<body>

  </a>
  <button class="qb-hamburger" aria-label="Toggle navigation menu" aria-expanded="false"

<main id="nfMain">
  <!-- /directory/<slug> profile loads here; if the path doesn't match,
       we fall back to a plain 404 message. -->
  <div class="nf-wrap" id="nfBoot"><div class="up-loading">Loading…</div></div>
</main>

<script>
  // GH Pages serves this file as the response body for any unmatched path.
  // We sniff the requested URL, and either render the profile shell or a
  // standard 404 message.
  (function () {
    const path = location.pathname.replace(/\/+$/, "");
    const m = path.match(/^\/directory\/([a-z0-9._-]+)$/i);
    const main = document.getElementById("nfMain");
    if (!m) {
      main.innerHTML = `
        <div class="nf-wrap">
          <h1 class="nf-h">Page not found</h1>
          <p class="nf-p">The URL <code>${path || "/"}</code> doesn't match anything on the site.</p>
          <p><a class="nf-back" href="/index.html">← Back to home</a></p>
        </div>`;
      return;
    }
    // Hand the slug to profile.js; it'll resolve it against staff.json and
    // render into <div id="upRoot">.
    window.__profileSlug = m[1].toLowerCase();
    main.className = "up-page";
    main.innerHTML = `<div id="upRoot"><div class="up-loading">Loading…</div></div>`;
    const s = document.createElement("script");
    s.src = "/profile.js?v=1779052620";
    document.body.appendChild(s);
  })();
</script>
<script src="/nav.js?v=1779034196" defer></script>
</body>
