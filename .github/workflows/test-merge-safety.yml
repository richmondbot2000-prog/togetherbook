name: Merge-safety tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  merge-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run merge-safety suite
        run: python3 scripts/test_merge_safety.py
