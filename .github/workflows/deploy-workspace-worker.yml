name: Deploy workspace worker

on:
  workflow_dispatch:
    inputs:
      rotate_bookr_secret:
        description: "Also push BOOKR_SERVICE_ACCOUNT_JSON to the worker before deploying."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_ACTIVITY_DB_ID:     ${{ secrets.D1_ACTIVITY_DB_ID }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Deploy (optionally rotating BOOKR secret)
        env:
          BOOKR_SERVICE_ACCOUNT_JSON: ${{ github.event.inputs.rotate_bookr_secret == 'true' && secrets.BOOKR_SERVICE_ACCOUNT_JSON || '' }}
        run: python3 scripts/deploy_workspace_worker.py
