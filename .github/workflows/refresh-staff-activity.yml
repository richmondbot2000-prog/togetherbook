name: Refresh staff activity

# Two outputs:
#   staff-activity.json          legacy 60-d aggregate (last-active +
#                                 write-count per Workspace user)
#   staff-activity-buckets.json  permanent per-(user, date, 15-min)
#                                 bucket store + warehouse + Google
#                                 detail events.
#
# Scheduled run: 12:00 UTC every day. Pulls yesterday's bucket data
# once and merges it into the permanent store; the 60-day aggregate
# always overwrites.
#
# Manual run (workflow_dispatch): accepts a date range so an Org admin
# can force-refresh a whole month from the Activity page's "Refresh
# data" button. The worker triggers this with `start_date` /
# `end_date` inputs.

on:
  schedule:
    - cron: '17 12 * * *'      # 12:17 UTC daily — one-shot for yesterday
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Buckets start date (YYYY-MM-DD, inclusive). Default = yesterday UTC.'
        required: false
        default: ''
      end_date:
        description: 'Buckets end date (YYYY-MM-DD, inclusive). Default = same as start.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh-staff-activity
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u +%Y-%m-%d)
          if [ -f staff-activity.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('staff-activity.json')).get('snapshot_date',''))")
          else
            CURRENT=""
          fi
          echo "expected=$EXPECTED  current=$CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ] && [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
            echo "Snapshot already taken for $EXPECTED — skipping (scheduled run)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Microsoft ODBC Driver 18
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet pyodbc==5.*

      - name: Scan staff activity
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: python scripts/scan_staff_activity.py

      - name: Scan staff activity buckets (merge yesterday or admin-selected range)
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
          ACTIVITY_START_DATE: ${{ inputs.start_date }}
          ACTIVITY_END_DATE:   ${{ inputs.end_date }}
        continue-on-error: true
        run: python scripts/scan_staff_activity_buckets.py

      - name: Scan comm items (per-message detail for activity drill-down)
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
          ACTIVITY_START_DATE:  ${{ inputs.start_date }}
          ACTIVITY_END_DATE:    ${{ inputs.end_date }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_ACTIVITY_DB_ID:     ${{ secrets.D1_ACTIVITY_DB_ID }}
        continue-on-error: true
        run: python scripts/scan_comm_items.py

      - name: Install Google API deps (for Workspace activity merge)
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet google-api-python-client==2.* google-auth==2.*

      - name: Merge Google Workspace activity (login / gmail / drive / meet / chat / calendar / admin)
        if: steps.guard.outputs.skip != 'true'
        env:
          WORKSPACE_SERVICE_ACCOUNT_JSON: ${{ secrets.WORKSPACE_SERVICE_ACCOUNT_JSON }}
          WORKSPACE_DELEGATE_USER:        ${{ secrets.WORKSPACE_DELEGATE_USER }}
          ACTIVITY_START_DATE: ${{ inputs.start_date }}
          ACTIVITY_END_DATE:   ${{ inputs.end_date }}
        # No-ops cleanly if the SA doesn't have the
        # admin.reports.audit.readonly scope yet — logs the 403 and
        # leaves staff-activity-buckets.json as the warehouse scanner
        # produced it.
        continue-on-error: true
        run: python scripts/scan_google_workspace_activity.py

      - name: Commit if staff-activity*.json changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in staff-activity.json staff-activity-buckets.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          if git diff --cached --quiet; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          ACTIVE=$(python -c "import json; print(json.load(open('staff-activity.json'))['active_count'])")
          git commit -m "Refresh staff activity: ${ACTIVE} active in last 60d (+ 14d buckets)"
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts"
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
          done
