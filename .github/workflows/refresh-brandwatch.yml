name: Refresh brandwatch

# Pulls recent public mentions of Together Loans and TransformCredit from
# Trustpilot, Reddit, and Google News and commits brandwatch.json back to
# main. The kids site reads that JSON on the Brandwatch page.
#
# Same hourly + guard + retry-on-rebase pattern as refresh-yesterday-payouts
# and refresh-row-counts: GitHub Actions cron is unreliable on free public
# repos, so we try every hour from 06:00–23:00 UTC and skip cleanly once the
# day's snapshot is already in the file.

on:
  schedule:
    - cron: '0 6-23 * * *'
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-brandwatch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u +%Y-%m-%d)
          if [ -f brandwatch.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('brandwatch.json')).get('snapshot_date',''))")
          else
            CURRENT=""
          fi
          echo "expected_snapshot_date=$EXPECTED  current_snapshot_date=$CURRENT  event=${GITHUB_EVENT_NAME:-}"
          if [ "$CURRENT" = "$EXPECTED" ] && [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
            echo "Snapshot already taken for $EXPECTED — skipping (scheduled run)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Refreshing: have '$CURRENT', want '$EXPECTED' (manual=${GITHUB_EVENT_NAME:-})."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet 'requests>=2.31'

      - name: Scan
        if: steps.guard.outputs.skip != 'true'
        env:
          # Optional — only set if a Reddit OAuth app is registered. When
          # present, the scanner uses authenticated calls (reliable from
          # cloud IPs). When absent, it falls back to anonymous reads
          # (Reddit increasingly 403s these from cloud-IP runners).
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # Optional — when set, Trustpilot and BBB requests route through
          # ScraperAPI (residential-IP proxy + Cloudflare bypass). 25 credits
          # per request; 5,000-credit free tier is plenty for this site's
          # daily-scan footprint. When absent, those two sources will 403.
          SCRAPERAPI_KEY:       ${{ secrets.SCRAPERAPI_KEY }}
          # Optional — YouTube Data API v3 key. Free quota of 10,000 units/day;
          # one search costs 100 units. When absent, fetch_youtube returns []
          # gracefully so the rest of the scan still runs.
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/scan_brandwatch.py

      - name: Diff new mentions (for email)
        if: steps.guard.outputs.skip != 'true'
        id: diff
        run: |
          set -euo pipefail
          python3 scripts/diff_brandwatch_mentions.py | tee /tmp/diff.out
          grep '^has_new=' /tmp/diff.out >> "$GITHUB_OUTPUT"

      - name: Build email body
        if: steps.guard.outputs.skip != 'true' && steps.diff.outputs.has_new == 'true'
        id: body
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/email_body.html
          import json, html
          mentions = json.load(open('notify-mentions.json'))
          rows = []
          for m in mentions:
              rows.append(
                  "<tr style='border-bottom:1px solid #eee'>"
                  f"<td style='padding:6px 10px;vertical-align:top;font-family:monospace;color:#888'>{html.escape(m.get('source','') or '')}</td>"
                  f"<td style='padding:6px 10px;vertical-align:top'>{html.escape(m.get('brand','') or '')}</td>"
                  f"<td style='padding:6px 10px;vertical-align:top'>{html.escape(m.get('date','') or '')}</td>"
                  f"<td style='padding:6px 10px;vertical-align:top'>"
                  f"<a href=\"{html.escape(m.get('url','') or '#')}\">{html.escape((m.get('title') or m.get('snippet') or '(no title)')[:140])}</a>"
                  f"<div style='color:#666;font-size:12px;margin-top:2px'>{html.escape((m.get('snippet') or '')[:300])}</div>"
                  "</td></tr>"
              )
          body = (
              f"<p>{len(mentions)} new brand mention(s) detected (excluding BBB / Reviewcentre).</p>"
              "<table style='border-collapse:collapse;font-family:sans-serif;font-size:14px'>"
              "<thead><tr style='text-align:left;border-bottom:2px solid #333'>"
              "<th style='padding:6px 10px'>Source</th><th style='padding:6px 10px'>Brand</th>"
              "<th style='padding:6px 10px'>Date</th><th style='padding:6px 10px'>Mention</th>"
              "</tr></thead><tbody>" + "".join(rows) + "</tbody></table>"
              "<p style='color:#888;font-size:12px;margin-top:24px'>"
              "Sent automatically by TogetherBook/refresh-brandwatch."
              "</p>"
          )
          print(body)
          PY
          COUNT=$(python -c "import json; print(len(json.load(open('notify-mentions.json'))))")
          echo "subject=[Brandwatch] ${COUNT} new mention(s)" >> "$GITHUB_OUTPUT"

      - name: Send email
        if: steps.guard.outputs.skip != 'true' && steps.diff.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: TogetherBook Brandwatch <${{ secrets.SMTP_USERNAME }}>
          to: james.benamor@rgroup.co.uk, compliance@togetherloans.com
          subject: ${{ steps.body.outputs.subject }}
          html_body: file:///tmp/email_body.html
          convert_markdown: false

      - name: Commit if brandwatch.json or seen-state changed
        # Gated on success() so a Send email failure does NOT push the
        # updated brandwatch-seen.json — otherwise the new mentions would
        # be silently marked as already-emailed and never re-tried. With
        # success() the next run starts from the last good seen-state
        # and will re-send the email when SMTP comes back.
        if: steps.guard.outputs.skip != 'true' && success()
        run: |
          set -euo pipefail
          git add brandwatch.json brandwatch-seen.json
          if git diff --cached --quiet; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          N=$(python -c "import json; d=json.load(open('brandwatch.json')); print(d['totals']['all'])")
          DATE=$(python -c "import json; d=json.load(open('brandwatch.json')); print(d.get('snapshot_date',''))")
          git commit -m "Refresh brandwatch: ${N} mentions on ${DATE}"

          # If a sibling refresh-* workflow committed in parallel, the push
          # will be rejected. Rebase onto the latest main and retry.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts"
              exit 1
            fi
            echo "Push rejected (concurrent commit); rebasing and retrying (attempt $attempt)…"
            git fetch origin main
            git rebase origin/main
          done
