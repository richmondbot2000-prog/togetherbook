name: Refresh 1st Contact

# Pulls the first inbound email each US borrower / guarantor sent us after
# their loan was paid out (3-month rolling window) and commits
# first-contact.json back to main so 1stcontact.html stays current.
#
# Same hourly + guard + retry-on-rebase pattern as the other refresh-*
# workflows.

on:
  schedule:
    - cron: '0 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-1st-contact
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u +%Y-%m-%d)
          if [ -f first-contact.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('first-contact.json')).get('snapshot_date',''))")
          else
            CURRENT=""
          fi
          echo "expected_snapshot_date=$EXPECTED  current_snapshot_date=$CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ]; then
            echo "Snapshot already taken for $EXPECTED — skipping the rest of the job."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Need to refresh: have '$CURRENT', want '$EXPECTED'."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Microsoft ODBC Driver 18
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet pyodbc==5.*

      - name: Scan
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: python scripts/scan_first_contact.py

      - name: Commit if first-contact.json changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Stage first so untracked-new-file shows up in --cached diff.
          git add first-contact.json
          if git diff --cached --quiet -- first-contact.json; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          N=$(python -c "import json; d=json.load(open('first-contact.json')); print(d['totals']['items'])")
          DATE=$(python -c "import json; d=json.load(open('first-contact.json')); print(d.get('snapshot_date',''))")
          git commit -m "Refresh 1st-contact: ${N} items on ${DATE}"

          # Sibling refresh-* workflows can race; rebase + retry up to 3 times.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts"
              exit 1
            fi
            echo "Push rejected (concurrent commit); rebasing and retrying (attempt $attempt)…"
            git fetch origin main
            git rebase origin/main
          done
