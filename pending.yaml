# Canonical pending-work registry for TogetherBook.
#
# This file is the single source of truth for open / blocked / parked work.
# `scripts/render_pending.py` reads it and re-renders three targets:
#   - SPEC.md §17 (between <!-- PENDING:BEGIN --> markers)
#   - ~/Desktop/wiki/CLAUDE_CONTEXT.md §8 (same)
#   - pending.html — a page on the site, linked from System nav
#
# Editing convention: change THIS file, then run `python3 scripts/render_pending.py`.
# Never hand-edit the rendered blocks — they get clobbered on next render.
#
# Statuses:
#   pending      — known to need doing, no progress yet
#   in-progress  — partial work has shipped; more remains
#   shipped-pending-config  — code is live, awaits a one-time human action (secret, grant, etc.)
#   blocked      — needs an external party (Kamran, Ben Gardner, Humand support…)
#   parked       — accepted-not-doing or low-priority backlog
#   done         — kept briefly for history then garbage-collected
#
# Priority: 1 = ship next / unblock something material, 2 = real value but no fire, 3 = backlog
#
# Schema (per item):
#   id            (string, kebab-case, unique)
#   title         (string, headline)
#   status        (one of the above)
#   priority      (1 | 2 | 3)
#   created       (YYYY-MM-DD)
#   tags          (list of: ui, auth, scanner, worker, docs, infra, data-quality, integrations)
#   blocker       (one-line, who/what is blocking)  — only for status=blocked
#   detail        (free text, can be multi-line; markdown-light)

