  - id: auth0-chip-secrets
    title: Auth0 → Directory chip — awaiting Management API secrets
    status: shipped-pending-config
    priority: 2
    created: 2026-05-17
    tags: [auth, integrations]
    detail: |
      Scanner (`scan_auth0.py`) + workflow (`refresh-auth0.yml`) + chip rendering
      shipped 2026-05-17 (commit `014e171`). One-time setup required to activate:
        1. Create Management API M2M app at https://manage.auth0.com/#/apis
           (Auth0 Management API → Machine to Machine Applications → name
           "TogetherBook directory reader", scope `read:users` only)
        2. Paste `AUTH0_CLIENT_ID` + `AUTH0_CLIENT_SECRET` into GitHub repo secrets
        3. `gh workflow run refresh-auth0.yml --ref main`
      Until done, every Directory row renders without the AUTH0 chip and the
      header banner omits the active-Auth0 count.

