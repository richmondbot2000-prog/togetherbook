<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TogetherBOOK — Wall</title>
<link rel="icon" type="image/png" href="site-icon.png">
<link rel="apple-touch-icon" href="site-icon.png">
<link rel="stylesheet" href="quiet-tokens.css?v=1778923602">
<link rel="stylesheet" href="quiet.css?v=1778923602">
<link rel="stylesheet" href="quiet-extras.css?v=1778923602">
<style>
  /* 648 px column — sweet spot per editorial line-length research
     (60–75 chars per line at 15 px body). Wider feels marketing-y. */
  .wl-section { max-width: 648px; margin: 0 auto; padding: 18px 0 48px; }
  @media (max-width: 800px) { .wl-section { padding: 8px 12px 32px; } }

  /* Compose form — the only true card on the page (the inkwell).
     Brass left rule + 'a new page' eyebrow makes the compose card
     visually quote the feed below. */
  .wl-compose {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    border-radius: 0;
    padding: 20px 22px;
    margin: 0 0 24px;
  }
  .wl-compose-eyebrow {
    font: italic 500 13px/1 var(--font-display);
    color: var(--red-500);
    text-transform: lowercase;
    letter-spacing: 0.02em;
    margin: 0 0 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .wl-compose-eyebrow::before {
    content: ""; flex: 0 0 36px; height: 1px;
    background: var(--brass-300);
  }
  .wl-compose-row { display: flex; gap: 12px; align-items: flex-start; }
  .wl-compose-row .wl-avatar { flex: 0 0 auto; }
  .wl-compose textarea {
    flex: 1 1 auto;
    width: 100%; min-height: 64px; max-height: 320px;
    border: 1px solid var(--paper-300);
    border-radius: 0;
    padding: 10px 12px;
    font: 400 16px/1.55 var(--font-display);
    color: var(--ink-900);
    background: white;
    resize: vertical;
  }
  .wl-compose textarea::placeholder { font-style: italic; color: var(--ink-500); }
  .wl-compose textarea:focus { outline: 1px solid var(--brass-500); border-color: var(--brass-500); }
  .wl-compose-actions {
    display: flex; gap: 10px; align-items: center;
    margin-top: 10px; justify-content: space-between;
  }
  .wl-compose-actions-left { display: flex; gap: 10px; align-items: center; }
  .wl-char-count { font: 500 11px/1 var(--font-mono); color: var(--ink-500); }
  .wl-char-count.over { color: var(--red-500); font-weight: 700; }
  /* Post action — italic Newsreader text label, brass underline. Echoes
     the .qb-link-action pattern used elsewhere on the site (e.g. helper
     "see more" links). Solid coloured buttons are explicitly out of the
     Quiet Edition system. */
  .wl-btn-post {
    background: none; border: none;
    color: var(--ink-800);
    font: italic 600 16px/1.2 var(--font-display);
    padding: 8px 4px;
    border-bottom: 1.5px solid var(--brass-500);
    cursor: pointer;
    min-height: 40px;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .wl-btn-post::after { content: " →"; font-style: normal; }
  .wl-btn-post:disabled { opacity: 0.45; cursor: not-allowed; }
  .wl-btn-post:hover:not(:disabled) { color: var(--red-500); border-bottom-color: var(--red-500); }
  /* Compose attach buttons (Photo / Video / GIF) — flat outline icons + label. */
  .wl-attach-btn {
    background: transparent;
    border: 1px solid var(--paper-300);
    color: var(--ink-700);
    border-radius: 4px;
    padding: 6px 10px;
    font: 500 12px/1 var(--font-display);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 36px;
  }
  .wl-attach-btn:hover { color: var(--ink-900); border-color: var(--brass-500); }
  .wl-attach-btn .wl-icon { width: 18px; height: 18px; }
  .wl-attach-btn input[type=file] { display: none; }
  .wl-compose-previews { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .wl-compose-preview {
    position: relative; width: 88px; height: 88px;
    border-radius: 4px; overflow: hidden;
    border: 1px solid var(--paper-300);
    background: var(--paper-100);
  }
  .wl-compose-preview img,
  .wl-compose-preview video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wl-compose-preview .wl-remove {
    position: absolute; top: 2px; right: 2px;
    width: 22px; height: 22px;
    border-radius: 50%; border: none;
    background: rgba(0,0,0,0.55); color: white;
    font-size: 14px; line-height: 22px;
    cursor: pointer; padding: 0;
  }
  .wl-compose-preview .wl-remove:hover { background: rgba(0,0,0,0.8); }
  .wl-compose-preview.is-uploading::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    animation: wl-pulse 1.2s ease-in-out infinite;
  }
  @keyframes wl-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* Inline icon attach buttons inside a comment / reply composer */
  .wl-comment-attach {
    background: none; border: none;
    color: var(--ink-600);
    padding: 6px; cursor: pointer;
    display: inline-flex; align-items: center;
    min-width: 36px; min-height: 36px;
    justify-content: center;
    border-radius: 4px;
  }
  .wl-comment-attach:hover { color: var(--red-500); }
  .wl-comment-attach .wl-icon { width: 18px; height: 18px; }
  .wl-comment-attach input[type=file] { display: none; }
  .wl-comment-photos { margin-top: 6px; display: grid; gap: 2px; border-radius: 4px; overflow: hidden; max-width: 100%; }
  .wl-comment-photos.cm-1 { grid-template-columns: 1fr; }
  .wl-comment-photos.cm-2 { grid-template-columns: 1fr 1fr; }
  .wl-comment-photos.cm-3 { grid-template-columns: 1fr 1fr 1fr; }
  .wl-comment-photos.cm-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .wl-comment-photos img, .wl-comment-photos video {
    width: 100%; max-height: 240px; object-fit: cover; cursor: zoom-in;
    background: var(--paper-200);
  }
  .wl-comment-photos.cm-1 img, .wl-comment-photos.cm-1 video {
    max-height: 320px; object-fit: contain;
  }

  /* GIF picker — paper-card on ink scrim, no radius / shadow. */
  .wl-gif-panel {
    position: fixed; inset: 0; z-index: 2500;
    background: rgba(17, 25, 46, 0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wl-gif-modal {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    width: 100%; max-width: 640px; max-height: 80vh;
    display: flex; flex-direction: column;
    border-radius: 0; overflow: hidden;
  }
  .wl-gif-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
  }
  .wl-gif-head input {
    flex: 1 1 auto;
    border: 1px solid var(--paper-300);
    border-radius: 4px;
    padding: 8px 12px;
    font: 400 14px/1.4 var(--font-body);
    background: white;
  }
  .wl-gif-head input:focus { outline: 2px solid var(--ink-700); border-color: var(--ink-700); }
  .wl-gif-close { background: none; border: none; cursor: pointer; padding: 6px; color: var(--ink-700); }
  .wl-gif-close:hover { color: var(--ink-900); }
  /* CSS-columns masonry — each GIF shows in its natural aspect ratio,
     packed by the browser into 3 columns (2 on mobile). The container
     scrolls vertically. No more square crop / top-30% slice. */
  .wl-gif-grid {
    flex: 1 1 auto; overflow-y: auto;
    column-count: 3; column-gap: 4px;
    padding: 10px;
  }
  .wl-gif-tile {
    display: block;
    cursor: pointer; background: var(--paper-100); overflow: hidden;
    border: 1px solid var(--paper-300);
    border-radius: 3px;
    margin-bottom: 4px;
    break-inside: avoid;
    width: 100%;
  }
  .wl-gif-tile img { width: 100%; height: auto; display: block; }
  .wl-gif-tile:hover { border-color: var(--brass-500); }
  .wl-gif-attribution {
    padding: 6px 14px;
    font: 400 10px/1 var(--font-mono);
    color: var(--ink-500); text-align: right;
    border-top: 1px solid var(--divider);
  }
  @media (max-width: 480px) {
    .wl-gif-grid { column-count: 2; }
  }

  /* Avatars — circular medallion with a 1 px brass ring (echoes the
     qb-monogram pattern on index.html). Initials inside use italic
     Newsreader (helper-monogram style). */
  .wl-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--paper-100);
    box-shadow: 0 0 0 1px var(--brass-300);
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font: italic 600 14px/1 var(--font-display);
    color: var(--brass-600);
    flex-shrink: 0;
  }
  .wl-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* Post as a hairline-divided row (not a card). Matches the rest of
     Quiet Edition's row-based composition (helpers, robots, commandments).
     The compose form below is the only true card on the page. */
  .wl-post {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink-500);
    border-radius: 0;
    margin: 0;
    padding: 24px 0 20px;
  }
  .wl-section > #wlFeed > .wl-post:first-of-type {
    border-top: 1px solid var(--ink-500);
  }
  .wl-post-head { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
  .wl-post-head .wl-meta { flex: 1 1 auto; }
  .wl-post-name { font: 500 17px/1.3 var(--font-display); color: var(--ink-900); letter-spacing: -0.005em; }
  .wl-channel-tag {
    font: italic 400 13px/1 var(--font-display);
    color: var(--teal-500);
    margin-left: 4px;
  }
  .wl-channel-tag::before { content: "— "; color: var(--brass-500); font-style: normal; }
  /* Timestamp: italic overline pattern (matches qb-meta-label rhythm).
     ink-500 is fine here because we're at 11 px tracking-wide — overline
     scale exempts from the WCAG body-text 4.5:1 floor. */
  .wl-post-time {
    font: 400 11px/1 var(--font-body);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-top: 4px;
  }
  .wl-post-time .wl-time-dot { color: var(--brass-500); margin: 0 6px; }
  /* Body: Newsreader (--font-display), 16px / 1.55 — matches the editorial
     voice of commandments + helper blurbs across the site. */
  .wl-post-body {
    font: 400 16px/1.55 var(--font-display); color: var(--ink-800);
    white-space: pre-wrap; word-wrap: break-word; margin: 0 0 10px;
  }
  /* Line-clamp truncation (4 lines) — handles paragraphed AND wall-of-text
     posts uniformly. Removed when expanded. */
  .wl-post-body.is-clamped {
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* See more / See less — rendered as a <button> so Tab nav reaches it. */
  .wl-see-more {
    background: none; border: none;
    color: var(--teal-500); cursor: pointer;
    font: 600 14px/1.4 var(--font-display);
    display: inline-block; padding: 4px 0;
  }
  .wl-see-more:hover { text-decoration: underline; color: var(--link-hover); }
  .wl-see-more:focus { outline: 1px solid var(--brass-500); outline-offset: 2px; }

  /* Reaction pills — emoji glyph + count. Pill has a hairline outline
     so it reads on cream; "is-mine" lights the brass border + background.
     The emoji itself gets a per-emoji animation on hover, approximating
     Facebook's animated reaction kinetics (thumb taps, heart pulses,
     haha wobbles, wow stretches, sad teardrops, party shakes). */
  .wl-reactions {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin: 6px 0 2px;
    min-height: 28px;
  }
  .wl-react-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-radius: 14px;
    cursor: pointer;
    font: 500 13px/1.2 var(--font-mono);
    color: var(--ink-700);
    min-height: 28px;
  }
  .wl-react-pill .wl-emoji {
    font-size: 16px; line-height: 1;
    display: inline-block;
    transition: transform 180ms ease;
  }
  .wl-react-pill:hover { border-color: var(--brass-500); }
  .wl-react-pill:hover .wl-emoji { animation: var(--react-anim, wl-bounce) 600ms ease; }
  .wl-react-pill.is-mine {
    border-color: var(--brass-500);
    background: var(--brass-50);
    color: var(--ink-900);
  }
  .wl-react-pill.is-mine .wl-emoji { animation: wl-bounce-in 380ms cubic-bezier(.4,.0,.2,1.4); }
  /* Per-emoji animation personalities — approximations of FB's set. */
  .wl-emoji[data-anim="thumb"]  { --react-anim: wl-thumb;  }
  .wl-emoji[data-anim="heart"]  { --react-anim: wl-pulse;  }
  .wl-emoji[data-anim="haha"]   { --react-anim: wl-wobble; }
  .wl-emoji[data-anim="wow"]    { --react-anim: wl-stretch; }
  .wl-emoji[data-anim="sad"]    { --react-anim: wl-shake-down; }
  .wl-emoji[data-anim="party"]  { --react-anim: wl-shake;  }
  @keyframes wl-bounce-in   { 0% { transform: scale(0.4); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
  @keyframes wl-bounce      { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.25); } }
  @keyframes wl-thumb       { 0%,100%{ transform: rotate(0); } 30%{ transform: rotate(-18deg) scale(1.1); } 70%{ transform: rotate(8deg); } }
  @keyframes wl-pulse       { 0%,100%{ transform: scale(1); } 25%{ transform: scale(1.2); } 50%{ transform: scale(0.95); } 75%{ transform: scale(1.15); } }
  @keyframes wl-wobble      { 0%,100%{ transform: rotate(0); } 25%{ transform: rotate(-15deg); } 75%{ transform: rotate(15deg); } }
  @keyframes wl-stretch     { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.4, 0.9); } }
  @keyframes wl-shake-down  { 0%{ transform: translateY(0) rotate(0); } 50%{ transform: translateY(3px) rotate(-3deg); } 100%{ transform: translateY(0) rotate(0); } }
  @keyframes wl-shake       { 0%,100%{ transform: translateX(0) rotate(0); } 25%{ transform: translateX(-3px) rotate(-8deg); } 75%{ transform: translateX(3px) rotate(8deg); } }

  /* Reaction picker — horizontal row of large emoji buttons (Facebook
     reaction-bar shape). Each emoji animates on hover with its
     per-emoji keyframe (defined above). */
  .wl-emoji-popover {
    position: absolute; background: var(--paper-50);
    border: 1px solid var(--paper-300); border-radius: 24px;
    padding: 6px;
    display: flex; flex-direction: row; gap: 2px;
    z-index: 100;
  }
  .wl-emoji-popover button {
    background: transparent; border: none;
    font-size: 28px; line-height: 1;
    width: 44px; height: 44px;
    cursor: pointer; border-radius: 50%;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 180ms ease, background 180ms ease;
  }
  .wl-emoji-popover button:hover {
    background: var(--paper-100);
    transform: scale(1.35) translateY(-2px);
    animation: var(--react-anim, wl-bounce) 600ms ease infinite;
  }
  /* Tooltip below the picker on hover */
  .wl-emoji-popover button::after {
    content: attr(data-label);
    position: absolute; bottom: -22px;
    font: italic 500 12px/1 var(--font-display);
    color: var(--ink-700);
    background: var(--paper-50);
    padding: 2px 6px; border: 1px solid var(--paper-300);
    opacity: 0; pointer-events: none;
    transition: opacity 100ms ease 200ms;
    white-space: nowrap;
  }
  .wl-emoji-popover button:hover::after { opacity: 1; }

  /* Reaction + comment summary (above the action bar) */
  .wl-reaction-summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0 6px;
    font: 500 13px/1.2 var(--font-display);
    color: var(--ink-600);
    min-height: 24px;
  }
  .wl-reaction-summary .wl-comment-count.has-new {
    color: var(--red-500); font-weight: 700;
  }

  /* Action bar — Like / Comment, equal-spaced, 44pt tall. No borders
     (single hairline below the post separates it from the next post).
     Tap Like applies the default 👍 (= "Noted"); long-press opens the
     6-named-reaction picker. Share dropped — internal company wall;
     everyone's already on the same site behind Cloudflare Access. */
  .wl-action-bar {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--ink-300);
    border-bottom: none;
    margin: 8px 0 4px;
    padding-top: 4px;
  }
  .wl-action {
    background: none; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--ink-700);
    padding: 11px 8px;        /* 44 pt touch target */
    min-height: 44px;
    font: 600 13px/1 var(--font-display);
    color: var(--ink-700);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .wl-action:hover { color: var(--red-500); }
  .wl-action.is-active { color: var(--brass-600); }
  .wl-action-icon { line-height: 1; display: inline-flex; align-items: center; }
  .wl-action-label {
    font: italic 500 14px/1 var(--font-display);
    letter-spacing: 0;
  }
  @media (max-width: 480px) {
    .wl-action-label { display: none; }
    .wl-action-icon svg { width: 26px; height: 26px; }
  }

  /* Comment composer */
  .wl-comment-composer { display: flex; gap: 8px; align-items: center; margin: 6px 0 8px; }
  .wl-comment-composer .wl-avatar { width: 32px; height: 32px; font-size: 11px; }
  .wl-comment-composer input.wl-comment-input {
    flex: 1 1 auto; min-width: 0;
    border: 1px solid var(--paper-300);
    border-radius: 16px;
    padding: 8px 14px;
    /* 16 px minimum — anything smaller and iOS Safari auto-zooms the whole
       page when the input takes focus, dramatically reshuffling the layout. */
    font: 400 16px/1.4 var(--font-body);
    background: white;
  }
  .wl-comment-composer input.wl-comment-input:focus { outline: 1px solid var(--brass-500); }

  /* Delete (trash) icon button shown next to each post/comment/reply when
     the viewer is the author or an admin. */
  .wl-delete-btn {
    background: none; border: none;
    color: var(--ink-500);
    padding: 6px; border-radius: 4px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; min-height: 32px;
  }
  .wl-delete-btn:hover { color: var(--red-500); background: var(--paper-100); }
  .wl-delete-btn svg { width: 16px; height: 16px; }
  .wl-post-head-actions { display: flex; align-items: center; gap: 4px; }

  /* Confirm modal — small dialog with ink-900 backdrop */
  .wl-confirm-panel {
    position: fixed; inset: 0; z-index: 2700;
    background: rgba(17,25,46,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wl-confirm-modal {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--red-500);
    border-radius: 0;
    padding: 22px 26px;
    max-width: 440px; width: 100%;
  }
  .wl-confirm-modal h3 {
    margin: 0 0 8px;
    font: 600 18px/1.2 var(--font-display);
    color: var(--ink-900);
  }
  .wl-confirm-modal p {
    margin: 0 0 18px;
    font: 400 14px/1.45 var(--font-body);
    color: var(--ink-700);
  }
  .wl-confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .wl-confirm-cancel, .wl-confirm-ok {
    background: none; border: none;
    color: var(--ink-700);
    padding: 8px 4px;
    font: italic 500 14px/1.2 var(--font-display);
    border-bottom: 1.5px solid transparent;
    cursor: pointer;
    min-height: 36px;
  }
  .wl-confirm-cancel { border-bottom-color: var(--brass-300); }
  .wl-confirm-cancel:hover { color: var(--ink-900); border-bottom-color: var(--brass-500); }
  .wl-confirm-ok {
    color: var(--red-500);
    border-bottom-color: var(--red-500);
    font-weight: 600;
  }
  .wl-confirm-ok:hover { color: var(--red-700); border-bottom-color: var(--red-700); }

  /* Comments — hairline-divided rows, no chat-bubble fill. */
  .wl-comments { margin-top: 6px; }
  .wl-comment {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 0;
    border-top: 1px dashed var(--divider);
  }
  .wl-comment:first-child { border-top: none; }
  .wl-comment .wl-avatar { width: 32px; height: 32px; font-size: 11px; }
  .wl-comment-body { flex: 1 1 auto; background: none; border-radius: 0; padding: 0; }
  .wl-comment-name { font: 500 14px/1.3 var(--font-display); color: var(--ink-900); }
  .wl-comment-time {
    font: 400 10px/1 var(--font-body);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-left: 8px;
  }
  .wl-comment-time .wl-time-dot { color: var(--brass-500); margin: 0 4px; }
  .wl-comment-text {
    font: 400 15px/1.55 var(--font-display); color: var(--ink-800);
    margin-top: 3px; white-space: pre-wrap; word-wrap: break-word;
  }
  .wl-comment-actions { display: flex; gap: 12px; align-items: center; margin-top: 6px; }
  .wl-comment-actions .wl-react-pill { font-size: 11px; padding: 1px 7px; }
  .wl-reply-link {
    color: var(--ink-600); cursor: pointer;
    font: 600 12px/1 var(--font-display);
    background: none; border: none;
    padding: 8px 0;          /* 44 pt hit area */
    min-height: 28px;
  }
  .wl-reply-link:hover { color: var(--teal-500); }
  /* Replies: cap nesting at ONE visual level. All descendants of a top-level
     comment render in a single flat list inside .wl-replies. A brass curved
     tie-line in the indent gutter (drawn via ::before / ::after on each
     reply) signals the parent → child link without indenting further.
     Mirrors Facebook's pattern; survives narrow mobile viewports. */
  .wl-replies {
    position: relative;
    padding-left: 40px;
    margin-left: 0;
    border-left: none;
  }
  .wl-comment.is-reply {
    position: relative;
    padding: 10px 0;
    border-top: none;
  }
  .wl-comment.is-reply .wl-avatar { width: 28px; height: 28px; font-size: 10px; }
  /* Elbow: vertical drop from the top of this reply row into the avatar,
     then a curved 12 px corner reaching ~20 px right toward the avatar.
     Total elbow occupies the first ~22 px of the row vertically. */
  .wl-comment.is-reply::before {
    content: "";
    position: absolute;
    left: -28px;
    top: 0;
    width: 20px;
    height: 22px;
    border-left: 1px solid var(--brass-300);
    border-bottom: 1px solid var(--brass-300);
    border-bottom-left-radius: 12px;
    pointer-events: none;
  }
  /* For replies that aren't the last sibling, extend the trunk vertically
     so the line is unbroken between this elbow and the next reply's elbow. */
  .wl-comment.is-reply:not(:last-child)::after {
    content: "";
    position: absolute;
    left: -28px;
    top: 22px;
    bottom: 0;
    width: 1px;
    background: var(--brass-300);
    pointer-events: none;
  }
  /* "Replying to @Parent" prefix — shown on a reply whose parent is itself
     a reply, so the conversational flow is clear without nested indent. */
  .wl-reply-target {
    display: inline-block;
    margin-right: 6px;
    color: var(--brass-600, #A47829);
    font: italic 500 13px/1.4 var(--font-display);
  }
  .wl-reply-target a {
    color: #2c6cb8;
    text-decoration: none;
    font-style: normal;
    font-weight: 600;
  }
  .wl-reply-target a:hover { text-decoration: underline; }
  @media (max-width: 480px) {
    .wl-replies { padding-left: 28px; }
    .wl-comment.is-reply::before {
      left: -20px; width: 14px; height: 18px;
      border-bottom-left-radius: 8px;
    }
    .wl-comment.is-reply:not(:last-child)::after {
      left: -20px; top: 18px;
    }
    .wl-comment.is-reply .wl-avatar { width: 24px; height: 24px; font-size: 9px; }
  }
  .wl-show-all-comments {
    color: var(--teal-500); cursor: pointer;
    font: 600 13px/1.2 var(--font-display);
    padding: 10px 0; min-height: 44px;
    background: none; border: none;
  }
  .wl-show-all-comments:hover { text-decoration: underline; color: var(--link-hover); }

  /* Compact post tile (default in the feed). Click to expand. */
  .wl-post--compact {
    cursor: pointer;
    transition: background 120ms ease;
  }
  .wl-post--compact:hover { background: var(--paper-100); }
  .wl-post--compact:focus { outline: 2px solid var(--brass-500); outline-offset: -2px; }
  .wl-post-body--teaser { margin-bottom: 6px; }
  .wl-photo-strip {
    display: flex; gap: 4px;
    margin: 8px 0 6px;
    overflow: hidden;
  }
  .wl-photo-strip img,
  .wl-photo-strip .wl-photo-strip-more {
    width: 56px; height: 56px;
    object-fit: cover;
    border: 1px solid var(--paper-300);
    background: var(--paper-200);
    flex-shrink: 0;
  }
  .wl-photo-strip-more {
    display: flex; align-items: center; justify-content: center;
    font: italic 500 12px/1 var(--font-display);
    color: var(--ink-700);
  }
  .wl-compact-meta {
    display: flex; gap: 14px; align-items: center;
    margin: 4px 0 0;
    font: 500 12px/1 var(--font-mono);
    color: var(--ink-600);
  }
  .wl-compact-react { display: inline-flex; align-items: center; gap: 4px; }
  .wl-compact-react .wl-emoji { font-size: 14px; }
  .wl-compact-count.has-new { color: var(--red-500); font-weight: 700; }
  .wl-recent-comment {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--paper-100);
    border-left: 2px solid var(--brass-300);
    font: 400 13px/1.45 var(--font-display);
    color: var(--ink-700);
  }
  .wl-recent-comment .wl-recent-name { font-weight: 600; color: var(--ink-900); }

  /* Pagination strip at the bottom of the feed. */
  .wl-pagination {
    display: flex; justify-content: center; align-items: center; gap: 24px;
    padding: 24px 0 8px;
    font: italic 500 14px/1 var(--font-display);
    color: var(--ink-700);
  }
  .wl-pagination button {
    background: none; border: none;
    color: var(--ink-800);
    font: inherit;
    cursor: pointer;
    border-bottom: 1.5px solid var(--brass-300);
    padding: 6px 4px;
    min-height: 36px;
  }
  .wl-pagination button:hover:not(:disabled) {
    color: var(--red-500); border-bottom-color: var(--red-500);
  }
  .wl-pagination button:disabled {
    color: var(--ink-300); border-bottom-color: transparent;
    cursor: default;
  }
  .wl-pagination .wl-page-num {
    color: var(--ink-600);
    font-style: normal;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  /* URL inside a post body — italic + brass underline, opens in new tab. */
  .wl-post-link {
    color: var(--teal-500);
    text-decoration: none;
    border-bottom: 1px solid var(--brass-300);
    word-break: break-word;
  }
  .wl-post-link:hover { color: var(--red-500); border-bottom-color: var(--red-500); }

  /* YouTube embed sits below the body, native 16:9. */
  .wl-yt-embed {
    margin: 10px 0 4px;
    position: relative; width: 100%;
    aspect-ratio: 16 / 9;
    background: black;
    border: 1px solid var(--paper-300);
    overflow: hidden;
  }
  .wl-yt-embed iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: none;
  }

  /* Link-preview card */
  .wl-link-preview {
    display: flex; gap: 12px;
    margin: 10px 0 4px;
    padding: 12px 14px;
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    text-decoration: none;
    color: inherit;
  }
  .wl-link-preview:hover { border-color: var(--brass-500); }
  .wl-link-preview .wl-link-thumb {
    flex: 0 0 144px; height: 96px;
    background: var(--paper-200);
    overflow: hidden;
    border: 1px solid var(--paper-300);
  }
  .wl-link-preview .wl-link-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wl-link-preview .wl-link-body { flex: 1 1 auto; min-width: 0; }
  .wl-link-preview .wl-link-host {
    font: 400 10px/1 var(--font-mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-bottom: 4px;
  }
  .wl-link-preview .wl-link-title {
    font: 600 15px/1.3 var(--font-display);
    color: var(--ink-900); margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .wl-link-preview .wl-link-desc {
    font: 400 13px/1.4 var(--font-display);
    color: var(--ink-700);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .wl-link-preview .wl-link-thumb-empty {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font: italic 400 11px/1 var(--font-display);
    color: var(--ink-500);
  }
  @media (max-width: 480px) {
    .wl-link-preview .wl-link-thumb { flex-basis: 96px; height: 72px; }
    .wl-link-preview .wl-link-title { font-size: 14px; }
  }

  /* Photo grids — Facebook/LinkedIn pattern. Layout depends on count:
     1 → single image, native ratio, capped height, contain so screenshots
         don't get cropped (paper-200 backdrop fills the gaps).
     2 → side-by-side 1:1
     3 → 1 large left + 2 stacked right (Facebook's "P3 split")
     4 → 2×2 grid
     5+ → 3 visible + "+N more" overlay on the last; tap opens lightbox.
     All grids use a 2px gap; corners 4px. */
  .wl-photos { position: relative; margin: 10px 0 6px; display: grid; gap: 2px; border-radius: 4px; overflow: hidden; }
  .wl-photos .wl-photo {
    position: relative; cursor: zoom-in; background: var(--paper-200);
    overflow: hidden;
  }
  .wl-photos .wl-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wl-photos.count-1 { grid-template-columns: 1fr; }
  .wl-photos.count-1 .wl-photo { aspect-ratio: auto; max-height: 520px; }
  .wl-photos.count-1 .wl-photo img { object-fit: contain; max-height: 520px; }
  .wl-photos.count-2 { grid-template-columns: 1fr 1fr; }
  .wl-photos.count-2 .wl-photo { aspect-ratio: 1 / 1; }
  .wl-photos.count-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; aspect-ratio: 3 / 2; }
  .wl-photos.count-3 .wl-photo:nth-child(1) { grid-row: 1 / 3; }
  .wl-photos.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; aspect-ratio: 1 / 1; }
  .wl-photos.count-5plus { grid-template-columns: 1fr 1fr 1fr; aspect-ratio: 3 / 2; }
  .wl-photos.count-5plus .wl-photo { aspect-ratio: 1 / 1; }
  .wl-photo .wl-more-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font: 600 28px/1 var(--font-display);
    pointer-events: none;
  }
  /* Lightbox */
  .wl-lightbox {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .wl-lightbox img { max-width: 96vw; max-height: 92vh; object-fit: contain; }
  .wl-lightbox .wl-lightbox-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.12); color: white;
    width: 44px; height: 44px; border-radius: 50%;
    border: none; font-size: 24px; cursor: pointer;
  }
  .wl-lightbox .wl-lightbox-arrow.prev { left: 16px; }
  .wl-lightbox .wl-lightbox-arrow.next { right: 16px; }
  .wl-lightbox .wl-lightbox-close {
    position: absolute; top: 20px; right: 24px;
    background: transparent; color: var(--paper-50);
    border: none;
    font: italic 500 16px/1 var(--font-display);
    padding: 6px 0; cursor: pointer;
    border-bottom: 1px solid var(--paper-50);
    min-height: 44px;
  }
  .wl-lightbox .wl-lightbox-close:hover { color: var(--brass-300); border-bottom-color: var(--brass-300); }
  .wl-lightbox .wl-lightbox-count {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: white; font: 500 13px/1 var(--font-mono);
    background: rgba(255,255,255,0.12); padding: 6px 12px; border-radius: 12px;
  }

  /* Notification badge on the topbar Wall link */
  .qb-nav-link.wl-has-notif { position: relative; }
  .qb-nav-link.wl-has-notif::after {
    content: attr(data-notif);
    position: absolute; top: -4px; right: -14px;
    min-width: 16px; height: 16px;
    padding: 0 4px;
    background: var(--red-500);
    color: white; border-radius: 8px;
    font: 700 10px/16px var(--font-mono);
    text-align: center; box-sizing: border-box;
  }

  /* Sit below the topbar (72 / 64 / 56 px tall at the three breakpoints)
     so the bell never overlaps the brand or nav links. */
  .wl-notif-anchor { position: fixed; top: 84px; right: 16px; z-index: 1000; }
  @media (max-width: 960px) { .wl-notif-anchor { top: 76px; } }
  @media (max-width: 480px) { .wl-notif-anchor { top: 68px; right: 12px; } }
  .wl-notif-btn {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer; position: relative;
    color: var(--ink-700);
    display: flex; align-items: center; justify-content: center;
  }
  .wl-notif-btn:hover { color: var(--ink-900); border-color: var(--brass-500); }
  .wl-notif-btn .wl-icon { width: 20px; height: 20px; }
  .wl-icon { display: inline-block; vertical-align: middle; }
  .wl-notif-btn[data-count]:not([data-count="0"])::after {
    content: attr(data-count);
    position: absolute; top: -4px; right: -4px;
    min-width: 18px; height: 18px;
    background: var(--red-500); color: white;
    border-radius: 9px;
    font: 700 11px/18px var(--font-mono);
    padding: 0 5px; box-sizing: border-box;
  }
  .wl-notif-panel {
    position: absolute; top: 48px; right: 0;
    width: 320px; max-height: 420px; overflow-y: auto;
    background: var(--paper-50);
    border: 1px solid var(--paper-300); border-radius: 0;
    display: none;
  }
  .wl-notif-panel.is-open { display: block; }
  .wl-notif-head {
    padding: 10px 14px; border-bottom: 1px solid var(--paper-300);
    font: 600 13px/1 var(--font-display);
    display: flex; justify-content: space-between; align-items: center;
  }
  .wl-notif-mark { color: #2c6cb8; cursor: pointer; font-size: 12px; background: none; border: none; }
  .wl-notif-item {
    display: block; padding: 10px 14px;
    border-bottom: 1px solid var(--paper-200);
    text-decoration: none; color: var(--ink-900);
    font: 400 13px/1.4 var(--font-body);
  }
  .wl-notif-item:hover { background: var(--paper-100); }
  .wl-notif-item-time { font: 500 11px/1 var(--font-mono); color: var(--ink-500); margin-top: 2px; }
  .wl-notif-empty { padding: 24px 14px; text-align: center; color: var(--ink-500); font-style: italic; }

  /* @-mention chip inside a post / comment / reply body. Blue, links to
     user.html?email=<addr>. The chip survives bodyTeaser truncation
     because mention rendering runs on the truncated escaped text. */
  .wl-mention {
    color: #2c6cb8;
    text-decoration: none;
    font-weight: 600;
  }
  .wl-mention:hover { text-decoration: underline; }

  /* Autocomplete picker that appears under the compose textarea / comment /
     reply input when the user types @. Fixed-position floating panel. */
  .wl-mention-picker {
    position: fixed;
    z-index: 1100;
    background: var(--paper-50, white);
    border: 1px solid var(--ink-300, #B6BECF);
    max-height: 220px;
    overflow-y: auto;
    padding: 4px;
    font: 500 13px/1.3 var(--font-display, 'Newsreader', serif);
    min-width: 240px;
  }
  .wl-mention-item {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    padding: 6px 10px;
    background: transparent;
    border: 0;
    cursor: pointer;
    text-align: left;
    color: var(--ink-900);
  }
  .wl-mention-item:hover, .wl-mention-item.is-hl {
    background: var(--paper-200, #F5ECD4);
  }
  .wl-mention-item-name { font-weight: 600; }
  .wl-mention-item-local {
    font: 500 11px/1 var(--font-mono, 'JetBrains Mono', monospace);
    color: var(--ink-500);
    margin-left: 12px;
  }

  /* States */
  .wl-loading {
    text-align: center; padding: 24px;
    color: var(--ink-500);
    font: italic 400 14px/1.4 var(--font-display);
  }
  .wl-empty {
    background: transparent;
    border: 1px dashed var(--brass-300);
    padding: 40px 24px; text-align: center;
    color: var(--ink-600);
    font: italic 400 17px/1.5 var(--font-display);
    border-radius: 0;
  }
  .wl-empty::before {
    content: "❦"; display: block;
    font: 400 22px/1 var(--font-display);
    color: var(--brass-500);
    margin: 0 0 12px;
    font-style: normal;
  }

  /* Toast banner — paper-on-ink, no radius, no shadow. */
  .wl-banner {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: var(--ink-900); color: var(--paper-50);
    padding: 10px 18px; border-radius: 0;
    font: italic 500 14px/1 var(--font-display);
    border: 1px solid var(--brass-500);
    z-index: 2000;
  }
  .wl-banner.is-error { background: var(--red-500); border-color: var(--red-700); }
</style>
</head>

<script>
(function () {
  "use strict";
  let posts = [];
  let staffByEmail = {};
  let annotationsMap = {};   // email (lowercase) → annotation entry (incl. directory_photo_uploaded_at)
  let viewerEmail = "";
  let viewerName  = "";
  let viewerPhoto = "";
  let viewerIsAdmin = false; // true → can delete anyone's post / comment / reply
  let lastSeenByPost = {};
  // Notification events the viewer has individually clicked on. Each is a
  // stable string ID computed by eventIdFor(); persisted server-side under
  // by_user[viewer].seen_events in wall-seen.json. Independent of the
  // post-level lastSeenByPost timestamp — that's the "mark all read" path.
  let seenEvents = new Set();
  const openPostIds   = new Set();
  const expandedPostIds = new Set();
  const openReplyTo   = new Set();
  // Pagination: 20 posts per page; one expanded at a time. Reset to 0
  // when the post list reloads (after compose / delete / sort).
  const POSTS_PER_PAGE = 20;
  let currentPage = 0;
  // Cache of OG link-preview responses keyed by URL — survives the
  // session (sessionStorage); each entry is { title, description, image, host }.
  const linkPreviewCache = {};

  // Facebook's settled answer: 6 reactions. Larger sets measurably slow
  // decision time (their A/B test). We store as emoji keys (so old data
  // round-trips), but render as named italic Newsreader to fit Quiet
  // Edition — full-colour Apple emoji on cream paper read as fridge
  // magnets stuck to a manuscript. The first entry is the default
  // applied on a plain Like tap.
  const REACTIONS = ["👍", "❤️", "😂", "😮", "😢", "🎉"];
  const DEFAULT_REACTION = REACTIONS[0];
  // Storage key (emoji) → display label (used in notifications + a11y
  // tooltip) + the anim key that picks the per-emoji CSS keyframe.
  const REACTION_META = {
    "👍": { label: "Like",       past: "liked",          anim: "thumb" },
    "❤️": { label: "Love",       past: "loved",          anim: "heart" },
    "😂": { label: "Haha",       past: "laughed at",     anim: "haha"  },
    "😮": { label: "Wow",        past: "was wowed by",   anim: "wow"   },
    "😢": { label: "Sad",        past: "was sad at",     anim: "sad"   },
    "🎉": { label: "Celebrate",  past: "celebrated",     anim: "party" },
  };
  function reactionLabel(emoji) { return (REACTION_META[emoji] || {}).label || emoji; }
  function reactionPast(emoji)  { return (REACTION_META[emoji] || {}).past  || "reacted to"; }
  function reactionAnim(emoji)  { return (REACTION_META[emoji] || {}).anim  || ""; }
  // Wrap an emoji glyph in a span with the right data-anim attribute so
  // CSS applies the matching per-emoji animation on hover/insert.
  function emojiGlyph(emoji) {
    const a = reactionAnim(emoji);

  function icon(name, active) {
    const i = ICONS[name];
    if (!i) return "";
    return `<svg class="wl-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">${active ? i.filled : i.outline}</svg>`;
  }

  Promise.all([
    fetch("wall.json",        { cache: "no-store" }).then(r => r.ok ? r.json() : { posts: [] }).catch(() => ({ posts: [] })),
    fetch("staff.json",       { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("wall-seen.json",   { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch(`${WALL_API}/whoami`, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("annotations.json", { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("admins.json",      { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([wall, staff, seen, who, annFile, adminsFile]) => {
    const adminEmails = new Set(((adminsFile && adminsFile.admins) || []).map(e => (e || "").toLowerCase()));
    posts = Array.isArray(wall.posts) ? wall.posts : [];
    if (staff && Array.isArray(staff.users)) {
      for (const u of staff.users) {
        const k = (u.email || "").toLowerCase();
        if (k) staffByEmail[k] = u;
      }
    }
    buildStaffByLocal();
    if (annFile && annFile.annotations && typeof annFile.annotations === "object") {
      annotationsMap = annFile.annotations;
    }
    if (who && who.email) {
      viewerEmail = who.email.toLowerCase();
      const me = staffByEmail[viewerEmail];
      viewerName  = (me && me.name)  || who.name  || viewerEmail.split("@")[0];
      viewerPhoto = (me && photoUrlFor(me)) || "";
      viewerIsAdmin = adminEmails.has(viewerEmail);
      document.getElementById("wlMyAvatar").innerHTML = avatarInner(viewerName, viewerPhoto);
      document.getElementById("wlCompose").style.display = "";
    }
    if (seen && seen.by_user && seen.by_user[viewerEmail]) {
      lastSeenByPost = seen.by_user[viewerEmail].posts || {};
      seenEvents = new Set(seen.by_user[viewerEmail].seen_events || []);
    }
    sortPosts();
    // Initial deep-link jump (if any) — relies on jumpToPost which
    // both bell clicks and the hashchange handler also call.
    const hashId = (location.hash || "").replace(/^#post-/, "");
    if (hashId) jumpToPost(decodeURIComponent(hashId), { skipScroll: true });
    renderFeed();
    renderNotifications();
    if (hashId) {
      requestAnimationFrame(() => {
        const el = document.getElementById(`post-${decodeURIComponent(hashId)}`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }).catch(err => {
    document.getElementById("wlFeed").innerHTML =
      `<div class="wl-empty">Wall failed to load: ${escapeHtml(String(err))}</div>`;
  });

  const composeText = document.getElementById("wlComposeText");
  const charCount = document.getElementById("wlCharCount");
  const postBtn = document.getElementById("wlPostBtn");
  const previewsEl = document.getElementById("wlComposePreviews");
  let composeAttachments = [];

  function refreshComposeState() {
    const n = composeText.value.length;
    charCount.textContent = `${n.toLocaleString()} / 10,000`;
    charCount.classList.toggle("over", n > 10000);
    postBtn.disabled = (n === 0 && composeAttachments.length === 0) || n > 10000;
  }
  composeText.addEventListener("input", refreshComposeState);

  function renderComposePreviews() {
    previewsEl.innerHTML = composeAttachments.map((a, i) => {
      const inner = a.kind === "video"
        ? `<video src="${escapeHtml(a.preview)}" muted></video>`
        : `<img src="${escapeHtml(a.preview)}" alt="">`;
      return `<div class="wl-compose-preview ${a.uploading ? "is-uploading" : ""}" data-att-idx="${i}">${inner}<button type="button" class="wl-remove" data-remove-att="${i}" aria-label="Remove">×</button></div>`;
    }).join("");
    previewsEl.querySelectorAll("[data-remove-att]").forEach(el => {
      el.addEventListener("click", e => {
        e.preventDefault();
        composeAttachments.splice(parseInt(el.dataset.removeAtt, 10), 1);
        renderComposePreviews(); refreshComposeState();
      });
    });
  }

  // Render attach-button icons at boot.
  document.getElementById("wlIconPhoto").innerHTML = icon("photo", false);
  document.getElementById("wlIconVideo").innerHTML = icon("video", false);
  document.getElementById("wlIconGif").innerHTML   = icon("gif",   false);

  document.getElementById("wlComposePhotoInput").addEventListener("change", e => {
    handleFilePick(Array.from(e.target.files || []), "photo");
    e.target.value = "";
  });
  document.getElementById("wlComposeVideoInput").addEventListener("change", e => {
    handleFilePick(Array.from(e.target.files || []), "video");
    e.target.value = "";
  });
  document.getElementById("wlComposeGifBtn").addEventListener("click", () => {
    openGifPicker(gif => {
      composeAttachments.push({ path: gif.url, kind: "gif", preview: gif.preview });
      renderComposePreviews(); refreshComposeState();
    });
  });

  async function handleFilePick(files, kind) {
    if (!files.length) return;
    const take = kind === "video" ? Math.min(files.length, 2) : Math.min(files.length, 10);
    for (const f of files.slice(0, take)) await ingestFile(f, kind);
    renderComposePreviews(); refreshComposeState();
  }
  async function ingestFile(file, kind) {
    let dataUrl;
    try {
      dataUrl = kind === "photo"
        ? await resizeImage(file, 1600, 0.85)
        : await readAsDataUrl(file);
    } catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    const att = { path: "", kind, preview: dataUrl, uploading: true };
    composeAttachments.push(att); renderComposePreviews();
    try {
      const res = await wallAction("upload-media", { data_url: dataUrl, kind });
      if (!res || !res.path) throw new Error("upload returned no path");
      att.path = res.path; att.uploading = false;
      renderComposePreviews();
    } catch (err) {
      const i = composeAttachments.indexOf(att);
      if (i >= 0) composeAttachments.splice(i, 1);
      renderComposePreviews();
      showBanner("Upload failed: " + (err.message || err), true);
    }
  }
  function readAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => reject(new Error("read failed"));
      r.readAsDataURL(file);
    });
  }
  function resizeImage(file, maxDim, quality) {
    return new Promise(async (resolve, reject) => {
      try {
        const src = await readAsDataUrl(file);
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else        { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => reject(new Error("image decode failed"));
        img.src = src;
      } catch (e) { reject(e); }
    });
  }

  postBtn.addEventListener("click", async () => {
    const body = composeText.value.trim();
    if (!body && composeAttachments.length === 0) return;
    if (composeAttachments.some(a => a.uploading)) {
      showBanner("Wait for uploads to finish", true); return;
    }
    postBtn.disabled = true; postBtn.textContent = "Posting…";
    try {
      const photos = composeAttachments.map(a => a.path).filter(Boolean);
      const res = await wallAction("post", { body, photos });
      if (res && res.post) {
        posts.unshift(res.post);
        currentPage = 0; // jump back to the newest page so the author sees their post
        sortPosts(); renderFeed(); renderNotifications();
      }
      composeText.value = "";
      composeAttachments = [];
      renderComposePreviews();
      charCount.textContent = "0 / 10,000";
      showBanner("Posted");
    } catch (err) {
      showBanner(err.message || String(err), true);
    } finally {
      postBtn.disabled = false; postBtn.textContent = "Post this page";
    }
  });

  // ── GIF picker (via /api/wall/gif-search → GIPHY) ─────────────────
  let gifPickerState = null;
  function openGifPicker(onPick) {
    closeGifPicker();
    const root = document.createElement("div");
    root.className = "wl-gif-panel";
    root.innerHTML = `
      <div class="wl-gif-modal" role="dialog" aria-label="GIF picker">
        <div class="wl-gif-head">
          <input type="search" placeholder="Search GIFs + memes…" id="wlGifQuery" autocomplete="off">
          <button class="wl-gif-close" aria-label="Close">${icon("close", false)}</button>
        </div>
        <div class="wl-gif-grid" id="wlGifGrid"><div class="wl-loading">Loading…</div></div>
        <div class="wl-gif-attribution">Powered by GIPHY</div>
      </div>`;
    document.body.appendChild(root);
    const input = root.querySelector("#wlGifQuery");
    const grid  = root.querySelector("#wlGifGrid");
    input.focus();
    let debounce = null;
    const load = async (q) => {
      grid.innerHTML = `<div class="wl-loading">Searching…</div>`;
      try {
        const res = await wallAction("gif-search", { q, limit: 24 });
        const results = (res && res.results) || [];
        if (!results.length) { grid.innerHTML = `<div class="wl-loading">No results.</div>`; return; }
        grid.innerHTML = results.map(g =>
          `<div class="wl-gif-tile" data-gif='${escapeHtml(JSON.stringify({ url: g.url, preview: g.preview }))}'>
             <img src="${escapeHtml(g.preview)}" alt="${escapeHtml(g.title)}" loading="lazy">
           </div>`
        ).join("");
        grid.querySelectorAll(".wl-gif-tile").forEach(t => {
          t.addEventListener("click", () => {
            try { onPick(JSON.parse(t.dataset.gif)); } catch (e) {}
            closeGifPicker();
          });
        });
      } catch (err) {
        grid.innerHTML = `<div class="wl-loading">${escapeHtml(err.message || String(err))}</div>`;
      }
    };
    input.addEventListener("input", () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => load(input.value.trim()), 250);
    });
    root.querySelector(".wl-gif-close").addEventListener("click", closeGifPicker);
    root.addEventListener("click", e => { if (e.target === root) closeGifPicker(); });
    const onKey = e => { if (e.key === "Escape") closeGifPicker(); };
    document.addEventListener("keydown", onKey);
    gifPickerState = { root, onKey };
    load("");
  }
  function closeGifPicker() {
    if (!gifPickerState) return;
    gifPickerState.root.remove();
    document.removeEventListener("keydown", gifPickerState.onKey);
    gifPickerState = null;
  }

  // Navigate to a specific post: jump to the page that contains it,
  // expand it, scroll it into view. Used by:
  //   - initial page load (#post-<id> hash)
  //   - hashchange (user clicked a link with #post-<id>)
  //   - notification bell entries (data-jump handler)
  //   - Share — copies a #post-<id> URL that lands here on the recipient
  function jumpToPost(postId, opts) {
    if (!postId) return;
    const idx = posts.findIndex(p => p.id === postId);
    if (idx < 0) return;
    currentPage = Math.floor(idx / POSTS_PER_PAGE);
    expandedPostIds.clear();
    expandedPostIds.add(postId);
    openPostIds.add(postId);
    renderFeed();
    if (opts && opts.skipScroll) return;
    requestAnimationFrame(() => {
      const el = document.getElementById(`post-${postId}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }
  window.addEventListener("hashchange", () => {
    const h = (location.hash || "").replace(/^#post-/, "");
    if (h) jumpToPost(decodeURIComponent(h));
  });

  function renderFeed() {
    const root = document.getElementById("wlFeed");
    if (!posts.length) {
      root.innerHTML = `<div class="wl-empty">No pages yet. Write the first.</div>`;
      return;
    }
    const total = posts.length;
    const totalPages = Math.max(1, Math.ceil(total / POSTS_PER_PAGE));
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    if (currentPage < 0) currentPage = 0;
    const start = currentPage * POSTS_PER_PAGE;
    const slice = posts.slice(start, start + POSTS_PER_PAGE);
    root.innerHTML = slice.map(renderPost).join("") + renderPagination(currentPage, totalPages);
    wireFeed();
    hydrateLinkPreviews();
  }
  function renderPagination(page, total) {
    if (total <= 1) return "";
    return `<nav class="wl-pagination" aria-label="Wall pagination">
      <button type="button" data-page-prev ${page === 0 ? "disabled" : ""}>← Newer</button>
      <span class="wl-page-num">Page ${page + 1} of ${total}</span>
      <button type="button" data-page-next ${page >= total - 1 ? "disabled" : ""}>Older →</button>
    </nav>`;
  }
  function sortPosts() {
    posts.forEach(p => { p._sortKey = mostRecentActivity(p); });
    posts.sort((a, b) => (a._sortKey < b._sortKey ? 1 : a._sortKey > b._sortKey ? -1 : 0));
  }
  function mostRecentActivity(post) {
    let latest = post.created_at || "";
    for (const c of (post.comments || [])) {
      if ((c.created_at || "") > latest) latest = c.created_at;
    }
    return latest;
  }

  // Posts have two states:
  //   COMPACT (default in the feed) — author header, 250-char body
  //     teaser, small media row, reaction + comment counts, and the
  //     most recent today-comment as a 100-char teaser. The whole
  //     article is clickable to expand.
  //   EXPANDED — full body, full photo grid, action bar, all comments,
  //     reply composers. Reached by clicking the compact card.
  function renderPost(post) {
    const expanded = expandedPostIds.has(post.id);
    return expanded ? renderPostExpanded(post) : renderPostCompact(post);
  }

  function renderPostHead(post) {
    const name = displayName(post.author_email, post.author_name);
    const photo = photoUrlFor(staffByEmail[(post.author_email || "").toLowerCase()] || {});
    const channelTag = post.channel
      ? ` <span class="wl-channel-tag">${escapeHtml(post.channel)}</span>` : "";
    const canDeletePost = canDelete(post.author_email);
    return `
      <div class="wl-post-head">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div class="wl-meta">
          <div class="wl-post-name">${escapeHtml(name)}${channelTag}</div>
          <div class="wl-post-time">${formatTime(post.created_at)}</div>
        </div>
        ${canDeletePost ? `<div class="wl-post-head-actions"><button class="wl-delete-btn" data-delete-post="${escapeHtml(post.id)}" title="Delete this post" aria-label="Delete post" data-stop-card-click>${icon("trash", false)}</button></div>` : ""}
      </div>`;
  }

  function renderPostCompact(post) {
    const comments = post.comments || [];
    const cmCount = comments.filter(c => !c.parent_comment_id).length;
    const newCount = unseenCommentCount(post);
    // Latest comment or reply made today (UTC slice — close enough)
    const today = new Date().toISOString().slice(0, 10);
    const recent = comments
      .filter(c => (c.created_at || "").slice(0, 10) === today)
      .sort((a, b) => (a.created_at < b.created_at ? 1 : -1))[0] || null;
    const myReaction = mineReactionOn(post.reactions || {});
    const reactCount = Object.values(post.reactions || {}).reduce((n, arr) => n + arr.length, 0);
    const body250 = bodyTeaser(post.body || "", 250);
    const photoStrip = renderPhotoStrip(post.photos || [], post.id);
    const linkBlocks = renderLinkBlocks(post.body || "", post.id);
    const recentLine = recent
      ? `<div class="wl-recent-comment"><span class="wl-recent-name">${escapeHtml(displayName(recent.author_email, recent.author_name))}</span>: ${escapeHtml(bodyTeaser(recent.body || "(media)", 100))}</div>`
      : "";
    const likeActive = !!myReaction;
    return `
      <article class="wl-post wl-post--compact" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}" data-expand-card="${escapeHtml(post.id)}" role="button" tabindex="0" aria-label="Open post for full view">
        ${renderPostHead(post)}
        <div class="wl-post-body wl-post-body--teaser">${enrichBody(body250)}</div>
        ${photoStrip}
        ${linkBlocks}
        <div class="wl-compact-meta">
          ${reactCount > 0 ? `<span class="wl-compact-react">${myReaction ? emojiGlyph(myReaction) : emojiGlyph("👍")} ${reactCount}</span>` : ""}
          ${cmCount > 0 ? `<span class="wl-compact-count ${newCount > 0 ? "has-new" : ""}">${cmCount} ${cmCount === 1 ? "comment" : "comments"}${newCount > 0 ? ` · ${newCount} new` : ""}</span>` : ""}
        </div>
        ${recentLine}
        <div class="wl-action-bar" data-stop-card-click>
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" data-stop-card-click title="Tap to ${likeActive ? "remove your reaction" : "Like"}; hover to pick a different reaction">
            <span class="wl-action-icon">${likeActive ? emojiGlyph(myReaction) : icon("thumb", false)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Like"}</span>
          </button>
          <button class="wl-action" data-comment-on="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
          <button class="wl-action" data-share="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("share", false)}</span>
            <span class="wl-action-label">Share</span>
          </button>
        </div>
      </article>`;
  }

  function renderPostExpanded(post) {
    const bodyText = post.body || "";
    const bodyHtml = enrichBody(bodyText);
    const linkBlocks = renderLinkBlocks(bodyText, post.id);
    const photos = renderPhotos(post.photos || [], post.id);
    const reactions = renderReactionPills(post.reactions || {}, post.id, "post");
    const comments = post.comments || [];
    const cmCount = comments.filter(c => !c.parent_comment_id).length;
    const open = openPostIds.has(post.id);
    const newCount = unseenCommentCount(post);
    const myReaction = mineReactionOn(post.reactions || {});
    const likeActive = !!myReaction;
    return `
      <article class="wl-post" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}">
        ${renderPostHead(post)}
        <div class="wl-post-body">${bodyHtml}</div>
        ${linkBlocks}
        <button type="button" class="wl-see-more" data-expand="${escapeHtml(post.id)}" data-collapse="1">Show less</button>
        ${photos}
        <div class="wl-reaction-summary">
          <div>${reactions}</div>
          <span class="wl-comment-count ${newCount > 0 ? "has-new" : ""}">
            ${cmCount === 0 ? "" : (cmCount + (cmCount === 1 ? " comment" : " comments")) + (newCount > 0 ? ` · ${newCount} new` : "")}
          </span>
        </div>
        <div class="wl-action-bar">
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" title="Tap to ${likeActive ? "remove your reaction" : "Like"}; hover to pick a different reaction">
            <span class="wl-action-icon">${likeActive ? emojiGlyph(myReaction) : icon("thumb", false)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Like"}</span>
          </button>
          <button class="wl-action" data-toggle-comments="${escapeHtml(post.id)}">
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
          <button class="wl-action" data-share="${escapeHtml(post.id)}">
            <span class="wl-action-icon">${icon("share", false)}</span>
            <span class="wl-action-label">Share</span>
          </button>
        </div>
        <div class="wl-comment-composer">
          <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
          <input class="wl-comment-input" type="text" placeholder="Add a comment…" data-add-comment="${escapeHtml(post.id)}" ${viewerEmail ? "" : "disabled"} maxlength="2000">
          ${commentAttachButtons(post.id, "")}
        </div>
        ${renderComments(post, true)}
      </article>`;
  }

  function bodyTeaser(s, n) {
    const t = (s || "").trim().replace(/\s+/g, " ");
    return t.length <= n ? t : t.slice(0, n - 1) + "…";
  }

  // URL → clickable link with brass-underline styling. Used in compact
  // body teasers + the expanded body. Doesn't try to be RFC-perfect —
  // matches http(s):// URLs up to whitespace.
  const URL_RX = /\b(https?:\/\/[^\s<>"']+)/g;
  function linkifyBody(escapedText) {
    // Caller passes already-escapeHtml'd text.
    return escapedText.replace(URL_RX, (m) => {
      const safe = m.replace(/"/g, "&quot;");
      return `<a class="wl-post-link" href="${safe}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();">${m}</a>`;
    });
  }
  function enrichBody(rawText) {
    return renderMentionsInHtml(linkifyBody(escapeHtml(rawText || "")));
  }

  // === @-mentions ===========================================================
  // Two halves: rendering and autocomplete. Rendering replaces "@local" in
  // post bodies with a blue link to user.html when local matches a known
  // staff member. Autocomplete watches the compose textarea / comment / reply
  // inputs for "@..." and pops a filtered staff list under the caret.
  let staffByLocal = {};
  function buildStaffByLocal() {
    staffByLocal = {};
    for (const u of Object.values(staffByEmail)) {
      const lp = ((u.email || "").split("@")[0] || "").toLowerCase();
      if (lp) staffByLocal[lp] = u;
    }
  }
  function localPart(email) { return ((email || "").split("@")[0] || "").toLowerCase(); }
  // Match "@local" only when preceded by start-of-string or whitespace; the
  // local-part runs as long as it's a-z, 0-9, dot, dash, or underscore.
  // Operates on already-escaped + linkified HTML — URLs end up wrapped in
  // <a> tags whose visible href content doesn't contain "@\w" preceded by
  // whitespace, so we don't double-process them.
  const MENTION_RX_RENDER = /(^|\s)@([a-z0-9._-]+)/gi;
  function renderMentionsInHtml(html) {
    return html.replace(MENTION_RX_RENDER, (full, lead, local) => {
      const u = staffByLocal[local.toLowerCase()];
      if (!u) return full;
      const name = u.name || u.email;
      return `${lead}<a class="wl-mention" href="user.html?email=${escapeHtml(u.email.toLowerCase())}" onclick="event.stopPropagation();">@${escapeHtml(name)}</a>`;
    });
  }

  // Picker — single DOM element reused across all input fields.
  const mentionPicker = document.createElement("div");
  mentionPicker.className = "wl-mention-picker";
  mentionPicker.style.display = "none";
  document.body.appendChild(mentionPicker);
  let mentionState = null; // { input, atIdx, query, matches, hl }

  function findMentionContext(input) {
    const v = input.value || "";
    const pos = input.selectionStart || 0;
    const before = v.slice(0, pos);
    const atIdx = before.lastIndexOf("@");
    if (atIdx < 0) return null;
    // Must be start-of-string OR whitespace before the @
    if (atIdx > 0 && !/\s/.test(before[atIdx - 1])) return null;
    const query = before.slice(atIdx + 1);
    // Stop the picker if the query has any whitespace or invalid chars —
    // the user has moved past the @-token.
    if (!/^[a-z0-9._-]*$/i.test(query)) return null;
    return { atIdx, query };
  }
  function showMentionPicker(input, ctx) {
    const q = ctx.query.toLowerCase();
    const all = Object.values(staffByEmail);
    // Match by local-part prefix, then by name word-prefix as a secondary.
    const byLocal = all.filter(u => localPart(u.email).startsWith(q));
    const byName = q.length >= 2
      ? all.filter(u => {
          if (byLocal.includes(u)) return false;
          return (u.name || "").toLowerCase().split(/\s+/).some(w => w.startsWith(q));
        })
      : [];
    const matches = [...byLocal, ...byName]
      .sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email))
      .slice(0, 8);
    if (!matches.length) { hideMentionPicker(); return; }
    mentionState = { input, atIdx: ctx.atIdx, query: ctx.query, matches, hl: 0 };
    renderMentionPicker();
    positionMentionPicker(input);
    mentionPicker.style.display = "";
  }
  function renderMentionPicker() {
    if (!mentionState) return;
    mentionPicker.innerHTML = mentionState.matches.map((u, i) => {
      const lp = localPart(u.email);
      return `<button type="button" class="wl-mention-item ${i === mentionState.hl ? "is-hl" : ""}" data-mention-pick="${escapeHtml(u.email)}">
        <span class="wl-mention-item-name">${escapeHtml(u.name || u.email)}</span>
        <span class="wl-mention-item-local">@${escapeHtml(lp)}</span>
      </button>`;
    }).join("");
    mentionPicker.querySelectorAll("[data-mention-pick]").forEach(btn => {
      // mousedown — not click — so it fires before the input's blur handler
      // (otherwise the picker dismisses before we can read its value).
      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        pickMention(btn.dataset.mentionPick);
      });
    });
  }
  function positionMentionPicker(input) {
    const rect = input.getBoundingClientRect();
    mentionPicker.style.left = `${Math.max(8, rect.left)}px`;
    mentionPicker.style.top  = `${rect.bottom + 4}px`;
    mentionPicker.style.width = `${Math.max(240, Math.min(rect.width, 360))}px`;
  }
  function hideMentionPicker() {
    mentionPicker.style.display = "none";
    mentionState = null;
  }
  function pickMention(email) {
    if (!mentionState) return;
    const { input, atIdx } = mentionState;
    const v = input.value || "";
    const pos = input.selectionStart || 0;
    const lp = localPart(email);
    const replacement = `@${lp} `;
    const before = v.slice(0, atIdx);
    const after = v.slice(pos);
    input.value = before + replacement + after;
    const newPos = atIdx + replacement.length;
    input.setSelectionRange(newPos, newPos);
    hideMentionPicker();
    input.focus();
    input.dispatchEvent(new Event("input", { bubbles: true }));
  }
  function maybeOpenMention(input) {
    const ctx = findMentionContext(input);
    if (!ctx) { hideMentionPicker(); return; }
    showMentionPicker(input, ctx);
  }
  function isMentionTarget(t) {
    return !!t && (t.id === "wlComposeText" || (t.classList && t.classList.contains("wl-comment-input")));
  }
  document.addEventListener("input", e => {
    if (isMentionTarget(e.target)) maybeOpenMention(e.target);
  });
  document.addEventListener("keydown", e => {
    if (!mentionState || e.target !== mentionState.input) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      mentionState.hl = (mentionState.hl + 1) % mentionState.matches.length;
      renderMentionPicker();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      mentionState.hl = (mentionState.hl - 1 + mentionState.matches.length) % mentionState.matches.length;
      renderMentionPicker();
    } else if (e.key === "Enter" || e.key === "Tab") {
      e.preventDefault();
      pickMention(mentionState.matches[mentionState.hl].email);
    } else if (e.key === "Escape") {
      e.preventDefault();
      hideMentionPicker();
    }
  });
  document.addEventListener("click", e => {
    if (!mentionState) return;
    if (!mentionPicker.contains(e.target) && e.target !== mentionState.input) {
      hideMentionPicker();
    }
  }, true);
  window.addEventListener("scroll", () => { if (mentionState) hideMentionPicker(); }, true);
  // ==========================================================================

  // Detect YouTube vs other URLs in the body, render the appropriate
  // block below the body in expanded view.
  function renderLinkBlocks(rawText, postId) {
    const urls = (rawText || "").match(URL_RX) || [];
    if (!urls.length) return "";
    const seen = new Set();
    return urls.filter(u => !seen.has(u) && seen.add(u)).slice(0, 3).map(url => {
      const yt = matchYouTube(url);
      if (yt) {
        return `<div class="wl-yt-embed"><iframe src="https://www.youtube-nocookie.com/embed/${escapeHtml(yt)}" loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>`;
      }
      return `<a class="wl-link-preview" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" data-link-preview="${escapeHtml(url)}" data-post="${escapeHtml(postId)}" onclick="event.stopPropagation();">
                <div class="wl-link-thumb"><div class="wl-link-thumb-empty">Loading preview…</div></div>
                <div class="wl-link-body">
                  <div class="wl-link-host">${escapeHtml(safeHost(url))}</div>
                  <div class="wl-link-title">${escapeHtml(url)}</div>
                  <div class="wl-link-desc">Loading…</div>
                </div>
              </a>`;
    }).join("");
  }
  function matchYouTube(url) {
    // youtu.be/<id> or youtube.com/watch?v=<id> or /embed/<id> or /shorts/<id>
    let m = url.match(/youtu\.be\/([\w-]{6,})/);
    if (m) return m[1];
    m = url.match(/youtube\.com\/(?:watch\?[^"\s]*?\bv=|embed\/|shorts\/|v\/)([\w-]{6,})/);
    if (m) return m[1];
    return null;
  }
  function safeHost(url) {
    try { return new URL(url).host; } catch (e) { return ""; }
  }

  // Compact-view photo strip — small thumbnails (52 px), max 4 visible.
  function renderPhotoStrip(photos, postId) {
    if (!photos || !photos.length) return "";
    const shown = photos.slice(0, 4);
    const extra = photos.length - shown.length;
    return `<div class="wl-photo-strip">` +
      shown.map(p => `<img class="wl-media-img" src="${escapeHtml(mediaUrl(p))}" alt="" loading="lazy">`).join("") +
      (extra > 0 ? `<div class="wl-photo-strip-more">+${extra}</div>` : "") +
      `</div>`;
  }

  function canDelete(authorEmail) {
    if (!viewerEmail) return false;
    if (viewerIsAdmin) return true;
    return (authorEmail || "").toLowerCase() === viewerEmail;
  }
  function commentAttachButtons(postId, parentCommentId) {
    if (!viewerEmail) return "";
    const key = parentCommentId ? `${postId}::${parentCommentId}` : postId;
    return `
      <label class="wl-comment-attach" title="Add photo">
        <input type="file" accept="image/*" data-cm-photo="${escapeHtml(key)}">
        ${icon("photo", false)}
      </label>
      <label class="wl-comment-attach" title="Add video">
        <input type="file" accept="video/*" data-cm-video="${escapeHtml(key)}">
        ${icon("video", false)}
      </label>
      <button type="button" class="wl-comment-attach" data-cm-gif="${escapeHtml(key)}" title="Add a GIF">
        ${icon("gif", false)}
      </button>`;
  }
  function renderCommentMedia(photos, commentId) {
    if (!photos || !photos.length) return "";
    const n = Math.min(photos.length, 4);
    const tiles = photos.slice(0, 4).map((p, i) => {
      const isVideo = /\.(mp4|webm|mov)$/i.test(p);
      const url = mediaUrl(p);
      return isVideo
        ? `<video src="${escapeHtml(url)}" controls playsinline></video>`
        : `<img class="wl-media-img" src="${escapeHtml(url)}" alt="" loading="lazy" data-cm-open-lightbox="${escapeHtml(commentId)}::${i}" tabindex="0" role="button" aria-label="Open image">`;
    }).join("");
    return `<div class="wl-comment-photos cm-${n}">${tiles}</div>`;
  }

  function mineReactionOn(rx) {
    if (!viewerEmail) return null;
    for (const [emoji, emails] of Object.entries(rx || {})) {
      if ((emails || []).map(e => (e || "").toLowerCase()).includes(viewerEmail)) return emoji;
    }
    return null;
  }

  // Body is rendered raw + clamped via CSS line-clamp; the "See more" link
  // is sibling-rendered in renderPost. No JS character slicing — keeps
  // paragraphed and dense posts treated uniformly.
  function renderBody(body, postId, expanded) {
    return escapeHtml(body);
  }

  // Per-count grid layout. Counts of 1/2/3/4 show every photo; 5+ shows
  // first 3 with a "+N" overlay on the 3rd. Tap opens the lightbox.
  function renderPhotos(photos, postId) {
    if (!photos.length) return "";
    const n = photos.length;
    let cls = "count-" + Math.min(n, 4);
    let visible = photos.slice();
    let overlayN = 0;
    if (n >= 5) {
      cls = "count-5plus";
      visible = photos.slice(0, 3);
      overlayN = n - 3;
    }
    const tiles = visible.map((p, i) => {
      const overlay = (overlayN > 0 && i === visible.length - 1)
        ? `<div class="wl-more-overlay">+${overlayN}</div>` : "";
      // Error fallback (still publishing 30-60s window) handled by an
      // attached listener in wireFeed, not inline onerror.
      return `<div class="wl-photo" data-open-lightbox="${escapeHtml(postId)}::${i}" role="button" tabindex="0" aria-label="Open image">
                <img class="wl-media-img" src="${escapeHtml(mediaUrl(p))}" alt="" loading="lazy">${overlay}
              </div>`;
    }).join("");
    return `<div class="wl-photos ${cls}">${tiles}</div>`;
  }

  // Render reactions as emoji-glyph pills. Each emoji animates per its
  // per-emoji keyframe on hover (thumb taps, heart pulses, etc.). Tap
  // mine to remove; tap another to switch.
  function renderReactionPills(rx, parentId, parentKind) {
    const entries = Object.entries(rx || {})
      .filter(([_, emails]) => Array.isArray(emails) && emails.length > 0)
      .sort((a, b) => b[1].length - a[1].length);
    if (!entries.length) return "";
    const pills = entries.slice(0, 6).map(([emoji, emails]) => {
      const mine = emails.map(e => (e || "").toLowerCase()).includes(viewerEmail);
      const names = emails.map(e => displayName(e, "")).filter(Boolean).join(", ");
      return `<button class="wl-react-pill ${mine ? "is-mine" : ""}" data-react="${escapeHtml(emoji)}" data-on="${escapeHtml(parentId)}" data-kind="${escapeHtml(parentKind)}" title="${escapeHtml(names)}">${emojiGlyph(emoji)} ${emails.length}</button>`;
    }).join("");
    return `<div class="wl-reactions">${pills}</div>`;
  }
  function renderComments(post, allOpen) {
    const comments = (post.comments || []).slice();
    if (!comments.length) return "";
    const topLevel = comments.filter(c => !c.parent_comment_id);
    topLevel.sort((a, b) => (a.created_at < b.created_at ? -1 : 1));
    // Preview 2 newest by default — Facebook/LinkedIn consensus.
    const showList = allOpen ? topLevel : topLevel.slice(-2);
    const hiddenN = topLevel.length - showList.length;
    const headerLink = !allOpen && hiddenN > 0
      ? `<button class="wl-show-all-comments" data-show-all="${escapeHtml(post.id)}">View ${hiddenN} earlier ${hiddenN === 1 ? "comment" : "comments"}</button>`
      : (allOpen && topLevel.length > 2
          ? `<button class="wl-show-all-comments" data-show-all="${escapeHtml(post.id)}" data-collapse="1">Show only most recent</button>`
          : "");
    return `<div class="wl-comments">${headerLink}${showList.map(c => renderComment(post, c)).join("")}</div>`;
  }
  // Collect every descendant of a top-level comment (replies, replies-to-
  // replies, etc.) and return them flat, sorted chronologically. Used by
  // renderComment to render the whole reply thread at one indent level.
  function gatherCommentDescendants(allComments, rootId) {
    const out = [];
    const seen = new Set();
    const stack = [rootId];
    while (stack.length) {
      const pid = stack.shift();
      for (const c of allComments) {
        if (c.parent_comment_id === pid && !seen.has(c.id)) {
          seen.add(c.id);
          out.push(c);
          stack.push(c.id);
        }
      }
    }
    return out.sort((a, b) => (a.created_at < b.created_at ? -1 : 1));
  }
  function renderComment(post, comment, opts) {
    const isReply = !!(opts && opts.isReply);
    const parentForPrefix = (opts && opts.parentForPrefix) || null;
    const name = displayName(comment.author_email, comment.author_name);
    const photo = photoUrlFor(staffByEmail[(comment.author_email || "").toLowerCase()] || {});
    const replyKey = `${post.id}::${comment.id}`;
    const replyComposerOpen = openReplyTo.has(replyKey);
    const myReaction = mineReactionOn(comment.reactions || {});
    const canDel = canDelete(comment.author_email);

    // Render-time "↳ ParentName" prefix on replies whose parent is itself a
    // reply (i.e. depth ≥ 2 in the data tree). Suppressed if the body
    // already begins with the parent's @-mention — author has disambiguated
    // explicitly. Keeps the thread readable even though everything below a
    // top-level comment renders at the same visual indent.
    let bodyPrefix = "";
    if (parentForPrefix) {
      const parentLocal = ((parentForPrefix.author_email || "").split("@")[0] || "").toLowerCase();
      const parentName = displayName(parentForPrefix.author_email, parentForPrefix.author_name);
      const parentEmail = (parentForPrefix.author_email || "").toLowerCase();
      const bodyTrim = (comment.body || "").trimStart().toLowerCase();
      const alreadyMentioned = parentLocal && bodyTrim.startsWith(`@${parentLocal}`);
      if (parentName && !alreadyMentioned) {
        bodyPrefix = `<span class="wl-reply-target">↳ <a href="user.html?email=${escapeHtml(parentEmail)}" onclick="event.stopPropagation();">${escapeHtml(parentName)}</a></span>`;
      }
    }
    const hasVisibleBody = bodyPrefix || (comment.body && comment.body.length);

    // Flatten descendants for the top-level render. Replies themselves never
    // recurse — every descendant ends up in this one .wl-replies block.
    let repliesHtml = "";
    if (!isReply) {
      const all = post.comments || [];
      const descendants = gatherCommentDescendants(all, comment.id);
      if (descendants.length) {
        repliesHtml = `<div class="wl-replies">${descendants.map(d => {
          const parent = all.find(x => x.id === d.parent_comment_id);
          const pfp = (parent && parent.id !== comment.id) ? parent : null;
          return renderComment(post, d, { isReply: true, parentForPrefix: pfp });
        }).join("")}</div>`;
      }
    }

    return `
      <div class="wl-comment ${isReply ? "is-reply" : ""}" data-comment="${escapeHtml(comment.id)}">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div style="flex:1;">
          <div class="wl-comment-body">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:6px;">
              <div>
                <span class="wl-comment-name">${escapeHtml(name)}</span>
                <span class="wl-comment-time">${formatTime(comment.created_at)}</span>
              </div>
              ${canDel ? `<button class="wl-delete-btn" data-delete-comment="${escapeHtml(post.id)}::${escapeHtml(comment.id)}" title="Delete this ${isReply ? "reply" : "comment"}" aria-label="Delete">${icon("trash", false)}</button>` : ""}
            </div>
            ${hasVisibleBody ? `<div class="wl-comment-text">${bodyPrefix}${enrichBody(comment.body || "")}</div>` : ""}
            ${renderCommentMedia(comment.photos || [], comment.id)}
            ${renderReactionPills(comment.reactions || {}, comment.id, "comment")}
          </div>
          <div class="wl-comment-actions">
            <button class="wl-reply-link wl-comment-like" data-like="${escapeHtml(comment.id)}" data-kind="comment" title="Tap to ${myReaction ? "remove your reaction" : "Like"}; long-press to pick a different reaction">
              ${myReaction ? `${emojiGlyph(myReaction)} ${reactionLabel(myReaction)}` : "Like"}
            </button>
            <button class="wl-reply-link" data-reply="${escapeHtml(replyKey)}">Reply</button>
          </div>
          ${replyComposerOpen ? `
            <div class="wl-comment-composer">
