<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TogetherBOOK — Wall</title>
<link rel="icon" type="image/png" href="site-icon.png">
<link rel="apple-touch-icon" href="site-icon.png">
<link rel="stylesheet" href="quiet-tokens.css?v=1778923602">
<link rel="stylesheet" href="quiet.css?v=1778923602">
<link rel="stylesheet" href="quiet-extras.css?v=1778923602">
<style>
  /* 648 px column — sweet spot per editorial line-length research
     (60–75 chars per line at 15 px body). Wider feels marketing-y. */
  .wl-section { max-width: 648px; margin: 0 auto; padding: 18px 0 48px; }
  @media (max-width: 800px) { .wl-section { padding: 8px 6px 32px; } }

  /* Compose form — the only true card on the page (the inkwell).
     Brass left rule + 'a new page' eyebrow makes the compose card
     visually quote the feed below. */
  .wl-compose {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    border-radius: 0;
    padding: 10px 14px 8px;
    margin: 0 0 24px;
  }
  /* Threads / Nextdoor-style compose: avatar inline with name on top,
     borderless textarea flush with the card body, thin icon strip + Post
     button along the bottom edge. The whole card looks like a sheet of
     paper the viewer is writing on, rather than a form with fields. */
  .wl-compose-top {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 4px;
  }
  .wl-compose-top .wl-avatar { width: 32px; height: 32px; font-size: 11px; flex: 0 0 auto; }
  .wl-compose-meta { min-width: 0; flex: 1 1 auto; line-height: 1.2; }
  .wl-compose-name {
    font: 600 14px/1.2 var(--font-body);
    color: var(--ink-900);
  }
  .wl-compose-sub {
    font: 400 11px/1.2 var(--font-body);
    color: var(--ink-500);
    margin-top: 2px;
  }
  .wl-compose textarea {
    width: 100%; box-sizing: border-box;
    min-height: 80px;
    /* No max-height — fitCompose() auto-grows the box on input so long
       posts push the page down rather than showing an inner scrollbar. */
    border: 0;
    border-radius: 0;
    padding: 6px 0 4px;
    font: 400 16px/1.45 var(--font-body);
    color: var(--ink-900);
    background: transparent;
    resize: none;
    display: block;
    outline: none;
    overflow: hidden;
  }
  .wl-compose textarea::placeholder { color: var(--ink-500); font-style: normal; }
  .wl-compose textarea:focus { outline: none; }
  /* Bottom strip — icon attach row on the left, counter + Post on the
     right, all on one line. Hairline separator above so the user reads
     the textarea + strip as one unit. */
  .wl-compose-actions {
    display: flex; gap: 2px; align-items: center;
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid var(--paper-300, #ECDFB6);
  }
  .wl-compose-attach { display: flex; gap: 2px; align-items: center; }
  .wl-char-count {
    font: 500 11px/1 var(--font-mono);
    color: var(--ink-500);
    margin-left: auto;
  }
  .wl-char-count.over { color: var(--red-500); font-weight: 700; }
  /* Post — filled brass, the page's primary CTA. Same brass-on-paper
     contrast as a Threads "Post" pill, sized to read as a button
     rather than a chip. */
  .wl-btn-post {
    background: var(--brass-500, #C8973F);
    color: var(--paper-50, white);
    border: 0;
    font: 600 13px/1 var(--font-body);
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 0;
    min-height: 32px;
    letter-spacing: 0.02em;
    margin-left: 10px;
    transition: background-color 140ms ease, color 140ms ease;
  }
  .wl-btn-post:hover:not(:disabled) { background: var(--brass-600, #A47829); }
  .wl-btn-post:disabled {
    background: var(--paper-300, #ECDFB6);
    color: var(--ink-500, #6B7794);
    cursor: not-allowed;
  }
  /* Icon-only attach buttons — no rectangular border, no text label.
     Hit area 36 × 36 px, hover background only. */
  .wl-attach-btn {
    background: transparent;
    border: 0;
    color: var(--ink-600);
    border-radius: 4px;
    padding: 0;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 36px; min-height: 36px;
    transition: background-color 140ms ease, color 140ms ease;
  }
  .wl-attach-btn:hover { color: var(--brass-600, #A47829); background: var(--paper-100); }
  .wl-attach-btn.is-active {
    background: var(--ink-900, #11192E);
    color: var(--paper-50, white);
  }
  .wl-attach-btn.is-active:hover { background: var(--ink-700, #2C3E66); color: var(--paper-50, white); }
  .wl-attach-btn .wl-icon { width: 22px; height: 22px; }
  .wl-attach-btn input[type=file] { display: none; }

  /* Poll chip in the compose area (between textarea and action strip)
     — summary line of the poll the user is about to attach. */
  .wl-compose-poll-slot:empty { display: none; }
  .wl-compose-poll-chip {
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--paper-100, #FBF6E9);
    border: 1px solid var(--brass-300, #E2BF74);
  }
  .wl-compose-poll-chip-icon { color: var(--brass-600, #A47829); display: inline-flex; }
  .wl-compose-poll-chip-icon .wl-icon { width: 18px; height: 18px; }
  .wl-compose-poll-chip-text { flex: 1 1 auto; min-width: 0; font: 500 13px/1.3 var(--font-body); color: var(--ink-900); display: flex; flex-direction: column; gap: 2px; }
  .wl-compose-poll-chip-text strong { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wl-compose-poll-chip-meta { font: 400 11px/1 var(--font-body); color: var(--ink-500); }
  .wl-compose-poll-chip-edit, .wl-compose-poll-chip-remove {
    background: transparent; border: 0; cursor: pointer; padding: 4px 6px;
    font: 500 12px/1 var(--font-body); color: var(--ink-700);
  }
  .wl-compose-poll-chip-edit:hover { color: var(--brass-600); }
  .wl-compose-poll-chip-remove { font-size: 18px; line-height: 1; color: var(--ink-500); }
  .wl-compose-poll-chip-remove:hover { color: var(--red-500); }

  /* Poll-create modal — same backdrop pattern as the GIF picker, sized
     for a question + up to 10 options. */
  .wl-poll-panel {
    position: fixed; inset: 0; z-index: 2500;
    background: rgba(17,25,46,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wl-poll-modal {
    background: var(--paper-50, white);
    border: 1px solid var(--ink-300, #B6BECF);
    max-width: 460px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    padding: 18px 18px 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .wl-poll-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0;
  }
  .wl-poll-head h2 { margin: 0; font: 600 16px/1.2 var(--font-body); color: var(--ink-900); }
  .wl-poll-close {
    background: transparent; border: 0; cursor: pointer; padding: 4px;
    color: var(--ink-600); display: inline-flex;
  }
  .wl-poll-close .wl-icon { width: 18px; height: 18px; }
  .wl-poll-label {
    font: 600 11px/1 var(--font-body); letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-500); margin: 0 0 4px;
  }
  .wl-poll-input, .wl-poll-option {
    width: 100%; box-sizing: border-box;
    border: 1px solid var(--paper-300, #ECDFB6);
    background: white; padding: 9px 12px;
    font: 400 15px/1.3 var(--font-body); color: var(--ink-900);
    border-radius: 0;
  }
  .wl-poll-input:focus, .wl-poll-option:focus {
    outline: 1px solid var(--brass-500); border-color: var(--brass-500);
  }
  .wl-poll-options { display: flex; flex-direction: column; gap: 6px; }
  .wl-poll-option-row { display: flex; gap: 6px; align-items: center; }
  .wl-poll-option-row .wl-poll-option { flex: 1 1 auto; min-width: 0; }
  .wl-poll-option-remove {
    background: transparent; border: 0; cursor: pointer; padding: 4px 8px;
    color: var(--ink-500); font: 500 18px/1 var(--font-body);
    min-width: 32px; min-height: 32px;
  }
  .wl-poll-option-remove:hover { color: var(--red-500); }
  .wl-poll-add {
    background: transparent; border: 1px dashed var(--brass-300);
    color: var(--brass-600); cursor: pointer; padding: 8px;
    font: 600 13px/1 var(--font-body);
    margin-top: 4px;
  }
  .wl-poll-add:hover { color: var(--ink-900); border-color: var(--brass-500); }
  .wl-poll-add:disabled { opacity: 0.4; cursor: not-allowed; }
  .wl-poll-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .wl-poll-cancel {
    background: transparent; border: 0; cursor: pointer;
    font: 500 13px/1 var(--font-body); color: var(--ink-600); padding: 9px 14px;
  }
  .wl-poll-save {
    background: var(--brass-500, #C8973F); color: var(--paper-50, white);
    border: 0; padding: 9px 18px; font: 600 13px/1 var(--font-body);
    cursor: pointer; min-height: 36px;
  }
  .wl-poll-save:hover:not(:disabled) { background: var(--brass-600, #A47829); }
  .wl-poll-save:disabled { background: var(--paper-300); color: var(--ink-500); cursor: not-allowed; }

  /* Rendered poll widget inside a post body. */
  .wl-poll {
    margin: 10px 0 4px;
    padding: 10px 12px;
    background: var(--paper-50, white);
    border: 1px solid var(--paper-300, #ECDFB6);
    border-left: 3px solid var(--brass-500, #C8973F);
  }
  .wl-poll-q {
    font: 600 15px/1.3 var(--font-body);
    color: var(--ink-900); margin: 0 0 8px;
  }
  .wl-poll-opts { display: flex; flex-direction: column; gap: 4px; }
  .wl-poll-opt {
    position: relative; cursor: pointer; user-select: none;
    background: var(--paper-100, #FBF6E9);
    border: 1px solid var(--paper-300, #ECDFB6);
    padding: 8px 12px;
    font: 500 14px/1.3 var(--font-body); color: var(--ink-900);
    overflow: hidden;
    text-align: left;
    width: 100%;
    transition: border-color 140ms ease;
  }
  .wl-poll-opt:hover:not(.is-mine) { border-color: var(--brass-500); }
  .wl-poll-opt .wl-poll-opt-fill {
    position: absolute; inset: 0 auto 0 0;
    background: var(--brass-300, #E2BF74);
    opacity: 0.35;
    transition: width 240ms ease;
  }
  .wl-poll-opt.is-mine { border-color: var(--brass-500); }
  .wl-poll-opt.is-mine .wl-poll-opt-fill { opacity: 0.55; background: var(--brass-500, #C8973F); }
  .wl-poll-opt-row {
    position: relative; z-index: 1;
    display: flex; gap: 10px; align-items: center; justify-content: space-between;
  }
  .wl-poll-opt-label { flex: 1 1 auto; min-width: 0; overflow-wrap: anywhere; }
  .wl-poll-opt-pct {
    font: 600 12px/1 var(--font-mono); color: var(--ink-700);
    white-space: nowrap;
  }
  .wl-poll-opt-mine { font: 600 11px/1 var(--font-body); color: var(--brass-600); margin-left: 6px; }
  .wl-poll-foot {
    margin-top: 6px;
    font: 500 11px/1 var(--font-body); color: var(--ink-500);
  }
  .wl-compose-previews { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .wl-compose-preview {
    position: relative; width: 88px; height: 88px;
    border-radius: 4px; overflow: hidden;
    border: 1px solid var(--paper-300);
    background: var(--paper-100);
  }
  .wl-compose-preview img,
  .wl-compose-preview video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wl-compose-preview .wl-remove {
    position: absolute; top: 2px; right: 2px;
    width: 22px; height: 22px;
    border-radius: 50%; border: none;
    background: rgba(0,0,0,0.55); color: white;
    font-size: 14px; line-height: 22px;
    cursor: pointer; padding: 0;
  }
  .wl-compose-preview .wl-remove:hover { background: rgba(0,0,0,0.8); }
  .wl-compose-preview.is-uploading::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    animation: wl-pulse 1.2s ease-in-out infinite;
  }
  @keyframes wl-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* Inline icon attach buttons inside a comment / reply composer.
     28 × 28 hit area — small enough to keep the whole composer on one
     row, large enough to remain tappable. */
  .wl-comment-attach {
    background: none; border: none;
    color: var(--ink-600);
    padding: 0; cursor: pointer;
    display: inline-flex; align-items: center;
    min-width: 28px; min-height: 28px;
    flex: 0 0 auto;
    justify-content: center;
    border-radius: 4px;
    transition: color 140ms ease, background-color 140ms ease;
  }
  .wl-comment-attach:hover { color: var(--brass-600, #A47829); background: var(--paper-100); }
  .wl-comment-attach .wl-icon { width: 18px; height: 18px; }
  .wl-comment-attach input[type=file] { display: none; }
  .wl-comment-photos { margin-top: 6px; display: grid; gap: 2px; border-radius: 4px; overflow: hidden; max-width: 100%; }
  .wl-comment-photos.cm-1 { grid-template-columns: 1fr; }
  .wl-comment-photos.cm-2 { grid-template-columns: 1fr 1fr; }
  .wl-comment-photos.cm-3 { grid-template-columns: 1fr 1fr 1fr; }
  .wl-comment-photos.cm-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .wl-comment-photos img, .wl-comment-photos video {
    width: 100%; max-height: 240px; object-fit: cover; cursor: zoom-in;
    background: var(--paper-200);
  }
  .wl-comment-photos.cm-1 img, .wl-comment-photos.cm-1 video {
    max-height: 320px; object-fit: contain;
  }

  /* GIF picker — paper-card on ink scrim, no radius / shadow. */
  .wl-gif-panel {
    position: fixed; inset: 0; z-index: 2500;
    background: rgba(17, 25, 46, 0.6);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wl-gif-modal {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    width: 100%; max-width: 640px; max-height: 80vh;
    display: flex; flex-direction: column;
    border-radius: 0; overflow: hidden;
  }
  .wl-gif-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
  }
  .wl-gif-head input {
    flex: 1 1 auto;
    border: 1px solid var(--paper-300);
    border-radius: 4px;
    padding: 8px 12px;
    font: 400 14px/1.4 var(--font-body);
    background: white;
  }
  .wl-gif-head input:focus { outline: 2px solid var(--ink-700); border-color: var(--ink-700); }
  .wl-gif-close { background: none; border: none; cursor: pointer; padding: 6px; color: var(--ink-700); }
  .wl-gif-close:hover { color: var(--ink-900); }
  /* CSS-columns masonry — each GIF shows in its natural aspect ratio,
     packed by the browser into 3 columns (2 on mobile). The container
     scrolls vertically. No more square crop / top-30% slice. */
  .wl-gif-grid {
    flex: 1 1 auto; overflow-y: auto;
    column-count: 3; column-gap: 4px;
    padding: 10px;
  }
  .wl-gif-tile {
    display: block;
    cursor: pointer; background: var(--paper-100); overflow: hidden;
    border: 1px solid var(--paper-300);
    border-radius: 3px;
    margin-bottom: 4px;
    break-inside: avoid;
    width: 100%;
  }
  .wl-gif-tile img { width: 100%; height: auto; display: block; }
  .wl-gif-tile:hover { border-color: var(--brass-500); }
  .wl-gif-attribution {
    padding: 6px 14px;
    font: 400 10px/1 var(--font-mono);
    color: var(--ink-500); text-align: right;
    border-top: 1px solid var(--divider);
  }
  @media (max-width: 480px) {
    .wl-gif-grid { column-count: 2; }
  }

  /* Avatars — circular medallion with a 1 px brass ring (echoes the
     qb-monogram pattern on index.html). Initials inside use italic
     Newsreader (helper-monogram style). */
  .wl-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--paper-100);
    box-shadow: 0 0 0 1px var(--brass-300);
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font: italic 600 14px/1 var(--font-body);
    color: var(--brass-600);
    flex-shrink: 0;
  }
  .wl-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* Post as a hairline-divided row (not a card). Matches the rest of
     Quiet Edition's row-based composition (helpers, robots, commandments).
     The compose form below is the only true card on the page. */
  .wl-post {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink-500);
    border-radius: 0;
    margin: 0;
    padding: 24px 0 20px;
  }
  .wl-section > #wlFeed > .wl-post:first-of-type {
    border-top: 1px solid var(--ink-500);
  }
  .wl-post-head { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
  .wl-post-head .wl-meta { flex: 1 1 auto; }
  .wl-post-name { font: 500 17px/1.3 var(--font-body); color: var(--ink-900); letter-spacing: -0.005em; }
  .wl-name-link { color: inherit; text-decoration: none; }
  .wl-name-link:hover { color: #2c6cb8; text-decoration: underline; }
  .wl-channel-tag {
    font: italic 400 13px/1 var(--font-body);
    color: var(--teal-500);
    margin-left: 4px;
  }
  .wl-channel-tag::before { content: "— "; color: var(--brass-500); font-style: normal; }
  /* Timestamp: italic overline pattern (matches qb-meta-label rhythm).
     ink-500 is fine here because we're at 11 px tracking-wide — overline
     scale exempts from the WCAG body-text 4.5:1 floor. */
  .wl-post-time {
    font: 400 11px/1 var(--font-body);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-top: 4px;
  }
  .wl-post-time .wl-time-dot { color: var(--brass-500); margin: 0 6px; }
  /* Body: Newsreader (--font-display), 16px / 1.55 — matches the editorial
     voice of commandments + helper blurbs across the site. */
  .wl-post-body {
    font: 400 16px/1.55 var(--font-body); color: var(--ink-800);
    white-space: pre-wrap; word-wrap: break-word; margin: 0 0 10px;
  }
  /* Line-clamp truncation (4 lines) — handles paragraphed AND wall-of-text
     posts uniformly. Removed when expanded. */
  .wl-post-body.is-clamped {
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* See more / See less — rendered as a <button> so Tab nav reaches it. */
  .wl-see-more {
    background: none; border: none;
    color: var(--teal-500); cursor: pointer;
    font: 600 14px/1.4 var(--font-body);
    display: inline-block; padding: 4px 0;
  }
  .wl-see-more:hover { text-decoration: underline; color: var(--link-hover); }
  .wl-see-more:focus { outline: 1px solid var(--brass-500); outline-offset: 2px; }

  /* Reaction pills — emoji glyph + count. Pill has a hairline outline
     so it reads on cream; "is-mine" lights the brass border + background.
     The emoji itself gets a per-emoji animation on hover, approximating
     Facebook's animated reaction kinetics (thumb taps, heart pulses,
     haha wobbles, wow stretches, sad teardrops, party shakes). */
  .wl-reactions {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin: 6px 0 2px;
    min-height: 28px;
  }
  .wl-react-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-radius: 14px;
    cursor: pointer;
    font: 500 13px/1.2 var(--font-mono);
    color: var(--ink-700);
    min-height: 28px;
  }
  .wl-react-pill .wl-emoji {
    font-size: 16px; line-height: 1;
    display: inline-block;
    transition: transform 180ms ease;
  }
  .wl-react-pill:hover { border-color: var(--brass-500); }
  .wl-react-pill:hover .wl-emoji { animation: var(--react-anim, wl-bounce) 600ms ease; }
  .wl-react-pill.is-mine {
    border-color: var(--brass-500);
    background: var(--brass-50);
    color: var(--ink-900);
  }
  .wl-react-pill.is-mine .wl-emoji { animation: wl-bounce-in 380ms cubic-bezier(.4,.0,.2,1.4); }
  /* Per-emoji animation personalities — approximations of FB's set. */
  .wl-emoji[data-anim="thumb"]  { --react-anim: wl-thumb;  }
  .wl-emoji[data-anim="heart"]  { --react-anim: wl-pulse;  }
  .wl-emoji[data-anim="haha"]   { --react-anim: wl-wobble; }
  .wl-emoji[data-anim="wow"]    { --react-anim: wl-stretch; }
  .wl-emoji[data-anim="sad"]    { --react-anim: wl-shake-down; }
  .wl-emoji[data-anim="party"]  { --react-anim: wl-shake;  }
  @keyframes wl-bounce-in   { 0% { transform: scale(0.4); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
  @keyframes wl-bounce      { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.25); } }
  @keyframes wl-thumb       { 0%,100%{ transform: rotate(0); } 30%{ transform: rotate(-18deg) scale(1.1); } 70%{ transform: rotate(8deg); } }
  @keyframes wl-pulse       { 0%,100%{ transform: scale(1); } 25%{ transform: scale(1.2); } 50%{ transform: scale(0.95); } 75%{ transform: scale(1.15); } }
  @keyframes wl-wobble      { 0%,100%{ transform: rotate(0); } 25%{ transform: rotate(-15deg); } 75%{ transform: rotate(15deg); } }
  @keyframes wl-stretch     { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.4, 0.9); } }
  @keyframes wl-shake-down  { 0%{ transform: translateY(0) rotate(0); } 50%{ transform: translateY(3px) rotate(-3deg); } 100%{ transform: translateY(0) rotate(0); } }
  @keyframes wl-shake       { 0%,100%{ transform: translateX(0) rotate(0); } 25%{ transform: translateX(-3px) rotate(-8deg); } 75%{ transform: translateX(3px) rotate(8deg); } }

  /* Reaction picker — horizontal row of large emoji buttons (Facebook
     reaction-bar shape). Each emoji animates on hover with its
     per-emoji keyframe (defined above). */
  .wl-emoji-popover {
    position: absolute; background: var(--paper-50);
    border: 1px solid var(--paper-300); border-radius: 24px;
    padding: 6px;
    display: flex; flex-direction: row; gap: 2px;
    z-index: 100;
  }
  .wl-emoji-popover button {
    background: transparent; border: none;
    font-size: 28px; line-height: 1;
    width: 44px; height: 44px;
    cursor: pointer; border-radius: 50%;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 180ms ease, background 180ms ease;
  }
  .wl-emoji-popover button:hover {
    background: var(--paper-100);
    transform: scale(1.35) translateY(-2px);
    animation: var(--react-anim, wl-bounce) 600ms ease infinite;
  }
  /* Tooltip below the picker on hover */
  .wl-emoji-popover button::after {
    content: attr(data-label);
    position: absolute; bottom: -22px;
    font: italic 500 12px/1 var(--font-body);
    color: var(--ink-700);
    background: var(--paper-50);
    padding: 2px 6px; border: 1px solid var(--paper-300);
    opacity: 0; pointer-events: none;
    transition: opacity 100ms ease 200ms;
    white-space: nowrap;
  }
  .wl-emoji-popover button:hover::after { opacity: 1; }
  /* "+" button on the named-reaction picker — opens the any-emoji grid. */
  .wl-emoji-plus { color: var(--ink-600); }
  .wl-emoji-plus-icon { font: 700 24px/1 var(--font-body); }
  /* Wide popover variant — any-emoji grid + free-input box. */
  .wl-emoji-popover--grid {
    flex-direction: column;
    border-radius: 8px;
    width: 320px;
    padding: 8px;
    gap: 6px;
    max-height: 70vh; overflow: hidden;
  }
  .wl-emoji-grid-head { display: flex; }
  .wl-emoji-grid-input {
    flex: 1 1 auto; min-width: 0;
    border: 1px solid var(--paper-300);
    background: white;
    padding: 8px 12px;
    /* 16 px so iOS Safari doesn't zoom on focus. */
    font: 400 16px/1.2 var(--font-body);
    color: var(--ink-900);
    border-radius: 4px;
    outline: none;
  }
  .wl-emoji-grid-input:focus { border-color: var(--brass-500); }
  .wl-emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
  }
  .wl-emoji-popover--grid .wl-emoji-grid-cell {
    width: 36px; height: 36px;
    font-size: 22px; line-height: 1;
    background: transparent; border: 0; cursor: pointer;
    border-radius: 4px;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color 120ms ease, transform 120ms ease;
  }
  .wl-emoji-popover--grid .wl-emoji-grid-cell:hover {
    background: var(--paper-100);
    transform: scale(1.15);
    animation: none;
  }
  .wl-emoji-popover--grid .wl-emoji-grid-cell::after { content: none; }

  /* Reaction + comment summary (above the action bar) */
  /* Footer meta row (LinkedIn pattern): overlapping reaction circles +
     total count on the left; comments + "N new" badge on the right.
     Soft grey typography — no red mono shouting. */
  .wl-post-meta-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 2px 4px;
    font: 400 12px/1 var(--font-body);
    color: var(--ink-500);
    min-height: 20px;
  }
  .wl-post-meta-row:empty { display: none; }
  .wl-react-cluster { display: inline-flex; align-items: center; gap: 6px; }
  .wl-react-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--paper-50, white);
    border: 1px solid var(--paper-300, #ECDFB6);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1;
  }
  .wl-react-dot + .wl-react-dot { margin-left: -7px; }
  .wl-react-total { font: 500 12px/1 var(--font-body); color: var(--ink-700); }
  .wl-meta-counts { color: var(--ink-500); }
  .wl-meta-new {
    color: var(--red-500); font-weight: 600; margin-left: 4px;
  }
  /* Reaction pills row above the action bar in expanded view — only
     shown when reactions exist. Smaller padding than the old summary. */
  .wl-reaction-pills {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 4px 0;
  }

  /* Action bar — Like / Comment / Share, equal-spaced. Tighter than
     before (padding 11→6 px, min-height 44→32 px). Tap Like applies the
     default 👍; long-press opens the 6-named-reaction picker. */
  .wl-action-bar {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--paper-300, #ECDFB6);
    margin: 0;
  }
  .wl-action {
    background: none; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--ink-700);
    padding: 6px 6px;
    min-height: 36px;
    font: 600 13px/1 var(--font-body);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .wl-action:hover { color: var(--brass-600); }
  .wl-action.is-active { color: var(--brass-600); }
  .wl-action-icon { line-height: 1; display: inline-flex; align-items: center; }
  .wl-action-icon svg { width: 18px; height: 18px; }
  .wl-action-label {
    font: 500 13px/1 var(--font-body);
    letter-spacing: 0;
  }
  @media (max-width: 480px) {
    .wl-action-label { display: none; }
    .wl-action-icon svg { width: 22px; height: 22px; }
  }

  /* Comment composer */
  /* Single-row composer (Instagram / Messenger / Substack pattern):
     avatar | input pill | tight attach-icon cluster, all on one row,
     never wraps. Enter still submits — no separate send button needed.
     Was previously 3 rows tall on mobile because flex-wrap was on. */
  .wl-comment-composer {
    display: flex; gap: 4px; align-items: center; margin: 4px 0 6px;
    min-width: 0;
  }
  .wl-comment-composer .wl-avatar { width: 24px; height: 24px; font-size: 9px; flex: 0 0 auto; }
  .wl-comment-composer input.wl-comment-input {
    /* flex-basis 0 so the input can shrink to share the row with attach
       icons; min-width: 0 unblocks the shrink. 60 px is the smallest the
       input is allowed to get before clipping placeholder text. */
    flex: 1 1 0; min-width: 60px;
    border: 1px solid var(--paper-300);
    border-radius: 16px;
    padding: 6px 12px;
    /* 16 px minimum — anything smaller and iOS Safari auto-zooms on focus. */
    font: 400 16px/1.3 var(--font-body);
    background: white;
  }
  .wl-comment-composer input.wl-comment-input:focus { outline: 1px solid var(--brass-500); }

  /* Delete (trash) icon button shown next to each post/comment/reply when
     the viewer is the author or an admin. */
  .wl-delete-btn {
    background: none; border: none;
    color: var(--ink-500);
    padding: 6px; border-radius: 4px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; min-height: 32px;
  }
  .wl-delete-btn:hover { color: var(--red-500); background: var(--paper-100); }
  .wl-delete-btn svg { width: 16px; height: 16px; }
  .wl-post-head-actions { display: flex; align-items: center; gap: 4px; }
  /* Edit button — same shape + size as the trash button so they line up;
     hover-colour is brass so the affordance reads as "modify" rather than
     "destroy". */
  .wl-edit-btn {
    background: none; border: none;
    color: var(--ink-500);
    padding: 6px; border-radius: 4px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; min-height: 32px;
  }
  .wl-edit-btn:hover { color: var(--brass-600, #A47829); background: var(--paper-100); }
  .wl-edit-btn svg { width: 16px; height: 16px; }
  /* Inline edit input — replaces the body text while editing. Carries 16 px
     min font-size so iOS Safari doesn't auto-zoom on focus. */
  .wl-edit-input {
    width: 100%; box-sizing: border-box;
    border: 1px solid var(--brass-500, #C8973F);
    background: var(--paper-50, white);
    padding: 8px 10px;
    font: 400 16px/1.5 var(--font-body, 'Inter', sans-serif);
    color: var(--ink-900);
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  .wl-edit-input:focus { border-color: var(--ink-700); }
  /* In a comment / reply, the inline edit textarea should match the
     sans-serif body. Posts keep the serif on theirs. */
  .wl-comment .wl-edit-input {
    font: 400 16px/1.45 var(--font-body, 'Inter', sans-serif);
  }
  /* "(edited)" suffix on the timestamp — same style as the date overline. */
  .wl-edited-tag {
    font: italic 400 11px/1 var(--font-body);
    color: var(--ink-500);
    margin-left: 6px;
  }
  /* Shrink the edit / delete buttons inside comment headers so they
     don't inflate the row height. The 32 px hit target stays on posts
     (where vertical space is plentiful), but comments use a 22 px box. */
  .wl-comment .wl-edit-btn,
  .wl-comment .wl-delete-btn {
    padding: 2px;
    min-width: 22px; min-height: 22px;
  }
  .wl-comment .wl-edit-btn svg,
  .wl-comment .wl-delete-btn svg { width: 14px; height: 14px; }

  /* Confirm modal — small dialog with ink-900 backdrop */
  .wl-confirm-panel {
    position: fixed; inset: 0; z-index: 2700;
    background: rgba(17,25,46,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wl-confirm-modal {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--red-500);
    border-radius: 0;
    padding: 22px 26px;
    max-width: 440px; width: 100%;
  }
  .wl-confirm-modal h3 {
    margin: 0 0 8px;
    font: 600 18px/1.2 var(--font-body);
    color: var(--ink-900);
  }
  .wl-confirm-modal p {
    margin: 0 0 18px;
    font: 400 14px/1.45 var(--font-body);
    color: var(--ink-700);
  }
  .wl-confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .wl-confirm-cancel, .wl-confirm-ok {
    background: none; border: none;
    color: var(--ink-700);
    padding: 8px 4px;
    font: italic 500 14px/1.2 var(--font-body);
    border-bottom: 1.5px solid transparent;
    cursor: pointer;
    min-height: 36px;
  }
  .wl-confirm-cancel { border-bottom-color: var(--brass-300); }
  .wl-confirm-cancel:hover { color: var(--ink-900); border-bottom-color: var(--brass-500); }
  .wl-confirm-ok {
    color: var(--red-500);
    border-bottom-color: var(--red-500);
    font-weight: 600;
  }
  .wl-confirm-ok:hover { color: var(--red-700); border-bottom-color: var(--red-700); }

  /* Comments — hairline-divided rows, tighter than the editorial post
     header. Density target borrowed from Nextdoor's mobile feed: name +
     relative time on a single line, body immediately under, tight
     action row. */
  .wl-comments { margin-top: 4px; }
  .wl-comment {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0 6px;
    border-top: 1px dashed var(--divider);
    min-width: 0;
  }
  .wl-comment > * { min-width: 0; }
  .wl-comment:first-child { border-top: none; }
  .wl-comment .wl-avatar { width: 28px; height: 28px; font-size: 10px; }
  .wl-comment-body { flex: 1 1 auto; background: none; border-radius: 0; padding: 0; min-width: 0; }
  /* Comments + replies use Inter (font-body) instead of Newsreader serif.
     The editorial serif feels right on posts where the date carries the
     headline; in dense chat-style threads sans-serif reads cleaner at
     small sizes. Posts above keep the serif. */
  .wl-comment-name { font: 600 13px/1.25 var(--font-body); color: var(--ink-900); }
  /* Compact inline timestamp ("12h" / "Yesterday" / "16 May"). Mixed case,
     no letter-spacing, no middot — fits next to the name on one line so
     no header ever wraps. The full ISO is on the <time title="…"> for
     hover. */
  .wl-comment-time {
    font: 400 12px/1.25 var(--font-body);
    color: var(--ink-500);
    margin-left: 6px;
    text-transform: none;
    letter-spacing: 0;
  }
  .wl-comment-text {
    font: 400 14px/1.45 var(--font-body); color: var(--ink-800);
    margin-top: 2px; white-space: pre-wrap; word-wrap: break-word;
    overflow-wrap: anywhere;
    min-width: 0;
  }
  .wl-comment-actions { display: flex; gap: 14px; align-items: center; margin-top: 2px; }
  .wl-comment-actions .wl-react-pill { font-size: 11px; padding: 1px 7px; }
  .wl-reply-link {
    color: var(--ink-600); cursor: pointer;
    font: 600 12px/1 var(--font-body);
    background: none; border: none;
    padding: 4px 0;
    min-height: 24px;
  }
  .wl-reply-link:hover { color: var(--teal-500); }
  /* Replies: cap nesting at ONE visual level. All descendants of a top-level
     comment render in a single flat list inside .wl-replies. A brass curved
     tie-line in the indent gutter (drawn via ::before / ::after on each
     reply) signals the parent → child link without indenting further.
     Mirrors Facebook's pattern; survives narrow mobile viewports. */
  .wl-replies {
    position: relative;
    padding-left: 20px;
    margin-left: 0;
    border-left: none;
  }
  .wl-comment.is-reply {
    position: relative;
    padding: 10px 0;
    border-top: none;
  }
  .wl-comment.is-reply .wl-avatar { width: 28px; height: 28px; font-size: 10px; }
  /* Elbow: vertical drop from the top of this reply row into the avatar,
     then a curved 6 px corner reaching ~10 px right toward the avatar.
     Total elbow occupies the first ~20 px of the row vertically. Sized
     to match a 20 px reply indent. */
  .wl-comment.is-reply::before {
    content: "";
    position: absolute;
    left: -14px;
    top: 0;
    width: 10px;
    height: 20px;
    border-left: 1px solid var(--brass-300);
    border-bottom: 1px solid var(--brass-300);
    border-bottom-left-radius: 6px;
    pointer-events: none;
  }
  /* For replies that aren't the last sibling, extend the trunk vertically
     so the line is unbroken between this elbow and the next reply's elbow. */
  .wl-comment.is-reply:not(:last-child)::after {
    content: "";
    position: absolute;
    left: -14px;
    top: 20px;
    bottom: 0;
    width: 1px;
    background: var(--brass-300);
    pointer-events: none;
  }
  /* "Replying to @Parent" prefix — shown on a reply whose parent is itself
     a reply, so the conversational flow is clear without nested indent. */
  .wl-reply-target {
    display: inline-block;
    margin-right: 6px;
    color: var(--brass-600, #A47829);
    font: italic 500 13px/1.4 var(--font-body);
  }
  .wl-reply-target a {
    color: #2c6cb8;
    text-decoration: none;
    font-style: normal;
    font-weight: 600;
  }
  .wl-reply-target a:hover { text-decoration: underline; }
  @media (max-width: 480px) {
    .wl-replies { padding-left: 14px; }
    .wl-comment.is-reply::before {
      left: -10px; width: 7px; height: 18px;
      border-bottom-left-radius: 4px;
    }
    .wl-comment.is-reply:not(:last-child)::after {
      left: -10px; top: 18px;
    }
    .wl-comment.is-reply .wl-avatar { width: 24px; height: 24px; font-size: 9px; }
  }
  .wl-show-all-comments {
    color: var(--teal-500); cursor: pointer;
    font: 600 13px/1.2 var(--font-body);
    padding: 10px 0; min-height: 44px;
    background: none; border: none;
  }
  .wl-show-all-comments:hover { text-decoration: underline; color: var(--link-hover); }

  /* Compact post tile (default in the feed). Click to expand. */
  .wl-post--compact {
    cursor: pointer;
    transition: background 120ms ease;
  }
  .wl-post--compact:hover { background: var(--paper-100); }
  .wl-post--compact:focus { outline: 2px solid var(--brass-500); outline-offset: -2px; }
  .wl-post-body--teaser { margin-bottom: 6px; }
  /* Photo peek (compact post view): first photo full-width with the
     bottom clipped, "+N more" badge if there are extras. The user
     expands the post to see the full image. */
  .wl-photo-peek {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
    margin: 8px 0 6px;
    background: var(--paper-200, #F5ECD4);
  }
  .wl-photo-peek-img {
    width: 100%; height: auto; min-height: 100%;
    object-fit: cover; object-position: top;
    display: block;
  }
  .wl-photo-peek-more {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(17,25,46,0.78);
    color: var(--paper-50);
    padding: 4px 10px;
    font: 600 12px/1 var(--font-body);
    letter-spacing: 0.02em;
  }
  @media (max-width: 480px) {
    .wl-photo-peek { height: 180px; }
  }
  /* The single comment surfaced under a preview post — same flex shape
     as a regular .wl-comment but rendered without the action row, reply
     composer, or reactions, and with its first photo getting the same
     220-px full-width peek treatment as the post photo. */
  .wl-preview-comment {
    display: flex; gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--paper-200, #efe5c8);
  }
  .wl-preview-comment .wl-comment-body { padding: 0; }
  .wl-preview-comment .wl-photo-peek { margin: 6px 0 0; }
  .wl-recent-comment {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--paper-100);
    border-left: 2px solid var(--brass-300);
    font: 400 13px/1.45 var(--font-body);
    color: var(--ink-700);
  }
  .wl-recent-comment .wl-recent-name { font-weight: 600; color: var(--ink-900); }

  /* Pagination strip at the bottom of the feed. */
  .wl-pagination {
    display: flex; justify-content: center; align-items: center; gap: 24px;
    padding: 24px 0 8px;
    font: italic 500 14px/1 var(--font-body);
    color: var(--ink-700);
  }
  .wl-pagination button {
    background: none; border: none;
    color: var(--ink-800);
    font: inherit;
    cursor: pointer;
    border-bottom: 1.5px solid var(--brass-300);
    padding: 6px 4px;
    min-height: 36px;
  }
  .wl-pagination button:hover:not(:disabled) {
    color: var(--red-500); border-bottom-color: var(--red-500);
  }
  .wl-pagination button:disabled {
    color: var(--ink-300); border-bottom-color: transparent;
    cursor: default;
  }
  .wl-pagination .wl-page-num {
    color: var(--ink-600);
    font-style: normal;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  /* URL inside a post body — italic + brass underline, opens in new tab. */
  .wl-post-link {
    color: var(--teal-500);
    text-decoration: none;
    border-bottom: 1px solid var(--brass-300);
    word-break: break-word;
  }
  .wl-post-link:hover { color: var(--red-500); border-bottom-color: var(--red-500); }

  /* YouTube embed sits below the body, native 16:9. */
  .wl-yt-embed {
    margin: 10px 0 4px;
    position: relative; width: 100%;
    aspect-ratio: 16 / 9;
    background: black;
    border: 1px solid var(--paper-300);
    overflow: hidden;
  }
  .wl-yt-embed iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: none;
  }

  /* Link-preview card */
  .wl-link-preview {
    display: flex; gap: 12px;
    margin: 10px 0 4px;
    padding: 12px 14px;
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    border-left: 4px solid var(--brass-500);
    text-decoration: none;
    color: inherit;
  }
  .wl-link-preview:hover { border-color: var(--brass-500); }
  .wl-link-preview .wl-link-thumb {
    flex: 0 0 144px; height: 96px;
    background: var(--paper-200);
    overflow: hidden;
    border: 1px solid var(--paper-300);
  }
  .wl-link-preview .wl-link-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wl-link-preview .wl-link-body { flex: 1 1 auto; min-width: 0; }
  .wl-link-preview .wl-link-host {
    font: 400 10px/1 var(--font-mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin-bottom: 4px;
  }
  .wl-link-preview .wl-link-title {
    font: 600 15px/1.3 var(--font-body);
    color: var(--ink-900); margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .wl-link-preview .wl-link-desc {
    font: 400 13px/1.4 var(--font-body);
    color: var(--ink-700);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .wl-link-preview .wl-link-thumb-empty {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font: italic 400 11px/1 var(--font-body);
    color: var(--ink-500);
  }
  @media (max-width: 480px) {
    .wl-link-preview .wl-link-thumb { flex-basis: 96px; height: 72px; }
    .wl-link-preview .wl-link-title { font-size: 14px; }
  }

  /* Photo grids — Facebook/LinkedIn pattern. Layout depends on count:
     1 → single image, native ratio, capped height, contain so screenshots
         don't get cropped (paper-200 backdrop fills the gaps).
     2 → side-by-side 1:1
     3 → 1 large left + 2 stacked right (Facebook's "P3 split")
     4 → 2×2 grid
     5+ → 3 visible + "+N more" overlay on the last; tap opens lightbox.
     All grids use a 2px gap; corners 4px. */
  .wl-photos { position: relative; margin: 10px 0 6px; display: grid; gap: 2px; border-radius: 4px; overflow: hidden; }
  .wl-photos .wl-photo {
    position: relative; cursor: zoom-in; background: var(--paper-200);
    overflow: hidden;
  }

(function () {
  "use strict";
  let posts = [];
  let staffByEmail = {};

  let viewerEmail = "";

  let editingKey = null;

  const expandedPostIds = new Set();   // "fully expanded" — every comment + reply
  const partialPostIds  = new Set();   // "partially expanded" — last 4 comments by activity, each with last 3 replies
  const openReplyTo   = new Set();
  // A post is in one of three visible states:
  //   PREVIEW            — neither set contains the id; teaser body + most-recent comment card
  //   PARTIALLY EXPANDED — partialPostIds.has(id); full body + last 4 comments by activity
  //   FULLY EXPANDED     — expandedPostIds.has(id); every comment + every reply
  // Clicking a preview cycles into partial, clicking a partial cycles into full,
  // clicking anywhere on a different post collapses everything back to preview.
  // Pagination: 20 posts per page; one expanded at a time. Reset to 0
  // when the post list reloads (after compose / delete / sort).
  const POSTS_PER_PAGE = 20;

  // magnets stuck to a manuscript. The first entry is the default
  // applied on a plain Like tap.
  const REACTIONS = ["👍", "❤️", "😂", "😮", "😢", "🎉"];
  const DEFAULT_REACTION = REACTIONS[0];
  // Storage key (emoji) → display label (used in notifications + a11y
  // tooltip) + the anim key that picks the per-emoji CSS keyframe.
  const REACTION_META = {
    "👍": { label: "Like",       past: "liked",          anim: "thumb" },
    "❤️": { label: "Love",       past: "loved",          anim: "heart" },
    "😂": { label: "Haha",       past: "laughed at",     anim: "haha"  },
    "😮": { label: "Wow",        past: "was wowed by",   anim: "wow"   },
    "😢": { label: "Sad",        past: "was sad at",     anim: "sad"   },

  function reactionLabel(emoji) { return (REACTION_META[emoji] || {}).label || emoji; }
  function reactionPast(emoji)  { return (REACTION_META[emoji] || {}).past  || "reacted to"; }
  function reactionAnim(emoji)  { return (REACTION_META[emoji] || {}).anim  || ""; }

  }
  const WALL_API = "/api/wall";

  // Replaces system emoji in the action bar so the page stays on the

  const ICONS = {
    thumb: {
      outline: `<path d="M7 11v10H4a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1h3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11l4-8a3 3 0 0 1 3 3v4h5.5a2 2 0 0 1 2 2.4l-1.6 7.2A2 2 0 0 1 17.9 21H7V11z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<path d="M7 11v10H4a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1h3z" fill="currentColor"/><path d="M7 11l4-8a3 3 0 0 1 3 3v4h5.5a2 2 0 0 1 2 2.4l-1.6 7.2A2 2 0 0 1 17.9 21H7V11z" fill="currentColor"/>`,

      filled:  `<path d="M6 9a6 6 0 0 1 12 0c0 5 3 5 3 8H3c0-3 3-3 3-8z" fill="currentColor"/><path d="M10 21a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,

  function icon(name, active) {
    const i = ICONS[name];
    if (!i) return "";
    return `<svg class="wl-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">${active ? i.filled : i.outline}</svg>`;
  }

  // GitHub Pages + Cloudflare cache wall.json for ~30-90 s after each
  // commit, so a "post → refresh" sequence often serves a pre-commit copy
  // and the post (or poll) appears to vanish. api.github.com's contents
  // endpoint reflects the latest sha immediately; this helper hits it
  // first and falls back to the relative path on rate-limit / network
  // failure. Same fix shipped earlier for holidays.json.
  async function fetchFreshJson(path, fallbackRelative, defaultValue) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/richmondbot2000-prog/togetherbook/contents/${path}?ref=main`,
        { cache: "no-store", headers: { "Accept": "application/vnd.github+json" } },
      );
      if (!r.ok) throw new Error("api.github.com " + r.status);
      const data = await r.json();
      // atob returns a Latin-1 string — each byte becomes one JS char. If
      // the original payload had multi-byte UTF-8 (smart quotes, emoji,
      // accented names), Latin-1 interpretation splits them into garbage
      // ("don't" → "donâ\x80\x99t"). Round-trip through Uint8Array +
      // TextDecoder so JSON.parse sees the right characters.
      const bin = atob((data.content || "").replace(/\s/g, ""));
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const txt = new TextDecoder("utf-8").decode(bytes);
      return JSON.parse(txt);
    } catch (e) {
      try {
        const r = await fetch(`${fallbackRelative}?ts=${Date.now()}`, { cache: "no-store" });
        if (r.ok) return await r.json();
      } catch (_) {}
      return defaultValue;
    }
  }

  Promise.all([
    fetchFreshJson("wall.json",      "wall.json",      { posts: [] }),
    fetch("staff.json",       { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetchFreshJson("wall-seen.json", "wall-seen.json", null),
    fetch(`${WALL_API}/whoami`, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("annotations.json", { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("admins.json",      { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("people.json",      { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([wall, staff, seen, who, annFile, adminsFile, peopleFile]) => {
    const adminEmails = new Set(((adminsFile && adminsFile.admins) || []).map(e => (e || "").toLowerCase()));
    posts = Array.isArray(wall.posts) ? wall.posts : [];
    if (staff && Array.isArray(staff.users)) {
      for (const u of staff.users) {
        const k = (u.email || "").toLowerCase();
        if (k) staffByEmail[k] = u;
      }
    }
    // Layer people.json over staffByEmail: every Person's main/alt/external
    // email gets a record so mentions like @james.benamor resolve via the
    // Person table first. Synthesize a staff-shaped record for Persons whose
    // email isn't in Workspace (e.g. external Google or auth0-only users).
    if (peopleFile && Array.isArray(peopleFile.people)) {
      for (const p of peopleFile.people) {
        const emails = [p.main_google_email, ...(p.alt_google_emails || []), p.external_google_email].filter(Boolean);
        for (const eRaw of emails) {
          const e = eRaw.toLowerCase();
          if (!staffByEmail[e]) {
            staffByEmail[e] = { email: e, name: p.name || p.id, photo_url: "", tenant: (p.company || "").includes("togetherloans") ? "togetherloans" : "letme.co.uk" };
          }
          // If this Person has an uploaded avatar, prefer it over the raw
          // Workspace photo so the Wall + mentions stay consistent.
          if (p.directory_photo_uploaded_at) {
            staffByEmail[e].directory_photo_override = `/assets/photos/${e.replace(/@/g, "_at_")}.jpg?v=${encodeURIComponent(p.directory_photo_uploaded_at)}`;
          }
        }
      }
    }
    buildStaffByLocal();
    if (annFile && annFile.annotations && typeof annFile.annotations === "object") {
      annotationsMap = annFile.annotations;
    }
    if (who && who.email) {
      viewerEmail = who.email.toLowerCase();
      const me = staffByEmail[viewerEmail];
      viewerName  = (me && me.name)  || who.name  || viewerEmail.split("@")[0];
      viewerPhoto = (me && photoUrlFor(me)) || "";
      viewerIsAdmin = adminEmails.has(viewerEmail);
      document.getElementById("wlMyAvatar").innerHTML = avatarInner(viewerName, viewerPhoto);
      const nameEl = document.getElementById("wlComposeName");
      if (nameEl) nameEl.textContent = viewerName;
      const asEl = document.getElementById("wlComposeAs");
      if (asEl) asEl.textContent = "Posting to the team";
      document.getElementById("wlCompose").style.display = "";
    }
    if (seen && seen.by_user && seen.by_user[viewerEmail]) {
      lastSeenByPost = seen.by_user[viewerEmail].posts || {};
      seenEvents = new Set(seen.by_user[viewerEmail].seen_events || []);
    }
    sortPosts();
    // URL deep-links — supported shapes:
    //   #post-<id>           (legacy: focus + scroll)
    //   ?post=<id>           (canonical: same as #post-<id>)
    //   ?page=N              (0-indexed pagination position)
    // The ?post=<id> form supersedes ?page= so a share link still
    // lands on the right post even if it's on an older page.
    const qsInit = new URLSearchParams(location.search || "");
    const hashId = (location.hash || "").replace(/^#post-/, "");
    const postParam = qsInit.get("post");
    const focusId = postParam || hashId;
    if (qsInit.has("page")) {
      const p = parseInt(qsInit.get("page"), 10);
      if (!Number.isNaN(p) && p >= 0) currentPage = p;
    }
    if (focusId) jumpToPost(decodeURIComponent(focusId), { skipScroll: true });
    renderFeed();
    renderNotifications();
    if (focusId) {
      requestAnimationFrame(() => {
        const el = document.getElementById(`post-${decodeURIComponent(focusId)}`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }).catch(err => {
    document.getElementById("wlFeed").innerHTML =
      `<div class="wl-empty">Wall failed to load: ${escapeHtml(String(err))}</div>`;
  });

  const composeText = document.getElementById("wlComposeText");
  const charCount = document.getElementById("wlCharCount");
  const postBtn = document.getElementById("wlPostBtn");
  const previewsEl = document.getElementById("wlComposePreviews");
  let composeAttachments = [];
  // Poll attached to the compose, if any. Shape: { question, options[] }.
  // Sent alongside body + photos when the post is submitted.
  let composePoll = null;

  function refreshComposeState() {
    const n = composeText.value.length;
    charCount.textContent = `${n.toLocaleString()} / 10,000`;
    charCount.classList.toggle("over", n > 10000);
    const hasContent = n > 0 || composeAttachments.length > 0 || !!composePoll;
    postBtn.disabled = !hasContent || n > 10000;
  }
  // Auto-grow the textarea down the page as the user types. Lower bound
  // is the CSS min-height so the empty state stays compact; no upper
  // bound — long posts just push the rest of the page down rather than
  // showing an inner scrollbar.
  function fitCompose() {
    composeText.style.height = "auto";
    composeText.style.height = composeText.scrollHeight + "px";
  }
  composeText.addEventListener("input", () => { refreshComposeState(); fitCompose(); });
  // First-paint sizing (in case the user resumes a draft).
  requestAnimationFrame(fitCompose);

  function renderComposePreviews() {
    previewsEl.innerHTML = composeAttachments.map((a, i) => {
      const inner = a.kind === "video"
        ? `<video src="${escapeHtml(a.preview)}" muted></video>`
        : `<img src="${escapeHtml(a.preview)}" alt="">`;
      return `<div class="wl-compose-preview ${a.uploading ? "is-uploading" : ""}" data-att-idx="${i}">${inner}<button type="button" class="wl-remove" data-remove-att="${i}" aria-label="Remove">×</button></div>`;
    }).join("");
    previewsEl.querySelectorAll("[data-remove-att]").forEach(el => {
      el.addEventListener("click", e => {
        e.preventDefault();
        composeAttachments.splice(parseInt(el.dataset.removeAtt, 10), 1);
        renderComposePreviews(); refreshComposeState();
      });
    });
  }
  function renderPollChip() {
    const slot = document.getElementById("wlComposePollChip");
    if (!slot) return;
    if (!composePoll) { slot.innerHTML = ""; return; }
    const optionsCount = composePoll.options.length;
    slot.innerHTML = `
      <div class="wl-compose-poll-chip">
        <span class="wl-compose-poll-chip-icon">${icon("poll", false)}</span>
        <span class="wl-compose-poll-chip-text">
          <strong>${escapeHtml(composePoll.question)}</strong>
          <span class="wl-compose-poll-chip-meta">${optionsCount} option${optionsCount === 1 ? "" : "s"}</span>
        </span>
        <button type="button" class="wl-compose-poll-chip-edit" data-poll-edit aria-label="Edit poll">Edit</button>
        <button type="button" class="wl-compose-poll-chip-remove" data-poll-remove aria-label="Remove poll">×</button>
      </div>`;
    slot.querySelector("[data-poll-edit]").addEventListener("click", () => {
      openPollComposer(composePoll, p => { composePoll = p; renderPollChip(); refreshComposeState(); });
    });
    slot.querySelector("[data-poll-remove]").addEventListener("click", () => {
      composePoll = null; renderPollChip(); refreshComposeState();
    });
  }

  // Render attach-button icons at boot.
  document.getElementById("wlIconPhoto").innerHTML = icon("photo", false);
  document.getElementById("wlIconGif").innerHTML   = icon("gif",   false);
  document.getElementById("wlIconPoll").innerHTML  = icon("poll",  false);
  document.getElementById("wlIconBold").innerHTML  = icon("bold",  false);

  document.getElementById("wlComposePhotoInput").addEventListener("change", async e => {
    // The input accepts both image/* and video/* — route each picked
    // file by its real MIME type so videos still go through the video
    // upload path (single-file, larger limit) and photos through the
    // photo path (up to 10).
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    const photos = files.filter(f => f.type.startsWith("image/"));
    const videos = files.filter(f => f.type.startsWith("video/"));
    if (photos.length) await handleFilePick(photos, "photo");
    if (videos.length) await handleFilePick(videos, "video");
  });
  document.getElementById("wlComposeGifBtn").addEventListener("click", () => {
    openGifPicker(gif => {
      composeAttachments.push({ path: gif.url, kind: "gif", preview: gif.preview });
      renderComposePreviews(); refreshComposeState();
    });
  });
  document.getElementById("wlComposePollBtn").addEventListener("click", () => {
    openPollComposer(composePoll, poll => {
      composePoll = poll;
      renderPollChip();
      refreshComposeState();
    });
  });

  // Bold toggle. While "on" the textarea has an open `**` waiting for a
  // close; the next toggle inserts the closing `**`. So anything the user
  // types between the two clicks gets wrapped as **bold**. Rendering
  // (in renderPostCompact / renderPostExpanded) turns `**foo**` into
  // <strong>foo</strong>. Same Slack / WhatsApp pattern.
  let composeBoldOn = false;
  const boldBtn = document.getElementById("wlComposeBoldBtn");
  boldBtn.addEventListener("click", () => {
    const t = composeText;
    const start = t.selectionStart ?? t.value.length;
    const end   = t.selectionEnd   ?? start;
    const before = t.value.slice(0, start);
    const sel    = t.value.slice(start, end);
    const after  = t.value.slice(end);
    if (sel.length > 0) {
      // Wrap the current selection — leaves bold OFF since both stars
      // are placed atomically; user can keep typing in plain.
      t.value = before + "**" + sel + "**" + after;
      const cursor = start + 2 + sel.length + 2;
      t.setSelectionRange(cursor, cursor);
      composeBoldOn = false;
    } else {
      // Insert the open or close marker at the cursor.
      t.value = before + "**" + after;
      const cursor = start + 2;
      t.setSelectionRange(cursor, cursor);
      composeBoldOn = !composeBoldOn;
    }
    boldBtn.classList.toggle("is-active", composeBoldOn);
    boldBtn.setAttribute("aria-pressed", composeBoldOn ? "true" : "false");
    t.focus();
    t.dispatchEvent(new Event("input", { bubbles: true }));
  });

  async function handleFilePick(files, kind) {
    if (!files.length) return;
    const take = kind === "video" ? Math.min(files.length, 2) : Math.min(files.length, 10);
    for (const f of files.slice(0, take)) await ingestFile(f, kind);
    renderComposePreviews(); refreshComposeState();
  }
  async function ingestFile(file, kind) {
    let dataUrl;
    try {
      dataUrl = kind === "photo"
        ? await resizeImage(file, 1600, 0.85)
        : await readAsDataUrl(file);
    } catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    const att = { path: "", kind, preview: dataUrl, uploading: true };
    composeAttachments.push(att); renderComposePreviews();
    try {
      const res = await wallAction("upload-media", { data_url: dataUrl, kind });
      if (!res || !res.path) throw new Error("upload returned no path");
      att.path = res.path; att.uploading = false;
      renderComposePreviews();
    } catch (err) {
      const i = composeAttachments.indexOf(att);
      if (i >= 0) composeAttachments.splice(i, 1);
      renderComposePreviews();
      showBanner("Upload failed: " + (err.message || err), true);
    }
  }
  function readAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => reject(new Error("read failed"));
      r.readAsDataURL(file);
    });
  }
  function resizeImage(file, maxDim, quality) {
    return new Promise(async (resolve, reject) => {
      try {
        const src = await readAsDataUrl(file);
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else        { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => reject(new Error("image decode failed"));
        img.src = src;
      } catch (e) { reject(e); }
    });
  }

  postBtn.addEventListener("click", async () => {
    const body = composeText.value.trim();
    if (!body && composeAttachments.length === 0 && !composePoll) return;
    if (composeAttachments.some(a => a.uploading)) {
      showBanner("Wait for uploads to finish", true); return;
    }
    postBtn.disabled = true; postBtn.textContent = "Posting…";
    try {
      const photos = composeAttachments.map(a => a.path).filter(Boolean);
      const payload = { body, photos };
      if (composePoll) payload.poll = composePoll;
      const res = await wallAction("post", payload);
      if (res && res.post) {
        posts.unshift(res.post);
        currentPage = 0; // jump back to the newest page so the author sees their post
        sortPosts(); renderFeed(); renderNotifications();
      }
      composeText.value = "";
      fitCompose();
      composeAttachments = [];
      composePoll = null;
      renderPollChip();
      composeBoldOn = false;
      boldBtn.classList.remove("is-active");
      boldBtn.setAttribute("aria-pressed", "false");
      renderComposePreviews();
      charCount.textContent = "0 / 10,000";
      showBanner("Posted");
    } catch (err) {
      showBanner(err.message || String(err), true);
    } finally {
      postBtn.disabled = false; postBtn.textContent = "Post";
    }
  });

  // ── GIF picker (via /api/wall/gif-search → GIPHY) ─────────────────
  let gifPickerState = null;
  function openGifPicker(onPick) {
    closeGifPicker();
    const root = document.createElement("div");
    root.className = "wl-gif-panel";
    root.innerHTML = `
      <div class="wl-gif-modal" role="dialog" aria-label="GIF picker">
        <div class="wl-gif-head">
          <input type="search" placeholder="Search GIFs + memes…" id="wlGifQuery" autocomplete="off">
          <button class="wl-gif-close" aria-label="Close">${icon("close", false)}</button>
        </div>
        <div class="wl-gif-grid" id="wlGifGrid"><div class="wl-loading">Loading…</div></div>
        <div class="wl-gif-attribution">Powered by GIPHY</div>
      </div>`;
    document.body.appendChild(root);
    const input = root.querySelector("#wlGifQuery");
    const grid  = root.querySelector("#wlGifGrid");
    input.focus();
    let debounce = null;
    const load = async (q) => {
      grid.innerHTML = `<div class="wl-loading">Searching…</div>`;
      try {
        const res = await wallAction("gif-search", { q, limit: 24 });
        const results = (res && res.results) || [];
        if (!results.length) { grid.innerHTML = `<div class="wl-loading">No results.</div>`; return; }
        grid.innerHTML = results.map(g =>
          `<div class="wl-gif-tile" data-gif='${escapeHtml(JSON.stringify({ url: g.url, preview: g.preview }))}'>
             <img src="${escapeHtml(g.preview)}" alt="${escapeHtml(g.title)}" loading="lazy">
           </div>`
        ).join("");
        grid.querySelectorAll(".wl-gif-tile").forEach(t => {
          t.addEventListener("click", () => {
            try { onPick(JSON.parse(t.dataset.gif)); } catch (e) {}
            closeGifPicker();
          });
        });
      } catch (err) {
        grid.innerHTML = `<div class="wl-loading">${escapeHtml(err.message || String(err))}</div>`;
      }
    };
    input.addEventListener("input", () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => load(input.value.trim()), 250);
    });
    root.querySelector(".wl-gif-close").addEventListener("click", closeGifPicker);
    root.addEventListener("click", e => { if (e.target === root) closeGifPicker(); });
    const onKey = e => { if (e.key === "Escape") closeGifPicker(); };
    document.addEventListener("keydown", onKey);
    gifPickerState = { root, onKey };
    load("");
  }
  function closeGifPicker() {
    if (!gifPickerState) return;
    gifPickerState.root.remove();
    document.removeEventListener("keydown", gifPickerState.onKey);
    gifPickerState = null;
  }

  // Poll composer modal. Same backdrop pattern as the GIF picker.
  // existing = null OR { question, options:[] } for re-editing.
  // onSave = ({question, options}) callback.
  let pollComposerState = null;
  function openPollComposer(existing, onSave) {
    closePollComposer();
    const seedQ = (existing && existing.question) || "";
    const seedOpts = (existing && existing.options) || ["", ""];
    const root = document.createElement("div");
    root.className = "wl-poll-panel";
    root.innerHTML = `
      <div class="wl-poll-modal" role="dialog" aria-label="Create poll">
        <div class="wl-poll-head">
          <h2>${existing ? "Edit poll" : "Create poll"}</h2>
          <button type="button" class="wl-poll-close" aria-label="Close">${icon("close", false)}</button>
        </div>
        <div>
          <div class="wl-poll-label">Question</div>
          <input type="text" class="wl-poll-input" id="wlPollQ" maxlength="200" placeholder="What would you like to ask?" value="${escapeHtml(seedQ)}">
        </div>
        <div>
          <div class="wl-poll-label">Options (2–10)</div>
          <div class="wl-poll-options" id="wlPollOpts"></div>
          <button type="button" class="wl-poll-add" id="wlPollAdd">+ Add option</button>
        </div>
        <div class="wl-poll-actions">
          <button type="button" class="wl-poll-cancel">Cancel</button>
          <button type="button" class="wl-poll-save" disabled>${existing ? "Save changes" : "Attach poll"}</button>
        </div>
      </div>`;
    document.body.appendChild(root);
    const optsEl = root.querySelector("#wlPollOpts");
    const qEl    = root.querySelector("#wlPollQ");
    const addEl  = root.querySelector("#wlPollAdd");
    const saveEl = root.querySelector(".wl-poll-save");

    function refresh() {
      // Save enabled when question + at least 2 non-empty options.
      const q = qEl.value.trim();
      const opts = Array.from(optsEl.querySelectorAll("input.wl-poll-option"))
        .map(i => i.value.trim()).filter(v => v.length);
      saveEl.disabled = !(q.length && opts.length >= 2);
      addEl.disabled = optsEl.querySelectorAll("input.wl-poll-option").length >= 10;
    }
    function renderOpts(values) {
      optsEl.innerHTML = values.map((v, i) => `
        <div class="wl-poll-option-row">
          <input type="text" class="wl-poll-option" maxlength="100" placeholder="Option ${i + 1}" value="${escapeHtml(v)}">
          <button type="button" class="wl-poll-option-remove" data-rm aria-label="Remove option">×</button>
        </div>`).join("");
      optsEl.querySelectorAll("input.wl-poll-option").forEach(inp => {
        inp.addEventListener("input", refresh);
      });
      optsEl.querySelectorAll("[data-rm]").forEach(btn => {
        btn.addEventListener("click", () => {
          const rows = Array.from(optsEl.querySelectorAll("input.wl-poll-option"));
          if (rows.length <= 2) return; // keep at least 2
          const current = rows.map(i => i.value);
          const idx = Array.from(optsEl.querySelectorAll("[data-rm]")).indexOf(btn);
          current.splice(idx, 1);
          renderOpts(current);
          refresh();
        });
      });
    }
    renderOpts(seedOpts.length >= 2 ? seedOpts : ["", ""]);
    qEl.addEventListener("input", refresh);
    addEl.addEventListener("click", () => {
      const current = Array.from(optsEl.querySelectorAll("input.wl-poll-option")).map(i => i.value);
      if (current.length >= 10) return;
      current.push("");
      renderOpts(current);
      refresh();
      const newest = optsEl.querySelectorAll("input.wl-poll-option");
      newest[newest.length - 1].focus();
    });
    saveEl.addEventListener("click", () => {
      const q = qEl.value.trim();
      const opts = Array.from(optsEl.querySelectorAll("input.wl-poll-option"))
        .map(i => i.value.trim()).filter(v => v.length);
      if (!q || opts.length < 2) return;
      onPick({ question: q.slice(0, 200), options: opts.slice(0, 10).map(o => o.slice(0, 100)) });
      closePollComposer();
    });
    function onPick(poll) { onSave(poll); }
    root.querySelector(".wl-poll-close").addEventListener("click", closePollComposer);
    root.querySelector(".wl-poll-cancel").addEventListener("click", closePollComposer);
    root.addEventListener("click", e => { if (e.target === root) closePollComposer(); });
    const onKey = e => { if (e.key === "Escape") closePollComposer(); };
    document.addEventListener("keydown", onKey);
    pollComposerState = { root, onKey };
    qEl.focus();
    refresh();
  }
  function closePollComposer() {
    if (!pollComposerState) return;
    pollComposerState.root.remove();
    document.removeEventListener("keydown", pollComposerState.onKey);
    pollComposerState = null;
  }

  // Poll widget rendered inside a post body. Click an option to vote (or
  // click your current vote again to remove it). The widget always shows
  // every voter's choice — no anonymous mode in v1.
  function renderPoll(post) {
    const poll = post.poll;
    if (!poll || !Array.isArray(poll.options)) return "";
    const votes = poll.votes || {};
    const totals = poll.options.map((_, i) =>
      Object.values(votes).filter(v => v === i).length
    );
    const totalVotes = totals.reduce((a, b) => a + b, 0);
    const myVote = (viewerEmail && Object.prototype.hasOwnProperty.call(votes, viewerEmail))
      ? votes[viewerEmail] : null;
    const opts = poll.options.map((opt, i) => {
      const n = totals[i];
      const pct = totalVotes ? Math.round((n / totalVotes) * 100) : 0;
      const isMine = myVote === i;
      return `<button type="button" class="wl-poll-opt ${isMine ? "is-mine" : ""}" data-poll-vote="${escapeHtml(post.id)}::${i}" data-stop-card-click>
        <span class="wl-poll-opt-fill" style="width:${pct}%"></span>
        <span class="wl-poll-opt-row">
          <span class="wl-poll-opt-label">${escapeHtml(opt)}${isMine ? `<span class="wl-poll-opt-mine"> · your vote</span>` : ""}</span>
          <span class="wl-poll-opt-pct">${pct}% (${n})</span>
        </span>
      </button>`;
    }).join("");
    const foot = `${totalVotes} vote${totalVotes === 1 ? "" : "s"}` +
      (viewerEmail && myVote === null ? ` · click to vote` : "");
    return `<div class="wl-poll" data-stop-card-click>
      <div class="wl-poll-q">${escapeHtml(poll.question)}</div>
      <div class="wl-poll-opts">${opts}</div>
      <div class="wl-poll-foot">${escapeHtml(foot)}</div>
    </div>`;
  }
  async function votePoll(postId, optionIdx) {
    if (!viewerEmail) { showBanner("Sign in via Cloudflare Access first.", true); return; }
    const post = posts.find(p => p.id === postId);
    if (!post || !post.poll) return;
    // Optimistic: flip vote locally + re-render, then post to worker.
    const prev = (post.poll.votes || {})[viewerEmail];
    post.poll.votes = post.poll.votes || {};
    if (prev === optionIdx) delete post.poll.votes[viewerEmail];
    else post.poll.votes[viewerEmail] = optionIdx;
    renderFeed();
    try {
      await wallAction("poll-vote", { post_id: postId, option_index: optionIdx });
    } catch (err) {
      // Roll back on error.
      if (prev === undefined) delete post.poll.votes[viewerEmail];
      else post.poll.votes[viewerEmail] = prev;
      renderFeed();
      showBanner("Vote failed: " + (err.message || String(err)), true);
    }
  }

  // Navigate to a specific post: jump to the page that contains it,
  // expand it, scroll it into view. Closes every other expanded/open post
  // first so the viewer's screen lands on exactly one thing. Used by:
  //   - initial page load (#post-<id> hash)
  //   - hashchange (user clicked a link with #post-<id>)
  //   - notification bell entries (data-jump handler — may also pass a
  //     commentId so we scroll to + briefly highlight the specific comment)
  //   - Share — copies a #post-<id> URL that lands here on the recipient
  // Reflect current page + focused post in the URL so the view is
  // shareable / reload-stable. Default page=0 is stripped.
  function syncWallUrl() {
    try {
      const url = new URL(location.href);
      const focused = expandedPostIds.size === 1
        ? [...expandedPostIds][0]
        : (partialPostIds.size === 1 ? [...partialPostIds][0] : null);
      if (focused) url.searchParams.set("post", focused);
      else url.searchParams.delete("post");
      if (currentPage > 0) url.searchParams.set("page", String(currentPage));
      else url.searchParams.delete("page");
      // Drop the legacy #post-… hash so it doesn't fight the query param.
      const newHref = url.toString().replace(/#post-[^#]*$/, "");
      history.replaceState({}, "", newHref);
    } catch (e) { /* noop */ }
  }
  function jumpToPost(postId, opts) {
    if (!postId) return;
    const idx = posts.findIndex(p => p.id === postId);
    if (idx < 0) return;
    currentPage = Math.floor(idx / POSTS_PER_PAGE);
    expandedPostIds.clear();
    partialPostIds.clear();
    expandedPostIds.add(postId);
    openPostIds.clear();
    openPostIds.add(postId);
    renderFeed();
    if (opts && opts.skipScroll) return;
    requestAnimationFrame(() => {
      const commentId = opts && opts.commentId;
      let target = null;
      if (commentId) {
        // CSS attribute selector — comment IDs are alphanumeric+underscore,
        // safe to interpolate directly. Add the brief flash to mark it.
        target = document.querySelector(`[data-comment="${commentId}"]`);
      }
      if (!target) target = document.getElementById(`post-${postId}`);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: commentId ? "center" : "start" });
      if (commentId) {
        target.classList.add("wl-just-jumped");
        setTimeout(() => target.classList.remove("wl-just-jumped"), 2400);
      }
    });
  }
  window.addEventListener("hashchange", () => {
    const h = (location.hash || "").replace(/^#post-/, "");
    if (h) jumpToPost(decodeURIComponent(h));
  });

  function renderFeed() {
    const root = document.getElementById("wlFeed");
    if (!posts.length) {
      root.innerHTML = `<div class="wl-empty">No pages yet. Write the first.</div>`;
      return;
    }
    const total = posts.length;
    const totalPages = Math.max(1, Math.ceil(total / POSTS_PER_PAGE));
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    if (currentPage < 0) currentPage = 0;
    const start = currentPage * POSTS_PER_PAGE;
    const slice = posts.slice(start, start + POSTS_PER_PAGE);
    root.innerHTML = slice.map(renderPost).join("") + renderPagination(currentPage, totalPages);
    wireFeed();
    hydrateLinkPreviews();
  }
  function renderPagination(page, total) {
    if (total <= 1) return "";
    return `<nav class="wl-pagination" aria-label="Wall pagination">
      <button type="button" data-page-prev ${page === 0 ? "disabled" : ""}>← Newer</button>
      <span class="wl-page-num">Page ${page + 1} of ${total}</span>
      <button type="button" data-page-next ${page >= total - 1 ? "disabled" : ""}>Older →</button>
    </nav>`;
  }
  function sortPosts() {
    posts.forEach(p => { p._sortKey = mostRecentActivity(p); });
    posts.sort((a, b) => (a._sortKey < b._sortKey ? 1 : a._sortKey > b._sortKey ? -1 : 0));
  }
  function mostRecentActivity(post) {
    let latest = post.created_at || "";
    for (const c of (post.comments || [])) {
      if ((c.created_at || "") > latest) latest = c.created_at;
    }
    return latest;
  }

  // Posts have three states (preview → partial → full); see the
  // partialPostIds comment near the top of the script for the cycle.
  function renderPost(post) {
    if (expandedPostIds.has(post.id)) return renderPostExpanded(post);
    if (partialPostIds.has(post.id))  return renderPostPartial(post);
    return renderPostCompact(post);
  }

  // Activity timestamp for a top-level comment = max(comment.created_at,
  // every descendant reply's created_at). Used to (a) sort which
  // comments survive the partial-state cap of 4, and (b) pick the single
  // "most recent comment" surfaced under a post in preview state.
  function commentActivity(comment, allComments) {
    let latest = comment.created_at || "";
    const seen = new Set([comment.id]);
    const stack = [comment.id];
    while (stack.length) {
      const pid = stack.shift();
      for (const c of allComments) {
        if (c.parent_comment_id === pid && !seen.has(c.id)) {
          seen.add(c.id);
          if ((c.created_at || "") > latest) latest = c.created_at;
          stack.push(c.id);
        }
      }
    }
    return latest;
  }

  function renderPostHead(post) {
    const name = displayName(post.author_email, post.author_name);
    const photo = photoUrlFor(staffByEmail[(post.author_email || "").toLowerCase()] || {});
    const channelTag = post.channel
      ? ` <span class="wl-channel-tag">${escapeHtml(post.channel)}</span>` : "";
    const canDeletePost = canDelete(post.author_email);
    const canEditPost = canEdit(post.author_email);
    const editedTag = post.edited_at ? ` <span class="wl-edited-tag">edited</span>` : "";
    return `
      <div class="wl-post-head">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div class="wl-meta">
          <div class="wl-post-name"><a class="wl-name-link" href="/directory/${escapeHtml(((post.author_email||"").split("@")[0]||"").toLowerCase())}" onclick="event.stopPropagation();">${escapeHtml(name)}</a>${channelTag}</div>
          <div class="wl-post-time">${formatTime(post.created_at)}${editedTag}</div>
        </div>
        ${(canEditPost || canDeletePost) ? `<div class="wl-post-head-actions">
          ${canEditPost ? `<button class="wl-edit-btn" data-edit-post="${escapeHtml(post.id)}" title="Edit this post" aria-label="Edit post" data-stop-card-click>${icon("edit", false)}</button>` : ""}
          ${canDeletePost ? `<button class="wl-delete-btn" data-delete-post="${escapeHtml(post.id)}" title="Delete this post" aria-label="Delete post" data-stop-card-click>${icon("trash", false)}</button>` : ""}
        </div>` : ""}
      </div>`;
  }

  function renderPostCompact(post) {
    const comments = post.comments || [];
    const myReaction = mineReactionOn(post.reactions || {});
    const body250 = bodyTeaser(post.body || "", 250);
    const photoStrip = renderPhotoStrip(post.photos || [], post.id);
    const linkBlocks = renderLinkBlocks(post.body || "", post.id);

    // Surface the top-level comment whose thread has the most recent
    // activity (own date OR any descendant reply's date). A reply landing
    // today on an old comment lifts that comment into the preview slot.
    const topLevel = comments.filter(c => !c.parent_comment_id);
    let recent = null;
    let recentAt = "";
    for (const c of topLevel) {
      const act = commentActivity(c, comments);
      if (act > recentAt) { recent = c; recentAt = act; }
    }
    const recentCard = recent ? renderPreviewComment(post, recent) : "";

    const likeActive = !!myReaction;
    return `
      <article class="wl-post wl-post--compact" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}" data-expand-card="${escapeHtml(post.id)}" role="button" tabindex="0" aria-label="Open post for full view">
        ${renderPostHead(post)}
        ${editingKey === `post:${post.id}`
          ? `<textarea class="wl-edit-input" data-edit-save="post:${escapeHtml(post.id)}" maxlength="10000" data-stop-card-click>${escapeHtml(post.body || "")}</textarea>`
          : `<div class="wl-post-body wl-post-body--teaser">${enrichBody(body250, { bold: true })}</div>`}
