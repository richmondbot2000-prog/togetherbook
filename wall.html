        ${photoStrip}
        ${linkBlocks}
        ${renderPoll(post)}
        ${renderPostMetaRow(post)}
        ${recentCard}
        <div class="wl-action-bar" data-stop-card-click>
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" data-stop-card-click title="Tap to ${likeActive ? "remove your reaction" : "Like"}; hover to pick a different reaction">
            <span class="wl-action-icon">${likeActive ? emojiGlyph(myReaction) : icon("thumb", false)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Like"}</span>
          </button>
          <button class="wl-action" data-comment-on="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
          <button class="wl-action" data-share="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("share", false)}</span>
            <span class="wl-action-label">Share</span>
          </button>
        </div>
      </article>`;
  }

  // The "Preview" comment card under a post. Renders just enough to
  // recognise the thread: author + short timestamp, 200-char body trim,
  // and (if there's a photo) the first photo full-width clipped to the
  // same 220-px peek height the post uses. No action row, no reply
  // composer — those appear after clicking the post into partial state.
  function renderPreviewComment(post, comment) {
    const name = displayName(comment.author_email, comment.author_name);
    const photo = photoUrlFor(staffByEmail[(comment.author_email || "").toLowerCase()] || {});
    const trimmed = bodyTeaser(comment.body || "", 200);
    const firstPhoto = (comment.photos || []).find(Boolean);
    const photoPeek = firstPhoto
      ? `<div class="wl-photo-peek wl-photo-peek--comment"><img class="wl-media-img wl-photo-peek-img" src="${escapeHtml(mediaUrl(firstPhoto))}" alt="" loading="lazy"></div>`
      : "";
    return `
      <div class="wl-preview-comment">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div style="flex:1;min-width:0;">
          <div class="wl-comment-body">
            <div>
              <span class="wl-comment-name">${escapeHtml(name)}</span>
              <span class="wl-comment-time">${formatTimeShort(comment.created_at)}</span>
            </div>
            ${trimmed ? `<div class="wl-comment-text">${enrichBody(trimmed)}</div>` : ""}
          </div>
          ${photoPeek}
        </div>
      </div>`;
  }

  // Partially expanded state — full body, full photo grid, action bar
  // and composer like the fully-expanded view, but only the last 4
  // top-level comments by activity, and each of those comments is
  // capped to its 3 most recent replies. Clicking the article (or any
  // comment inside it) escalates to the fully-expanded renderer.
  function renderPostPartial(post) {
    const bodyText = post.body || "";
    const bodyHtml = enrichBody(bodyText, { bold: true });
    const linkBlocks = renderLinkBlocks(bodyText, post.id);
    const photos = renderPhotos(post.photos || [], post.id);
    const reactions = renderReactionPills(post.reactions || {}, post.id, "post");
    const myReaction = mineReactionOn(post.reactions || {});
    const likeActive = !!myReaction;
    return `
      <article class="wl-post wl-post--partial" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}" data-expand-card="${escapeHtml(post.id)}" role="button" tabindex="0" aria-label="Click again to see every comment + reply">
        ${renderPostHead(post)}
        ${editingKey === `post:${post.id}`
          ? `<textarea class="wl-edit-input" data-edit-save="post:${escapeHtml(post.id)}" maxlength="10000" data-stop-card-click>${escapeHtml(bodyText)}</textarea>`
          : `<div class="wl-post-body">${bodyHtml}</div>`}
        ${linkBlocks}
        ${renderPoll(post)}
        ${photos}
        ${renderPostMetaRow(post)}
        ${reactions ? `<div class="wl-reaction-pills">${reactions}</div>` : ""}
        <div class="wl-action-bar" data-stop-card-click>
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" data-stop-card-click title="Tap to ${likeActive ? "remove your reaction" : "Like"}; hover to pick a different reaction">
            <span class="wl-action-icon">${likeActive ? emojiGlyph(myReaction) : icon("thumb", false)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Like"}</span>
          </button>
          <button class="wl-action" data-toggle-comments="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
          <button class="wl-action" data-share="${escapeHtml(post.id)}" data-stop-card-click>
            <span class="wl-action-icon">${icon("share", false)}</span>
            <span class="wl-action-label">Share</span>
          </button>
        </div>
        <div class="wl-comment-composer" data-stop-card-click>
          <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
          <input class="wl-comment-input" type="text" placeholder="Add a comment…" data-add-comment="${escapeHtml(post.id)}" ${viewerEmail ? "" : "disabled"} maxlength="2000">
          ${commentAttachButtons(post.id, "")}
        </div>
        ${renderComments(post, "partial")}
      </article>`;
  }

  function renderPostExpanded(post) {
    const bodyText = post.body || "";
    const bodyHtml = enrichBody(bodyText, { bold: true });
    const linkBlocks = renderLinkBlocks(bodyText, post.id);
    const photos = renderPhotos(post.photos || [], post.id);
    const reactions = renderReactionPills(post.reactions || {}, post.id, "post");
    const comments = post.comments || [];
    const cmCount = comments.filter(c => !c.parent_comment_id).length;
    const open = openPostIds.has(post.id);
    const newCount = unseenCommentCount(post);
    const myReaction = mineReactionOn(post.reactions || {});
    const likeActive = !!myReaction;
    return `
      <article class="wl-post" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}">
        ${renderPostHead(post)}
        ${editingKey === `post:${post.id}`
          ? `<textarea class="wl-edit-input" data-edit-save="post:${escapeHtml(post.id)}" maxlength="10000">${escapeHtml(bodyText)}</textarea>`
          : `<div class="wl-post-body">${bodyHtml}</div>`}
        ${linkBlocks}
        ${renderPoll(post)}
        ${photos}
        ${renderPostMetaRow(post)}
        ${reactions ? `<div class="wl-reaction-pills">${reactions}</div>` : ""}
        <div class="wl-action-bar">
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" title="Tap to ${likeActive ? "remove your reaction" : "Like"}; hover to pick a different reaction">
            <span class="wl-action-icon">${likeActive ? emojiGlyph(myReaction) : icon("thumb", false)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Like"}</span>
          </button>
          <button class="wl-action" data-toggle-comments="${escapeHtml(post.id)}">
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
          <button class="wl-action" data-share="${escapeHtml(post.id)}">
            <span class="wl-action-icon">${icon("share", false)}</span>
            <span class="wl-action-label">Share</span>
          </button>
        </div>
        <div class="wl-comment-composer">
          <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
          <input class="wl-comment-input" type="text" placeholder="Add a comment…" data-add-comment="${escapeHtml(post.id)}" ${viewerEmail ? "" : "disabled"} maxlength="2000">
          ${commentAttachButtons(post.id, "")}
        </div>
        ${renderComments(post, "full")}
      </article>`;
  }

  function bodyTeaser(s, n) {
    const t = (s || "").trim().replace(/\s+/g, " ");
    return t.length <= n ? t : t.slice(0, n - 1) + "…";
  }

  // URL → clickable link with brass-underline styling. Used in compact
  // body teasers + the expanded body. Doesn't try to be RFC-perfect —
  // matches http(s):// URLs up to whitespace.
  const URL_RX = /\b(https?:\/\/[^\s<>"']+)/g;
  function linkifyBody(escapedText) {
    // Caller passes already-escapeHtml'd text.
    return escapedText.replace(URL_RX, (m) => {
      const safe = m.replace(/"/g, "&quot;");
      return `<a class="wl-post-link" href="${safe}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();">${m}</a>`;
    });
  }
  function enrichBody(rawText, opts) {
    let html = renderMentionsInHtml(linkifyBody(escapeHtml(rawText || "")));
    // Bold (**foo**) is a post-only feature — comments/replies render
    // the literal `**foo**` so the markdown isn't accidentally honoured
    // in chat. Pass {bold:true} from post renderers only.
    if (opts && opts.bold) html = renderBoldInHtml(html);
    return html;
  }
  // Markdown bold (**…**) → <strong>…</strong>. Runs on already-escaped
  // HTML so `**` is unchanged from the user's input. The non-greedy
  // [^*] inner pattern means consecutive bold spans don't merge and a
  // single dangling `**` stays as literal.
  function renderBoldInHtml(html) {
    return html.replace(/\*\*([^*\n][^*\n]*?)\*\*/g, '<strong>$1</strong>');
  }

  // === @-mentions ===========================================================
  // Two halves: rendering and autocomplete. Rendering replaces "@local" in
  // post bodies with a blue link to user.html when local matches a known
  // staff member. Autocomplete watches the compose textarea / comment / reply
  // inputs for "@..." and pops a filtered staff list under the caret.
  let staffByLocal = {};
  function buildStaffByLocal() {
    staffByLocal = {};
    for (const u of Object.values(staffByEmail)) {
      const lp = ((u.email || "").split("@")[0] || "").toLowerCase();
      if (lp) staffByLocal[lp] = u;
    }
  }
  function localPart(email) { return ((email || "").split("@")[0] || "").toLowerCase(); }
  // Match "@local" only when preceded by start-of-string or whitespace; the
  // local-part runs as long as it's a-z, 0-9, dot, dash, or underscore.
  // Operates on already-escaped + linkified HTML — URLs end up wrapped in
  // <a> tags whose visible href content doesn't contain "@\w" preceded by
  // whitespace, so we don't double-process them.
  const MENTION_RX_RENDER = /(^|\s)@([a-z0-9._-]+)/gi;
  function renderMentionsInHtml(html) {
    return html.replace(MENTION_RX_RENDER, (full, lead, local) => {
      const u = staffByLocal[local.toLowerCase()];
      if (!u) return full;
      const name = u.name || u.email;
      return `${lead}<a class="wl-mention" href="/directory/${escapeHtml(local.toLowerCase())}" onclick="event.stopPropagation();">@${escapeHtml(name)}</a>`;
    });
  }

  // Picker — single DOM element reused across all input fields.
  const mentionPicker = document.createElement("div");
  mentionPicker.className = "wl-mention-picker";
  mentionPicker.style.display = "none";
  document.body.appendChild(mentionPicker);
  let mentionState = null; // { input, atIdx, query, matches, hl }

  function findMentionContext(input) {
    const v = input.value || "";
    const pos = input.selectionStart || 0;
    const before = v.slice(0, pos);
    const atIdx = before.lastIndexOf("@");
    if (atIdx < 0) return null;
    // Must be start-of-string OR whitespace before the @
    if (atIdx > 0 && !/\s/.test(before[atIdx - 1])) return null;
    const query = before.slice(atIdx + 1);
    // Stop the picker if the query has any whitespace or invalid chars —
    // the user has moved past the @-token.
    if (!/^[a-z0-9._-]*$/i.test(query)) return null;
    return { atIdx, query };
  }
  function showMentionPicker(input, ctx) {
    const q = ctx.query.toLowerCase();
    const all = Object.values(staffByEmail);
    // Match by local-part prefix, then by name word-prefix as a secondary.
    const byLocal = all.filter(u => localPart(u.email).startsWith(q));
    const byName = q.length >= 2
      ? all.filter(u => {
          if (byLocal.includes(u)) return false;
          return (u.name || "").toLowerCase().split(/\s+/).some(w => w.startsWith(q));
        })
      : [];
    const matches = [...byLocal, ...byName]
      .sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email))
      .slice(0, 8);
    if (!matches.length) { hideMentionPicker(); return; }
    mentionState = { input, atIdx: ctx.atIdx, query: ctx.query, matches, hl: 0 };
    renderMentionPicker();
    positionMentionPicker(input);
    mentionPicker.style.display = "";
  }
  function renderMentionPicker() {
    if (!mentionState) return;
    mentionPicker.innerHTML = mentionState.matches.map((u, i) => {
      const lp = localPart(u.email);
      return `<button type="button" class="wl-mention-item ${i === mentionState.hl ? "is-hl" : ""}" data-mention-pick="${escapeHtml(u.email)}">
        <span class="wl-mention-item-name">${escapeHtml(u.name || u.email)}</span>
        <span class="wl-mention-item-local">@${escapeHtml(lp)}</span>
      </button>`;
    }).join("");
    mentionPicker.querySelectorAll("[data-mention-pick]").forEach(btn => {
      // mousedown — not click — so it fires before the input's blur handler
      // (otherwise the picker dismisses before we can read its value).
      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        pickMention(btn.dataset.mentionPick);
      });
    });
  }
  function positionMentionPicker(input) {
    const rect = input.getBoundingClientRect();
    mentionPicker.style.left = `${Math.max(8, rect.left)}px`;
    mentionPicker.style.top  = `${rect.bottom + 4}px`;
    mentionPicker.style.width = `${Math.max(240, Math.min(rect.width, 360))}px`;
  }
  function hideMentionPicker() {
    mentionPicker.style.display = "none";
    mentionState = null;
  }
  function pickMention(email) {
    if (!mentionState) return;
    const { input, atIdx } = mentionState;
    const v = input.value || "";
    const pos = input.selectionStart || 0;
    const lp = localPart(email);
    const replacement = `@${lp} `;
    const before = v.slice(0, atIdx);
    const after = v.slice(pos);
    input.value = before + replacement + after;
    const newPos = atIdx + replacement.length;
    input.setSelectionRange(newPos, newPos);
    hideMentionPicker();
    input.focus();
    input.dispatchEvent(new Event("input", { bubbles: true }));
  }
  function maybeOpenMention(input) {
    const ctx = findMentionContext(input);
    if (!ctx) { hideMentionPicker(); return; }
    showMentionPicker(input, ctx);
  }
  function isMentionTarget(t) {
    return !!t && (t.id === "wlComposeText" || (t.classList && t.classList.contains("wl-comment-input")));
  }
  document.addEventListener("input", e => {
    if (isMentionTarget(e.target)) maybeOpenMention(e.target);
  });
  document.addEventListener("keydown", e => {
    if (!mentionState || e.target !== mentionState.input) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      mentionState.hl = (mentionState.hl + 1) % mentionState.matches.length;
      renderMentionPicker();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      mentionState.hl = (mentionState.hl - 1 + mentionState.matches.length) % mentionState.matches.length;
      renderMentionPicker();
    } else if (e.key === "Enter" || e.key === "Tab") {
      e.preventDefault();
      pickMention(mentionState.matches[mentionState.hl].email);
    } else if (e.key === "Escape") {
      e.preventDefault();
      hideMentionPicker();
    }
  });
  document.addEventListener("click", e => {
    if (!mentionState) return;
    if (!mentionPicker.contains(e.target) && e.target !== mentionState.input) {
      hideMentionPicker();
    }
  }, true);
  window.addEventListener("scroll", () => { if (mentionState) hideMentionPicker(); }, true);
  // ==========================================================================

  // Detect YouTube vs other URLs in the body, render the appropriate
  // block below the body in expanded view.
  function renderLinkBlocks(rawText, postId) {
    const urls = (rawText || "").match(URL_RX) || [];
    if (!urls.length) return "";
    const seen = new Set();
    return urls.filter(u => !seen.has(u) && seen.add(u)).slice(0, 3).map(url => {
      const yt = matchYouTube(url);
      if (yt) {
        return `<div class="wl-yt-embed"><iframe src="https://www.youtube-nocookie.com/embed/${escapeHtml(yt)}" loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>`;
      }
      return `<a class="wl-link-preview" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" data-link-preview="${escapeHtml(url)}" data-post="${escapeHtml(postId)}" onclick="event.stopPropagation();">
                <div class="wl-link-thumb"><div class="wl-link-thumb-empty">Loading preview…</div></div>
                <div class="wl-link-body">
                  <div class="wl-link-host">${escapeHtml(safeHost(url))}</div>
                  <div class="wl-link-title">${escapeHtml(url)}</div>
                  <div class="wl-link-desc">Loading…</div>
                </div>
              </a>`;
    }).join("");
  }
  function matchYouTube(url) {
    // youtu.be/<id> or youtube.com/watch?v=<id> or /embed/<id> or /shorts/<id>
    let m = url.match(/youtu\.be\/([\w-]{6,})/);
    if (m) return m[1];
    m = url.match(/youtube\.com\/(?:watch\?[^"\s]*?\bv=|embed\/|shorts\/|v\/)([\w-]{6,})/);
    if (m) return m[1];
    return null;
  }
  function safeHost(url) {
    try { return new URL(url).host; } catch (e) { return ""; }
  }

  // Compact-view photo strip — small thumbnails (52 px), max 4 visible.
  // Compact post photo display: render the FIRST photo full-width but
  // clipped to a fixed height so only the top portion is visible. The
  // user expands the post to see the full image. If there are extra
  // photos, show a small "+N more" badge in the corner.
  function renderPhotoStrip(photos, postId) {
    if (!photos || !photos.length) return "";
    const first = photos[0];
    const extra = photos.length - 1;
    return `<div class="wl-photo-peek">
      <img class="wl-media-img wl-photo-peek-img" src="${escapeHtml(mediaUrl(first))}" alt="" loading="lazy">
      ${extra > 0 ? `<div class="wl-photo-peek-more">+${extra} more</div>` : ""}
    </div>`;
  }

  function canDelete(authorEmail) {
    if (!viewerEmail) return false;
    if (viewerIsAdmin) return true;
    return (authorEmail || "").toLowerCase() === viewerEmail;
  }
  // Edit is author-only — admins can take a post down (canDelete) but not
  // rewrite someone else's words.
  function canEdit(authorEmail) {
    if (!viewerEmail) return false;
    return (authorEmail || "").toLowerCase() === viewerEmail;
  }
  function commentAttachButtons(postId, parentCommentId) {
    if (!viewerEmail) return "";
    const key = parentCommentId ? `${postId}::${parentCommentId}` : postId;
    return `
      <label class="wl-comment-attach" title="Upload photo or video" aria-label="Upload photo or video">
        <input type="file" accept="image/*,video/*" data-cm-photo="${escapeHtml(key)}">
        ${icon("photo", false)}
      </label>
      <button type="button" class="wl-comment-attach" data-cm-gif="${escapeHtml(key)}" title="Add a GIF" aria-label="Add a GIF">
        ${icon("gif", false)}
      </button>`;
  }
  function renderCommentMedia(photos, commentId) {
    if (!photos || !photos.length) return "";
    const n = Math.min(photos.length, 4);
    const tiles = photos.slice(0, 4).map((p, i) => {
      const isVideo = /\.(mp4|webm|mov)$/i.test(p);
      const url = mediaUrl(p);
      return isVideo
        ? `<video src="${escapeHtml(url)}" controls playsinline></video>`
        : `<img class="wl-media-img" src="${escapeHtml(url)}" alt="" loading="lazy" data-cm-open-lightbox="${escapeHtml(commentId)}::${i}" tabindex="0" role="button" aria-label="Open image">`;
    }).join("");
    return `<div class="wl-comment-photos cm-${n}">${tiles}</div>`;
  }

  function mineReactionOn(rx) {
    if (!viewerEmail) return null;
    for (const [emoji, emails] of Object.entries(rx || {})) {
      if ((emails || []).map(e => (e || "").toLowerCase()).includes(viewerEmail)) return emoji;
    }
    return null;
  }

  // Body is rendered raw + clamped via CSS line-clamp; the "See more" link
  // is sibling-rendered in renderPost. No JS character slicing — keeps
  // paragraphed and dense posts treated uniformly.
  function renderBody(body, postId, expanded) {
    return escapeHtml(body);
  }

  // Per-count grid layout. Counts of 1/2/3/4 show every photo; 5+ shows
  // first 3 with a "+N" overlay on the 3rd. Tap opens the lightbox.
  function renderPhotos(photos, postId) {
    if (!photos.length) return "";
    const n = photos.length;
    let cls = "count-" + Math.min(n, 4);
    let visible = photos.slice();
    let overlayN = 0;
    if (n >= 5) {
      cls = "count-5plus";
      visible = photos.slice(0, 3);
      overlayN = n - 3;
    }
    const tiles = visible.map((p, i) => {
      const overlay = (overlayN > 0 && i === visible.length - 1)
        ? `<div class="wl-more-overlay">+${overlayN}</div>` : "";
      // Error fallback (still publishing 30-60s window) handled by an
      // attached listener in wireFeed, not inline onerror.
      return `<div class="wl-photo" data-open-lightbox="${escapeHtml(postId)}::${i}" role="button" tabindex="0" aria-label="Open image">
                <img class="wl-media-img" src="${escapeHtml(mediaUrl(p))}" alt="" loading="lazy">${overlay}
              </div>`;
    }).join("");
    return `<div class="wl-photos ${cls}">${tiles}</div>`;
  }

  // Render reactions as emoji-glyph pills. Each emoji animates per its
  // per-emoji keyframe on hover (thumb taps, heart pulses, etc.). Tap
  // mine to remove; tap another to switch.
  // Overlapping reaction circles (LinkedIn pattern) — up to 3 distinct
  // emoji types ranked by count, total tally to the right. Quiet when
  // there are zero reactions.
  function renderReactionCluster(reactions) {
    const entries = Object.entries(reactions || {}).filter(([, arr]) => arr && arr.length);
    if (!entries.length) return "";
    entries.sort((a, b) => b[1].length - a[1].length);
    const top = entries.slice(0, 3);
    const total = entries.reduce((n, [, arr]) => n + arr.length, 0);
    const dots = top.map(([emoji]) =>
      `<span class="wl-react-dot">${emojiGlyph(emoji)}</span>`
    ).join("");
    return `<span class="wl-react-cluster">${dots}<span class="wl-react-total">${total}</span></span>`;
  }
  // Combined meta line: reaction cluster on the left, comment / new
  // counts on the right. Empty when there's nothing to show.
  function renderPostMetaRow(post) {
    const cluster = renderReactionCluster(post.reactions || {});
    const comments = post.comments || [];
    const cmCount = comments.filter(c => !c.parent_comment_id).length;
    const newCount = unseenCommentCount(post);
    const right = cmCount > 0
      ? `<span class="wl-meta-counts">${cmCount} ${cmCount === 1 ? "comment" : "comments"}${newCount > 0 ? `<span class="wl-meta-new">· ${newCount} new</span>` : ""}</span>`
      : "";
    if (!cluster && !right) return "";
    return `<div class="wl-post-meta-row">${cluster || "<span></span>"}${right || "<span></span>"}</div>`;
  }

  function renderReactionPills(rx, parentId, parentKind) {
    const entries = Object.entries(rx || {})
      .filter(([_, emails]) => Array.isArray(emails) && emails.length > 0)
      .sort((a, b) => b[1].length - a[1].length);
    if (!entries.length) return "";
    const pills = entries.slice(0, 6).map(([emoji, emails]) => {
      const mine = emails.map(e => (e || "").toLowerCase()).includes(viewerEmail);
      const names = emails.map(e => displayName(e, "")).filter(Boolean).join(", ");
      return `<button class="wl-react-pill ${mine ? "is-mine" : ""}" data-react="${escapeHtml(emoji)}" data-on="${escapeHtml(parentId)}" data-kind="${escapeHtml(parentKind)}" title="${escapeHtml(names)}">${emojiGlyph(emoji)} ${emails.length}</button>`;
    }).join("");
    return `<div class="wl-reactions">${pills}</div>`;
  }
  // mode = "full"    → every top-level comment, every reply, sorted by
  //                    activity (oldest at top, newest at the bottom)
  // mode = "partial" → last 4 top-level comments by activity; each
  //                    capped to its 3 most recent replies
  function renderComments(post, mode) {
    const comments = (post.comments || []).slice();
    if (!comments.length) return "";
    const topLevel = comments.filter(c => !c.parent_comment_id);
    // Activity-based sort: a comment with a recent reply bubbles below
    // a comment whose own date is newer but has no recent replies.
    topLevel.sort((a, b) => {
      const aa = commentActivity(a, comments);
      const bb = commentActivity(b, comments);
      return aa < bb ? -1 : (aa > bb ? 1 : 0);
    });
    const partial = mode === "partial";
    const showList = partial ? topLevel.slice(-4) : topLevel;
    const hiddenN = topLevel.length - showList.length;
    let headerLink = "";
    if (partial && hiddenN > 0) {
      headerLink = `<button class="wl-show-all-comments" data-expand-full="${escapeHtml(post.id)}">View ${hiddenN} earlier ${hiddenN === 1 ? "comment" : "comments"}</button>`;
    } else if (!partial && topLevel.length > 4) {
      headerLink = `<button class="wl-show-all-comments" data-collapse-partial="${escapeHtml(post.id)}">Show recent only</button>`;
    }
    const repliesCap = partial ? 3 : null;
    return `<div class="wl-comments">${headerLink}${showList.map(c => renderComment(post, c, { repliesCap })).join("")}</div>`;
  }
  // Collect every descendant of a top-level comment (replies, replies-to-
  // replies, etc.) and return them flat, sorted chronologically. Used by
  // renderComment to render the whole reply thread at one indent level.
  function gatherCommentDescendants(allComments, rootId) {
    const out = [];
    const seen = new Set();
    const stack = [rootId];
    while (stack.length) {
      const pid = stack.shift();
      for (const c of allComments) {
        if (c.parent_comment_id === pid && !seen.has(c.id)) {
          seen.add(c.id);
          out.push(c);
          stack.push(c.id);
        }
      }
    }
    return out.sort((a, b) => (a.created_at < b.created_at ? -1 : 1));
  }
  function renderComment(post, comment, opts) {
    const isReply = !!(opts && opts.isReply);
    const parentForPrefix = (opts && opts.parentForPrefix) || null;
    const name = displayName(comment.author_email, comment.author_name);
    const photo = photoUrlFor(staffByEmail[(comment.author_email || "").toLowerCase()] || {});
    const replyKey = `${post.id}::${comment.id}`;
    const replyComposerOpen = openReplyTo.has(replyKey);
    const myReaction = mineReactionOn(comment.reactions || {});
    const canDel = canDelete(comment.author_email);
    const canEditThis = canEdit(comment.author_email);

    // Render-time "↳ ParentName" prefix on replies whose parent is itself a
    // reply (i.e. depth ≥ 2 in the data tree). Suppressed if the body
    // already begins with the parent's @-mention — author has disambiguated
    // explicitly. Keeps the thread readable even though everything below a
    // top-level comment renders at the same visual indent.
    let bodyPrefix = "";
    if (parentForPrefix) {
      const parentLocal = ((parentForPrefix.author_email || "").split("@")[0] || "").toLowerCase();
      const parentName = displayName(parentForPrefix.author_email, parentForPrefix.author_name);
      const parentEmail = (parentForPrefix.author_email || "").toLowerCase();
      const bodyTrim = (comment.body || "").trimStart().toLowerCase();
      const alreadyMentioned = parentLocal && bodyTrim.startsWith(`@${parentLocal}`);
      if (parentName && !alreadyMentioned) {
        bodyPrefix = `<span class="wl-reply-target">↳ <a href="/directory/${escapeHtml(parentEmail.split("@")[0] || "")}" onclick="event.stopPropagation();">${escapeHtml(parentName)}</a></span>`;
      }
    }
    const hasVisibleBody = bodyPrefix || (comment.body && comment.body.length);

    // Flatten descendants for the top-level render. Replies themselves never
    // recurse — every descendant ends up in this one .wl-replies block.
    let repliesHtml = "";
    if (!isReply) {
      const all = post.comments || [];
      const descendants = gatherCommentDescendants(all, comment.id);
      // Partial-state cap: when there are more than 4 replies, only the
      // 3 most recent survive (chronological tail of the sorted list).
      const cap = (opts && opts.repliesCap) || 0;
      const shown = (cap && descendants.length > 4) ? descendants.slice(-cap) : descendants;
      const hiddenReplies = descendants.length - shown.length;
      if (shown.length) {
        const earlierLink = hiddenReplies > 0
          ? `<button class="wl-show-all-comments wl-show-all-replies" data-expand-full="${escapeHtml(post.id)}">View ${hiddenReplies} earlier ${hiddenReplies === 1 ? "reply" : "replies"}</button>`
          : "";
        repliesHtml = `<div class="wl-replies">${earlierLink}${shown.map(d => {
          const parent = all.find(x => x.id === d.parent_comment_id);
          const pfp = (parent && parent.id !== comment.id) ? parent : null;
          return renderComment(post, d, { isReply: true, parentForPrefix: pfp });
        }).join("")}</div>`;
      }
    }

    return `
      <div class="wl-comment ${isReply ? "is-reply" : ""}" data-comment="${escapeHtml(comment.id)}">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div style="flex:1;min-width:0;">
          <div class="wl-comment-body">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:6px;">
              <div>
                <span class="wl-comment-name"><a class="wl-name-link" href="/directory/${escapeHtml(((comment.author_email||"").split("@")[0]||"").toLowerCase())}" onclick="event.stopPropagation();">${escapeHtml(name)}</a></span>
                <span class="wl-comment-time">${formatTimeShort(comment.created_at)}${comment.edited_at ? ` <span class="wl-edited-tag">edited</span>` : ""}</span>
              </div>
              ${(canEditThis || canDel) ? `<div style="display:flex;gap:2px;align-items:center;">
                ${canEditThis ? `<button class="wl-edit-btn" data-edit-comment="${escapeHtml(post.id)}::${escapeHtml(comment.id)}" title="Edit this ${isReply ? "reply" : "comment"}" aria-label="Edit">${icon("edit", false)}</button>` : ""}
                ${canDel ? `<button class="wl-delete-btn" data-delete-comment="${escapeHtml(post.id)}::${escapeHtml(comment.id)}" title="Delete this ${isReply ? "reply" : "comment"}" aria-label="Delete">${icon("trash", false)}</button>` : ""}
              </div>` : ""}
            </div>
            ${editingKey === `comment:${post.id}::${comment.id}`
              ? `<textarea class="wl-edit-input" data-edit-save="comment:${escapeHtml(post.id)}::${escapeHtml(comment.id)}" maxlength="2000">${escapeHtml(comment.body || "")}</textarea>`
              : (hasVisibleBody ? `<div class="wl-comment-text">${bodyPrefix}${enrichBody(comment.body || "")}</div>` : "")}
            ${renderCommentMedia(comment.photos || [], comment.id)}
            ${renderReactionPills(comment.reactions || {}, comment.id, "comment")}
          </div>
          <div class="wl-comment-actions">
            <button class="wl-reply-link wl-comment-like" data-like="${escapeHtml(comment.id)}" data-kind="comment" title="Tap to ${myReaction ? "remove your reaction" : "Like"}; long-press to pick a different reaction">
              ${myReaction ? `${emojiGlyph(myReaction)} ${reactionLabel(myReaction)}` : "Like"}
            </button>
            <button class="wl-reply-link" data-reply="${escapeHtml(replyKey)}">Reply</button>
          </div>
          ${replyComposerOpen ? `
            <div class="wl-comment-composer">
              <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
              <input class="wl-comment-input" type="text" placeholder="Reply to ${escapeHtml(name)}…" data-add-reply="${escapeHtml(replyKey)}" maxlength="2000" autofocus>
              ${commentAttachButtons(post.id, comment.id)}
            </div>` : ""}
          ${repliesHtml}
        </div>
      </div>`;
  }
  function unseenCommentCount(post) {
    if (!viewerEmail || (post.author_email || "").toLowerCase() !== viewerEmail) return 0;
    const seen = lastSeenByPost[post.id] || "";
    return (post.comments || []).filter(c => (c.created_at || "") > seen && (c.author_email || "").toLowerCase() !== viewerEmail).length;
  }

  function wireFeed() {
    // Click anywhere on a preview / partial post (outside an action /
    // link / control) to cycle: preview → partial → full. Clicking a
    // different post wipes whichever non-preview state was set on the
    // old post so only one post is above preview at a time.
    const expandCard = (id) => {
      const wasPartial = partialPostIds.has(id);
      const wasFull    = expandedPostIds.has(id);
      // Anything that wasn't this id collapses back to preview.
      expandedPostIds.clear();
      partialPostIds.clear();
      if (wasFull) {
        // Already at the top of the cycle — keep it there; clicks
        // inside a fully-expanded post shouldn't suddenly collapse it.
        expandedPostIds.add(id);
      } else if (wasPartial) {
        expandedPostIds.add(id);
      } else {
        partialPostIds.add(id);
      }
      syncWallUrl();
      renderFeed();
      if (!wasFull) {
        // Defer scroll until next paint
        requestAnimationFrame(() => {
          const el = document.getElementById(`post-${id}`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      }
    };
    document.querySelectorAll("[data-expand-card]").forEach(el => {
      el.addEventListener("click", e => {
        if (e.target.closest("[data-stop-card-click]")) return;
        // Don't escalate when the user is clicking a real control inside
        // a partial post (Like, Reply, "View N earlier", reaction pills,
        // photo tiles, etc.) — those have their own handlers and
        // shouldn't double as cycle-the-card triggers. The article
        // itself is also role="button" so closest() can match the
        // article — we only skip when the matched element is *not* the
        // article, i.e. a real inner control.
        const interactive = e.target.closest('a, input, textarea, label, button, [role="button"]');
        if (interactive && interactive !== el) return;
        expandCard(el.dataset.expandCard);
      });
      el.addEventListener("keydown", e => {
        if (e.target !== el) return; // ignore inputs inside
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          expandCard(el.dataset.expandCard);
        }
      });
    });
    document.querySelectorAll("[data-page-prev]").forEach(el => {
      el.addEventListener("click", () => {
        currentPage = Math.max(0, currentPage - 1);
        expandedPostIds.clear();
        partialPostIds.clear();
        syncWallUrl();
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll("[data-page-next]").forEach(el => {
      el.addEventListener("click", () => {
        currentPage++;
        expandedPostIds.clear();
        partialPostIds.clear();
        syncWallUrl();
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll("[data-share]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.share;
        const url = `${location.origin}/wall.html#post-${encodeURIComponent(id)}`;
        try {
          await navigator.clipboard.writeText(url);
          showBanner("Link copied to clipboard");
        } catch (err) {
          // Fallback for browsers blocking clipboard write
          prompt("Copy this link:", url);
        }
      });
    });
    document.querySelectorAll("[data-comment-on]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.commentOn;
        expandedPostIds.clear();
        partialPostIds.clear();
        expandedPostIds.add(id);
        openPostIds.add(id);
        renderFeed();
        const inp = document.querySelector(`[data-add-comment="${cssAttr(id)}"]`);
        if (inp) inp.focus();
      });
    });
    // Buttons added by renderComments to jump between partial + full
    // states without going through the cycling card click.
    document.querySelectorAll("[data-expand-full]").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        const id = el.dataset.expandFull;
        expandedPostIds.clear();
        partialPostIds.clear();
        expandedPostIds.add(id);
        syncWallUrl();
        renderFeed();
      });
    });
    document.querySelectorAll("[data-collapse-partial]").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        const id = el.dataset.collapsePartial;
        expandedPostIds.clear();
        partialPostIds.clear();
        partialPostIds.add(id);
        syncWallUrl();
        renderFeed();
      });
    });
    document.querySelectorAll("[data-expand]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.expand;
        if (el.dataset.collapse) expandedPostIds.delete(id);
        else expandedPostIds.add(id);
        renderFeed();
      });
    });
    // Poll vote — data-poll-vote="<postId>::<optionIdx>".
    document.querySelectorAll("[data-poll-vote]").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        const v = el.dataset.pollVote || "";
        const sep = v.lastIndexOf("::");
        if (sep < 0) return;
        const pid = v.slice(0, sep);
        const idx = parseInt(v.slice(sep + 2), 10);
        if (!isNaN(idx)) votePoll(pid, idx);
      });
    });
    document.querySelectorAll("[data-toggle-comments]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.toggleComments;
        // Comment-action click: expand all comments AND focus the composer.
        openPostIds.add(id);
        renderFeed();
        const inp = document.querySelector(`[data-add-comment="${cssAttr(id)}"]`);
        if (inp) inp.focus();
      });
    });
    document.querySelectorAll("[data-show-all]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.showAll;
        if (el.dataset.collapse) openPostIds.delete(id);
        else openPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-add-comment]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const postId = el.dataset.addComment;
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: postId, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === postId);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            el.value = "";
            // The reply may have bubbled the post to the top — keep the
            // viewer staring at it (not staring at the empty slot it
            // left behind on page N) by jumping to its new page.
            sortPosts();
            const idx = posts.findIndex(p => p.id === postId);
            if (idx >= 0) currentPage = Math.floor(idx / POSTS_PER_PAGE);
            renderFeed();
            // After renderFeed re-creates the DOM, re-focus the fresh
            // composer input for the same post so a user can keep typing.
            const fresh = document.querySelector(`[data-add-comment="${cssAttr(postId)}"]`);
            if (fresh) fresh.focus();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
          el.disabled = false; el.focus();
        }
      });
    });
    document.querySelectorAll("[data-reply]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.reply;
        const wasOpen = openReplyTo.has(key);
        if (wasOpen) openReplyTo.delete(key);
        else openReplyTo.add(key);
        const [pid, parentCommentId] = key.split("::");
        openPostIds.add(pid);
        renderFeed();
        // If we just opened the composer for a reply-to-a-reply, prefill the
        // input with "@<parent-local> " so the thread context is preserved.
        // Replies to top-level comments stay empty.
        if (!wasOpen) {
          const post = posts.find(p => p.id === pid);
          const parentComment = post && (post.comments || []).find(c => c.id === parentCommentId);
          if (parentComment && parentComment.parent_comment_id) {
            const local = ((parentComment.author_email || "").split("@")[0] || "").toLowerCase();
            if (local) {
              for (const inp of document.querySelectorAll("[data-add-reply]")) {
                if (inp.dataset.addReply === key) {
                  inp.value = `@${local} `;
                  const end = inp.value.length;
                  inp.setSelectionRange(end, end);
                  inp.focus();
                  break;
                }
              }
            }
          }
        }
      });
    });
    document.querySelectorAll("[data-add-reply]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const [pid, parent] = el.dataset.addReply.split("::");
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: pid, parent_comment_id: parent, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === pid);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            openReplyTo.delete(`${pid}::${parent}`);
            sortPosts();
            const idx = posts.findIndex(p => p.id === pid);
            if (idx >= 0) currentPage = Math.floor(idx / POSTS_PER_PAGE);
            renderFeed();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
        } finally {
          el.disabled = false;
        }
      });
    });
    document.querySelectorAll("[data-react]").forEach(el => {
      el.addEventListener("click", async () => {
        await reactTo(el.dataset.on, el.dataset.kind, el.dataset.react);
      });
    });
    // Avatar fallback to initials when photo 404s. Re-escape the value
    // we read back from the attribute (getAttribute returns decoded text)
    // so we can't be tricked into injecting HTML via a hostile name.
    document.querySelectorAll(".wl-avatar-img").forEach(img => {
      img.addEventListener("error", () => {
        const init = img.getAttribute("data-fallback-initials") || "?";
        const div = document.createElement("div");
        div.textContent = init;
        img.replaceWith(div);
      });
    });
    // Wall media (post + comment photos): dim + relabel while GitHub Pages
    // is still publishing the just-uploaded file (30-60s window).
    document.querySelectorAll(".wl-media-img").forEach(img => {
      img.addEventListener("error", () => {
        img.style.opacity = "0.3";
        img.alt = "still publishing — refresh in 30 s";
      });
    });
    // Keyboard support for photo tiles (Enter / Space opens lightbox).
    document.querySelectorAll("[data-open-lightbox], [data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); el.click(); }
      });
    });
    // Like buttons: tap = default reaction toggle; long-press = picker.
    document.querySelectorAll("[data-like]").forEach(el => {
      attachLikeButton(el);
    });
    // Photo tiles → lightbox
    document.querySelectorAll("[data-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [pid, idxStr] = el.dataset.openLightbox.split("::");
        const post = posts.find(p => p.id === pid);
        if (post) openLightbox(post.photos || [], parseInt(idxStr, 10) || 0);
      });
    });

    // Inline comment / reply media attach
    document.querySelectorAll("[data-cm-photo]").forEach(el => {
      el.addEventListener("change", async e => {
        const file = (e.target.files || [])[0];
        e.target.value = "";
        if (!file) return;
        // Single Upload button accepts image/* and video/*; route each
        // pick to the right kind based on the file's MIME type.
        const kind = (file.type || "").startsWith("video/") ? "video" : "photo";
        await submitCommentWithMedia(el.dataset.cmPhoto, file, kind);
      });
    });
    document.querySelectorAll("[data-cm-gif]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.cmGif;
        openGifPicker(async gif => {
          await submitCommentWithMediaPath(key, gif.url, "gif");
        });
      });
    });
    document.querySelectorAll("[data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [cid, idxStr] = el.dataset.cmOpenLightbox.split("::");
        let media = [];
        for (const p of posts) {
          const c = (p.comments || []).find(x => x.id === cid);
          if (c) { media = c.photos || []; break; }
        }
        openLightbox(media, parseInt(idxStr, 10) || 0);
      });
    });

    // Delete affordances
    // Edit-mode entry: click the pencil → flip editingKey, re-render so the
    // body region swaps to a textarea. Posts also auto-expand so the user
    // sees the full body, not just the compact teaser.
    document.querySelectorAll("[data-edit-post]").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        const id = el.dataset.editPost;
        editingKey = `post:${id}`;
        expandedPostIds.clear(); partialPostIds.clear(); expandedPostIds.add(id);
        openPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-edit-comment]").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        editingKey = `comment:${el.dataset.editComment}`;
        renderFeed();
      });
    });
    // Inline edit input: focus + grow + commit on blur. Escape cancels
    // without saving. Enter without shift also commits.
    document.querySelectorAll(".wl-edit-input").forEach(t => {
      const fit = () => { t.style.height = "auto"; t.style.height = Math.max(60, t.scrollHeight) + "px"; };
      fit();
      requestAnimationFrame(() => { t.focus(); t.setSelectionRange(t.value.length, t.value.length); });
      t.addEventListener("input", fit);
      t.addEventListener("blur", () => commitEdit(t));
      t.addEventListener("keydown", e => {
        if (e.key === "Escape") { e.preventDefault(); editingKey = null; renderFeed(); }
        else if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); t.blur(); }
      });
    });

    document.querySelectorAll("[data-delete-post]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.deletePost;
        const ok = await confirmDialog("Delete this post?", "The post + all its comments will be permanently removed. This cannot be undone.");
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "post", id });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          const i = posts.findIndex(p => p.id === id);
          if (i >= 0) posts.splice(i, 1);
          document.querySelectorAll(`[data-post="${cssAttr(id)}"]`).forEach(n => n.remove());
          renderFeed(); renderNotifications();
          showBanner("Post deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
    document.querySelectorAll("[data-delete-comment]").forEach(el => {
      el.addEventListener("click", async () => {
        const [pid, cid] = el.dataset.deleteComment.split("::");
        const post = posts.find(p => p.id === pid);
        const c = post && (post.comments || []).find(x => x.id === cid);
        const isReply = !!(c && c.parent_comment_id);
        const ok = await confirmDialog(
          `Delete this ${isReply ? "reply" : "comment"}?`,
          isReply
            ? "The reply will be permanently removed."
            : "The comment and any replies underneath it will be permanently removed.",
        );
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "comment", post_id: pid, id: cid });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          if (post) {
            // Remove the comment AND any replies to it (one-level cap).
            post.comments = (post.comments || []).filter(c => c.id !== cid && c.parent_comment_id !== cid);
          }
          // Defensive DOM removal — even if some render bug stopped the
          // post.comments mutation from clearing the visible row, drop the
          // matching DOM node now.
          document.querySelectorAll(`[data-comment="${cssAttr(cid)}"]`).forEach(n => n.remove());
          sortPosts(); renderFeed(); renderNotifications();
          showBanner(isReply ? "Reply deleted" : "Comment deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
  }

  async function submitCommentWithMedia(key, file, kind) {
    let dataUrl;
    try { dataUrl = kind === "photo" ? await resizeImage(file, 1600, 0.85) : await readAsDataUrl(file); }
    catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    let res;
    try { res = await wallAction("upload-media", { data_url: dataUrl, kind }); }
    catch (e) { showBanner("Upload failed: " + e.message, true); return; }
    if (!res || !res.path) return;
    await submitCommentWithMediaPath(key, res.path, kind);
  }
  async function submitCommentWithMediaPath(key, path, kind) {
    const [pid, parent] = key.includes("::") ? key.split("::") : [key, null];
    const inp = parent
      ? document.querySelector(`[data-add-reply="${cssAttr(key)}"]`)
      : document.querySelector(`[data-add-comment="${cssAttr(pid)}"]`);
    const text = inp ? inp.value.trim() : "";
    try {
      const payload = { post_id: pid, body: text, photos: [path] };
      if (parent) payload.parent_comment_id = parent;
      const res = await wallAction("comment", payload);
      if (res && res.comment) {
        const post = posts.find(p => p.id === pid);
        if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
        if (parent) openReplyTo.delete(key);
        openPostIds.add(pid);
        sortPosts(); renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  // Generic confirm dialog — returns Promise<bool>. Used for deletes.
  function confirmDialog(title, body) {
    return new Promise(resolve => {
      const root = document.createElement("div");
      root.className = "wl-confirm-panel";
      root.innerHTML = `
        <div class="wl-confirm-modal" role="dialog" aria-modal="true">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(body)}</p>
          <div class="wl-confirm-actions">
            <button class="wl-confirm-cancel" type="button">Cancel</button>
            <button class="wl-confirm-ok" type="button">Delete</button>
          </div>
        </div>`;
      document.body.appendChild(root);
      const close = (ans) => {
        document.removeEventListener("keydown", onKey);
        root.remove();
        resolve(ans);
      };
      // Esc closes (cancel). Enter is intentionally NOT shortcut to
       // confirm — if the user has Tab-focused Cancel, hitting Enter should
       // cancel; the focused button handles its own Enter natively.
      const onKey = e => { if (e.key === "Escape") close(false); };
      document.addEventListener("keydown", onKey);
      root.addEventListener("click", e => { if (e.target === root) close(false); });
      root.querySelector(".wl-confirm-cancel").addEventListener("click", () => close(false));
      root.querySelector(".wl-confirm-ok").addEventListener("click", () => close(true));
      root.querySelector(".wl-confirm-ok").focus();
    });
  }

  // Like button behaviour:
  //   - Desktop: hover for ~200 ms → emoji picker fades in. Cursor can
  //     travel into the picker (the picker's own mouseenter cancels the
  //     hide timer). Picker hides 220 ms after the cursor leaves both.
  //   - Touch: long-press 450 ms → picker.
  //   - Click (either input): toggles the user's current reaction
  //     (default 👍) without opening the picker.
  function attachLikeButton(el) {
    const openWithCallback = () => openEmojiPicker(el, async emoji => {
      await reactTo(el.dataset.like, el.dataset.kind, emoji);
    });
    // Desktop hover-open / leave-hide
    el.addEventListener("mouseenter", () => {
      clearTimeout(pickerHideTimer); pickerHideTimer = null;
      clearTimeout(pickerShowTimer);
      pickerShowTimer = setTimeout(openWithCallback, 220);
    });
    el.addEventListener("mouseleave", () => {
      clearTimeout(pickerShowTimer); pickerShowTimer = null;
      clearTimeout(pickerHideTimer);
      pickerHideTimer = setTimeout(closeEmojiPicker, 320);
    });
    // Touch long-press fallback (no hover on touch devices)
    let touchTimer = null, longPressFired = false;
    el.addEventListener("touchstart", () => {
      longPressFired = false;
      touchTimer = setTimeout(() => { longPressFired = true; openWithCallback(); }, 450);
    }, { passive: true });
    const cancelTouch = () => { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } };
    el.addEventListener("touchend", cancelTouch);
    el.addEventListener("touchcancel", cancelTouch);
    // Click — toggle current/default reaction. Ignored when the touch
    // long-press already opened the picker.
    el.addEventListener("click", async (ev) => {
      if (longPressFired) { ev.preventDefault(); return; }
      clearTimeout(pickerShowTimer); pickerShowTimer = null;
      const post = posts.find(p => p.id === el.dataset.like)
                 || posts.find(p => (p.comments || []).some(c => c.id === el.dataset.like));
      const rx = (el.dataset.kind === "post"
        ? (post && post.reactions)
        : ((post && (post.comments || []).find(c => c.id === el.dataset.like) || {}).reactions)) || {};
      const mine = mineReactionOn(rx) || DEFAULT_REACTION;
      await reactTo(el.dataset.like, el.dataset.kind, mine);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────────────
  let lightboxState = null;
  function openLightbox(photos, startIdx) {
    if (!photos || !photos.length) return;
    closeLightbox();
    let idx = startIdx;
    const root = document.createElement("div");
    root.className = "wl-lightbox";
    root.innerHTML = `
      <button class="wl-lightbox-arrow prev" aria-label="Previous">‹</button>
      <img src="${escapeHtml(mediaUrl(photos[idx]))}" alt="">
      <button class="wl-lightbox-arrow next" aria-label="Next">›</button>
      <button class="wl-lightbox-close" aria-label="Close">close</button>
      <div class="wl-lightbox-count">${idx + 1} / ${photos.length}</div>`;
    document.body.appendChild(root);
    const refresh = () => {
      root.querySelector("img").src = mediaUrl(photos[idx]);
      root.querySelector(".wl-lightbox-count").textContent = `${idx + 1} / ${photos.length}`;
    };
    const onKey = e => {
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft")  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.key === "ArrowRight") { idx = (idx + 1) % photos.length; refresh(); }
    };
    root.addEventListener("click", e => {
      if (e.target === root || e.target.classList.contains("wl-lightbox-close")) closeLightbox();
      else if (e.target.classList.contains("prev"))  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.target.classList.contains("next"))  { idx = (idx + 1) % photos.length; refresh(); }
    });
    document.addEventListener("keydown", onKey);
    lightboxState = { root, onKey };
  }
  function closeLightbox() {
    if (!lightboxState) return;
    lightboxState.root.remove();
    document.removeEventListener("keydown", lightboxState.onKey);
    lightboxState = null;
  }

  // Reaction picker — Facebook-style: appears on hover of the Like
  // button, persists while the cursor is over either the button or the
  // popover (a 400ms grace period covers the gap as the cursor travels),
  // and dismisses when both lose hover or the user clicks anywhere else.
  let activePopover = null;
  let activeAnchor = null;
  let activeDocHandler = null;
  let pickerShowTimer = null;
  let pickerHideTimer = null;
  let pickerOnPick = null;

  function openEmojiPicker(anchor, onPick) {
    if (activePopover && activeAnchor === anchor) {
      // Same anchor already has an open picker — just refresh callback.
      pickerOnPick = onPick;
      return;
    }
    closeEmojiPicker();
    const pop = document.createElement("div");
    pop.className = "wl-emoji-popover";
    const namedBtns = REACTIONS.map(e => {
      const meta = REACTION_META[e];
      const anim = (meta && meta.anim) || "";
      const label = (meta && meta.label) || e;
      return `<button data-emoji="${escapeHtml(e)}" data-label="${escapeHtml(label)}" aria-label="${escapeHtml(label)}" style="--react-anim: wl-${escapeHtml(anim)};"><span class="wl-emoji" data-anim="${escapeHtml(anim)}">${escapeHtml(e)}</span></button>`;
    }).join("");
    // "+" button — opens the extended any-emoji grid. Same target,
    // same onPick callback; the grid + free input route into the
    // existing reaction flow.
    const plusBtn = `<button data-custom="1" aria-label="Pick any emoji" title="Pick any emoji" class="wl-emoji-plus"><span class="wl-emoji-plus-icon">+</span></button>`;
    pop.innerHTML = namedBtns + plusBtn;
    document.body.appendChild(pop);
    const rect = anchor.getBoundingClientRect();
    pop.style.left = `${Math.max(8, rect.left + window.scrollX)}px`;
    pop.style.top  = `${rect.bottom + window.scrollY + 8}px`;
    pop.querySelectorAll("button").forEach(b => {
      const fire = (e) => {
        e.preventDefault(); e.stopPropagation();
        const cb = pickerOnPick;
        if (b.dataset.custom) {
          // "+" button — keep the anchor's onPick, swap the popover.
          openCustomEmojiPicker(anchor, cb);
          return;
        }
        const emoji = b.dataset.emoji;
        closeEmojiPicker();
        if (cb) cb(emoji);
      };
      // mousedown fires BEFORE the document click listener can intercept.
      b.addEventListener("mousedown", fire);
      // Touch / keyboard fallback
      b.addEventListener("click", fire);
    });
    // Keep the picker alive while the cursor is inside it.
    pop.addEventListener("mouseenter", () => {
      clearTimeout(pickerHideTimer); pickerHideTimer = null;
    });
    pop.addEventListener("mouseleave", () => {
      clearTimeout(pickerHideTimer);
      pickerHideTimer = setTimeout(closeEmojiPicker, 220);
    });
    activePopover = pop;
    activeAnchor = anchor;
    pickerOnPick = onPick;
    // Outside-click dismissal — ignore clicks inside the picker OR the
    // anchor (the click that triggered the open shouldn't immediately
    // close it). Registered with a short delay so the triggering click
    // doesn't fall through.
    activeDocHandler = (e) => {
      if (pop.contains(e.target)) return;
      if (anchor === e.target || anchor.contains(e.target)) return;
      closeEmojiPicker();
    };
    setTimeout(() => document.addEventListener("click", activeDocHandler), 50);
  }
  // Curated grid of common emojis surfaced when the user clicks "+"
  // on the named-reaction picker. Anything not in the grid is still
  // available via the "Type or paste any emoji" input (OS emoji
  // keyboard works on every modern device). Worker accepts arbitrary
  // emoji strings up to 4 codepoints.
  const EXTRA_EMOJIS = [
    "😀","😂","🤣","😊","🥲","😉","😍","🥰",
    "😘","🤩","🥳","🤔","🙄","😏","😴","😬",
    "🥺","😢","😭","😡","🤯","🥶","🤢","🤮",
    "👍","👎","👏","🙌","🙏","💪","🤝","✌️",
    "👌","👋","🤙","🤞","❤️","💔","💯","🔥",
    "⭐","✅","❌","⚠️","💡","🎉","🎁","💸",
  ];
  function openCustomEmojiPicker(anchor, onPick) {
    closeEmojiPicker();
    const pop = document.createElement("div");
    pop.className = "wl-emoji-popover wl-emoji-popover--grid";
    pop.innerHTML = `
      <div class="wl-emoji-grid-head">
        <input type="text" class="wl-emoji-grid-input" placeholder="Type or paste any emoji" maxlength="8">
      </div>
      <div class="wl-emoji-grid">
        ${EXTRA_EMOJIS.map(e => `<button type="button" class="wl-emoji-grid-cell" data-emoji="${escapeHtml(e)}" aria-label="${escapeHtml(e)}">${escapeHtml(e)}</button>`).join("")}
      </div>`;
    document.body.appendChild(pop);
    const rect = anchor.getBoundingClientRect();
    // Position with viewport-edge clamp so the wider grid doesn't spill.
    const popW = 320;
    let left = Math.max(8, Math.min(rect.left + window.scrollX, window.scrollX + document.documentElement.clientWidth - popW - 8));
    pop.style.left = `${left}px`;
    pop.style.top  = `${rect.bottom + window.scrollY + 8}px`;
    const input = pop.querySelector(".wl-emoji-grid-input");
    const fire = emoji => {
      const cb = pickerOnPick;
      closeEmojiPicker();
      if (cb && emoji) cb(emoji);
    };
    pop.querySelectorAll(".wl-emoji-grid-cell").forEach(b => {
      const handler = e => { e.preventDefault(); e.stopPropagation(); fire(b.dataset.emoji); };
      b.addEventListener("mousedown", handler);
      b.addEventListener("click", handler);
    });
    input.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      const v = (input.value || "").trim();
      if (!v) return;
      // Cap to first 4 codepoints — same as worker rule.
      const emoji = [...v].slice(0, 4).join("");
      fire(emoji);
    });
    activePopover = pop;
    activeAnchor = anchor;
    pickerOnPick = onPick;
    requestAnimationFrame(() => input.focus());
    setTimeout(() => {
      activeDocHandler = (ev) => {
        if (pop.contains(ev.target) || anchor.contains(ev.target)) return;
        closeEmojiPicker();
      };
      document.addEventListener("click", activeDocHandler);
    }, 50);
  }

  function closeEmojiPicker() {
    clearTimeout(pickerShowTimer); clearTimeout(pickerHideTimer);
    pickerShowTimer = pickerHideTimer = null;
    if (activeDocHandler) {
      document.removeEventListener("click", activeDocHandler);
      activeDocHandler = null;
    }
    if (activePopover) { activePopover.remove(); activePopover = null; }
    activeAnchor = null;
    pickerOnPick = null;
  }

  async function reactTo(parentId, kind, emoji) {
    if (!viewerEmail) { showBanner("Sign in via Cloudflare Access first.", true); return; }
    try {
      const res = await wallAction("react", { parent_id: parentId, parent_kind: kind, emoji });
      if (res && res.post_id) {
        const post = posts.find(p => p.id === res.post_id);
        if (post && res.target_kind === "post") post.reactions = res.reactions;
        else if (post && res.target_kind === "comment") {
          const c = (post.comments || []).find(c => c.id === parentId);
          if (c) c.reactions = res.reactions;
        }
        renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  // Mark a single notification event as seen-by-click. Optimistic local
  // update + worker persist. On worker failure we keep the local mark — the
  // worker call will resync on next load; preserving the click-feeling is
  // worth a tiny chance of "the bell came back" after a reload.
  // Inline-edit commit on blur. Reads the textarea value, diffs against
  // the stored body, calls the worker if changed, applies the new body
  // to the local cache and re-renders. On worker failure we leave the
  // editing state so the user can retry without losing what they typed.
  async function commitEdit(t) {
    const key = t.dataset.editSave || editingKey;
    if (!key) return;
    const nextBody = (t.value || "").trim();
    // Key is "post:<id>" or "comment:<postId>::<commentId>". The naive
    // `key.split(":")` drops the `::` half on comments because destructuring
    // only takes the first two elements — manually slice at the first colon.
    const firstColon = key.indexOf(":");
    if (firstColon < 0) { editingKey = null; renderFeed(); return; }
    const kind = key.slice(0, firstColon);
    const rest = key.slice(firstColon + 1);
    if (kind === "post") {
      const id = rest;
      const post = posts.find(p => p.id === id);
      if (!post) { editingKey = null; renderFeed(); return; }
      const prev = (post.body || "").trim();
      if (nextBody === prev) { editingKey = null; renderFeed(); return; }
      if (!nextBody && (!post.photos || !post.photos.length)) {
        showBanner("A post needs either text or a photo.", true);
        return;
      }
      try {
        const res = await wallAction("edit", { kind: "post", id, body: nextBody });
        post.body = nextBody;
        if (res && res.edited_at) post.edited_at = res.edited_at;
        editingKey = null;
        renderFeed();
        showBanner("Post edited");
      } catch (err) {
        showBanner("Edit failed: " + (err.message || String(err)), true);
      }
    } else if (kind === "comment") {
      const [pid, cid] = rest.split("::");
      const post = posts.find(p => p.id === pid);
      const c = post && (post.comments || []).find(x => x.id === cid);
      if (!c) { editingKey = null; renderFeed(); return; }
      const prev = (c.body || "").trim();
      if (nextBody === prev) { editingKey = null; renderFeed(); return; }
      if (!nextBody && (!c.photos || !c.photos.length)) {
        showBanner("A comment needs either text or a photo.", true);
        return;
      }
      try {
        const res = await wallAction("edit", { kind: "comment", id: cid, post_id: pid, body: nextBody });
        c.body = nextBody;
        if (res && res.edited_at) c.edited_at = res.edited_at;
        editingKey = null;
        renderFeed();
        showBanner("Edited");
      } catch (err) {
        showBanner("Edit failed: " + (err.message || String(err)), true);
      }
    } else {
      editingKey = null;
      renderFeed();
    }
  }

  async function markEventSeen(evId) {
    if (!evId || !viewerEmail) return;
    if (seenEvents.has(evId)) return;
    seenEvents.add(evId);
    renderNotifications();
    try {
      await wallAction("seen-event", { event_id: evId });
    } catch (err) {
      /* non-fatal; will resync */
    }
  }
  function renderNotifications() {
    const events = collectNotifications();
    const btn = document.getElementById("wlNotifBtn");
    btn.setAttribute("data-count", String(events.length));
    if (!btn.querySelector(".wl-icon")) {
      btn.insertAdjacentHTML("afterbegin", icon("bell", events.length > 0));
    } else {
      btn.querySelector(".wl-icon").outerHTML = icon("bell", events.length > 0);
    }
    const list = document.getElementById("wlNotifList");
    if (!events.length) {
      list.innerHTML = `<div class="wl-notif-empty">Nothing new on your posts.</div>`;
    } else {
      list.innerHTML = events.slice(0, 30).map(ev => {
        const name = displayName(ev.actor_email, ev.actor_name);
        let line;
        if (ev.kind === "mention") {
          const where = ev.target_kind === "post" ? "a post" :
            (ev.target_kind === "reply" ? "a reply" : "a comment");
          line = `<strong>${escapeHtml(name)}</strong> mentioned you in ${where}.`;
        } else if (ev.kind === "react") {
          line = `<strong>${escapeHtml(name)}</strong> ${emojiGlyph(ev.emoji)} ${reactionPast(ev.emoji)} your post.`;
        } else {
          const verb = ev.parent_comment_id ? "replied to a comment on your" : "commented on your";
          line = `<strong>${escapeHtml(name)}</strong> ${verb} post.`;
        }
        const commentAttr = ev.comment_id ? ` data-comment-jump="${escapeHtml(ev.comment_id)}"` : "";
        return `<a class="wl-notif-item" href="#post-${escapeHtml(ev.post_id)}" data-jump="${escapeHtml(ev.post_id)}" data-event-id="${escapeHtml(eventIdFor(ev))}"${commentAttr}>
          <div>${line}</div>
          <div class="wl-notif-item-time">${formatTimeShort(ev.at)}</div>
        </a>`;
      }).join("");
      list.querySelectorAll("[data-jump]").forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const id = a.dataset.jump;
          const evId = a.dataset.eventId;
          const commentId = a.dataset.commentJump || null;
          if (evId) markEventSeen(evId);
          // Close the notification panel — the click counts as "I'm done
          // with the menu, take me to the thing".
          document.getElementById("wlNotifPanel").classList.remove("is-open");
          jumpToPost(id, { commentId });
        });
      });
    }
    const navLink = document.querySelector('.qb-nav-link[href="wall.html"]');
    if (navLink) {
      if (events.length > 0) {
        navLink.classList.add("wl-has-notif");
        navLink.setAttribute("data-notif", String(events.length));
      } else {
        navLink.classList.remove("wl-has-notif");
        navLink.removeAttribute("data-notif");
      }
    }
  }
  function postsMentioningViewer() {
    // Scan all posts + nested comments for "@<viewerLocal>" in their body.
    // Returns the set of post ids where the viewer is mentioned by someone
    // other than themselves. Used by mark-seen so the bell clears.
    if (!viewerEmail) return new Set();
    const viewerLocal = localPart(viewerEmail);
    if (!viewerLocal) return new Set();
    const rx = mentionRxFor(viewerLocal);
    const ids = new Set();
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() !== viewerEmail && rx.test(post.body || "")) {
        ids.add(post.id);
      }
      for (const c of (post.comments || [])) {
        if ((c.author_email || "").toLowerCase() !== viewerEmail && rx.test(c.body || "")) {
          ids.add(post.id);
        }
      }
    }
    return ids;
  }
  function mentionRxFor(local) {
    const esc = local.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return new RegExp(`(^|\\s)@${esc}(?![a-z0-9._-])`, "i");
  }
  // Stable identifier for a notification event. Used to track which
  // individual notifications the viewer has clicked through (seenEvents set,
  // persisted server-side). Format choices are append-only — older IDs are
  // already stored, never rename fields.
  function eventIdFor(ev) {
    const actor = (ev.actor_email || "").toLowerCase();
    if (ev.kind === "comment") return `c:${ev.post_id}:${ev.comment_id || ev.at}`;
    if (ev.kind === "mention") return `m:${ev.post_id}:${ev.comment_id || "post"}:${actor}`;
    if (ev.kind === "react")   return `r:${ev.post_id}:${ev.target_kind || ""}:${ev.target_id || ""}:${actor}:${ev.emoji || ""}`;
    return `${ev.kind}:${ev.post_id}:${ev.at}`;
  }
  function collectNotifications() {
    if (!viewerEmail) return [];
    const events = [];
    const viewerLocal = localPart(viewerEmail);
    const viewerRx = viewerLocal ? mentionRxFor(viewerLocal) : null;

    // Pass 1: posts authored by viewer — comments / reactions on those.
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() !== viewerEmail) continue;
      const seen = lastSeenByPost[post.id] || "";
      // Comments + replies (from other people, since the last mark-seen)
      for (const c of (post.comments || [])) {
        if ((c.author_email || "").toLowerCase() === viewerEmail) continue;
        if ((c.created_at || "") <= seen) continue;
        events.push({
          kind: "comment",
          at: c.created_at,
          post_id: post.id,
          comment_id: c.id,
          actor_email: c.author_email,
          actor_name: c.author_name,
          parent_comment_id: c.parent_comment_id || null,
        });
      }
      // Reactions (from other people, additions only, since mark-seen)
      for (const ev of (post.react_events || [])) {
        if (ev.kind !== "added") continue;
        if ((ev.actor_email || "").toLowerCase() === viewerEmail) continue;
        if ((ev.at || "") <= seen) continue;
        events.push({
          kind: "react",
          at: ev.at,
          post_id: post.id,
          actor_email: ev.actor_email,
          actor_name: "",
          emoji: ev.emoji,
          target_kind: ev.target_kind,
          target_id: ev.target_id,
        });
      }
    }
    // Pass 2: mentions of viewer in any post / comment / reply.
    if (viewerRx) {
      for (const post of posts) {
        const seen = lastSeenByPost[post.id] || "";
        if ((post.author_email || "").toLowerCase() !== viewerEmail
            && (post.created_at || "") > seen
            && viewerRx.test(post.body || "")) {
          events.push({
            kind: "mention",
            at: post.created_at,
            post_id: post.id,
            actor_email: post.author_email,
            actor_name: post.author_name,
            target_kind: "post",
          });
        }
        for (const c of (post.comments || [])) {
          if ((c.author_email || "").toLowerCase() === viewerEmail) continue;
          if ((c.created_at || "") <= seen) continue;
          if (!viewerRx.test(c.body || "")) continue;
          events.push({
            kind: "mention",
            at: c.created_at,
            post_id: post.id,
            actor_email: c.author_email,
            actor_name: c.author_name,
            target_kind: c.parent_comment_id ? "reply" : "comment",
            comment_id: c.id,
            parent_comment_id: c.parent_comment_id || null,
          });
        }
      }
    }
    // De-duplicate: an actor that comments AND mentions the viewer in the
    // same comment should not show two entries. Prefer the mention entry.
    const seenKeys = new Set();
    const deduped = [];
    for (const ev of events) {
      const key = `${ev.post_id}|${ev.comment_id || ""}|${ev.actor_email || ""}|${ev.kind}`;
      if (seenKeys.has(key)) continue;
      seenKeys.add(key);
      // Drop a plain comment event if there's also a mention event for the
      // same comment by the same actor.
      if (ev.kind === "comment") {
        const dupMention = events.find(o => o.kind === "mention"
          && o.post_id === ev.post_id && o.comment_id === ev.comment_id
          && (o.actor_email || "") === (ev.actor_email || ""));
        if (dupMention) continue;
      }
      deduped.push(ev);
    }
    deduped.sort((a, b) => (a.at < b.at ? 1 : -1));
    // Drop anything the viewer has already clicked through.
    return deduped.filter(ev => !seenEvents.has(eventIdFor(ev)));
  }

  document.getElementById("wlNotifBtn").addEventListener("click", e => {
    e.stopPropagation();
    document.getElementById("wlNotifPanel").classList.toggle("is-open");
  });
  document.addEventListener("click", e => {
    const panel = document.getElementById("wlNotifPanel");
    if (!panel.contains(e.target) && e.target !== document.getElementById("wlNotifBtn")) {
      panel.classList.remove("is-open");
    }
  });

  // ── Wall search ─────────────────────────────────────────────────────
  // Magnifier opens a full-width bar that scans every loaded post body,
  // comment, and reply. Results render Google-style below the bar; click
  // jumps to the post via the existing jumpToPost flow (passing commentId
  // when the hit is on a comment / reply so the row gets the flash).
  const searchBtn    = document.getElementById("wlSearchBtn");
  const searchBar    = document.getElementById("wlSearchBar");
  const searchInput  = document.getElementById("wlSearchInput");
  const searchClose  = document.getElementById("wlSearchClose");
  const searchPanel  = document.getElementById("wlSearchPanel");
  const searchAnchor = document.querySelector(".wl-search-anchor");
  const notifAnchor  = document.querySelector(".wl-notif-anchor");
  searchBtn.innerHTML = icon("search");
  document.getElementById("wlSearchIcon").outerHTML      = `<span class="wl-icon-slot">${icon("search")}</span>`;
  document.getElementById("wlSearchCloseIcon").outerHTML = `<span class="wl-icon-slot">${icon("close")}</span>`;

  function openWallSearch() {
    searchBar.classList.add("is-open");
    searchAnchor.style.display = "none";
    notifAnchor.style.display  = "none";
    searchInput.value = "";
    searchPanel.classList.remove("is-open");
    searchPanel.innerHTML = "";
    requestAnimationFrame(() => searchInput.focus());
  }
  function closeWallSearch() {
    searchBar.classList.remove("is-open");
    searchPanel.classList.remove("is-open");
    searchPanel.innerHTML = "";
    searchAnchor.style.display = "";
    notifAnchor.style.display  = "";
  }
  searchBtn.addEventListener("click", e => { e.stopPropagation(); openWallSearch(); });
  searchClose.addEventListener("click", e => { e.stopPropagation(); closeWallSearch(); });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && searchBar.classList.contains("is-open")) {
      closeWallSearch();
    }
  });

  function searchWall(rawQuery) {
    const needle = rawQuery.trim().toLowerCase();
    if (!needle) return [];
    const out = [];
    for (const post of posts) {
      const pbody = String(post.body || "");
      if (pbody.toLowerCase().includes(needle)) {
        out.push({
          kind: "post",
          post_id: post.id,
          comment_id: null,
          author_email: post.author_email,
          author_name: post.author_name,
          at: post.created_at,
          body: pbody,
          field: "body",
        });
      }
      // Poll question + options live in post.poll — searchable as part
      // of the post, but the body snippet wouldn't contain them, so each
      // hit is its own result with the matching string in `body`.
      const poll = post.poll;
      if (poll) {
        const pq = String(poll.question || "");
        if (pq.toLowerCase().includes(needle)) {
          out.push({
            kind: "post",
            post_id: post.id,
