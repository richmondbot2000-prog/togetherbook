              <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
              <input class="wl-comment-input" type="text" placeholder="Reply to ${escapeHtml(name)}…" data-add-reply="${escapeHtml(replyKey)}" maxlength="2000" autofocus>
              ${commentAttachButtons(post.id, comment.id)}
            </div>` : ""}
          ${repliesHtml}
        </div>
      </div>`;
  }
  function unseenCommentCount(post) {
    if (!viewerEmail || (post.author_email || "").toLowerCase() !== viewerEmail) return 0;
    const seen = lastSeenByPost[post.id] || "";
    return (post.comments || []).filter(c => (c.created_at || "") > seen && (c.author_email || "").toLowerCase() !== viewerEmail).length;
  }

  function wireFeed() {
    // Click anywhere on a compact post (outside an action/link/control) to
    // expand it. Single-expand: any previously open post collapses.
    const expandCard = (id) => {
      const wasExpanded = expandedPostIds.has(id);
      expandedPostIds.clear();
      if (!wasExpanded) expandedPostIds.add(id);
      renderFeed();
      if (!wasExpanded) {
        // Defer scroll until next paint
        requestAnimationFrame(() => {
          const el = document.getElementById(`post-${id}`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      }
    };
    document.querySelectorAll("[data-expand-card]").forEach(el => {
      el.addEventListener("click", e => {
        if (e.target.closest("[data-stop-card-click]")) return;
        if (e.target.closest("a, input, textarea, label")) return;
        // The Like-button picker popover is a body-level child so it can't
        // be a closest() ancestor, but its clicks bubble through document.
        // We're safe to expand on any click that didn't hit a control.
        expandCard(el.dataset.expandCard);
      });
      el.addEventListener("keydown", e => {
        if (e.target !== el) return; // ignore inputs inside
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          expandCard(el.dataset.expandCard);
        }
      });
    });
    document.querySelectorAll("[data-page-prev]").forEach(el => {
      el.addEventListener("click", () => {
        currentPage = Math.max(0, currentPage - 1);
        expandedPostIds.clear();
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll("[data-page-next]").forEach(el => {
      el.addEventListener("click", () => {
        currentPage++;
        expandedPostIds.clear();
        renderFeed();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll("[data-share]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.share;
        const url = `${location.origin}/wall.html#post-${encodeURIComponent(id)}`;
        try {
          await navigator.clipboard.writeText(url);
          showBanner("Link copied to clipboard");
        } catch (err) {
          // Fallback for browsers blocking clipboard write
          prompt("Copy this link:", url);
        }
      });
    });
    document.querySelectorAll("[data-comment-on]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.commentOn;
        expandedPostIds.clear();
        expandedPostIds.add(id);
        openPostIds.add(id);
        renderFeed();
        const inp = document.querySelector(`[data-add-comment="${cssAttr(id)}"]`);
        if (inp) inp.focus();
      });
    });
    document.querySelectorAll("[data-expand]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.expand;
        if (el.dataset.collapse) expandedPostIds.delete(id);
        else expandedPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-toggle-comments]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.toggleComments;
        // Comment-action click: expand all comments AND focus the composer.
        openPostIds.add(id);
        renderFeed();
        const inp = document.querySelector(`[data-add-comment="${cssAttr(id)}"]`);
        if (inp) inp.focus();
      });
    });
    document.querySelectorAll("[data-show-all]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.showAll;
        if (el.dataset.collapse) openPostIds.delete(id);
        else openPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-add-comment]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const postId = el.dataset.addComment;
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: postId, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === postId);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            el.value = "";
            // The reply may have bubbled the post to the top — keep the
            // viewer staring at it (not staring at the empty slot it
            // left behind on page N) by jumping to its new page.
            sortPosts();
            const idx = posts.findIndex(p => p.id === postId);
            if (idx >= 0) currentPage = Math.floor(idx / POSTS_PER_PAGE);
            renderFeed();
            // After renderFeed re-creates the DOM, re-focus the fresh
            // composer input for the same post so a user can keep typing.
            const fresh = document.querySelector(`[data-add-comment="${cssAttr(postId)}"]`);
            if (fresh) fresh.focus();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
          el.disabled = false; el.focus();
        }
      });
    });
    document.querySelectorAll("[data-reply]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.reply;
        const wasOpen = openReplyTo.has(key);
        if (wasOpen) openReplyTo.delete(key);
        else openReplyTo.add(key);
        const [pid, parentCommentId] = key.split("::");
        openPostIds.add(pid);
        renderFeed();
        // If we just opened the composer for a reply-to-a-reply, prefill the
        // input with "@<parent-local> " so the thread context is preserved.
        // Replies to top-level comments stay empty.
        if (!wasOpen) {
          const post = posts.find(p => p.id === pid);
          const parentComment = post && (post.comments || []).find(c => c.id === parentCommentId);
          if (parentComment && parentComment.parent_comment_id) {
            const local = ((parentComment.author_email || "").split("@")[0] || "").toLowerCase();
            if (local) {
              for (const inp of document.querySelectorAll("[data-add-reply]")) {
                if (inp.dataset.addReply === key) {
                  inp.value = `@${local} `;
                  const end = inp.value.length;
                  inp.setSelectionRange(end, end);
                  inp.focus();
                  break;
                }
              }
            }
          }
        }
      });
    });
    document.querySelectorAll("[data-add-reply]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const [pid, parent] = el.dataset.addReply.split("::");
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: pid, parent_comment_id: parent, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === pid);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            openReplyTo.delete(`${pid}::${parent}`);
            sortPosts();
            const idx = posts.findIndex(p => p.id === pid);
            if (idx >= 0) currentPage = Math.floor(idx / POSTS_PER_PAGE);
            renderFeed();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
        } finally {
          el.disabled = false;
        }
      });
    });
    document.querySelectorAll("[data-react]").forEach(el => {
      el.addEventListener("click", async () => {
        await reactTo(el.dataset.on, el.dataset.kind, el.dataset.react);
      });
    });
    // Avatar fallback to initials when photo 404s. Re-escape the value
    // we read back from the attribute (getAttribute returns decoded text)
    // so we can't be tricked into injecting HTML via a hostile name.
    document.querySelectorAll(".wl-avatar-img").forEach(img => {
      img.addEventListener("error", () => {
        const init = img.getAttribute("data-fallback-initials") || "?";
        const div = document.createElement("div");
        div.textContent = init;
        img.replaceWith(div);
      });
    });
    // Wall media (post + comment photos): dim + relabel while GitHub Pages
    // is still publishing the just-uploaded file (30-60s window).
    document.querySelectorAll(".wl-media-img").forEach(img => {
      img.addEventListener("error", () => {
        img.style.opacity = "0.3";
        img.alt = "still publishing — refresh in 30 s";
      });
    });
    // Keyboard support for photo tiles (Enter / Space opens lightbox).
    document.querySelectorAll("[data-open-lightbox], [data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); el.click(); }
      });
    });
    // Like buttons: tap = default reaction toggle; long-press = picker.
    document.querySelectorAll("[data-like]").forEach(el => {
      attachLikeButton(el);
    });
    // Photo tiles → lightbox
    document.querySelectorAll("[data-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [pid, idxStr] = el.dataset.openLightbox.split("::");
        const post = posts.find(p => p.id === pid);
        if (post) openLightbox(post.photos || [], parseInt(idxStr, 10) || 0);
      });
    });

    // Inline comment / reply media attach
    document.querySelectorAll("[data-cm-photo]").forEach(el => {
      el.addEventListener("change", async e => {
        const file = (e.target.files || [])[0];
        e.target.value = "";
        if (!file) return;
        await submitCommentWithMedia(el.dataset.cmPhoto, file, "photo");
      });
    });
    document.querySelectorAll("[data-cm-video]").forEach(el => {
      el.addEventListener("change", async e => {
        const file = (e.target.files || [])[0];
        e.target.value = "";
        if (!file) return;
        await submitCommentWithMedia(el.dataset.cmVideo, file, "video");
      });
    });
    document.querySelectorAll("[data-cm-gif]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.cmGif;
        openGifPicker(async gif => {
          await submitCommentWithMediaPath(key, gif.url, "gif");
        });
      });
    });
    document.querySelectorAll("[data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [cid, idxStr] = el.dataset.cmOpenLightbox.split("::");
        let media = [];
        for (const p of posts) {
          const c = (p.comments || []).find(x => x.id === cid);
          if (c) { media = c.photos || []; break; }
        }
        openLightbox(media, parseInt(idxStr, 10) || 0);
      });
    });

    // Delete affordances
    document.querySelectorAll("[data-delete-post]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.deletePost;
        const ok = await confirmDialog("Delete this post?", "The post + all its comments will be permanently removed. This cannot be undone.");
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "post", id });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          const i = posts.findIndex(p => p.id === id);
          if (i >= 0) posts.splice(i, 1);
          document.querySelectorAll(`[data-post="${cssAttr(id)}"]`).forEach(n => n.remove());
          renderFeed(); renderNotifications();
          showBanner("Post deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
    document.querySelectorAll("[data-delete-comment]").forEach(el => {
      el.addEventListener("click", async () => {
        const [pid, cid] = el.dataset.deleteComment.split("::");
        const post = posts.find(p => p.id === pid);
        const c = post && (post.comments || []).find(x => x.id === cid);
        const isReply = !!(c && c.parent_comment_id);
        const ok = await confirmDialog(
          `Delete this ${isReply ? "reply" : "comment"}?`,
          isReply
            ? "The reply will be permanently removed."
            : "The comment and any replies underneath it will be permanently removed.",
        );
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "comment", post_id: pid, id: cid });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          if (post) {
            // Remove the comment AND any replies to it (one-level cap).
            post.comments = (post.comments || []).filter(c => c.id !== cid && c.parent_comment_id !== cid);
          }
          // Defensive DOM removal — even if some render bug stopped the
          // post.comments mutation from clearing the visible row, drop the
          // matching DOM node now.
          document.querySelectorAll(`[data-comment="${cssAttr(cid)}"]`).forEach(n => n.remove());
          sortPosts(); renderFeed(); renderNotifications();
          showBanner(isReply ? "Reply deleted" : "Comment deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
  }

  async function submitCommentWithMedia(key, file, kind) {
    let dataUrl;
    try { dataUrl = kind === "photo" ? await resizeImage(file, 1600, 0.85) : await readAsDataUrl(file); }
    catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    let res;
    try { res = await wallAction("upload-media", { data_url: dataUrl, kind }); }
    catch (e) { showBanner("Upload failed: " + e.message, true); return; }
    if (!res || !res.path) return;
    await submitCommentWithMediaPath(key, res.path, kind);
  }
  async function submitCommentWithMediaPath(key, path, kind) {
    const [pid, parent] = key.includes("::") ? key.split("::") : [key, null];
    const inp = parent
      ? document.querySelector(`[data-add-reply="${cssAttr(key)}"]`)
      : document.querySelector(`[data-add-comment="${cssAttr(pid)}"]`);
    const text = inp ? inp.value.trim() : "";
    try {
      const payload = { post_id: pid, body: text, photos: [path] };
      if (parent) payload.parent_comment_id = parent;
      const res = await wallAction("comment", payload);
      if (res && res.comment) {
        const post = posts.find(p => p.id === pid);
        if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
        if (parent) openReplyTo.delete(key);
        openPostIds.add(pid);
        sortPosts(); renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  // Generic confirm dialog — returns Promise<bool>. Used for deletes.
  function confirmDialog(title, body) {
    return new Promise(resolve => {
      const root = document.createElement("div");
      root.className = "wl-confirm-panel";
      root.innerHTML = `
        <div class="wl-confirm-modal" role="dialog" aria-modal="true">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(body)}</p>
          <div class="wl-confirm-actions">
            <button class="wl-confirm-cancel" type="button">Cancel</button>
            <button class="wl-confirm-ok" type="button">Delete</button>
          </div>
        </div>`;
      document.body.appendChild(root);
      const close = (ans) => {
        document.removeEventListener("keydown", onKey);
        root.remove();
        resolve(ans);
      };
      // Esc closes (cancel). Enter is intentionally NOT shortcut to
       // confirm — if the user has Tab-focused Cancel, hitting Enter should
       // cancel; the focused button handles its own Enter natively.
      const onKey = e => { if (e.key === "Escape") close(false); };
      document.addEventListener("keydown", onKey);
      root.addEventListener("click", e => { if (e.target === root) close(false); });
      root.querySelector(".wl-confirm-cancel").addEventListener("click", () => close(false));
      root.querySelector(".wl-confirm-ok").addEventListener("click", () => close(true));
      root.querySelector(".wl-confirm-ok").focus();
    });
  }

  // Like button behaviour:
  //   - Desktop: hover for ~200 ms → emoji picker fades in. Cursor can
  //     travel into the picker (the picker's own mouseenter cancels the
  //     hide timer). Picker hides 220 ms after the cursor leaves both.
  //   - Touch: long-press 450 ms → picker.
  //   - Click (either input): toggles the user's current reaction
  //     (default 👍) without opening the picker.
  function attachLikeButton(el) {
    const openWithCallback = () => openEmojiPicker(el, async emoji => {
      await reactTo(el.dataset.like, el.dataset.kind, emoji);
    });
    // Desktop hover-open / leave-hide
    el.addEventListener("mouseenter", () => {
      clearTimeout(pickerHideTimer); pickerHideTimer = null;
      clearTimeout(pickerShowTimer);
      pickerShowTimer = setTimeout(openWithCallback, 220);
    });
    el.addEventListener("mouseleave", () => {
      clearTimeout(pickerShowTimer); pickerShowTimer = null;
      clearTimeout(pickerHideTimer);
      pickerHideTimer = setTimeout(closeEmojiPicker, 320);
    });
    // Touch long-press fallback (no hover on touch devices)
    let touchTimer = null, longPressFired = false;
    el.addEventListener("touchstart", () => {
      longPressFired = false;
      touchTimer = setTimeout(() => { longPressFired = true; openWithCallback(); }, 450);
    }, { passive: true });
    const cancelTouch = () => { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } };
    el.addEventListener("touchend", cancelTouch);
    el.addEventListener("touchcancel", cancelTouch);
    // Click — toggle current/default reaction. Ignored when the touch
    // long-press already opened the picker.
    el.addEventListener("click", async (ev) => {
      if (longPressFired) { ev.preventDefault(); return; }
      clearTimeout(pickerShowTimer); pickerShowTimer = null;
      const post = posts.find(p => p.id === el.dataset.like)
                 || posts.find(p => (p.comments || []).some(c => c.id === el.dataset.like));
      const rx = (el.dataset.kind === "post"
        ? (post && post.reactions)
        : ((post && (post.comments || []).find(c => c.id === el.dataset.like) || {}).reactions)) || {};
      const mine = mineReactionOn(rx) || DEFAULT_REACTION;
      await reactTo(el.dataset.like, el.dataset.kind, mine);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────────────
  let lightboxState = null;
  function openLightbox(photos, startIdx) {
    if (!photos || !photos.length) return;
    closeLightbox();
    let idx = startIdx;
    const root = document.createElement("div");
    root.className = "wl-lightbox";
    root.innerHTML = `
      <button class="wl-lightbox-arrow prev" aria-label="Previous">‹</button>
      <img src="${escapeHtml(mediaUrl(photos[idx]))}" alt="">
      <button class="wl-lightbox-arrow next" aria-label="Next">›</button>
      <button class="wl-lightbox-close" aria-label="Close">close</button>
      <div class="wl-lightbox-count">${idx + 1} / ${photos.length}</div>`;
    document.body.appendChild(root);
    const refresh = () => {
      root.querySelector("img").src = mediaUrl(photos[idx]);
      root.querySelector(".wl-lightbox-count").textContent = `${idx + 1} / ${photos.length}`;
    };
    const onKey = e => {
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft")  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.key === "ArrowRight") { idx = (idx + 1) % photos.length; refresh(); }
    };
    root.addEventListener("click", e => {
      if (e.target === root || e.target.classList.contains("wl-lightbox-close")) closeLightbox();
      else if (e.target.classList.contains("prev"))  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.target.classList.contains("next"))  { idx = (idx + 1) % photos.length; refresh(); }
    });
    document.addEventListener("keydown", onKey);
    lightboxState = { root, onKey };
  }
  function closeLightbox() {
    if (!lightboxState) return;
    lightboxState.root.remove();
    document.removeEventListener("keydown", lightboxState.onKey);
    lightboxState = null;
  }

  // Reaction picker — Facebook-style: appears on hover of the Like
  // button, persists while the cursor is over either the button or the
  // popover (a 400ms grace period covers the gap as the cursor travels),
  // and dismisses when both lose hover or the user clicks anywhere else.
  let activePopover = null;
  let activeAnchor = null;
  let activeDocHandler = null;
  let pickerShowTimer = null;
  let pickerHideTimer = null;
  let pickerOnPick = null;

  function openEmojiPicker(anchor, onPick) {
    if (activePopover && activeAnchor === anchor) {
      // Same anchor already has an open picker — just refresh callback.
      pickerOnPick = onPick;
      return;
    }
    closeEmojiPicker();
    const pop = document.createElement("div");
    pop.className = "wl-emoji-popover";
    pop.innerHTML = REACTIONS.map(e => {
      const meta = REACTION_META[e];
      const anim = (meta && meta.anim) || "";
      const label = (meta && meta.label) || e;
      return `<button data-emoji="${escapeHtml(e)}" data-label="${escapeHtml(label)}" aria-label="${escapeHtml(label)}" style="--react-anim: wl-${escapeHtml(anim)};"><span class="wl-emoji" data-anim="${escapeHtml(anim)}">${escapeHtml(e)}</span></button>`;
    }).join("");
    document.body.appendChild(pop);
    const rect = anchor.getBoundingClientRect();
    pop.style.left = `${Math.max(8, rect.left + window.scrollX)}px`;
    pop.style.top  = `${rect.bottom + window.scrollY + 8}px`;
    pop.querySelectorAll("button").forEach(b => {
      // mousedown fires BEFORE the document click listener can intercept.
      b.addEventListener("mousedown", (e) => {
        e.preventDefault(); e.stopPropagation();
        const emoji = b.dataset.emoji;
        const cb = pickerOnPick;
        closeEmojiPicker();
        if (cb) cb(emoji);
      });
      // Touch / keyboard fallback
      b.addEventListener("click", (e) => {
        e.preventDefault(); e.stopPropagation();
        const emoji = b.dataset.emoji;
        const cb = pickerOnPick;
        closeEmojiPicker();
        if (cb) cb(emoji);
      });
    });
    // Keep the picker alive while the cursor is inside it.
    pop.addEventListener("mouseenter", () => {
      clearTimeout(pickerHideTimer); pickerHideTimer = null;
    });
    pop.addEventListener("mouseleave", () => {
      clearTimeout(pickerHideTimer);
      pickerHideTimer = setTimeout(closeEmojiPicker, 220);
    });
    activePopover = pop;
    activeAnchor = anchor;
    pickerOnPick = onPick;
    // Outside-click dismissal — ignore clicks inside the picker OR the
    // anchor (the click that triggered the open shouldn't immediately
    // close it). Registered with a short delay so the triggering click
    // doesn't fall through.
    activeDocHandler = (e) => {
      if (pop.contains(e.target)) return;
      if (anchor === e.target || anchor.contains(e.target)) return;
      closeEmojiPicker();
    };
    setTimeout(() => document.addEventListener("click", activeDocHandler), 50);
  }
  function closeEmojiPicker() {
    clearTimeout(pickerShowTimer); clearTimeout(pickerHideTimer);
    pickerShowTimer = pickerHideTimer = null;
    if (activeDocHandler) {
      document.removeEventListener("click", activeDocHandler);
      activeDocHandler = null;
    }
    if (activePopover) { activePopover.remove(); activePopover = null; }
    activeAnchor = null;
    pickerOnPick = null;
  }

  async function reactTo(parentId, kind, emoji) {
    if (!viewerEmail) { showBanner("Sign in via Cloudflare Access first.", true); return; }
    try {
      const res = await wallAction("react", { parent_id: parentId, parent_kind: kind, emoji });
      if (res && res.post_id) {
        const post = posts.find(p => p.id === res.post_id);
        if (post && res.target_kind === "post") post.reactions = res.reactions;
        else if (post && res.target_kind === "comment") {
          const c = (post.comments || []).find(c => c.id === parentId);
          if (c) c.reactions = res.reactions;
        }
        renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  // Mark a single notification event as seen-by-click. Optimistic local
  // update + worker persist. On worker failure we keep the local mark — the
  // worker call will resync on next load; preserving the click-feeling is
  // worth a tiny chance of "the bell came back" after a reload.
  async function markEventSeen(evId) {
    if (!evId || !viewerEmail) return;
    if (seenEvents.has(evId)) return;
    seenEvents.add(evId);
    renderNotifications();
    try {
      await wallAction("seen-event", { event_id: evId });
    } catch (err) {
      /* non-fatal; will resync */
    }
  }
  function renderNotifications() {
    const events = collectNotifications();
    const btn = document.getElementById("wlNotifBtn");
    btn.setAttribute("data-count", String(events.length));
    if (!btn.querySelector(".wl-icon")) {
      btn.insertAdjacentHTML("afterbegin", icon("bell", events.length > 0));
    } else {
      btn.querySelector(".wl-icon").outerHTML = icon("bell", events.length > 0);
    }
    const list = document.getElementById("wlNotifList");
    if (!events.length) {
      list.innerHTML = `<div class="wl-notif-empty">Nothing new on your posts.</div>`;
    } else {
      list.innerHTML = events.slice(0, 30).map(ev => {
        const name = displayName(ev.actor_email, ev.actor_name);
        let line;
        if (ev.kind === "mention") {
          const where = ev.target_kind === "post" ? "a post" :
            (ev.target_kind === "reply" ? "a reply" : "a comment");
          line = `<strong>${escapeHtml(name)}</strong> mentioned you in ${where}.`;
        } else if (ev.kind === "react") {
          line = `<strong>${escapeHtml(name)}</strong> ${emojiGlyph(ev.emoji)} ${reactionPast(ev.emoji)} your post.`;
        } else {
          const verb = ev.parent_comment_id ? "replied to a comment on your" : "commented on your";
          line = `<strong>${escapeHtml(name)}</strong> ${verb} post.`;
        }
        return `<a class="wl-notif-item" href="#post-${escapeHtml(ev.post_id)}" data-jump="${escapeHtml(ev.post_id)}" data-event-id="${escapeHtml(eventIdFor(ev))}">
          <div>${line}</div>
          <div class="wl-notif-item-time">${formatTime(ev.at)}</div>
        </a>`;
      }).join("");
      list.querySelectorAll("[data-jump]").forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const id = a.dataset.jump;
          const evId = a.dataset.eventId;
          if (evId) markEventSeen(evId);
          jumpToPost(id);
        });
      });
    }
    const navLink = document.querySelector('.qb-nav-link[href="wall.html"]');
    if (navLink) {
      if (events.length > 0) {
        navLink.classList.add("wl-has-notif");
        navLink.setAttribute("data-notif", String(events.length));
      } else {
        navLink.classList.remove("wl-has-notif");
        navLink.removeAttribute("data-notif");
      }
    }
  }
  function postsMentioningViewer() {
    // Scan all posts + nested comments for "@<viewerLocal>" in their body.
    // Returns the set of post ids where the viewer is mentioned by someone
    // other than themselves. Used by mark-seen so the bell clears.
    if (!viewerEmail) return new Set();
    const viewerLocal = localPart(viewerEmail);
    if (!viewerLocal) return new Set();
    const rx = mentionRxFor(viewerLocal);
    const ids = new Set();
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() !== viewerEmail && rx.test(post.body || "")) {
        ids.add(post.id);
      }
      for (const c of (post.comments || [])) {
        if ((c.author_email || "").toLowerCase() !== viewerEmail && rx.test(c.body || "")) {
          ids.add(post.id);
        }
      }
    }
    return ids;
  }
  function mentionRxFor(local) {
    const esc = local.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return new RegExp(`(^|\\s)@${esc}(?![a-z0-9._-])`, "i");
  }
  // Stable identifier for a notification event. Used to track which
  // individual notifications the viewer has clicked through (seenEvents set,
  // persisted server-side). Format choices are append-only — older IDs are
  // already stored, never rename fields.
  function eventIdFor(ev) {
    const actor = (ev.actor_email || "").toLowerCase();
    if (ev.kind === "comment") return `c:${ev.post_id}:${ev.comment_id || ev.at}`;
    if (ev.kind === "mention") return `m:${ev.post_id}:${ev.comment_id || "post"}:${actor}`;
    if (ev.kind === "react")   return `r:${ev.post_id}:${ev.target_kind || ""}:${ev.target_id || ""}:${actor}:${ev.emoji || ""}`;
    return `${ev.kind}:${ev.post_id}:${ev.at}`;
  }
  function collectNotifications() {
    if (!viewerEmail) return [];
    const events = [];
    const viewerLocal = localPart(viewerEmail);
    const viewerRx = viewerLocal ? mentionRxFor(viewerLocal) : null;

    // Pass 1: posts authored by viewer — comments / reactions on those.
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() !== viewerEmail) continue;
      const seen = lastSeenByPost[post.id] || "";
      // Comments + replies (from other people, since the last mark-seen)
      for (const c of (post.comments || [])) {
        if ((c.author_email || "").toLowerCase() === viewerEmail) continue;
        if ((c.created_at || "") <= seen) continue;
        events.push({
          kind: "comment",
          at: c.created_at,
          post_id: post.id,
          comment_id: c.id,
          actor_email: c.author_email,
          actor_name: c.author_name,
          parent_comment_id: c.parent_comment_id || null,
        });
      }
      // Reactions (from other people, additions only, since mark-seen)
      for (const ev of (post.react_events || [])) {
        if (ev.kind !== "added") continue;
        if ((ev.actor_email || "").toLowerCase() === viewerEmail) continue;
        if ((ev.at || "") <= seen) continue;
        events.push({
          kind: "react",
          at: ev.at,
          post_id: post.id,
          actor_email: ev.actor_email,
          actor_name: "",
          emoji: ev.emoji,
          target_kind: ev.target_kind,
          target_id: ev.target_id,
        });
      }
    }
    // Pass 2: mentions of viewer in any post / comment / reply.
    if (viewerRx) {
      for (const post of posts) {
        const seen = lastSeenByPost[post.id] || "";
        if ((post.author_email || "").toLowerCase() !== viewerEmail
            && (post.created_at || "") > seen
            && viewerRx.test(post.body || "")) {
          events.push({
            kind: "mention",
            at: post.created_at,
            post_id: post.id,
            actor_email: post.author_email,
            actor_name: post.author_name,
            target_kind: "post",
          });
        }
        for (const c of (post.comments || [])) {
          if ((c.author_email || "").toLowerCase() === viewerEmail) continue;
          if ((c.created_at || "") <= seen) continue;
          if (!viewerRx.test(c.body || "")) continue;
          events.push({
            kind: "mention",
            at: c.created_at,
            post_id: post.id,
            actor_email: c.author_email,
            actor_name: c.author_name,
            target_kind: c.parent_comment_id ? "reply" : "comment",
            comment_id: c.id,
            parent_comment_id: c.parent_comment_id || null,
          });
        }
      }
    }
    // De-duplicate: an actor that comments AND mentions the viewer in the
    // same comment should not show two entries. Prefer the mention entry.
    const seenKeys = new Set();
    const deduped = [];
    for (const ev of events) {
      const key = `${ev.post_id}|${ev.comment_id || ""}|${ev.actor_email || ""}|${ev.kind}`;
      if (seenKeys.has(key)) continue;
      seenKeys.add(key);
      // Drop a plain comment event if there's also a mention event for the
      // same comment by the same actor.
      if (ev.kind === "comment") {
        const dupMention = events.find(o => o.kind === "mention"
          && o.post_id === ev.post_id && o.comment_id === ev.comment_id
          && (o.actor_email || "") === (ev.actor_email || ""));
        if (dupMention) continue;
      }
      deduped.push(ev);
    }
    deduped.sort((a, b) => (a.at < b.at ? 1 : -1));
    // Drop anything the viewer has already clicked through.
    return deduped.filter(ev => !seenEvents.has(eventIdFor(ev)));
  }

  document.getElementById("wlNotifBtn").addEventListener("click", e => {
    e.stopPropagation();
    document.getElementById("wlNotifPanel").classList.toggle("is-open");
  });
  document.addEventListener("click", e => {
    const panel = document.getElementById("wlNotifPanel");
    if (!panel.contains(e.target) && e.target !== document.getElementById("wlNotifBtn")) {
      panel.classList.remove("is-open");
    }
  });
  document.getElementById("wlNotifMark").addEventListener("click", async () => {
    if (!viewerEmail) return;
    const now = new Date().toISOString();
    // Snapshot the prior state so we can roll back if the worker errors.
    const snapshot = { ...lastSeenByPost };
    const mentionPostIds = postsMentioningViewer();
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() === viewerEmail
          || mentionPostIds.has(post.id)) {
        lastSeenByPost[post.id] = now;
      }
    }
    renderNotifications();
    try {
      await wallAction("mark-seen", { at: now });
      showBanner("Marked all as read");
    } catch (err) {
      lastSeenByPost = snapshot;
      renderNotifications();
      showBanner("Mark-as-read failed: " + (err.message || String(err)), true);
    }
  });

  function wallAction(action, body) {
    return fetch(`${WALL_API}/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }).then(async res => {
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (!res.ok || (data && data.ok === false)) {
        throw new Error((data && data.error) || `HTTP ${res.status}`);
      }
      return data;
    });
  }
  // Lazy-fetch OG previews for every [data-link-preview] currently in the
  // DOM. Results are cached per-URL for the session so re-renders don't
  // re-hit the worker. Worker enforces SSRF + 8s timeout + 1MB cap.
  function hydrateLinkPreviews() {
    document.querySelectorAll("[data-link-preview]").forEach(el => {
      if (el.dataset.lpDone === "1") return;
      const url = el.dataset.linkPreview;
      const cached = linkPreviewCache[url];
      if (cached) { paintLinkPreview(el, cached); return; }
      el.dataset.lpDone = "1";
      wallAction("link-preview", { url })
        .then(data => {
          if (!data) return;
          linkPreviewCache[url] = data;
          // Re-paint every currently-mounted instance of the same URL.
          document.querySelectorAll(`[data-link-preview="${cssAttr(url)}"]`).forEach(node => {
            paintLinkPreview(node, data);
          });
        })
        .catch(() => { /* silent — leave the loading state in place */ });
    });
  }
  function paintLinkPreview(el, data) {
    const title = data.title || data.url || "";
    const desc  = data.description || "";
    const img   = data.image || "";
    const host  = data.site_name || data.host || safeHost(el.dataset.linkPreview || "");
    const thumb = el.querySelector(".wl-link-thumb");
    const body  = el.querySelector(".wl-link-body");
    if (thumb) {
      thumb.innerHTML = img
        ? `<img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;wl-link-thumb-empty&quot;>no preview</div>';">`
        : `<div class="wl-link-thumb-empty">no preview</div>`;
    }
    if (body) {
      body.innerHTML = `
        <div class="wl-link-host">${escapeHtml(host || "")}</div>
        <div class="wl-link-title">${escapeHtml(title)}</div>
        ${desc ? `<div class="wl-link-desc">${escapeHtml(desc)}</div>` : ""}`;
    }
  }
  function displayName(email, fallback) {
    if (!email) return fallback || "Unknown";
    const u = staffByEmail[email.toLowerCase()];
    return (u && u.name) || fallback || email.split("@")[0];
  }
  // Mirrors directory.html's dirPhotoUrl: prefer the admin-uploaded
  // override at assets/photos/<email_at_>.jpg (with the annotation
  // timestamp as cache-bust); fall back to Google's Workspace
  // thumbnailPhotoUrl when no upload exists.
  function dirPhotoKey(email) {
    return (email || "").toString().trim().toLowerCase().replace(/@/g, "_at_");
  }
  // Always serve wall-media via the public github.io mirror — Cloudflare
  // Access gates book.togetherbook.net/wall-media/*, and `<img>` tags
  // can't follow the 302 redirect to the login page. GIPHY URLs come
  // through as absolute https:// already; pass those untouched.
  const MEDIA_BASE = "https://richmondbot2000-prog.github.io/togetherbook/";
  function mediaUrl(path) {
    if (!path) return "";
    if (/^https?:/i.test(path)) return path;
    return MEDIA_BASE + path.replace(/^\/+/, "");
  }
  function photoUrlFor(u) {
    if (!u || !u.email) return "";
    const email = u.email.toLowerCase();
    const ann = annotationsMap[email];
    if (ann && ann.directory_photo_uploaded_at) {
      return `assets/photos/${dirPhotoKey(email)}.jpg?v=${encodeURIComponent(ann.directory_photo_uploaded_at)}`;
    }
    return u.photo_url || "";
  }
  function initials(name) {
    return (name || "").split(/\s+/).map(p => p.charAt(0).toUpperCase()).slice(0, 2).join("") || "?";
  }
  function avatarInner(name, photoUrl) {
    const init = initials(name);
    if (photoUrl) {
      // Attached error handler instead of inline onerror — inline-attribute
      // approach syntax-errors when a name contains an apostrophe (e.g.
      // "O'Brien" → JS unterminated string literal). wireFeed() picks
      // these up after each render.
      return `<img class="wl-avatar-img" src="${escapeHtml(photoUrl)}" alt="" data-fallback-initials="${escapeHtml(init)}">`;
    }
    return `<div>${escapeHtml(init)}</div>`;
  }
  // Editorial overline format: "WED, 15 MAY 2026 · 09:36" with a brass
  // middot. Wraps in <time datetime> for screen-reader semantics.
  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return escapeHtml(iso);
    const date = d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
    const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hourCycle: "h23" });
    const datePart = date.toUpperCase().replace(",", "");
    return `<time datetime="${escapeHtml(iso)}">${escapeHtml(datePart)}<span class="wl-time-dot">·</span>${escapeHtml(time)}</time>`;
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
  }
  function cssAttr(s) { return String(s).replace(/"/g, '\\"'); }
  function showBanner(msg, isError) {
    document.querySelectorAll(".wl-banner").forEach(el => el.remove());
    const b = document.createElement("div");
    b.className = "wl-banner" + (isError ? " is-error" : "");
    b.textContent = msg;
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 4000);
  }
})();
</script>
</body>
</html>
