            comment_id: null,
            author_email: post.author_email,
            author_name: post.author_name,
            at: post.created_at,
            body: pq,
            field: "poll-question",
          });
        }
        for (const opt of (poll.options || [])) {
          const s = String(opt || "");
          if (s.toLowerCase().includes(needle)) {
            out.push({
              kind: "post",
              post_id: post.id,
              comment_id: null,
              author_email: post.author_email,
              author_name: post.author_name,
              at: post.created_at,
              body: s,
              field: "poll-option",
            });
          }
        }
      }
      for (const c of (post.comments || [])) {
        const cbody = String(c.body || "");
        if (!cbody) continue;
        if (cbody.toLowerCase().includes(needle)) {
          out.push({
            kind: c.parent_comment_id ? "reply" : "comment",
            post_id: post.id,
            comment_id: c.id,
            author_email: c.author_email,
            author_name: c.author_name,
            at: c.created_at,
            body: cbody,
            on_post_by: post.author_email,
            field: "body",
          });
        }
      }
    }
    out.sort((a, b) => (a.at < b.at ? 1 : -1));
    return out;
  }

  function snippetWithHighlight(body, needle, radius) {
    radius = radius || 90;
    const lower = body.toLowerCase();
    const idx = lower.indexOf(needle);
    if (idx < 0) return escapeHtml(body.slice(0, radius * 2));
    const start = Math.max(0, idx - radius);
    const end   = Math.min(body.length, idx + needle.length + radius);
    const prefix = start > 0 ? "…" : "";
    const suffix = end < body.length ? "…" : "";
    return prefix
      + escapeHtml(body.slice(start, idx))
      + "<mark>" + escapeHtml(body.slice(idx, idx + needle.length)) + "</mark>"
      + escapeHtml(body.slice(idx + needle.length, end))
      + suffix;
  }

  function renderSearchResults(rawQuery) {
    const q = rawQuery.trim();
    if (!q) {
      searchPanel.classList.remove("is-open");
      searchPanel.innerHTML = "";
      return;
    }
    const needle = q.toLowerCase();
    const results = searchWall(q);
    searchPanel.classList.add("is-open");
    if (!results.length) {
      searchPanel.innerHTML = `<div class="wl-search-empty">No posts, comments, or replies match “${escapeHtml(q)}”.</div>`;
      return;
    }
    const KIND_LABEL = { post: "Post", comment: "Comment", reply: "Reply" };
    const FIELD_LABEL = { "poll-question": "Poll question", "poll-option": "Poll option" };
    const meta = `<div class="wl-search-meta">${results.length} result${results.length === 1 ? "" : "s"} for “${escapeHtml(q)}”</div>`;
    const items = results.slice(0, 100).map(r => {
      const author = displayName(r.author_email, r.author_name);
      const when = r.at
        ? new Date(r.at).toLocaleString("en-GB", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })
        : "";
      // For poll matches the heading reads "Poll question" / "Poll option"
      // so the reader can see at a glance why the post was returned even
      // though the post body doesn't contain the term.
      const headKind = FIELD_LABEL[r.field] || KIND_LABEL[r.kind];
      let cite = `${escapeHtml(headKind)} by ${escapeHtml(author)}`;
      if ((r.kind === "comment" || r.kind === "reply") && r.on_post_by) {
        cite += ` on ${escapeHtml(displayName(r.on_post_by, ""))}'s post`;
      }
      if (when) cite += ` · ${escapeHtml(when)}`;
      const snippet = snippetWithHighlight(r.body, needle);
      return `<a class="wl-search-result" href="#post-${escapeHtml(r.post_id)}"
                 data-search-post="${escapeHtml(r.post_id)}"
                 data-search-comment="${escapeHtml(r.comment_id || "")}">
        <div class="wl-search-result-head">${escapeHtml(author)} — ${escapeHtml(headKind)}</div>
        <div class="wl-search-result-cite">${cite}</div>
        <div class="wl-search-result-snippet">${snippet}</div>
      </a>`;
    }).join("");
    searchPanel.innerHTML = meta + items;
    searchPanel.querySelectorAll("[data-search-post]").forEach(a => {
      a.addEventListener("click", e => {
        e.preventDefault();
        const postId = a.dataset.searchPost;
        const commentId = a.dataset.searchComment || null;
        closeWallSearch();
        jumpToPost(postId, commentId ? { commentId } : undefined);
      });
    });
  }

  let searchDebounce = 0;
  searchInput.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => renderSearchResults(searchInput.value), 80);
  });
  searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      clearTimeout(searchDebounce);
      renderSearchResults(searchInput.value);
    }
  });
  document.getElementById("wlNotifMark").addEventListener("click", async () => {
    if (!viewerEmail) return;
    const now = new Date().toISOString();
    // Snapshot the prior state so we can roll back if the worker errors.
    const snapshot = { ...lastSeenByPost };
    const mentionPostIds = postsMentioningViewer();
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() === viewerEmail
          || mentionPostIds.has(post.id)) {
        lastSeenByPost[post.id] = now;
      }
    }
    renderNotifications();
    try {
      await wallAction("mark-seen", { at: now });
      showBanner("Marked all as read");
    } catch (err) {
      lastSeenByPost = snapshot;
      renderNotifications();
      showBanner("Mark-as-read failed: " + (err.message || String(err)), true);
    }
  });

  function wallAction(action, body) {
    return fetch(`${WALL_API}/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }).then(async res => {
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (!res.ok || (data && data.ok === false)) {
        throw new Error((data && data.error) || `HTTP ${res.status}`);
      }
      return data;
    });
  }
  // Lazy-fetch OG previews for every [data-link-preview] currently in the
  // DOM. Results are cached per-URL for the session so re-renders don't
  // re-hit the worker. Worker enforces SSRF + 8s timeout + 1MB cap.
  function hydrateLinkPreviews() {
    document.querySelectorAll("[data-link-preview]").forEach(el => {
      if (el.dataset.lpDone === "1") return;
      const url = el.dataset.linkPreview;
      const cached = linkPreviewCache[url];
      if (cached) { paintLinkPreview(el, cached); return; }
      el.dataset.lpDone = "1";
      wallAction("link-preview", { url })
        .then(data => {
          if (!data) return;
          linkPreviewCache[url] = data;
          // Re-paint every currently-mounted instance of the same URL.
          document.querySelectorAll(`[data-link-preview="${cssAttr(url)}"]`).forEach(node => {
            paintLinkPreview(node, data);
          });
        })
        .catch(() => { /* silent — leave the loading state in place */ });
    });
  }
  function paintLinkPreview(el, data) {
    const title = data.title || data.url || "";
    const desc  = data.description || "";
    const img   = data.image || "";
    const host  = data.site_name || data.host || safeHost(el.dataset.linkPreview || "");
    const thumb = el.querySelector(".wl-link-thumb");
    const body  = el.querySelector(".wl-link-body");
    if (thumb) {
      thumb.innerHTML = img
        ? `<img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;wl-link-thumb-empty&quot;>no preview</div>';">`
        : `<div class="wl-link-thumb-empty">no preview</div>`;
    }
    if (body) {
      body.innerHTML = `
        <div class="wl-link-host">${escapeHtml(host || "")}</div>
        <div class="wl-link-title">${escapeHtml(title)}</div>
        ${desc ? `<div class="wl-link-desc">${escapeHtml(desc)}</div>` : ""}`;
    }
  }
  function displayName(email, fallback) {
    if (!email) return fallback || "Unknown";
    const u = staffByEmail[email.toLowerCase()];
    return (u && u.name) || fallback || email.split("@")[0];
  }
  // Mirrors directory.html's dirPhotoUrl: prefer the admin-uploaded
  // override at assets/photos/<email_at_>.jpg (with the annotation
  // timestamp as cache-bust); fall back to Google's Workspace
  // thumbnailPhotoUrl when no upload exists.
  function dirPhotoKey(email) {
    return (email || "").toString().trim().toLowerCase().replace(/@/g, "_at_");
  }
  // Serve wall-media via a relative URL so the browser fetches it from the
  // same origin the page is on (always book.togetherbook.net — the github.io
  // URL 301-redirects the HTML to the custom domain too). The earlier
  // implementation used an absolute github.io URL, but with the CNAME set
  // GitHub Pages 301s wall-media/* to http://book.togetherbook.net/... (no
  // HTTPS — GitHub doesn't manage a cert for the custom domain), and
  // browsers block that mixed-content step on the HTTPS wall page, so
  // images permanently showed the "still publishing" fallback. Same-origin
  // relative URLs carry the Cloudflare Access cookie automatically, so the
  // image request succeeds without bouncing through the login page. GIPHY
  // URLs come through as absolute https:// already; pass those untouched.
  const MEDIA_BASE = "";
  // Bump this when something changes about how wall-media is served (e.g.
  // a new Cloudflare Access bypass). Cached failed responses for the un-
  // suffixed URL won't apply to ?v=<n>, so browsers that latched onto a
  // 302/404 from before the fix will issue a fresh request and succeed.
  const MEDIA_CACHE_BUST = "v=2";
  function mediaUrl(path) {
    if (!path) return "";
    if (/^https?:/i.test(path)) return path;
    const clean = path.replace(/^\/+/, "");
    const sep = clean.includes("?") ? "&" : "?";
    return MEDIA_BASE + clean + sep + MEDIA_CACHE_BUST;
  }
  function photoUrlFor(u) {
    if (!u || !u.email) return "";
    if (u.directory_photo_override) return u.directory_photo_override;
    const email = u.email.toLowerCase();
    const ann = annotationsMap[email];
    if (ann && ann.directory_photo_uploaded_at) {
      return `assets/photos/${dirPhotoKey(email)}.jpg?v=${encodeURIComponent(ann.directory_photo_uploaded_at)}`;
    }
    return u.photo_url || "";
  }
  function initials(name) {
    return (name || "").split(/\s+/).map(p => p.charAt(0).toUpperCase()).slice(0, 2).join("") || "?";
  }
  function avatarInner(name, photoUrl) {
    const init = initials(name);
    if (photoUrl) {
      // Attached error handler instead of inline onerror — inline-attribute
      // approach syntax-errors when a name contains an apostrophe (e.g.
      // "O'Brien" → JS unterminated string literal). wireFeed() picks
      // these up after each render.
      return `<img class="wl-avatar-img" src="${escapeHtml(photoUrl)}" alt="" data-fallback-initials="${escapeHtml(init)}">`;
    }
    return `<div>${escapeHtml(init)}</div>`;
  }
  // Editorial overline format: "WED, 15 MAY 2026 · 09:36" with a brass
  // middot. Wraps in <time datetime> for screen-reader semantics. Used on
  // posts where the date carries editorial weight.
  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return escapeHtml(iso);
    const date = d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
    const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hourCycle: "h23" });
    const datePart = date.toUpperCase().replace(",", "");
    return `<time datetime="${escapeHtml(iso)}">${escapeHtml(datePart)}<span class="wl-time-dot">·</span>${escapeHtml(time)}</time>`;
  }
  // Nextdoor-style compact relative time for comments / replies — fits on
  // the same line as the author name so every comment header is one row.
  // < 1 min → "now"; < 60 min → "Nm"; < 24 h → "Nh"; < 7 d → "Nd";
  // older → "16 May" or "16 May 2024". Full ISO is on the title attr.
  function formatTimeShort(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return escapeHtml(iso);
    const now = new Date();
    const secs = Math.max(0, (now - d) / 1000);
    let label;
    if (secs < 60) label = "now";
    else if (secs < 3600) label = `${Math.floor(secs / 60)}m`;
    else if (secs < 86400) label = `${Math.floor(secs / 3600)}h`;
    else if (secs < 86400 * 7) label = `${Math.floor(secs / 86400)}d`;
    else if (d.getFullYear() === now.getFullYear()) {
      label = d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    } else {
      label = d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
    }
    const full = d.toLocaleString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", hourCycle: "h23" });
    return `<time datetime="${escapeHtml(iso)}" title="${escapeHtml(full)}">${escapeHtml(label)}</time>`;
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
  }
  function cssAttr(s) { return String(s).replace(/"/g, '\\"'); }
  function showBanner(msg, isError) {
    document.querySelectorAll(".wl-banner").forEach(el => el.remove());
    const b = document.createElement("div");
    b.className = "wl-banner" + (isError ? " is-error" : "");
    b.textContent = msg;
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 4000);
  }
})();
</script>
</body>
</html>
