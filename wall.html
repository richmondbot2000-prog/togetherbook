<script src="nav.js" defer></script>
<script>
(function () {
  "use strict";
  let posts = [];
  let staffByEmail = {};
  let annotationsMap = {};   // email (lowercase) → annotation entry (incl. directory_photo_uploaded_at)
  let viewerEmail = "";
  let viewerName  = "";
  let viewerPhoto = "";
  let viewerIsAdmin = false; // true → can delete anyone's post / comment / reply
  let lastSeenByPost = {};
  const openPostIds   = new Set();
  const expandedPostIds = new Set();
  const openReplyTo   = new Set();

  // Facebook's settled answer: 6 reactions. Larger sets measurably slow
  // decision time (their A/B test). We store as emoji keys (so old data
  // round-trips), but render as named italic Newsreader to fit Quiet
  // Edition — full-colour Apple emoji on cream paper read as fridge
  // magnets stuck to a manuscript. The first entry is the default
  // applied on a plain Like tap.
  const REACTIONS = ["👍", "❤️", "😂", "😮", "😢", "🎉"];
  const DEFAULT_REACTION = REACTIONS[0];
  // Storage key (emoji) → display verb + semantic colour token.
  const REACTION_META = {
    "👍": { label: "Noted",       past: "noted",       color: "var(--ink-700)" },
    "❤️": { label: "Loved",       past: "loved",       color: "var(--red-500)" },
    "😂": { label: "Smiled",      past: "smiled at",   color: "var(--brass-600)" },
    "😮": { label: "Surprised",   past: "was surprised by", color: "var(--teal-500)" },
    "😢": { label: "Mourned",     past: "mourned",     color: "var(--ink-600)" },
    "🎉": { label: "Celebrated",  past: "celebrated",  color: "var(--sage-600)" },
  };
  function reactionLabel(emoji) { return (REACTION_META[emoji] || {}).label || emoji; }
  function reactionPast(emoji)  { return (REACTION_META[emoji] || {}).past  || "reacted to"; }
  function reactionColor(emoji) { return (REACTION_META[emoji] || {}).color || "var(--ink-700)"; }
  const WALL_API = "/api/wall";

  // Inline SVG icon set — outline (default) ↔ filled (active/hover).
  // Replaces system emoji in the action bar so the page stays on the
  // Quiet Edition ink palette (no full-colour Apple emoji on cream).
  const ICONS = {
    thumb: {
      outline: `<path d="M7 11v10H4a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1h3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11l4-8a3 3 0 0 1 3 3v4h5.5a2 2 0 0 1 2 2.4l-1.6 7.2A2 2 0 0 1 17.9 21H7V11z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<path d="M7 11v10H4a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1h3z" fill="currentColor"/><path d="M7 11l4-8a3 3 0 0 1 3 3v4h5.5a2 2 0 0 1 2 2.4l-1.6 7.2A2 2 0 0 1 17.9 21H7V11z" fill="currentColor"/>`,
    },
    bell: {
      outline: `<path d="M6 9a6 6 0 0 1 12 0c0 5 3 5 3 8H3c0-3 3-3 3-8z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 21a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,
      filled:  `<path d="M6 9a6 6 0 0 1 12 0c0 5 3 5 3 8H3c0-3 3-3 3-8z" fill="currentColor"/><path d="M10 21a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,
    },
    heart: {
      outline: `<path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z" fill="currentColor"/>`,
    },
    share: {
      outline: `<path d="M4 18c0-7 7-9 11-9V5l6 5-6 5v-4C8 11 5 13 4 18z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<path d="M4 18c0-7 7-9 11-9V5l6 5-6 5v-4C8 11 5 13 4 18z" fill="currentColor"/>`,
    },
    bookmark: {
      outline: `<path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" fill="currentColor"/>`,
    },
    comment: {
      outline: `<path d="M21 12a8 8 0 0 1-11.8 7L4 21l1.8-5A8 8 0 1 1 21 12z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="15" cy="12" r="1.2" fill="currentColor"/>`,
      filled:  `<path d="M21 12a8 8 0 0 1-11.8 7L4 21l1.8-5A8 8 0 1 1 21 12z" fill="currentColor"/><circle cx="9" cy="12" r="1.2" fill="var(--paper-50)"/><circle cx="12" cy="12" r="1.2" fill="var(--paper-50)"/><circle cx="15" cy="12" r="1.2" fill="var(--paper-50)"/>`,
    },
    photo: {
      outline: `<rect x="3" y="5" width="18" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><path d="M3 17l5-5 5 5 3-3 5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
      filled:  `<rect x="3" y="5" width="18" height="14" rx="1.5" fill="currentColor"/><circle cx="8.5" cy="10" r="1.5" fill="var(--paper-50)"/><path d="M3 17l5-5 5 5 3-3 5 5" fill="none" stroke="var(--paper-50)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`,
    },
    video: {
      outline: `<rect x="3" y="6" width="13" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M16 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>`,
      filled:  `<rect x="3" y="6" width="13" height="12" rx="1.5" fill="currentColor"/><path d="M16 10l5-3v10l-5-3z" fill="currentColor"/>`,
    },
    gif: {
      outline: `<rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><text x="12" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="currentColor" letter-spacing="0.5">GIF</text>`,
      filled:  `<rect x="2" y="5" width="20" height="14" rx="2" fill="currentColor"/><text x="12" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="var(--paper-50)" letter-spacing="0.5">GIF</text>`,
    },
    close: {
      outline: `<path d="M6 6l12 12M18 6l-12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
      filled:  `<path d="M6 6l12 12M18 6l-12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`,
    },
    trash: {
      outline: `<path d="M9 4h6M10 4v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M4 7h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v7M14 11v7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`,
      filled:  `<path d="M9 4h6M10 4v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M4 7h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v7M14 11v7" stroke="var(--paper-50)" stroke-width="1.6" stroke-linecap="round"/>`,
    },
  };
  function icon(name, active) {
    const i = ICONS[name];
    if (!i) return "";
    return `<svg class="wl-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">${active ? i.filled : i.outline}</svg>`;
  }

  Promise.all([
    fetch("wall.json",        { cache: "no-store" }).then(r => r.ok ? r.json() : { posts: [] }).catch(() => ({ posts: [] })),
    fetch("staff.json",       { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("wall-seen.json",   { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch(`${WALL_API}/whoami`, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("annotations.json", { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("admins.json",      { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([wall, staff, seen, who, annFile, adminsFile]) => {
    const adminEmails = new Set(((adminsFile && adminsFile.admins) || []).map(e => (e || "").toLowerCase()));
    posts = Array.isArray(wall.posts) ? wall.posts : [];
    if (staff && Array.isArray(staff.users)) {
      for (const u of staff.users) {
        const k = (u.email || "").toLowerCase();
        if (k) staffByEmail[k] = u;
      }
    }
    if (annFile && annFile.annotations && typeof annFile.annotations === "object") {
      annotationsMap = annFile.annotations;
    }
    if (who && who.email) {
      viewerEmail = who.email.toLowerCase();
      const me = staffByEmail[viewerEmail];
      viewerName  = (me && me.name)  || who.name  || viewerEmail.split("@")[0];
      viewerPhoto = (me && photoUrlFor(me)) || "";
      viewerIsAdmin = adminEmails.has(viewerEmail);
      document.getElementById("wlMyAvatar").innerHTML = avatarInner(viewerName, viewerPhoto);
      document.getElementById("wlCompose").style.display = "";
    }
    if (seen && seen.by_user && seen.by_user[viewerEmail] && seen.by_user[viewerEmail].posts) {
      lastSeenByPost = seen.by_user[viewerEmail].posts || {};
    }
    sortPosts();
    renderFeed();
    renderNotifications();
  }).catch(err => {
    document.getElementById("wlFeed").innerHTML =
      `<div class="wl-empty">Wall failed to load: ${escapeHtml(String(err))}</div>`;
  });

  const composeText = document.getElementById("wlComposeText");
  const charCount = document.getElementById("wlCharCount");
  const postBtn = document.getElementById("wlPostBtn");
  const previewsEl = document.getElementById("wlComposePreviews");
  let composeAttachments = [];

  function refreshComposeState() {
    const n = composeText.value.length;
    charCount.textContent = `${n.toLocaleString()} / 10,000`;
    charCount.classList.toggle("over", n > 10000);
    postBtn.disabled = (n === 0 && composeAttachments.length === 0) || n > 10000;
  }
  composeText.addEventListener("input", refreshComposeState);

  function renderComposePreviews() {
    previewsEl.innerHTML = composeAttachments.map((a, i) => {
      const inner = a.kind === "video"
        ? `<video src="${escapeHtml(a.preview)}" muted></video>`
        : `<img src="${escapeHtml(a.preview)}" alt="">`;
      return `<div class="wl-compose-preview ${a.uploading ? "is-uploading" : ""}" data-att-idx="${i}">${inner}<button type="button" class="wl-remove" data-remove-att="${i}" aria-label="Remove">×</button></div>`;
    }).join("");
    previewsEl.querySelectorAll("[data-remove-att]").forEach(el => {
      el.addEventListener("click", e => {
        e.preventDefault();
        composeAttachments.splice(parseInt(el.dataset.removeAtt, 10), 1);
        renderComposePreviews(); refreshComposeState();
      });
    });
  }

  // Render attach-button icons at boot.
  document.getElementById("wlIconPhoto").innerHTML = icon("photo", false);
  document.getElementById("wlIconVideo").innerHTML = icon("video", false);
  document.getElementById("wlIconGif").innerHTML   = icon("gif",   false);

  document.getElementById("wlComposePhotoInput").addEventListener("change", e => {
    handleFilePick(Array.from(e.target.files || []), "photo");
    e.target.value = "";
  });
  document.getElementById("wlComposeVideoInput").addEventListener("change", e => {
    handleFilePick(Array.from(e.target.files || []), "video");
    e.target.value = "";
  });
  document.getElementById("wlComposeGifBtn").addEventListener("click", () => {
    openGifPicker(gif => {
      composeAttachments.push({ path: gif.url, kind: "gif", preview: gif.preview });
      renderComposePreviews(); refreshComposeState();
    });
  });

  async function handleFilePick(files, kind) {
    if (!files.length) return;
    const take = kind === "video" ? Math.min(files.length, 2) : Math.min(files.length, 10);
    for (const f of files.slice(0, take)) await ingestFile(f, kind);
    renderComposePreviews(); refreshComposeState();
  }
  async function ingestFile(file, kind) {
    let dataUrl;
    try {
      dataUrl = kind === "photo"
        ? await resizeImage(file, 1600, 0.85)
        : await readAsDataUrl(file);
    } catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    const att = { path: "", kind, preview: dataUrl, uploading: true };
    composeAttachments.push(att); renderComposePreviews();
    try {
      const res = await wallAction("upload-media", { data_url: dataUrl, kind });
      if (!res || !res.path) throw new Error("upload returned no path");
      att.path = res.path; att.uploading = false;
      renderComposePreviews();
    } catch (err) {
      const i = composeAttachments.indexOf(att);
      if (i >= 0) composeAttachments.splice(i, 1);
      renderComposePreviews();
      showBanner("Upload failed: " + (err.message || err), true);
    }
  }
  function readAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => reject(new Error("read failed"));
      r.readAsDataURL(file);
    });
  }
  function resizeImage(file, maxDim, quality) {
    return new Promise(async (resolve, reject) => {
      try {
        const src = await readAsDataUrl(file);
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else        { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => reject(new Error("image decode failed"));
        img.src = src;
      } catch (e) { reject(e); }
    });
  }

  postBtn.addEventListener("click", async () => {
    const body = composeText.value.trim();
    if (!body && composeAttachments.length === 0) return;
    if (composeAttachments.some(a => a.uploading)) {
      showBanner("Wait for uploads to finish", true); return;
    }
    postBtn.disabled = true; postBtn.textContent = "Posting…";
    try {
      const photos = composeAttachments.map(a => a.path).filter(Boolean);
      const res = await wallAction("post", { body, photos });
      if (res && res.post) {
        posts.unshift(res.post);
        sortPosts(); renderFeed(); renderNotifications();
      }
      composeText.value = "";
      composeAttachments = [];
      renderComposePreviews();
      charCount.textContent = "0 / 10,000";
      showBanner("Posted");
    } catch (err) {
      showBanner(err.message || String(err), true);
    } finally {
      postBtn.disabled = false; postBtn.textContent = "Post this page";
    }
  });

  // ── GIF picker (via /api/wall/gif-search → GIPHY) ─────────────────
  let gifPickerState = null;
  function openGifPicker(onPick) {
    closeGifPicker();
    const root = document.createElement("div");
    root.className = "wl-gif-panel";
    root.innerHTML = `
      <div class="wl-gif-modal" role="dialog" aria-label="GIF picker">
        <div class="wl-gif-head">
          <input type="search" placeholder="Search GIFs + memes…" id="wlGifQuery" autocomplete="off">
          <button class="wl-gif-close" aria-label="Close">${icon("close", false)}</button>
        </div>
        <div class="wl-gif-grid" id="wlGifGrid"><div class="wl-loading">Loading…</div></div>
        <div class="wl-gif-attribution">Powered by GIPHY</div>
      </div>`;
    document.body.appendChild(root);
    const input = root.querySelector("#wlGifQuery");
    const grid  = root.querySelector("#wlGifGrid");
    input.focus();
    let debounce = null;
    const load = async (q) => {
      grid.innerHTML = `<div class="wl-loading">Searching…</div>`;
      try {
        const res = await wallAction("gif-search", { q, limit: 24 });
        const results = (res && res.results) || [];
        if (!results.length) { grid.innerHTML = `<div class="wl-loading">No results.</div>`; return; }
        grid.innerHTML = results.map(g =>
          `<div class="wl-gif-tile" data-gif='${escapeHtml(JSON.stringify({ url: g.url, preview: g.preview }))}'>
             <img src="${escapeHtml(g.preview)}" alt="${escapeHtml(g.title)}" loading="lazy">
           </div>`
        ).join("");
        grid.querySelectorAll(".wl-gif-tile").forEach(t => {
          t.addEventListener("click", () => {
            try { onPick(JSON.parse(t.dataset.gif)); } catch (e) {}
            closeGifPicker();
          });
        });
      } catch (err) {
        grid.innerHTML = `<div class="wl-loading">${escapeHtml(err.message || String(err))}</div>`;
      }
    };
    input.addEventListener("input", () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => load(input.value.trim()), 250);
    });
    root.querySelector(".wl-gif-close").addEventListener("click", closeGifPicker);
    root.addEventListener("click", e => { if (e.target === root) closeGifPicker(); });
    const onKey = e => { if (e.key === "Escape") closeGifPicker(); };
    document.addEventListener("keydown", onKey);
    gifPickerState = { root, onKey };
    load("");
  }
  function closeGifPicker() {
    if (!gifPickerState) return;
    gifPickerState.root.remove();
    document.removeEventListener("keydown", gifPickerState.onKey);
    gifPickerState = null;
  }

  function renderFeed() {
    const root = document.getElementById("wlFeed");
    if (!posts.length) {
      root.innerHTML = `<div class="wl-empty">No pages yet. Write the first.</div>`;
      return;
    }
    root.innerHTML = posts.map(renderPost).join("");
    wireFeed();
  }
  function sortPosts() {
    posts.forEach(p => { p._sortKey = mostRecentActivity(p); });
    posts.sort((a, b) => (a._sortKey < b._sortKey ? 1 : a._sortKey > b._sortKey ? -1 : 0));
  }
  function mostRecentActivity(post) {
    let latest = post.created_at || "";
    for (const c of (post.comments || [])) {
      if ((c.created_at || "") > latest) latest = c.created_at;
    }
    return latest;
  }

  function renderPost(post) {
    const name = displayName(post.author_email, post.author_name);
    const photo = photoUrlFor(staffByEmail[(post.author_email || "").toLowerCase()] || {});
    const expanded = expandedPostIds.has(post.id);
    const bodyHtml = renderBody(post.body || "", post.id, expanded);
    const photos = renderPhotos(post.photos || [], post.id);
    const reactions = renderReactionPills(post.reactions || {}, post.id, "post");
    // Channel rendered as italic register-tag (matches the .qb-register-tag
     // pattern on index.html — italic small-caps in a muted ink/teal/sage).
    const channelTag = post.channel
      ? ` <span class="wl-channel-tag">${escapeHtml(post.channel)}</span>` : "";
    const comments = post.comments || [];
    const cmCount = (comments || []).filter(c => !c.parent_comment_id).length;
    const open = openPostIds.has(post.id);
    const newCount = unseenCommentCount(post);
    const myReaction = mineReactionOn(post.reactions || {});
    const likeActive = !!myReaction;
    const likeIcon = myReaction || "👍";
    const canDeletePost = canDelete(post.author_email);
    return `
      <article class="wl-post" data-post="${escapeHtml(post.id)}" id="post-${escapeHtml(post.id)}">
        <div class="wl-post-head">
          <div class="wl-avatar">${avatarInner(name, photo)}</div>
          <div class="wl-meta">
            <div class="wl-post-name">${escapeHtml(name)}${channelTag}</div>
            <div class="wl-post-time">${formatTime(post.created_at)}</div>
          </div>
          ${canDeletePost ? `<div class="wl-post-head-actions"><button class="wl-delete-btn" data-delete-post="${escapeHtml(post.id)}" title="Delete this post" aria-label="Delete post">${icon("trash", false)}</button></div>` : ""}
        </div>
        <div class="wl-post-body${expanded || (post.body || "").length < 240 ? "" : " is-clamped"}" data-post-body="${escapeHtml(post.id)}">${bodyHtml}</div>
        ${(post.body || "").length >= 240 && !expanded ? `<button type="button" class="wl-see-more" data-expand="${escapeHtml(post.id)}">See more</button>` : ""}
        ${expanded && (post.body || "").length >= 240 ? `<button type="button" class="wl-see-more" data-expand="${escapeHtml(post.id)}" data-collapse="1">See less</button>` : ""}
        ${photos}
        <div class="wl-reaction-summary">
          <div>${reactions}</div>
          <span class="wl-comment-count ${newCount > 0 ? "has-new" : ""}">
            ${cmCount === 0 ? "" : (cmCount + (cmCount === 1 ? " comment" : " comments")) + (newCount > 0 ? ` · ${newCount} new` : "")}
          </span>
        </div>
        <div class="wl-action-bar">
          <button class="wl-action wl-action-like ${likeActive ? "is-active" : ""}" data-like="${escapeHtml(post.id)}" data-kind="post" title="Tap to ${likeActive ? "remove your reaction" : "react " + reactionLabel(DEFAULT_REACTION)}; long-press to pick a different reaction" ${likeActive ? `style="color:${reactionColor(myReaction)};"` : ""}>
            <span class="wl-action-icon">${icon("thumb", likeActive)}</span>
            <span class="wl-action-label">${likeActive ? reactionLabel(myReaction) : "Note"}</span>
          </button>
          <button class="wl-action" data-toggle-comments="${escapeHtml(post.id)}">
            <span class="wl-action-icon">${icon("comment", false)}</span>
            <span class="wl-action-label">Comment</span>
          </button>
        </div>
        <div class="wl-comment-composer">
          <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
          <input class="wl-comment-input" type="text" placeholder="Add a comment…" data-add-comment="${escapeHtml(post.id)}" ${viewerEmail ? "" : "disabled"} maxlength="2000">
          ${commentAttachButtons(post.id, "")}
        </div>
        ${renderComments(post, open)}
      </article>`;
  }

  function canDelete(authorEmail) {
    if (!viewerEmail) return false;
    if (viewerIsAdmin) return true;
    return (authorEmail || "").toLowerCase() === viewerEmail;
  }
  function commentAttachButtons(postId, parentCommentId) {
    if (!viewerEmail) return "";
    const key = parentCommentId ? `${postId}::${parentCommentId}` : postId;
    return `
      <label class="wl-comment-attach" title="Add photo">
        <input type="file" accept="image/*" data-cm-photo="${escapeHtml(key)}">
        ${icon("photo", false)}
      </label>
      <label class="wl-comment-attach" title="Add video">
        <input type="file" accept="video/*" data-cm-video="${escapeHtml(key)}">
        ${icon("video", false)}
      </label>
      <button type="button" class="wl-comment-attach" data-cm-gif="${escapeHtml(key)}" title="Add a GIF">
        ${icon("gif", false)}
      </button>`;
  }
  function renderCommentMedia(photos, commentId) {
    if (!photos || !photos.length) return "";
    const n = Math.min(photos.length, 4);
    const tiles = photos.slice(0, 4).map((p, i) => {
      const isVideo = /\.(mp4|webm|mov)$/i.test(p);
      const url = mediaUrl(p);
      return isVideo
        ? `<video src="${escapeHtml(url)}" controls playsinline></video>`
        : `<img class="wl-media-img" src="${escapeHtml(url)}" alt="" loading="lazy" data-cm-open-lightbox="${escapeHtml(commentId)}::${i}" tabindex="0" role="button" aria-label="Open image">`;
    }).join("");
    return `<div class="wl-comment-photos cm-${n}">${tiles}</div>`;
  }

  function mineReactionOn(rx) {
    if (!viewerEmail) return null;
    for (const [emoji, emails] of Object.entries(rx || {})) {
      if ((emails || []).map(e => (e || "").toLowerCase()).includes(viewerEmail)) return emoji;
    }
    return null;
  }

  // Body is rendered raw + clamped via CSS line-clamp; the "See more" link
  // is sibling-rendered in renderPost. No JS character slicing — keeps
  // paragraphed and dense posts treated uniformly.
  function renderBody(body, postId, expanded) {
    return escapeHtml(body);
  }

  // Per-count grid layout. Counts of 1/2/3/4 show every photo; 5+ shows
  // first 3 with a "+N" overlay on the 3rd. Tap opens the lightbox.
  function renderPhotos(photos, postId) {
    if (!photos.length) return "";
    const n = photos.length;
    let cls = "count-" + Math.min(n, 4);
    let visible = photos.slice();
    let overlayN = 0;
    if (n >= 5) {
      cls = "count-5plus";
      visible = photos.slice(0, 3);
      overlayN = n - 3;
    }
    const tiles = visible.map((p, i) => {
      const overlay = (overlayN > 0 && i === visible.length - 1)
        ? `<div class="wl-more-overlay">+${overlayN}</div>` : "";
      // Error fallback (still publishing 30-60s window) handled by an
      // attached listener in wireFeed, not inline onerror.
      return `<div class="wl-photo" data-open-lightbox="${escapeHtml(postId)}::${i}" role="button" tabindex="0" aria-label="Open image">
                <img class="wl-media-img" src="${escapeHtml(mediaUrl(p))}" alt="" loading="lazy">${overlay}
              </div>`;
    }).join("");
    return `<div class="wl-photos ${cls}">${tiles}</div>`;
  }

  // Render reactions as italic named verbs in the comment's marginalia.
  // Each verb shows in its semantic colour (red for Loved, sage for
  // Celebrated, etc.) so the typographic register stays inside the
  // Quiet Edition system. "Mine" gets a 1px brass underline + bold.
  function renderReactionPills(rx, parentId, parentKind) {
    const entries = Object.entries(rx || {})
      .filter(([_, emails]) => Array.isArray(emails) && emails.length > 0)
      .sort((a, b) => b[1].length - a[1].length);
    if (!entries.length) return "";
    const pills = entries.slice(0, 6).map(([emoji, emails]) => {
      const mine = emails.map(e => (e || "").toLowerCase()).includes(viewerEmail);
      const label = reactionLabel(emoji);
      const colour = reactionColor(emoji);
      const names = emails.map(e => displayName(e, "")).filter(Boolean).join(", ");
      return `<button class="wl-react-pill ${mine ? "is-mine" : ""}" data-react="${escapeHtml(emoji)}" data-on="${escapeHtml(parentId)}" data-kind="${escapeHtml(parentKind)}" title="${escapeHtml(names)}" style="color:${colour};">${escapeHtml(label)} <span class="wl-react-count">· ${emails.length}</span></button>`;
    }).join("");
    return `<div class="wl-reactions">${pills}</div>`;
  }
  function renderComments(post, allOpen) {
    const comments = (post.comments || []).slice();
    if (!comments.length) return "";
    const topLevel = comments.filter(c => !c.parent_comment_id);
    topLevel.sort((a, b) => (a.created_at < b.created_at ? -1 : 1));
    // Preview 2 newest by default — Facebook/LinkedIn consensus.
    const showList = allOpen ? topLevel : topLevel.slice(-2);
    const hiddenN = topLevel.length - showList.length;
    const headerLink = !allOpen && hiddenN > 0
      ? `<button class="wl-show-all-comments" data-show-all="${escapeHtml(post.id)}">View ${hiddenN} earlier ${hiddenN === 1 ? "comment" : "comments"}</button>`
      : (allOpen && topLevel.length > 2
          ? `<button class="wl-show-all-comments" data-show-all="${escapeHtml(post.id)}" data-collapse="1">Show only most recent</button>`
          : "");
    return `<div class="wl-comments">${headerLink}${showList.map(c => renderComment(post, c, false)).join("")}</div>`;
  }
  function renderComment(post, comment, isReply) {
    const name = displayName(comment.author_email, comment.author_name);
    const photo = photoUrlFor(staffByEmail[(comment.author_email || "").toLowerCase()] || {});
    const replies = (post.comments || [])
      .filter(c => c.parent_comment_id === comment.id)
      .sort((a, b) => (a.created_at < b.created_at ? -1 : 1));
    const replyKey = `${post.id}::${comment.id}`;
    const replyComposerOpen = openReplyTo.has(replyKey);
    const myReaction = mineReactionOn(comment.reactions || {});
    const canDel = canDelete(comment.author_email);
    return `
      <div class="wl-comment ${isReply ? "is-reply" : ""}" data-comment="${escapeHtml(comment.id)}">
        <div class="wl-avatar">${avatarInner(name, photo)}</div>
        <div style="flex:1;">
          <div class="wl-comment-body">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:6px;">
              <div>
                <span class="wl-comment-name">${escapeHtml(name)}</span>
                <span class="wl-comment-time">${formatTime(comment.created_at)}</span>
              </div>
              ${canDel ? `<button class="wl-delete-btn" data-delete-comment="${escapeHtml(post.id)}::${escapeHtml(comment.id)}" title="Delete this ${isReply ? "reply" : "comment"}" aria-label="Delete">${icon("trash", false)}</button>` : ""}
            </div>
            ${comment.body ? `<div class="wl-comment-text">${escapeHtml(comment.body)}</div>` : ""}
            ${renderCommentMedia(comment.photos || [], comment.id)}
            ${renderReactionPills(comment.reactions || {}, comment.id, "comment")}
          </div>
          <div class="wl-comment-actions">
            <button class="wl-reply-link wl-comment-like" data-like="${escapeHtml(comment.id)}" data-kind="comment" title="Tap to ${myReaction ? "remove your reaction" : "react " + reactionLabel(DEFAULT_REACTION)}; long-press to pick a different reaction" ${myReaction ? `style="color:${reactionColor(myReaction)};"` : ""}>
              ${myReaction ? reactionLabel(myReaction) : "Like"}
            </button>
            <button class="wl-reply-link" data-reply="${escapeHtml(replyKey)}">Reply</button>
          </div>
          ${replyComposerOpen ? `
            <div class="wl-comment-composer">
              <div class="wl-avatar">${avatarInner(viewerName, viewerPhoto)}</div>
              <input class="wl-comment-input" type="text" placeholder="Reply to ${escapeHtml(name)}…" data-add-reply="${escapeHtml(replyKey)}" maxlength="2000" autofocus>
              ${commentAttachButtons(post.id, comment.id)}
            </div>` : ""}
          ${replies.length ? `<div class="wl-replies">${replies.map(r => renderComment(post, r, true)).join("")}</div>` : ""}
        </div>
      </div>`;
  }
  function unseenCommentCount(post) {
    if (!viewerEmail || (post.author_email || "").toLowerCase() !== viewerEmail) return 0;
    const seen = lastSeenByPost[post.id] || "";
    return (post.comments || []).filter(c => (c.created_at || "") > seen && (c.author_email || "").toLowerCase() !== viewerEmail).length;
  }

  function wireFeed() {
    document.querySelectorAll("[data-expand]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.expand;
        if (el.dataset.collapse) expandedPostIds.delete(id);
        else expandedPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-toggle-comments]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.toggleComments;
        // Comment-action click: expand all comments AND focus the composer.
        openPostIds.add(id);
        renderFeed();
        const inp = document.querySelector(`[data-add-comment="${cssAttr(id)}"]`);
        if (inp) inp.focus();
      });
    });
    document.querySelectorAll("[data-show-all]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.showAll;
        if (el.dataset.collapse) openPostIds.delete(id);
        else openPostIds.add(id);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-add-comment]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const postId = el.dataset.addComment;
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: postId, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === postId);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            el.value = "";
            sortPosts(); renderFeed();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
        } finally {
          el.disabled = false; el.focus();
        }
      });
    });
    document.querySelectorAll("[data-reply]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.reply;
        if (openReplyTo.has(key)) openReplyTo.delete(key);
        else openReplyTo.add(key);
        const [pid] = key.split("::");
        openPostIds.add(pid);
        renderFeed();
      });
    });
    document.querySelectorAll("[data-add-reply]").forEach(el => {
      el.addEventListener("keydown", async e => {
        if (e.key !== "Enter") return;
        const body = el.value.trim();
        if (!body) return;
        const [pid, parent] = el.dataset.addReply.split("::");
        el.disabled = true;
        try {
          const res = await wallAction("comment", { post_id: pid, parent_comment_id: parent, body });
          if (res && res.comment) {
            const post = posts.find(p => p.id === pid);
            if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
            openReplyTo.delete(`${pid}::${parent}`);
            sortPosts(); renderFeed();
          }
        } catch (err) {
          showBanner(err.message || String(err), true);
        } finally {
          el.disabled = false;
        }
      });
    });
    document.querySelectorAll("[data-react]").forEach(el => {
      el.addEventListener("click", async () => {
        await reactTo(el.dataset.on, el.dataset.kind, el.dataset.react);
      });
    });
    // Avatar fallback to initials when photo 404s. Re-escape the value
    // we read back from the attribute (getAttribute returns decoded text)
    // so we can't be tricked into injecting HTML via a hostile name.
    document.querySelectorAll(".wl-avatar-img").forEach(img => {
      img.addEventListener("error", () => {
        const init = img.getAttribute("data-fallback-initials") || "?";
        const div = document.createElement("div");
        div.textContent = init;
        img.replaceWith(div);
      });
    });
    // Wall media (post + comment photos): dim + relabel while GitHub Pages
    // is still publishing the just-uploaded file (30-60s window).
    document.querySelectorAll(".wl-media-img").forEach(img => {
      img.addEventListener("error", () => {
        img.style.opacity = "0.3";
        img.alt = "still publishing — refresh in 30 s";
      });
    });
    // Keyboard support for photo tiles (Enter / Space opens lightbox).
    document.querySelectorAll("[data-open-lightbox], [data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); el.click(); }
      });
    });
    // Like buttons: tap = default reaction toggle; long-press = picker.
    document.querySelectorAll("[data-like]").forEach(el => {
      attachLikeButton(el);
    });
    // Photo tiles → lightbox
    document.querySelectorAll("[data-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [pid, idxStr] = el.dataset.openLightbox.split("::");
        const post = posts.find(p => p.id === pid);
        if (post) openLightbox(post.photos || [], parseInt(idxStr, 10) || 0);
      });
    });

    // Inline comment / reply media attach
    document.querySelectorAll("[data-cm-photo]").forEach(el => {
      el.addEventListener("change", async e => {
        const file = (e.target.files || [])[0];
        e.target.value = "";
        if (!file) return;
        await submitCommentWithMedia(el.dataset.cmPhoto, file, "photo");
      });
    });
    document.querySelectorAll("[data-cm-video]").forEach(el => {
      el.addEventListener("change", async e => {
        const file = (e.target.files || [])[0];
        e.target.value = "";
        if (!file) return;
        await submitCommentWithMedia(el.dataset.cmVideo, file, "video");
      });
    });
    document.querySelectorAll("[data-cm-gif]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.cmGif;
        openGifPicker(async gif => {
          await submitCommentWithMediaPath(key, gif.url, "gif");
        });
      });
    });
    document.querySelectorAll("[data-cm-open-lightbox]").forEach(el => {
      el.addEventListener("click", () => {
        const [cid, idxStr] = el.dataset.cmOpenLightbox.split("::");
        let media = [];
        for (const p of posts) {
          const c = (p.comments || []).find(x => x.id === cid);
          if (c) { media = c.photos || []; break; }
        }
        openLightbox(media, parseInt(idxStr, 10) || 0);
      });
    });

    // Delete affordances
    document.querySelectorAll("[data-delete-post]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.deletePost;
        const ok = await confirmDialog("Delete this post?", "The post + all its comments will be permanently removed. This cannot be undone.");
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "post", id });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          const i = posts.findIndex(p => p.id === id);
          if (i >= 0) posts.splice(i, 1);
          document.querySelectorAll(`[data-post="${cssAttr(id)}"]`).forEach(n => n.remove());
          renderFeed(); renderNotifications();
          showBanner("Post deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
    document.querySelectorAll("[data-delete-comment]").forEach(el => {
      el.addEventListener("click", async () => {
        const [pid, cid] = el.dataset.deleteComment.split("::");
        const post = posts.find(p => p.id === pid);
        const c = post && (post.comments || []).find(x => x.id === cid);
        const isReply = !!(c && c.parent_comment_id);
        const ok = await confirmDialog(
          `Delete this ${isReply ? "reply" : "comment"}?`,
          isReply
            ? "The reply will be permanently removed."
            : "The comment and any replies underneath it will be permanently removed.",
        );
        if (!ok) return;
        try {
          const res = await wallAction("delete", { kind: "comment", post_id: pid, id: cid });
          if (!res || res.ok === false) {
            throw new Error((res && res.error) || "Delete did not return success");
          }
          if (post) {
            // Remove the comment AND any replies to it (one-level cap).
            post.comments = (post.comments || []).filter(c => c.id !== cid && c.parent_comment_id !== cid);
          }
          // Defensive DOM removal — even if some render bug stopped the
          // post.comments mutation from clearing the visible row, drop the
          // matching DOM node now.
          document.querySelectorAll(`[data-comment="${cssAttr(cid)}"]`).forEach(n => n.remove());
          sortPosts(); renderFeed(); renderNotifications();
          showBanner(isReply ? "Reply deleted" : "Comment deleted");
        } catch (err) {
          showBanner("Delete failed: " + (err.message || String(err)), true);
          console.error("[wall] delete failed", err);
        }
      });
    });
  }

  async function submitCommentWithMedia(key, file, kind) {
    let dataUrl;
    try { dataUrl = kind === "photo" ? await resizeImage(file, 1600, 0.85) : await readAsDataUrl(file); }
    catch (e) { showBanner("Couldn't read file: " + e.message, true); return; }
    let res;
    try { res = await wallAction("upload-media", { data_url: dataUrl, kind }); }
    catch (e) { showBanner("Upload failed: " + e.message, true); return; }
    if (!res || !res.path) return;
    await submitCommentWithMediaPath(key, res.path, kind);
  }
  async function submitCommentWithMediaPath(key, path, kind) {
    const [pid, parent] = key.includes("::") ? key.split("::") : [key, null];
    const inp = parent
      ? document.querySelector(`[data-add-reply="${cssAttr(key)}"]`)
      : document.querySelector(`[data-add-comment="${cssAttr(pid)}"]`);
    const text = inp ? inp.value.trim() : "";
    try {
      const payload = { post_id: pid, body: text, photos: [path] };
      if (parent) payload.parent_comment_id = parent;
      const res = await wallAction("comment", payload);
      if (res && res.comment) {
        const post = posts.find(p => p.id === pid);
        if (post) { post.comments = post.comments || []; post.comments.push(res.comment); }
        if (parent) openReplyTo.delete(key);
        openPostIds.add(pid);
        sortPosts(); renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  // Generic confirm dialog — returns Promise<bool>. Used for deletes.
  function confirmDialog(title, body) {
    return new Promise(resolve => {
      const root = document.createElement("div");
      root.className = "wl-confirm-panel";
      root.innerHTML = `
        <div class="wl-confirm-modal" role="dialog" aria-modal="true">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(body)}</p>
          <div class="wl-confirm-actions">
            <button class="wl-confirm-cancel" type="button">Cancel</button>
            <button class="wl-confirm-ok" type="button">Delete</button>
          </div>
        </div>`;
      document.body.appendChild(root);
      const close = (ans) => {
        document.removeEventListener("keydown", onKey);
        root.remove();
        resolve(ans);
      };
      // Esc closes (cancel). Enter is intentionally NOT shortcut to
       // confirm — if the user has Tab-focused Cancel, hitting Enter should
       // cancel; the focused button handles its own Enter natively.
      const onKey = e => { if (e.key === "Escape") close(false); };
      document.addEventListener("keydown", onKey);
      root.addEventListener("click", e => { if (e.target === root) close(false); });
      root.querySelector(".wl-confirm-cancel").addEventListener("click", () => close(false));
      root.querySelector(".wl-confirm-ok").addEventListener("click", () => close(true));
      root.querySelector(".wl-confirm-ok").focus();
    });
  }

  // Tap a Like button = toggle default reaction. Long-press (450 ms) opens
  // the 6-emoji picker. Works on both desktop (mouse) and touch.
  function attachLikeButton(el) {
    let timer = null, longPressFired = false;
    const start = (ev) => {
      longPressFired = false;
      timer = setTimeout(() => {
        longPressFired = true;
        openEmojiPicker(el, async emoji => {
          await reactTo(el.dataset.like, el.dataset.kind, emoji);
        });
      }, 450);
    };
    const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
    el.addEventListener("mousedown", start);
    el.addEventListener("touchstart", start, { passive: true });
    el.addEventListener("mouseup", cancel);
    el.addEventListener("mouseleave", cancel);
    el.addEventListener("touchend", cancel);
    el.addEventListener("touchcancel", cancel);
    el.addEventListener("click", async (ev) => {
      if (longPressFired) { ev.preventDefault(); return; }
      // Default reaction: if you already reacted, remove that; otherwise add 👍.
      const post = posts.find(p => p.id === el.dataset.like)
                 || posts.find(p => (p.comments || []).some(c => c.id === el.dataset.like));
      const rx = (el.dataset.kind === "post"
        ? (post && post.reactions)
        : ((post && (post.comments || []).find(c => c.id === el.dataset.like) || {}).reactions)) || {};
      const mine = mineReactionOn(rx) || DEFAULT_REACTION;
      await reactTo(el.dataset.like, el.dataset.kind, mine);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────────────
  let lightboxState = null;
  function openLightbox(photos, startIdx) {
    if (!photos || !photos.length) return;
    closeLightbox();
    let idx = startIdx;
    const root = document.createElement("div");
    root.className = "wl-lightbox";
    root.innerHTML = `
      <button class="wl-lightbox-arrow prev" aria-label="Previous">‹</button>
      <img src="${escapeHtml(mediaUrl(photos[idx]))}" alt="">
      <button class="wl-lightbox-arrow next" aria-label="Next">›</button>
      <button class="wl-lightbox-close" aria-label="Close">close</button>
      <div class="wl-lightbox-count">${idx + 1} / ${photos.length}</div>`;
    document.body.appendChild(root);
    const refresh = () => {
      root.querySelector("img").src = mediaUrl(photos[idx]);
      root.querySelector(".wl-lightbox-count").textContent = `${idx + 1} / ${photos.length}`;
    };
    const onKey = e => {
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft")  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.key === "ArrowRight") { idx = (idx + 1) % photos.length; refresh(); }
    };
    root.addEventListener("click", e => {
      if (e.target === root || e.target.classList.contains("wl-lightbox-close")) closeLightbox();
      else if (e.target.classList.contains("prev"))  { idx = (idx - 1 + photos.length) % photos.length; refresh(); }
      else if (e.target.classList.contains("next"))  { idx = (idx + 1) % photos.length; refresh(); }
    });
    document.addEventListener("keydown", onKey);
    lightboxState = { root, onKey };
  }
  function closeLightbox() {
    if (!lightboxState) return;
    lightboxState.root.remove();
    document.removeEventListener("keydown", lightboxState.onKey);
    lightboxState = null;
  }

  let activePopover = null;
  function openEmojiPicker(anchor, onPick) {
    closeEmojiPicker();
    const pop = document.createElement("div");
    pop.className = "wl-emoji-popover";
    pop.innerHTML = REACTIONS.map(e => {
      const meta = REACTION_META[e];
      return `<button data-emoji="${escapeHtml(e)}" style="color:${meta.color};">${escapeHtml(meta.label)}</button>`;
    }).join("");
    document.body.appendChild(pop);
    const rect = anchor.getBoundingClientRect();
    pop.style.left = `${Math.max(8, rect.left + window.scrollX)}px`;
    pop.style.top  = `${rect.bottom + window.scrollY + 4}px`;
    pop.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => { closeEmojiPicker(); onPick(b.dataset.emoji); });
    });
    activePopover = pop;
    setTimeout(() => document.addEventListener("click", closeEmojiPicker, { once: true }), 0);
  }
  function closeEmojiPicker() { if (activePopover) { activePopover.remove(); activePopover = null; } }

  async function reactTo(parentId, kind, emoji) {
    if (!viewerEmail) { showBanner("Sign in via Cloudflare Access first.", true); return; }
    try {
      const res = await wallAction("react", { parent_id: parentId, parent_kind: kind, emoji });
      if (res && res.post_id) {
        const post = posts.find(p => p.id === res.post_id);
        if (post && res.target_kind === "post") post.reactions = res.reactions;
        else if (post && res.target_kind === "comment") {
          const c = (post.comments || []).find(c => c.id === parentId);
          if (c) c.reactions = res.reactions;
        }
        renderFeed();
      }
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  }

  function renderNotifications() {
    const events = collectNotifications();
    const btn = document.getElementById("wlNotifBtn");
    btn.setAttribute("data-count", String(events.length));
    if (!btn.querySelector(".wl-icon")) {
      btn.insertAdjacentHTML("afterbegin", icon("bell", events.length > 0));
    } else {
      btn.querySelector(".wl-icon").outerHTML = icon("bell", events.length > 0);
    }
    const list = document.getElementById("wlNotifList");
    if (!events.length) {
      list.innerHTML = `<div class="wl-notif-empty">Nothing new on your posts.</div>`;
    } else {
      list.innerHTML = events.slice(0, 30).map(ev => {
        const name = displayName(ev.actor_email, ev.actor_name);
        const verb = ev.kind === "react"
          ? `${reactionPast(ev.emoji)} your`
          : (ev.parent_comment_id ? "replied to a comment on your" : "commented on your");
        return `<a class="wl-notif-item" href="#post-${escapeHtml(ev.post_id)}" data-jump="${escapeHtml(ev.post_id)}">
          <div><strong>${escapeHtml(name)}</strong> ${verb} post.</div>
          <div class="wl-notif-item-time">${formatTime(ev.at)}</div>
        </a>`;
      }).join("");
      list.querySelectorAll("[data-jump]").forEach(a => {
        a.addEventListener("click", () => {
          const id = a.dataset.jump;
          openPostIds.add(id);
          renderFeed();
        });
      });
    }
    const navLink = document.querySelector('.qb-nav-link[href="wall.html"]');
    if (navLink) {
      if (events.length > 0) {
        navLink.classList.add("wl-has-notif");
        navLink.setAttribute("data-notif", String(events.length));
      } else {
        navLink.classList.remove("wl-has-notif");
        navLink.removeAttribute("data-notif");
      }
    }
  }
  function collectNotifications() {
    if (!viewerEmail) return [];
    const events = [];
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() !== viewerEmail) continue;
      const seen = lastSeenByPost[post.id] || "";
      // Comments + replies (from other people, since the last mark-seen)
      for (const c of (post.comments || [])) {
        if ((c.author_email || "").toLowerCase() === viewerEmail) continue;
        if ((c.created_at || "") <= seen) continue;
        events.push({
          kind: "comment",
          at: c.created_at,
          post_id: post.id,
          actor_email: c.author_email,
          actor_name: c.author_name,
          parent_comment_id: c.parent_comment_id || null,
        });
      }
      // Reactions (from other people, additions only, since mark-seen)
      for (const ev of (post.react_events || [])) {
        if (ev.kind !== "added") continue;
        if ((ev.actor_email || "").toLowerCase() === viewerEmail) continue;
        if ((ev.at || "") <= seen) continue;
        events.push({
          kind: "react",
          at: ev.at,
          post_id: post.id,
          actor_email: ev.actor_email,
          actor_name: "",
          emoji: ev.emoji,
          target_kind: ev.target_kind,
          target_id: ev.target_id,
        });
      }
    }
    events.sort((a, b) => (a.at < b.at ? 1 : -1));
    return events;
  }

  document.getElementById("wlNotifBtn").addEventListener("click", e => {
    e.stopPropagation();
    document.getElementById("wlNotifPanel").classList.toggle("is-open");
  });
  document.addEventListener("click", e => {
    const panel = document.getElementById("wlNotifPanel");
    if (!panel.contains(e.target) && e.target !== document.getElementById("wlNotifBtn")) {
      panel.classList.remove("is-open");
    }
  });
  document.getElementById("wlNotifMark").addEventListener("click", async () => {
    if (!viewerEmail) return;
    const now = new Date().toISOString();
    for (const post of posts) {
      if ((post.author_email || "").toLowerCase() === viewerEmail) {
        lastSeenByPost[post.id] = now;
      }
    }
    try {
      await wallAction("mark-seen", { at: now });
      renderNotifications();
      showBanner("Marked all as read");
    } catch (err) {
      showBanner(err.message || String(err), true);
    }
  });

  function wallAction(action, body) {
    return fetch(`${WALL_API}/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }).then(async res => {
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (!res.ok || (data && data.ok === false)) {
        throw new Error((data && data.error) || `HTTP ${res.status}`);
      }
      return data;
    });
  }
  function displayName(email, fallback) {
    if (!email) return fallback || "Unknown";
    const u = staffByEmail[email.toLowerCase()];
    return (u && u.name) || fallback || email.split("@")[0];
  }
  // Mirrors directory.html's dirPhotoUrl: prefer the admin-uploaded
  // override at assets/photos/<email_at_>.jpg (with the annotation
  // timestamp as cache-bust); fall back to Google's Workspace
  // thumbnailPhotoUrl when no upload exists.
  function dirPhotoKey(email) {
    return (email || "").toString().trim().toLowerCase().replace(/@/g, "_at_");
  }
  // Always serve wall-media via the public github.io mirror — Cloudflare
  // Access gates book.togetherbook.net/wall-media/*, and `<img>` tags
  // can't follow the 302 redirect to the login page. GIPHY URLs come
  // through as absolute https:// already; pass those untouched.
  const MEDIA_BASE = "https://richmondbot2000-prog.github.io/togetherbook/";
  function mediaUrl(path) {
    if (!path) return "";
    if (/^https?:/i.test(path)) return path;
    return MEDIA_BASE + path.replace(/^\/+/, "");
  }
  function photoUrlFor(u) {
    if (!u || !u.email) return "";
    const email = u.email.toLowerCase();
    const ann = annotationsMap[email];
    if (ann && ann.directory_photo_uploaded_at) {
      return `assets/photos/${dirPhotoKey(email)}.jpg?v=${encodeURIComponent(ann.directory_photo_uploaded_at)}`;
    }
    return u.photo_url || "";
  }
  function initials(name) {
    return (name || "").split(/\s+/).map(p => p.charAt(0).toUpperCase()).slice(0, 2).join("") || "?";
  }
  function avatarInner(name, photoUrl) {
    const init = initials(name);
    if (photoUrl) {
      // Attached error handler instead of inline onerror — inline-attribute
      // approach syntax-errors when a name contains an apostrophe (e.g.
      // "O'Brien" → JS unterminated string literal). wireFeed() picks
      // these up after each render.
      return `<img class="wl-avatar-img" src="${escapeHtml(photoUrl)}" alt="" data-fallback-initials="${escapeHtml(init)}">`;
    }
    return `<div>${escapeHtml(init)}</div>`;
  }
  // Editorial overline format: "WED, 15 MAY 2026 · 09:36" with a brass
  // middot. Wraps in <time datetime> for screen-reader semantics.
  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return escapeHtml(iso);
    const date = d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
    const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hourCycle: "h23" });
    const datePart = date.toUpperCase().replace(",", "");
    return `<time datetime="${escapeHtml(iso)}">${escapeHtml(datePart)}<span class="wl-time-dot">·</span>${escapeHtml(time)}</time>`;
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
  }
  function cssAttr(s) { return String(s).replace(/"/g, '\\"'); }
  function showBanner(msg, isError) {
    document.querySelectorAll(".wl-banner").forEach(el => el.remove());
    const b = document.createElement("div");
    b.className = "wl-banner" + (isError ? " is-error" : "");
    b.textContent = msg;
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 4000);
  }
})();
</script>
</body>
