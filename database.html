<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Database Schema — Central Services</title>
<link rel="icon" type="image/png" href="site-icon.png">
<link rel="apple-touch-icon" href="site-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700;800&family=Roboto+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a1f;
    --bg-soft: #0e1438;
    --bg-soft-2: #161e4d;
    --ink: #e6f1ff;
    --ink-soft: #b8c4e8;
    --muted: #7686b8;
    --border: #28315c;
    --border-soft: #1a2148;
    --accent: #00d4ff;
    --accent-soft: #0c2a3e;
    --accent-ink: #67e8ff;
    --font-display: 'Orbitron', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15.5px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 0.88em; background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); }
  pre { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; overflow-x: auto; }
  pre code { background: none; border: none; padding: 0; font-size: 0.85em; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
    height: 64px;
    display: flex; align-items: center; padding: 0 24px;
  }
  .topbar .brand { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px;
    color: var(--ink); text-decoration: none; transition: color 0.15s ease; }
  .topbar .brand:hover { color: var(--accent); text-decoration: none; }
  .topbar .brand .brand-icon { display: block; width: 36px; height: 36px;
    border-radius: 50%; object-fit: cover; background: #fff;
    border: 1.5px solid rgba(0, 212, 255, 0.55);
    box-shadow: 0 0 12px rgba(0, 212, 255, 0.55), inset 0 0 6px rgba(255,255,255,0.25);
    animation: pulse-dot 3s ease-in-out infinite; }
  .topbar .brand .brand-logo { display: block; height: 38px; width: auto;
    filter: drop-shadow(0 0 6px rgba(122, 224, 122, 0.45)); }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 12px rgba(0, 212, 255, 0.55), inset 0 0 6px rgba(255,255,255,0.25); }
    50%      { box-shadow: 0 0 22px rgba(0, 212, 255, 0.95), inset 0 0 8px rgba(255,255,255,0.4); }
  }
  .topbar nav { margin-left: auto; display: flex; gap: 22px; }
  .topbar nav a { color: var(--ink-soft); font-weight: 500; font-size: 0.92rem; }
  .topbar nav a:hover { color: var(--accent); text-decoration: none; }
  .topbar nav a.active { color: var(--accent-ink); font-weight: 600; }
  @media (prefers-reduced-motion: reduce) { .topbar .brand .brand-icon { animation: none; } }

  /* CONTENT */
  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 60px 32px 120px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800;
    letter-spacing: 0.02em;
    margin: 0 0 12px;
    line-height: 1.1;
    text-transform: uppercase;
    background: linear-gradient(135deg, #67e8ff, #00d4ff 50%, #ff39a8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 56px 0 12px;
    padding-top: 24px;
    border-top: 1px solid var(--border-soft);
    line-height: 1.25;
    scroll-margin-top: 80px;
    color: var(--accent);
  }
  h3 {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin: 32px 0 10px;
    color: var(--ink);
    text-transform: uppercase;
    font-family: var(--font-display);
  }
  p { margin: 0 0 14px; color: var(--ink-soft); }
  p strong, li strong, td strong { color: var(--ink); font-weight: 600; }
  em { color: var(--ink-soft); }
  hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
  blockquote { margin: 14px 0; padding: 10px 16px; border-left: 3px solid var(--accent); background: var(--accent-soft); color: var(--ink); font-style: normal; }

  /* TABLES */
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0 20px;
    font-size: 0.88rem;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border-soft);
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--bg-soft);
    border-bottom: 2px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }
  td code { font-size: 0.82em; }
  td:first-child code { font-weight: 600; color: var(--ink); }

  /* MERMAID */
  .mermaid {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin: 16px 0 24px;
    text-align: center;
    overflow-x: auto;
  }

  /* MARKDOWN LIST */
  ul, ol { margin: 0 0 14px; padding-left: 24px; color: var(--ink-soft); }
  li { margin: 4px 0; }
  li > p { margin: 0; }

  /* TOC */
  .toc {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin: 24px 0 40px;
  }
  .toc h3 {
    margin: 0 0 8px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 700;
  }
  .toc ul { padding-left: 18px; margin: 0; }
  .toc li { font-size: 0.92rem; margin: 3px 0; }

  /* LOADING */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 80px 0;
    font-size: 0.95rem;
  }

  @media (max-width: 700px) {
    main { padding: 32px 18px 80px; }
    h1 { font-size: 1.7rem; }
    h2 { font-size: 1.3rem; }
    table { font-size: 0.8rem; }
    th, td { padding: 6px 8px; }
    .topbar { padding: 0 14px; }
    .topbar nav { gap: 14px; }
    .topbar nav a { font-size: 0.85rem; }
    .topbar .brand { font-size: 0.95rem; }
  }

  /* === Row-count flipboard list === */
  .rc-section {
    max-width: 1100px;
    margin: 64px auto 32px;
    padding: 28px 24px 32px;
    border-top: 1px solid var(--border-soft);
  }
  .rc-section h2 {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 8px;
  }
  .rc-section .lead {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin: 0 0 8px;
  }
  .rc-section .rc-meta {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    margin: 0 0 28px;
  }
  .rc-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 18px;
  }
  .rc-row {
    padding: 16px 18px;
    background: linear-gradient(180deg, var(--bg-soft), var(--bg-soft-2));
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .rc-row:hover {
    border-color: var(--accent);
    box-shadow: 0 0 18px rgba(0, 212, 255, 0.18);
  }
  .rc-label {
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink);
    margin: 0 0 2px;
  }
  .rc-sub {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    margin: 0 0 12px;
    word-break: break-word;
  }
  .rc-flip {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-wrap: wrap;
    margin: 0 0 10px;
  }
  .rc-cell {
    --flip-card: #f4f0e6;
    --flip-card-2: #e8e1d0;
    display: inline-block;
    width: 28px;
    height: 42px;
    background: linear-gradient(180deg,
      var(--flip-card) 0%,
      var(--flip-card) 49.5%,
      #d8d2c0 50%,
      #d8d2c0 50.5%,
      var(--flip-card-2) 51%,
      var(--flip-card-2) 100%);
    border-radius: 4px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.6),
      inset 0 -1px 0 rgba(0, 0, 0, 0.1),
      0 1px 2px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
  }
  .rc-cell::before,
  .rc-cell::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 3px;
    height: 4px;
    background: #4a4438;
    border-radius: 1px;
    transform: translateY(-50%);
    z-index: 2;
  }
  .rc-cell::before { left: 0; }
  .rc-cell::after { right: 0; }
  .rc-cell-digit {
    display: block;
    height: 42px;
    line-height: 42px;
    text-align: center;
    font-family: 'Roboto Mono', ui-monospace, Menlo, monospace;
    font-weight: 800;
    font-size: 1.45rem;
    color: #1a1a1a;
  }
  .rc-sep {
    color: #6b6253;
    font-family: 'Roboto Mono', ui-monospace, Menlo, monospace;
    font-weight: 800;
    font-size: 1.5rem;
    padding: 0 1px;
    align-self: center;
    line-height: 1;
  }
  .rc-updated {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.02em;
  }
  .rc-skipped {
    margin-top: 24px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }
  @media (max-width: 540px) {
    .rc-section { padding: 24px 16px; }
    .rc-cell { width: 22px; height: 34px; }
    .rc-cell-digit { height: 34px; line-height: 34px; font-size: 1.15rem; }
    .rc-sep { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html" aria-label="BOOK — home"><img class="brand-icon" src="site-icon.png" alt=""><img class="brand-logo" src="book-logo.png" alt="BOOK"></a>
  <nav>
    <a href="index.html">← BOOK</a>
    <a href="database.html" class="active">Database schema</a>
    <a href="stats.html">Stats</a>
  </nav>
</div>

<main id="content">
  <p class="loading">Loading schema and rendering diagrams…</p>
</main>

<section class="rc-section" id="row-counts" aria-labelledby="rc-heading">
  <h2 id="rc-heading">Live row counts</h2>
  <p class="lead">How many rows sit in each table on the warehouse — the snapshot Claude pulled from the Fabric mirror.</p>
  <p class="rc-meta" id="rcMeta">Loading…</p>
  <div class="rc-list" id="rcList"></div>
  <p class="rc-skipped" id="rcSkipped"></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  // Configure mermaid
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      darkMode: true,
      background: '#0e1438',
      primaryColor: '#161e4d',
      primaryTextColor: '#e6f1ff',
      primaryBorderColor: '#00d4ff',
      lineColor: '#67e8ff',
      secondaryColor: '#1a2148',
      tertiaryColor: '#28315c',
      fontFamily: 'Inter, system-ui, sans-serif',
      fontSize: '14px'
    },
    flowchart: { curve: 'basis', useMaxWidth: true },
    er: { useMaxWidth: true }
  });

  // Custom marked renderer: turn ```mermaid blocks into <div class="mermaid">
  const renderer = new marked.Renderer();
  const origCode = renderer.code.bind(renderer);
  renderer.code = function (code, lang) {
    if (lang === 'mermaid') {
      return `<div class="mermaid">${code}</div>`;
    }
    return origCode(code, lang);
  };
  // Auto-add IDs to headings for anchor links
  renderer.heading = function (text, level) {
    const slug = text
      .toLowerCase()
      .replace(/<[^>]+>/g, '')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-');
    return `<h${level} id="${slug}">${text}</h${level}>`;
  };

  marked.setOptions({ renderer, gfm: true, breaks: false });

  fetch('database.md')
    .then(r => {
      if (!r.ok) throw new Error('Could not load schema (' + r.status + ')');
      return r.text();
    })
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      // Render Mermaid blocks
      mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<h1>Database schema</h1><p style="color:#b91c1c">Error: ${err.message}</p>` +
        `<p>Open <a href="database.md">database.md</a> directly.</p>`;
    });

  // === Row-count flipboard list ===
  const RC_DATE_OPTS = { year: 'numeric', month: 'short', day: 'numeric' };
  function renderRowCounts(data) {
    const meta = document.getElementById('rcMeta');
    const list = document.getElementById('rcList');
    const skipped = document.getElementById('rcSkipped');
    const items = data.items || [];
    const totalRows = (data.totals && data.totals.rows) || items.reduce((s, i) => s + (i.rows || 0), 0);
    const updatedDate = new Date(data.snapshot_date || data.updated_at || Date.now());
    const updatedLabel = updatedDate.toLocaleDateString('en-GB', RC_DATE_OPTS);

    meta.textContent = `${items.length} tables · ${totalRows.toLocaleString('en-US')} total rows · snapshot ${updatedLabel}`;

    const frag = document.createDocumentFragment();
    for (const item of items) {
      const digits = (item.rows || 0).toLocaleString('en-US');
      const cells = [...digits].map(c =>
        c === ','
          ? `<span class="rc-sep">,</span>`
          : `<span class="rc-cell"><span class="rc-cell-digit">${c}</span></span>`
      ).join('');
      const row = document.createElement('div');
      row.className = 'rc-row';
      row.innerHTML = `
        <div class="rc-label">${item.database}</div>
        <div class="rc-sub">${item.schema}.${item.table}</div>
        <div class="rc-flip" aria-label="${digits} rows">${cells}</div>
        <div class="rc-updated">Last updated ${updatedLabel}</div>
      `;
      frag.appendChild(row);
    }
    list.appendChild(frag);

    if (data.skipped_databases && data.skipped_databases.length) {
      skipped.textContent =
        `Skipped this run (timed out): ${data.skipped_databases.join(', ')}.`;
    }
  }

  fetch('row-counts.json', { cache: 'no-cache' })
    .then(r => { if (!r.ok) throw new Error('row-counts.json HTTP ' + r.status); return r.json(); })
    .then(renderRowCounts)
    .catch(err => {
      const meta = document.getElementById('rcMeta');
      if (meta) meta.textContent = 'Could not load row counts: ' + err.message;
    });
</script>

</body>
</html>
