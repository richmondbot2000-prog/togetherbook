<style>
  /* Quiet Edition palette is wired in via quiet-tokens / quiet-legacy.
     This block adds the page-specific schema viewer + flipboard rules. */
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 96px; }

  a { color: var(--teal-500); text-decoration: underline;
      text-decoration-color: color-mix(in srgb, var(--teal-500) 35%, transparent);
      text-underline-offset: 0.18em; }
  a:hover { color: var(--red-500); text-decoration-color: currentColor; }

  pre { background: var(--paper-200); border: 1px solid var(--paper-300);
        border-radius: var(--radius-xs); padding: 14px 18px; overflow-x: auto; }
  pre code { background: none; border: none; padding: 0;
             font-size: 0.85em; color: var(--ink-900); }

  /* CONTENT */
  main.qb-page { max-width: 920px; padding: 16px 16px 48px; }
  main h1 {
    font: 400 56px/1.05 var(--font-display);
    color: var(--ink-900);
    letter-spacing: -0.018em;
    margin: 8px 0 16px;
    text-wrap: balance;
  }
  main h2 {
    font: 400 32px/1.15 var(--font-display);
    color: var(--ink-900);
    letter-spacing: -0.012em;
    margin: 56px 0 12px;
    padding-top: 24px;
    border-top: 1px solid var(--ink-300);
    scroll-margin-top: 96px;
  }
  main h3 {
    font: italic 400 18px/1.3 var(--font-display);
    color: var(--red-500);
    letter-spacing: 0.005em;
    margin: 28px 0 8px;
  }
  main p { margin: 0 0 14px; color: var(--ink-700); }
  main p strong, main li strong, main td strong { color: var(--ink-900); font-weight: 500; }
  main em { color: var(--ink-800); font-style: italic; }
  hr { border: none; border-top: 1px solid var(--divider); margin: 40px 0; }
  blockquote {
    margin: 14px 0; padding: 10px 16px;
    border-left: 2px solid var(--brass-500);
    background: transparent; color: var(--ink-800); font-style: italic;
  }

  /* TABLES */
  table { border-collapse: collapse; width: 100%; margin: 12px 0 20px; font-size: 14px; }
  th, td {
    padding: 8px 10px; border-bottom: 1px dashed var(--divider);
    text-align: left; vertical-align: top;
  }
  th {
    background: transparent;
    border-bottom: 1px solid var(--ink-300);
    font-family: var(--font-body);
    font-size: 11px; font-weight: 600; color: var(--ink-500);
    text-transform: uppercase; letter-spacing: 0.16em;
    white-space: nowrap;
  }
  td code { font-size: 0.86em; }
  td:first-child code { font-weight: 500; color: var(--ink-900); }

  /* MERMAID — pale paper plate with brass border */
  .mermaid {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    padding: 24px;
    margin: 16px 0 24px;
    text-align: center; overflow-x: auto;
    position: relative;
  }
  .mermaid::before {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid var(--brass-300); opacity: 0.4; pointer-events: none;
  }

  /* MARKDOWN LIST */
  main ul, main ol { margin: 0 0 14px; padding-left: 24px; color: var(--ink-700); }
  main li { margin: 4px 0; }
  main li > p { margin: 0; }

  /* TOC */
  .toc {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    padding: 18px 22px;
    margin: 24px 0 40px;
    position: relative;
  }
  .toc::before {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid var(--brass-300); opacity: 0.4; pointer-events: none;
  }
  .toc h3 {
    margin: 0 0 8px;
    font-family: var(--font-body) !important;
    font-size: 11px !important;
    font-weight: 600 !important;
    color: var(--ink-500) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.18em !important;
    font-style: normal !important;
  }
  .toc ul { padding-left: 18px; margin: 0; }
  .toc li { font-size: 14px; margin: 3px 0; }

  /* LOADING */
  .loading {
    text-align: center; color: var(--ink-500);
    padding: 80px 0; font-size: 15px;
    font-style: italic;
  }

  @media (max-width: 700px) {
    main.qb-page { padding: 2px 0 32px; }
    main h1 { font-size: 36px; }
    main h2 { font-size: 24px; margin: 36px 0 10px; padding-top: 16px; }
    table { font-size: 13px; }
    th, td { padding: 6px 8px; }
  }

  /* === Row-count flipboard list — antique split-flap on cream paper === */
  .rc-section {
    max-width: 1100px;
    margin: 12px auto 24px;
    padding: 12px 32px 24px;
  }
  .rc-section h2 {
    font: italic 400 15px/1 var(--font-display);
    color: var(--red-500);
    letter-spacing: 0.02em;
    margin: 0 0 6px;
    border: none; padding: 0;
    display: flex; align-items: center; gap: 14px;
  }
  .rc-section h2::before {
    content: ""; flex: 0 0 36px; height: 1px; background: var(--brass-300);
  }
  .rc-section .lead {
    color: var(--ink-700); font-size: 14px;
    margin: 0; font-family: var(--font-display);
  }
  .rc-section .rc-meta {
    color: var(--ink-500);
    font: 500 11px/1 var(--font-mono);
    letter-spacing: 0.04em; margin: 6px 0 14px;
  }
  .rc-list { display: flex; flex-direction: column; gap: 18px; }
  .rc-group {
    background: var(--paper-50);
    border: 1px solid var(--paper-300);
    padding: 8px 14px 10px;
    position: relative;
  }
  .rc-group::before {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid var(--brass-300); opacity: 0.35; pointer-events: none;
  }
  .rc-group-h {
    margin: 4px 0 8px; padding: 4px 0 8px;
    border-bottom: 1px solid var(--paper-300);
    font: italic 400 14px/1.2 var(--font-display);
    color: var(--ink-900);
    text-transform: none; letter-spacing: 0.005em;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .rc-group-name { font-weight: 500; }
  .rc-group-meta {
    color: var(--ink-500);
    font: 400 11px/1 var(--font-mono);
    text-transform: none; letter-spacing: 0;
  }
  .rc-group > .rc-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto auto;
    gap: 8px; align-items: center;
    padding: 1px 0;
    border-bottom: 1px dashed var(--divider);
  }
  .rc-group > .rc-row:last-child { border-bottom: none; }
  .rc-group > .rc-row:hover { background: rgba(200, 151, 63, 0.06); }
  /* On wide viewports, two-column the rows inside the group */
  @media (min-width: 880px) {
    .rc-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 22px;
      row-gap: 0;
    }
    .rc-group .rc-group-h { grid-column: 1 / -1; }
  }
  .rc-label {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    color: var(--ink-700);
    margin: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.1;
  }
  .rc-label .rc-db { color: var(--brass-600); font-weight: 600; }
  .rc-flip {
    display: flex;
    gap: 0;
    align-items: center;
    flex-wrap: nowrap;
  }
  .rc-cell {
    --flip-card: #f4f0e6;
    --flip-card-2: #e8e1d0;
    display: inline-block;
    width: 13px;
    height: 20px;
    background: linear-gradient(180deg,
      var(--flip-card) 0%,
      var(--flip-card) 49.5%,
      #cbc5b3 50%,
      #cbc5b3 50.5%,
      var(--flip-card-2) 51%,
      var(--flip-card-2) 100%);
    border-radius: 1.5px;
    box-shadow:
      inset 0 0.5px 0 rgba(255, 255, 255, 0.5),
      inset 0 -0.5px 0 rgba(0, 0, 0, 0.1),
      0 0.5px 1px rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: hidden;
  }
  .rc-cell-digit {
    display: block;
    height: 20px;
    line-height: 20px;
    text-align: center;
    font-family: 'Roboto Mono', ui-monospace, Menlo, monospace;
    font-weight: 800;
    font-size: 0.78rem;
    color: #1a1a1a;
  }
  .rc-sep {
    color: #6b6253;
    font-family: 'Roboto Mono', ui-monospace, Menlo, monospace;
    font-weight: 800;
    font-size: 0.78rem;
    padding: 0 0.5px;
    align-self: center;
    line-height: 1;
  }
  .rc-cols {
    color: var(--ink-600);
    font: 500 10px/1 var(--font-mono);
    white-space: nowrap; width: 4.5em; text-align: right;
  }
  .rc-cols-unit { color: var(--ink-500); font-weight: 400; }
  .rc-updated {
    color: var(--ink-500);
    font: 400 10px/1 var(--font-mono);
    white-space: nowrap; width: 4em; text-align: right;
  }
  .rc-skipped {
    margin-top: 12px; color: var(--ink-500);
    font: 400 11px/1.4 var(--font-mono); font-style: italic;
  }
  @media (max-width: 600px) {
    .rc-section { padding: 6px 10px; }
    .rc-row { grid-template-columns: minmax(0, 1fr) auto auto; }
    .rc-row .rc-updated { display: none; }
    .rc-cell { width: 11px; height: 17px; }
    .rc-cell-digit { height: 17px; line-height: 17px; font-size: 0.66rem; }
    .rc-sep { font-size: 0.66rem; }
    .rc-cols { width: auto; font-size: 0.62rem; }
  }
</style>

<section class="rc-section" id="row-counts" aria-labelledby="rc-heading">
  <h2 id="rc-heading">Live row counts</h2>
  <p class="lead">How many rows sit in each table on the warehouse — the snapshot Claude pulled from the Fabric mirror.</p>
  <p class="rc-meta" id="rcMeta">Loading…</p>
  <div class="rc-list" id="rcList"></div>
  <p class="rc-skipped" id="rcSkipped"></p>
</section>

  <p class="loading">Loading schema and rendering diagrams…</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  // Configure mermaid
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      darkMode: false,
      background: '#FDFBF4',
      primaryColor: '#FBF6E9',
      primaryTextColor: '#11192E',
      primaryBorderColor: '#C8973F',
      lineColor: '#A47829',
      secondaryColor: '#F5ECD4',
      tertiaryColor: '#ECDFB6',
      fontFamily: '"Newsreader", "Iowan Old Style", Georgia, serif',
      fontSize: '14px'
    },
    flowchart: { curve: 'basis', useMaxWidth: true },
    er: { useMaxWidth: true }
  });

  // Custom marked renderer: turn ```mermaid blocks into <div class="mermaid">
  const renderer = new marked.Renderer();
  const origCode = renderer.code.bind(renderer);
  renderer.code = function (code, lang) {
    if (lang === 'mermaid') {
      return `<div class="mermaid">${code}</div>`;
    }
    return origCode(code, lang);
  };
  // Auto-add IDs to headings for anchor links
  renderer.heading = function (text, level) {
    const slug = text
      .toLowerCase()
      .replace(/<[^>]+>/g, '')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-');
    return `<h${level} id="${slug}">${text}</h${level}>`;
  };

  marked.setOptions({ renderer, gfm: true, breaks: false });

  fetch('database.md')
    .then(r => {
      if (!r.ok) throw new Error('Could not load schema (' + r.status + ')');
      return r.text();
    })
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      // Render Mermaid blocks
      mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<h1>Database schema</h1><p style="color:#b91c1c">Error: ${err.message}</p>` +
        `<p>Open <a href="database.md">database.md</a> directly.</p>`;
    });

  // === Row-count flipboard list ===
  const RC_DATE_OPTS = { year: 'numeric', month: 'short', day: 'numeric' };
  function renderRowCounts(data) {
    const meta = document.getElementById('rcMeta');
    const list = document.getElementById('rcList');
    const skipped = document.getElementById('rcSkipped');
    const items = data.items || [];
    const totalRows = (data.totals && data.totals.rows) || items.reduce((s, i) => s + (i.rows || 0), 0);
    const updatedDate = new Date(data.snapshot_date || data.updated_at || Date.now());
    const updatedLabel = updatedDate.toLocaleDateString('en-GB', RC_DATE_OPTS);

    meta.textContent = `${items.length} tables · ${totalRows.toLocaleString('en-US')} total rows · snapshot ${updatedLabel}`;

    const updatedShort = updatedDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    // Group by database.schema; sort groups by total rows; sort items within
    // each group by rows desc.
    const groups = new Map();
    for (const item of items) {
      const key = `${item.database}.${item.schema}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(item);
    }
    const sortedGroups = [...groups.entries()]
      .map(([key, list]) => ({
        key,
        list: list.slice().sort((a, b) => (b.rows || 0) - (a.rows || 0)),
        rows: list.reduce((s, i) => s + (i.rows || 0), 0),
        tables: list.length,
      }))
      .sort((a, b) => b.rows - a.rows);

    const renderRowMarkup = (item) => {
      const digits = (item.rows || 0).toLocaleString('en-US');
      const cells = [...digits].map(c =>
        c === ','
          ? `<span class="rc-sep">,</span>`
          : `<span class="rc-cell"><span class="rc-cell-digit">${c}</span></span>`
      ).join('');
      const colsLabel = item.columns != null
        ? `<span class="rc-cols">${item.columns}<span class="rc-cols-unit"> cols</span></span>`
        : '';
      return `
        <div class="rc-row">
          <div class="rc-label" title="${item.schema}.${item.table}">
            ${item.schema}.${item.table}
          </div>
          <div class="rc-flip" aria-label="${digits} rows">${cells}</div>
          ${colsLabel}
          <div class="rc-updated">${updatedShort}</div>
        </div>
      `;
    };

    const frag = document.createDocumentFragment();
    for (const g of sortedGroups) {
      const section = document.createElement('div');
      section.className = 'rc-group';
      section.innerHTML = `
        <h3 class="rc-group-h">
          <span class="rc-group-name">${g.key}</span>
          <span class="rc-group-meta">${g.tables} tables · ${g.rows.toLocaleString('en-US')} rows</span>
        </h3>
        ${g.list.map(renderRowMarkup).join('')}
      `;
      frag.appendChild(section);
    }
    list.appendChild(frag);

    if (data.skipped_databases && data.skipped_databases.length) {
      skipped.textContent =
        `Skipped this run (timed out): ${data.skipped_databases.join(', ')}.`;
    }
  }

  fetch('row-counts.json', { cache: 'no-cache' })
    .then(r => { if (!r.ok) throw new Error('row-counts.json HTTP ' + r.status); return r.json(); })
    .then(renderRowCounts)
    .catch(err => {
      const meta = document.getElementById('rcMeta');
      if (meta) meta.textContent = 'Could not load row counts: ' + err.message;
    });
</script>
