<style>
  body { background: var(--paper-100, #FBF6E9); }
  .pp-page { max-width: 1280px; margin: 0 auto; padding: 16px 12px 64px; }

  .pp-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .pp-title { font: 600 22px/1.2 var(--font-display, 'Newsreader', serif); color: var(--ink-900); margin: 0; }
  .pp-sub { font: 400 13px/1.4 var(--font-body); color: var(--ink-600); margin: 2px 0 0; max-width: 720px; }
  .pp-tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pp-search {
    font: 400 14px/1 var(--font-body);
    background: var(--paper-50); color: var(--ink-900);
    border: 1px solid var(--ink-300); padding: 8px 12px; min-width: 220px;
  }
  .pp-search:focus { outline: 0; border-color: var(--brass-500); }
  .pp-filter {
    font: 500 12px/1 var(--font-body); color: var(--ink-700);
    background: var(--paper-50); border: 1px solid var(--ink-300);
    padding: 8px 10px;
  }
  .pp-btn {
    font: 600 13px/1 var(--font-body);
    background: var(--brass-500); color: var(--paper-50);
    border: 1px solid var(--brass-500);
    padding: 9px 14px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pp-btn:hover { background: var(--brass-600); border-color: var(--brass-600); }
  .pp-btn--ghost { background: var(--paper-50); color: var(--ink-800); border-color: var(--ink-300); }
  .pp-btn--ghost:hover { background: var(--paper-50); border-color: var(--brass-500); color: var(--ink-900); }
  .pp-btn--danger { background: var(--paper-50); color: var(--red-600, #b3261e); border-color: var(--red-200, #f3c8c4); }
  .pp-btn--danger:hover { background: var(--red-50, #fcf0ee); border-color: var(--red-500); }

  .pp-stats { display: flex; gap: 14px; font: 500 12px/1.3 var(--font-body); color: var(--ink-600); margin-bottom: 10px; }
  .pp-stat strong { color: var(--ink-900); font-weight: 700; }

  .pp-table {
    background: var(--paper-50, white);
    border: 1px solid var(--ink-300);
    overflow: hidden;
  }
  .pp-thead, .pp-row {
    display: grid;
    grid-template-columns: 44px minmax(180px, 1.4fr) minmax(180px, 1.5fr) 130px 110px 100px 90px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
  }
  .pp-src-chips { display: inline-flex; gap: 3px; }
  .pp-src-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 4px;
    font: 700 10px/1 var(--font-body);
    color: var(--ink-400, #999);
    background: var(--paper-100);
    border: 1px solid var(--paper-300);
    cursor: help;
  }
  .pp-src-chip.is-on {
    color: #1a7f37; background: #eefaf0; border-color: #b8e3c4;
  }
  .pp-src-chip--old {
    color: var(--red-600, #b3261e); background: #fcf0ee; border-color: var(--red-200, #f3c8c4);
  }
  .pp-orphans {
    margin-top: 24px;
    background: var(--paper-50);
    border: 1px solid var(--ink-300);
  }
  .pp-orphans-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--paper-300);
    font: 600 14px/1.2 var(--font-body); color: var(--ink-900);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .pp-orphan-section { padding: 10px 16px; border-bottom: 1px solid var(--paper-300); }
  .pp-orphan-section:last-child { border-bottom: 0; }
  .pp-orphan-section h3 {
    font: 700 10px/1 var(--font-body); letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-500); margin: 0 0 8px;
  }
  .pp-orphan-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; padding: 6px 0;
    border-bottom: 1px dashed var(--paper-300);
    font: 500 12px/1.4 var(--font-body);
  }
  .pp-orphan-row:last-child { border-bottom: 0; }
  .pp-orphan-row .meta { color: var(--ink-700); overflow-wrap: anywhere; }
  .pp-orphan-row .meta code { font: 500 11px/1.3 var(--font-mono); color: var(--ink-500); }
  .pp-orphan-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .pp-orphan-actions select, .pp-orphan-actions button {
    font: 500 11px/1 var(--font-body);
    padding: 6px 8px;
    background: var(--paper-50); color: var(--ink-800);
    border: 1px solid var(--ink-300);
    cursor: pointer;
  }
  .pp-orphan-actions button.primary { background: var(--brass-500); color: var(--paper-50); border-color: var(--brass-500); }
  .pp-orphan-actions button.primary:hover { background: var(--brass-600); border-color: var(--brass-600); }
  .pp-orphan-empty { color: var(--ink-500); font: italic 400 12px/1.4 var(--font-body); }
  .pp-thead {
    background: var(--paper-100);
    border-bottom: 1px solid var(--ink-300);
    font: 600 10px/1 var(--font-body); letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-500);
    position: sticky; top: 0; z-index: 1;
  }
  .pp-thead button { background: none; border: 0; padding: 0; color: inherit; font: inherit; cursor: pointer; text-align: left; }
  .pp-thead button:hover { color: var(--ink-800); }
  .pp-row { border-bottom: 1px solid var(--paper-300); cursor: pointer; transition: background-color 120ms ease; }
  .pp-row:hover { background: var(--paper-100); }
  .pp-row.is-expanded { background: var(--paper-100); }
  .pp-row:last-child { border-bottom: 0; }

  .pp-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--paper-200);
    display: flex; align-items: center; justify-content: center;
    font: 600 13px/1 var(--font-body); color: var(--ink-700);
    overflow: hidden;
  }
  .pp-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .pp-name { font: 600 14px/1.3 var(--font-body); color: var(--ink-900); overflow-wrap: anywhere; }
  .pp-role { font: 400 12px/1.3 var(--font-body); color: var(--ink-500); margin-top: 2px; }
  .pp-emails { font: 500 12px/1.4 var(--font-mono, 'JetBrains Mono', monospace); color: var(--ink-700); overflow-wrap: anywhere; }
  .pp-emails .alt { color: var(--ink-500); font-size: 11px; }

  .pp-pill {
    display: inline-flex; align-items: center;
    padding: 3px 8px; border-radius: 999px;
    font: 600 10px/1 var(--font-body); letter-spacing: 0.04em; text-transform: uppercase;
    border: 1px solid var(--ink-300); background: var(--paper-50); color: var(--ink-700);
  }
  .pp-pill--admin { color: #835F1F; border-color: var(--brass-500); background: #fbf3e1; }
  .pp-pill--staff { color: #2c6cb8; border-color: #b9d1f5; background: #eef4fc; }
  .pp-pill--agent { color: #2a8a5f; border-color: #b9e6cf; background: #ecf8f1; }
  .pp-pill--outsider { color: #87705a; border-color: #e2d3b9; background: #faf3e3; }
  .pp-pill--former { color: #888; border-color: #ddd; background: #f3f3f3; }
  .pp-pill--live { color: #1a7f37; border-color: #b8e3c4; background: #eefaf0; }
  .pp-pill--suspended { color: #888; border-color: #ddd; background: #f3f3f3; }

  /* Expanded row panel */
  .pp-detail {
    grid-column: 1 / -1;
    background: var(--paper-50);
    padding: 18px 22px 22px;
    border-top: 1px solid var(--paper-300);
    display: grid; grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr); gap: 24px;
  }
  @media (max-width: 920px) { .pp-detail { grid-template-columns: 1fr; padding: 14px 14px 18px; } }
  .pp-detail h3 {
    font: 700 11px/1 var(--font-body); letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-500); margin: 0 0 10px;
  }
  .pp-detail-section { display: flex; flex-direction: column; gap: 8px; }
  .pp-fieldrow {
    display: grid; grid-template-columns: 130px 1fr;
    gap: 10px; align-items: center;
    padding: 4px 0;
  }
  .pp-fieldlabel { font: 500 12px/1.2 var(--font-body); color: var(--ink-600); }
  .pp-input, .pp-select, .pp-textarea {
    width: 100%; box-sizing: border-box;
    font: 400 13px/1.4 var(--font-body); color: var(--ink-900);
    background: var(--paper-50);
    border: 1px solid var(--ink-300);
    padding: 6px 9px;
  }
  .pp-input:focus, .pp-select:focus, .pp-textarea:focus { outline: 0; border-color: var(--brass-500); }
  .pp-textarea { resize: vertical; min-height: 60px; font-family: var(--font-body); }

  .pp-account {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 8px 10px;
    border: 1px solid var(--ink-300);
    background: var(--paper-50);
    font: 500 12px/1.3 var(--font-mono);
  }
  .pp-account .meta { color: var(--ink-700); overflow-wrap: anywhere; }
  .pp-account .badge { font: 600 10px/1 var(--font-body); color: var(--ink-500); margin-left: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .pp-account .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .pp-account a, .pp-account button {
    font: 600 11px/1 var(--font-body);
    padding: 5px 8px;
    background: var(--paper-50); color: var(--ink-800);
    border: 1px solid var(--ink-300);
    text-decoration: none; cursor: pointer;
  }
  .pp-account a:hover, .pp-account button:hover { border-color: var(--brass-500); }
  .pp-account button.danger { color: var(--red-600); border-color: var(--red-200); }
  .pp-account button.danger:hover { border-color: var(--red-500); background: var(--red-50, #fcf0ee); }

  .pp-detail-actions {
    grid-column: 1 / -1;
    display: flex; gap: 10px; align-items: center; justify-content: flex-end;
    margin-top: 8px;
  }
  .pp-status { font: 500 12px/1 var(--font-body); color: var(--ink-500); }
  .pp-status.ok  { color: #1a7f37; }
  .pp-status.err { color: var(--red-500); }

  .pp-empty {
    padding: 60px 20px; text-align: center; color: var(--ink-500);
    font: italic 400 14px/1.4 var(--font-body);
  }
  .pp-banner {
    background: #fbf3e1; border: 1px solid var(--brass-500); padding: 10px 14px;
    font: 500 13px/1.4 var(--font-body); color: var(--ink-800); margin-bottom: 12px;
  }
  .pp-banner.warn { background: #fcf0ee; border-color: var(--red-500); color: var(--red-600); }

  /* Create modal */
  .pp-modal-bg {
    position: fixed; inset: 0; background: rgba(20, 20, 30, 0.4);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .pp-modal-bg.open { display: flex; }
  .pp-modal {
    background: var(--paper-50); border: 1px solid var(--ink-300);
    width: min(440px, 92vw);
    padding: 20px 22px;
  }
  .pp-modal h2 { font: 700 16px/1 var(--font-display); color: var(--ink-900); margin: 0 0 12px; }
</style>

<main class="pp-page">
  <div class="pp-head">
    <div>
      <h1 class="pp-title">People</h1>
      <p class="pp-sub">Canonical Person table. Every other system on TogetherBook should resolve identity through this list — each row links a real human to one or more Google accounts, an optional Auth0 ID, and their access level.</p>
    </div>
    <div class="pp-tools">
      <input class="pp-search" id="ppSearch" placeholder="Search name, email, role…" autocomplete="off">
      <select class="pp-filter" id="ppAccess">
        <option value="">All access levels</option>
        <option value="admin">Admin</option>
        <option value="staff">Standard user</option>
        <option value="agent">Agent</option>
        <option value="outsider">Outsider</option>
        <option value="former">Former</option>
      </select>
      <select class="pp-filter" id="ppStatus">
        <option value="">All statuses</option>
        <option value="live">Live</option>
        <option value="suspended">Suspended</option>
      </select>
      <a class="pp-btn pp-btn--ghost" id="ppReconcile" href="/reconcile.html" title="Open the Reconcile page to see records in Payroll / Google / Warehouse that aren't yet linked to a Person">Reconcile sources <span id="ppReconcileCount"></span></a>
      <button class="pp-btn pp-btn--ghost" id="ppSync" title="Re-derive admins.json from people.json and push the allow-list to Cloudflare Access">Sync access</button>
      <button class="pp-btn" id="ppAdd">+ Add person</button>

  <div class="pp-stats" id="ppStats"></div>
  <div id="ppGate"></div>

<div class="pp-modal-bg" id="ppModalBg">
  <div class="pp-modal" id="ppModal">
    <h2>Add a new person</h2>
    <div class="pp-fieldrow"><label class="pp-fieldlabel">Display name</label><input class="pp-input" id="newName" placeholder="Jane Smith"></div>
    <div class="pp-fieldrow"><label class="pp-fieldlabel">Main Google email</label><input class="pp-input" id="newEmail" placeholder="jane.smith@letme.co.uk" type="email"></div>
    <div class="pp-fieldrow"><label class="pp-fieldlabel">Access level</label>
      <select class="pp-select" id="newAccess">
        <option value="staff">Standard user</option>
        <option value="admin">Admin</option>
        <option value="agent">Agent</option>
        <option value="outsider">Outsider</option>
      </select>
    </div>
    <p class="pp-status" id="newStatus" style="margin: 12px 0 0;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">

      <button class="pp-btn" id="newCreate">Create person</button>
    </div>

<script>
  const WORKSPACE_API = "/api/workspace";

  let people = [];
  let staffByEmail = {};
  let payrollData = null;        // { by_email:{}, by_name:{}, updated_at }
  let activity = null;           // { active_users:[], external_users:[] }
  let isAdmin = false;
  let viewerEmail = "";
  let sortBy = "name", sortDir = 1;
  let expandedId = null;

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function emailToSlug(e) { return ((e||"").split("@")[0]||"").toLowerCase(); }
  function initials(name) {
    return (name||"").split(/\s+/).filter(Boolean).map(p=>p.charAt(0).toUpperCase()).slice(0,2).join("") || "?";
  }
  function dirPhotoKey(email) { return (email||"").toString().trim().toLowerCase().replace(/@/g,"_at_"); }
  function avatarHtml(p) {
    let src = "";
    if (p.directory_photo_uploaded_at && p.main_google_email) {
      src = `/assets/photos/${dirPhotoKey(p.main_google_email)}.jpg?v=${encodeURIComponent(p.directory_photo_uploaded_at)}`;
    } else {
      const u = staffByEmail[(p.main_google_email||"").toLowerCase()];
      if (u && u.photo_url) src = u.photo_url;
    }
    if (src) return `<img src="${escapeHtml(src)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${escapeHtml(initials(p.name))}'}))">`;
    return escapeHtml(initials(p.name));
  }
  function pillClass(level) { return level && /^(admin|staff|agent|outsider|former)$/.test(level) ? `pp-pill--${level}` : "pp-pill--staff"; }
  function statusOf(p) {
    if (p.suspended || p.access_level === "former") return "suspended";
    return "live";
  }
  function statusLabel(p) { return statusOf(p) === "live" ? "Live" : "Suspended"; }

  /* ─── Source matching (payroll / google letme / google together /
     warehouse) — computed per Person at render time, no schema change. ─ */
  function emailsOf(p) {
    return [p.main_google_email, ...(p.alt_google_emails||[]), p.external_google_email]
      .filter(Boolean).map(e => e.toLowerCase());
  }
  function nameKeys(p) {
    const out = new Set();
    const strip = s => (s || "").toLowerCase().replace(/['’.\-]/g, "").trim();
    const add = s => { const t = (s || "").trim(); if (!t) return; out.add(t.toLowerCase()); out.add(strip(t)); };
    if (p.given && p.family) add(`${p.given} ${p.family}`);
    if (p.name) {
      const parts = p.name.trim().split(/\s+/);
      if (parts.length >= 2) add(`${parts[0]} ${parts[parts.length - 1]}`);
      add(p.name);
    }
    return out;
  }
  function payrollMatch(p) {
    if (!payrollData) return null;
    const emails = emailsOf(p);
    for (const e of emails) {
      const lst = (payrollData.by_email || {})[e];
      if (lst && lst.length) return lst[0];
    }
    if (payrollData.by_name) {
      for (const k of nameKeys(p)) {
        const lst = payrollData.by_name[k];
        if (lst && lst.length) return lst[0];
      }
    }
    return null;
  }
  function googleLetmeAccounts(p) {
    // Any Workspace account on the letme tenants.
    return emailsOf(p).filter(e => {
      const d = e.split("@")[1] || "";
      return d === "letme.co.uk" || d === "letme.com";
    }).map(e => ({ email: e, raw: staffByEmail[e] || null }));
  }
  function googleTogetherAccounts(p) {
    return emailsOf(p).filter(e => (e.split("@")[1] || "") === "togetherloans.com")
      .map(e => ({ email: e, raw: staffByEmail[e] || null }));
  }
  function warehouseMatch(p) {
    if (!activity) return null;
    const emails = emailsOf(p);
    for (const a of (activity.active_users || [])) {
      if (emails.includes((a.email || "").toLowerCase())) return a;
    }
    // External users (CRM-only): match by stripped name vs username's
    // leading "first.last" portion.
    const names = nameKeys(p);
    for (const e of (activity.external_users || [])) {
      const uname = (e.username || "").toLowerCase().split("@")[0];
      // Try matching "first.last" or "first last" forms.
      const candidates = new Set([uname, uname.replace(/\./g, " ")]);
      for (const c of candidates) if (names.has(c)) return e;
    }
    return null;
  }
  function sourceMatches(p) {
    const letme    = googleLetmeAccounts(p);
    const together = googleTogetherAccounts(p);
    const payroll  = payrollMatch(p);
    const wh       = warehouseMatch(p);
    return {
      payroll:  payroll ? { label: payroll.first_name + " " + payroll.last_name, raw: payroll } : null,
      letme:    letme.length    ? { count: letme.length, items: letme } : null,
      together: together.length ? { count: together.length, items: together } : null,
      warehouse: wh ? { label: wh.email || wh.username, raw: wh } : null,
    };
  }
  function hasDeletedAccount(p) {
    return emailsOf(p).some(e => {
      const u = staffByEmail[e];
      return u && (u.deletion_time || u.suspended);
    });
  }

  function sourceChip(letter, present, title) {
    return `<span class="pp-src-chip${present ? " is-on" : ""}" title="${escapeHtml(title)}">${letter}</span>`;
  }
  function sourceChipsHtml(p) {
    const m = sourceMatches(p);
    return `
      ${sourceChip("P", !!m.payroll,  m.payroll  ? `Payroll: ${m.payroll.label}`  : "No payroll record matched")}
      ${sourceChip("L", !!m.letme,    m.letme    ? `Google Letme: ${m.letme.items.map(x=>x.email).join(", ")}` : "No Letme Google account")}
      ${sourceChip("T", !!m.together, m.together ? `Google Together: ${m.together.items.map(x=>x.email).join(", ")}` : "No Together Google account")}
      ${sourceChip("W", !!m.warehouse, m.warehouse ? `Warehouse: ${m.warehouse.label}` : "No warehouse activity matched")}
      ${hasDeletedAccount(p) ? `<span class="pp-src-chip pp-src-chip--old" title="One or more of this person's Google accounts is suspended or deleted">!</span>` : ""}`;
  }

  function renderStats() {
    const total = people.length;
    const live  = people.filter(p => statusOf(p) === "live").length;
    const admin = people.filter(p => p.access_level === "admin").length;
    const multi = people.filter(p => (p.alt_google_emails||[]).length).length;
    const ext   = people.filter(p => p.external_google_email).length;
    document.getElementById("ppStats").innerHTML = `
      <span class="pp-stat"><strong>${total}</strong> people</span>
      <span class="pp-stat"><strong>${live}</strong> live</span>
      <span class="pp-stat"><strong>${admin}</strong> admins</span>
      <span class="pp-stat"><strong>${multi}</strong> with alt Google accounts</span>
      <span class="pp-stat"><strong>${ext}</strong> with external Google access</span>`;
  }

  function getVisible() {
    const q = (document.getElementById("ppSearch").value || "").toLowerCase().trim();
    const af = document.getElementById("ppAccess").value;
    const sf = document.getElementById("ppStatus").value;
    let rows = people.slice();
    if (af) rows = rows.filter(p => p.access_level === af);
    if (sf) rows = rows.filter(p => statusOf(p) === sf);
    if (q)  rows = rows.filter(p => {
      const hay = [p.name, p.role, p.main_google_email, ...(p.alt_google_emails||[]), p.external_google_email, p.title, p.department].join(" ").toLowerCase();
      return hay.includes(q);
    });
    rows.sort((a, b) => {
      const av = (a[sortBy]||"").toString().toLowerCase();
      const bv = (b[sortBy]||"").toString().toLowerCase();
      if (av < bv) return -1 * sortDir;
      if (av > bv) return  1 * sortDir;
      return 0;
    });
    return rows;
  }

  function render() {
    renderStats();
    const rows = getVisible();
    const html = `
      <div class="pp-thead">

        <div><button data-sort="main_google_email">Google accounts</button></div>

        <div><button data-sort="access_level">Access</button></div>
        <div>Status</div>
        <div></div>
      </div>
      ${rows.length ? rows.map(rowHtml).join("") : '<div class="pp-empty">No people match the current filters.</div>'}`;
    document.getElementById("ppTable").innerHTML = html;
    renderReconcileBadge();
    wireRows();

  // Count unmatched source records (no full render — that lives on /reconcile.html).
  function renderReconcileBadge() {
    const el = document.getElementById("ppReconcileCount");
    if (!el) return;
    const o = findOrphans();
    const n = o.payroll.length + o.letme.length + o.together.length + o.warehouse.length;
    el.textContent = n ? `· ${n} unmatched` : "· clean ✓";
    el.style.color = n ? "var(--red-600, #b3261e)" : "#1a7f37";
    el.style.fontWeight = "600";
  }

  /* ─── Orphan accounts (records in a source with no Person link) ─── */
  function findOrphans() {
    const personEmails = new Set();
    const personNames = new Set();
    for (const p of people) {
      for (const e of emailsOf(p)) personEmails.add(e);
      for (const n of nameKeys(p)) personNames.add(n);
    }
    const orphans = { payroll: [], letme: [], together: [], warehouse: [] };

    // Payroll: rows where neither email nor name match a Person.
    if (payrollData) {
      const seen = new Set();
      const consider = (rec) => {
        const id = `${rec.employer || ""}|${rec.employee_number || ""}|${(rec.first_name || "").toLowerCase()}|${(rec.last_name || "").toLowerCase()}`;
        if (seen.has(id)) return;
        seen.add(id);
        const email = (rec.email || "").toLowerCase();
        if (email && personEmails.has(email)) return;
        const full  = `${rec.first_name || ""} ${rec.last_name || ""}`.trim().toLowerCase();
        const strip = full.replace(/['’.\-]/g, "").trim();
        if (full && (personNames.has(full) || personNames.has(strip))) return;
        orphans.payroll.push(rec);
      };
      for (const lst of Object.values(payrollData.by_email || {})) for (const r of lst) consider(r);
      for (const lst of Object.values(payrollData.by_name  || {})) for (const r of lst) consider(r);
    }

    // Google accounts: any staff.json user whose email isn't on a Person.
    for (const e of Object.keys(staffByEmail)) {
      if (personEmails.has(e)) continue;
      const u = staffByEmail[e];
      if (u.suspended || u.deletion_time) continue; // skip already-old
      const dom = e.split("@")[1] || "";
      if (dom === "letme.co.uk" || dom === "letme.com")  orphans.letme.push(u);
      else if (dom === "togetherloans.com")              orphans.together.push(u);
    }

    // Warehouse: external_users (CRM-only) where username doesn't match a
    // Person by name.
    if (activity) {
      for (const e of (activity.external_users || [])) {
        const uname = (e.username || "").toLowerCase().split("@")[0];
        const cand = [uname, uname.replace(/\./g, " ")];
        if (cand.some(c => personNames.has(c))) continue;
        orphans.warehouse.push(e);
      }
      // Also active_users whose email isn't on any Person yet (but exists
      // in Workspace — typically these will already appear under letme/
      // together above, but include for safety).
      for (const a of (activity.active_users || [])) {
        const em = (a.email || "").toLowerCase();
        if (!em || personEmails.has(em)) continue;
        if (!staffByEmail[em]) orphans.warehouse.push(a);
      }
    }
    return orphans;
  }

  function wireRows() {
    document.querySelectorAll(".pp-row[data-id]").forEach(row => {
      row.addEventListener("click", e => {
        // Don't toggle if click was on a button/input inside the detail.
        if (e.target.closest("input,select,textarea,button,a")) return;
        expandedId = String(expandedId) === String(row.dataset.id) ? null : row.dataset.id;
        render();
      });
    });
    document.querySelectorAll(".pp-thead [data-sort]").forEach(b => {
      b.addEventListener("click", () => {
        if (sortBy === b.dataset.sort) sortDir *= -1;
        else { sortBy = b.dataset.sort; sortDir = 1; }
        render();
      });
    });
    document.querySelectorAll("[data-edit]").forEach(inp => {
      const commit = () => savePersonField(inp.dataset.pid, inp.dataset.edit, inp.value);
      inp.addEventListener("blur",   commit);
      inp.addEventListener("change", commit);
    });
    document.querySelectorAll("[data-addalt]").forEach(btn => {
      btn.addEventListener("click", () => {
        const pid = btn.dataset.addalt;
        const input = document.getElementById("addAlt_" + pid);
        const val = (input.value || "").trim().toLowerCase();
        if (!val || !val.includes("@")) { setStatus(pid, "Enter a valid email", true); return; }
        const p = people.find(x => String(x.id) === String(pid));
        const next = Array.from(new Set([...(p.alt_google_emails||[]), val])).filter(e => e !== p.main_google_email);
        savePersonField(pid, "alt_google_emails", next, true);
      });
    });
    document.querySelectorAll("[data-promote]").forEach(btn => {
      btn.addEventListener("click", () => promoteEmail(btn.dataset.pid, btn.dataset.promote));
    });
    document.querySelectorAll("[data-unlink]").forEach(btn => {
      btn.addEventListener("click", () => unlinkEmail(btn.dataset.pid, btn.dataset.unlink));
    });
    document.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", () => deletePerson(btn.dataset.delete));
    });
    document.querySelectorAll("[data-suspend]").forEach(btn => {
      btn.addEventListener("click", () => toggleSuspend(btn.dataset.suspend));
    });
  }

  async function toggleSuspend(pid) {
    const p = people.find(x => String(x.id) === String(pid)); if (!p) return;
    const goingDown = statusOf(p) === "live";
    const verb = goingDown ? "Suspend" : "Reactivate";
    if (!confirm(`${verb} ${p.name}?\n\n${goingDown
      ? "Their Person record will be marked Suspended. Sign-in via Google still works until you also suspend the Google account itself (use the Manage button next to each Google email)."
      : "Their Person record will be marked Live again. If their Google account was also suspended, you'll need to Unsuspend it from Directory."}`)) return;
    const patch = goingDown
      ? { suspended: true,  access_level: "former" }
      : { suspended: false, access_level: p.access_level === "former" ? "staff" : p.access_level };
    try {
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "people-set", id: pid, ...patch }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      Object.assign(p, out.person);
      render();
    } catch (err) { setStatus(pid, "Failed — " + err.message, true); }
  }

  function setStatus(pid, msg, isErr) {
    const el = document.querySelector(`[data-status-for="${pid}"]`);
    if (!el) return;
    el.textContent = msg;
    el.className = "pp-status " + (isErr ? "err" : "ok");
  }

  async function savePersonField(pid, field, value, isArray) {
    const p = people.find(x => String(x.id) === String(pid)); if (!p) return;
    let payload = { action: "people-set", id: pid };
    if (field === "aliases" && !Array.isArray(value)) {
      payload[field] = value.split(",").map(s => s.trim()).filter(Boolean);
    } else {
      payload[field] = value;
    }
    setStatus(pid, "Saving…");
    try {
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      Object.assign(p, out.person);
      setStatus(pid, "Saved");
      if (isArray) render();
    } catch (err) {
      setStatus(pid, "Failed — " + err.message, true);
    }
  }

  async function promoteEmail(pid, email) {
    const p = people.find(x => String(x.id) === String(pid)); if (!p) return;
    if (!confirm(`Make ${email} the main Google account for ${p.name}?\n\nThis is the account that gives them access. The old main (${p.main_google_email}) becomes an alt.`)) return;
    const newAlts = [...(p.alt_google_emails||[]).filter(e => e !== email)];
    if (p.main_google_email && p.main_google_email !== email) newAlts.push(p.main_google_email);
    try {
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "people-set", id: pid, main_google_email: email, alt_google_emails: newAlts }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      Object.assign(p, out.person);
      render();
    } catch (err) { setStatus(pid, "Failed — " + err.message, true); }
  }

  async function unlinkEmail(pid, email) {
    const p = people.find(x => String(x.id) === String(pid)); if (!p) return;
    if (!confirm(`Remove ${email} from ${p.name}'s person record?\n\nThis does not touch the Google account itself — use Directory > Manage to suspend/delete that.`)) return;
    const newAlts = (p.alt_google_emails||[]).filter(e => e !== email);
    savePersonField(pid, "alt_google_emails", newAlts, true);
  }

  async function deletePerson(pid) {
    const p = people.find(x => String(x.id) === String(pid)); if (!p) return;
    if (!confirm(`Delete the Person record for ${p.name}?\n\nThis does NOT delete any Google account — those stay in Workspace and can still be managed in Directory. This only removes the row from the People table.`)) return;
    try {
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "people-delete", id: pid }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      people = people.filter(x => x.id !== pid);
      expandedId = null;
      render();
    } catch (err) { alert("Failed: " + err.message); }
  }

  /* ─── Create modal ───────────────────────────────────────────────── */
  function openCreate() {
    document.getElementById("newName").value = "";
    document.getElementById("newEmail").value = "";
    document.getElementById("newAccess").value = "staff";
    document.getElementById("newStatus").textContent = "";
    document.getElementById("ppModalBg").classList.add("open");
    setTimeout(() => document.getElementById("newName").focus(), 50);
  }
  function closeCreate() { document.getElementById("ppModalBg").classList.remove("open"); }
  async function createPerson() {
    const name  = (document.getElementById("newName").value || "").trim();
    const email = (document.getElementById("newEmail").value || "").trim().toLowerCase();
    const acc   = document.getElementById("newAccess").value;
    if (!name || !email.includes("@")) {
      document.getElementById("newStatus").textContent = "Both name and main Google email are required.";
      document.getElementById("newStatus").className = "pp-status err";
      return;
    }
    const url_slug = email.split("@")[0];
    document.getElementById("newStatus").textContent = "Creating…";
    document.getElementById("newStatus").className = "pp-status";
    try {
      // No id passed — worker auto-assigns the next integer.
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "people-set", url_slug, name, main_google_email: email, access_level: acc, company: email.split("@")[1] || "" }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      people.push(out.person);
      closeCreate();
      expandedId = out.person.id;
      render();
    } catch (err) {
      document.getElementById("newStatus").textContent = "Failed — " + err.message;
      document.getElementById("newStatus").className = "pp-status err";
    }
  }
  document.getElementById("ppAdd").addEventListener("click", openCreate);
  document.getElementById("ppSync").addEventListener("click", async () => {
    const btn = document.getElementById("ppSync");
    const orig = btn.textContent;
    btn.textContent = "Syncing…"; btn.disabled = true;
    try {
      const res = await fetch(WORKSPACE_API, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "people-sync-access" }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
      alert(`Synced.\n\nadmins.json: ${out.admin_sync && out.admin_sync.admins ? out.admin_sync.admins.length : 0} admin email(s).\nCloudflare Access include rules: ${out.access_sync && out.access_sync.include_count ? out.access_sync.include_count : "(unchanged)"}.`);
    } catch (err) {
      alert("Sync failed: " + err.message);
    } finally {
      btn.textContent = orig; btn.disabled = false;
    }
  });
  document.getElementById("newCancel").addEventListener("click", closeCreate);
  document.getElementById("newCreate").addEventListener("click", createPerson);
  document.getElementById("ppModalBg").addEventListener("click", e => { if (e.target.id === "ppModalBg") closeCreate(); });

  ["ppSearch","ppAccess","ppStatus"].forEach(id => {
    document.getElementById(id).addEventListener("input", render);
    document.getElementById(id).addEventListener("change", render);
  });

  /* ─── Boot ───────────────────────────────────────────────────────── */
  Promise.all([
    fetch("/api/workspace/whoami",  { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("/people.json",           { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("/staff.json",            { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("/api/workspace/payroll", { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("/staff-activity.json",   { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([who, peopleFile, staff, payroll, act]) => {
    if (who) { viewerEmail = (who.email||"").toLowerCase(); isAdmin = !!who.is_admin; }
    if (staff && Array.isArray(staff.users)) {
      for (const u of staff.users) { const k = (u.email||"").toLowerCase(); if (k) staffByEmail[k] = u; }
    }
    if (peopleFile && Array.isArray(peopleFile.people)) people = peopleFile.people;
    if (payroll && (payroll.by_email || payroll.by_name)) payrollData = payroll;
    if (act && (Array.isArray(act.active_users) || Array.isArray(act.external_users))) activity = act;

    if (!isAdmin) {
      document.getElementById("ppGate").innerHTML = `<div class="pp-banner warn">You are signed in as <strong>${escapeHtml(viewerEmail || "(unknown)")}</strong> but are not a TogetherBook admin. The page is read-only; edits + add + delete will fail.</div>`;
    }
    render();
  });
</script>
