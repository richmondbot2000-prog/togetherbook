<style>
  .yp-section { max-width: 1080px; margin: 0 auto; padding: 24px 0 48px; }
  .yp-section h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .yp-section .lead { color: var(--ink-soft); font-size: 1.05rem; margin: 0 0 4px; }
  .yp-meta {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    margin: 0 0 24px;
  }
  .yp-map, .yp-map-states {
    height: 480px;
    margin: 0 0 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-soft);
    /* Contain Leaflet's internal z-index (markers up to 600, popups 700, controls 800)
       so it can't escape and float over the mobile sidebar drawer (z-index 60). */
    position: relative;
    z-index: 0;
  }
  .yp-map-caption {
    margin: 0 0 8px;
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  /* Make Leaflet's tiles slightly muted so they blend with the dark theme. */
  .yp-map .leaflet-tile, .yp-map-states .leaflet-tile { filter: brightness(0.85) saturate(0.85); }
  .yp-map-states .leaflet-container { background: var(--bg-soft); }

  /* Single-borrower pin (inline SVG via L.divIcon) — strip Leaflet's
     default white background that divIcons get by default. */
  .yp-pin { background: transparent !important; border: none !important; }
  .yp-pin svg { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25)); }

  /* State-total pill markers (second map) */
  .state-amount-icon { background: transparent !important; border: none !important; }
  .state-amount-icon .amount-pill {
    background: rgba(6, 10, 31, 0.92);
    color: var(--accent-ink);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 3px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.45);
    transform: translate(-50%, -50%);
    display: inline-block;
  }
  .yp-map .leaflet-container {
    background: var(--bg-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }
  .yp-map .leaflet-popup-content-wrapper {
    background: var(--bg-soft-2);
    color: var(--ink);
    border: 1px solid var(--accent);
    border-radius: 6px;
  }
  .yp-map .leaflet-popup-tip { background: var(--bg-soft-2); }
  .yp-map .leaflet-popup-content { margin: 8px 12px; line-height: 1.4; }
  .yp-map .leaflet-popup-content strong { color: var(--accent-ink); }
  .yp-states {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .yp-state {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .yp-state-h {
    margin: 0;
    padding: 10px 14px;
    background: var(--bg-soft-2);
    border-bottom: 1px solid var(--border-soft);
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .yp-state-meta {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0;
    text-transform: none;
  }
  table.yp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  table.yp-table th, table.yp-table td {
    text-align: left;
    padding: 6px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }
  table.yp-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  table.yp-table tr:last-child td { border-bottom: none; }
  table.yp-table tr:hover td { background: rgba(0, 212, 255, 0.05); }
  table.yp-table td.first-name { color: var(--ink); }
  table.yp-table td.city {
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 12em;
  }
  table.yp-table td.amount {
    font-family: 'JetBrains Mono', monospace; color: var(--ink-soft);
    text-align: right;
    white-space: nowrap;
  }

  /* Range selector — three tabs that switch the data range. Italic
     Newsreader buttons with brass underlines (Quiet Edition rhythm).
     The selected tab carries a manuscript-red rule + bold weight so
     the user can see at a glance which dataset they are looking at. */
  .yp-range {
    display: flex; gap: 28px; align-items: baseline;
    margin: 0 0 24px;
    border-bottom: 1px solid var(--ink-500);
    padding-bottom: 0;
  }
  .yp-range-btn {
    background: none; border: none;
    padding: 10px 4px;
    margin-bottom: -1px;
    font: italic 500 18px/1 var(--font-display, 'Newsreader', serif);
    color: var(--ink-600);
    border-bottom: 2px solid transparent;
    cursor: pointer;
  }
  .yp-range-btn:hover { color: var(--ink-900); }
  .yp-range-btn.is-active {
    color: var(--red-500);
    font-weight: 700;
    border-bottom-color: var(--red-500);
  }
  .yp-range-pending {
    padding: 48px 24px;
    text-align: center;
    background: var(--paper-50, transparent);
    border: 1px dashed var(--ink-300);
    color: var(--ink-700);
    font: italic 400 16px/1.5 var(--font-display, 'Newsreader', serif);
  }
  .yp-range-pending strong { display: block; margin-bottom: 6px; color: var(--ink-900); font-style: normal; font-weight: 600; }

  /* Monthly bar chart (Last Year view) — minimal horizontal-bar list,
     no library. Each row: month label · bar · amount + count. */
  .yp-bars {
    display: flex; flex-direction: column; gap: 6px;
    margin: 0 0 28px;
    padding: 16px 18px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .yp-bar-row {
    display: grid;
    grid-template-columns: 100px 1fr 180px;
    gap: 14px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }
  .yp-bar-label { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; }
  .yp-bar-track { position: relative; height: 14px; background: var(--bg-soft-2); border-radius: 3px; overflow: hidden; }
  .yp-bar-fill  { position: absolute; inset: 0 auto 0 0; background: var(--accent, #00d4ff); }
  .yp-bar-amt   { text-align: right; color: var(--ink); }
  .yp-bar-amt-meta { color: var(--muted); font-size: 0.7rem; margin-left: 6px; }

  /* Per-capita / total toggle link beside the state-total caption.
     Year view only. Reads as a brass-underlined italic link so it
     looks part of the caption row, not a button competing with it. */
  .yp-map-caption.has-toggle {
    display: flex; gap: 18px; align-items: baseline; flex-wrap: wrap;
  }
  .yp-map-toggle {
    background: none; border: none;
    padding: 0;
    color: var(--accent, #00d4ff);
    font: italic 500 0.78rem/1 var(--font-display, 'Newsreader', serif);
    text-transform: none;
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--accent, #00d4ff);
    cursor: pointer;
  }
  .yp-map-toggle:hover { color: var(--red-500); border-bottom-color: var(--red-500); }
</style>

<main class="qb-page">

      <nav class="yp-range" id="ypRange" role="tablist" aria-label="Payout date range">

        <p class="yp-map-caption">Total paid out by state</p>
        <div class="yp-map-states" id="ypStateMap"></div>

        <p class="yp-map-caption">Average loan amount by state</p>

        <div class="yp-states" id="ypStates"></div>
      </div>

<script>
  const fmtUSD0 = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
  const fmtUSD2 = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

  // US state populations — US Census Bureau Vintage 2024 estimates
  // (released Dec 2024). Used by the Year tab's "$ per person" toggle.
  // These shift by <1% a year so a hard-coded snapshot is fine for a
  // dashboard label — recompute against a fresh estimate every couple
  // of years if it matters.
  const STATE_POPULATIONS = {
    AL: 5108468, AK:   733406, AZ: 7497004, AR: 3088354, CA: 39431263,
    CO: 5957493, CT: 3675069, DE: 1051917, DC:  702250, FL: 23372215,
    GA:11180878, HI: 1446146, ID: 2001619, IL:12549689, IN: 6924275,
    IA: 3241488, KS: 2970606, KY: 4588372, LA: 4597740, ME: 1405012,
    MD: 6263220, MA: 7136171, MI:10140459, MN: 5793151, MS: 2943045,
    MO: 6245466, MT: 1137233, NE: 2005465, NV: 3267467, NH: 1409032,
    NJ: 9500851, NM: 2130256, NY:19867248, NC:11046024, ND:  796568,
    OH:11883304, OK: 4095393, OR: 4272371, PA:13078751, RI: 1112308,
    SC: 5478831, SD:  924669, TN: 7227750, TX:31290831, UT: 3503613,
    VT:  648278, VA: 8811195, WA: 7958180, WV: 1769979, WI: 5960975,
    WY:  587618,
  };

  // Year-view state-total map can render in two modes. Total = absolute
  // dollars paid out across the 12-month window. Per-capita = total /
  // state-population (so the "small states cluster at the top" effect
  // disappears and the heat is genuinely on the borrowers-per-capita
  // axis). Defaults to 'total'; the caption row carries the toggle.
  let yearTotalMode = 'total';

  // Geographic centre of each US state (lat, lng) — used to anchor the
  // total-paid-out label on the second map.
  const STATE_CENTROIDS = {
    AL: [32.74, -86.84], AK: [64.07, -152.28], AZ: [34.27, -111.66],
    AR: [34.89, -92.44], CA: [37.18, -119.47], CO: [38.99, -105.55],
    CT: [41.62, -72.73], DE: [38.99, -75.51], DC: [38.91, -77.04],
    FL: [28.63, -82.45], GA: [32.64, -83.44], HI: [20.29, -156.37],
    ID: [44.35, -114.61], IL: [40.04, -89.20], IN: [39.89, -86.28],
    IA: [42.08, -93.50], KS: [38.49, -98.38], KY: [37.53, -85.30],
    LA: [31.07, -91.99], ME: [45.37, -69.24], MD: [39.05, -76.79],
    MA: [42.26, -71.81], MI: [44.35, -85.41], MN: [46.28, -94.31],
    MS: [32.74, -89.67], MO: [38.36, -92.46], MT: [47.05, -109.63],
    NE: [41.54, -99.80], NV: [39.33, -116.63], NH: [43.68, -71.58],
    NJ: [40.19, -74.67], NM: [34.41, -106.11], NY: [42.95, -75.53],
    NC: [35.56, -79.39], ND: [47.45, -100.47], OH: [40.29, -82.79],
    OK: [35.59, -97.49], OR: [43.93, -120.56], PA: [40.88, -77.80],
    RI: [41.68, -71.56], SC: [33.92, -80.90], SD: [44.44, -100.23],
    TN: [35.86, -86.35], TX: [31.48, -99.33], UT: [39.32, -111.69],
    VT: [44.07, -72.67], VA: [37.52, -78.85], WA: [47.38, -120.45],
    WV: [38.64, -80.62], WI: [44.62, -89.99], WY: [43.00, -107.55],
  };

  function renderStateMap(items) {
    const mapEl = document.getElementById('ypStateMap');
    if (!mapEl || typeof L === 'undefined') return;
    const map = L.map(mapEl, { worldCopyJump: false, scrollWheelZoom: false })
                 .setView([39.0, -96.5], 4);
    map.on('click', () => map.scrollWheelZoom.enable());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Aggregate amount per state (using the 2-letter postal code from the data)
    const totals = new Map();
    for (const it of items) {
      const s = (it.state || '').toUpperCase();
      if (!s) continue;
      totals.set(s, (totals.get(s) || 0) + (it.amount || 0));
    }
    for (const [state, total] of totals.entries()) {
      const c = STATE_CENTROIDS[state];
      if (!c) continue;
      const icon = L.divIcon({
        className: 'state-amount-icon',
        html: `<span class="amount-pill" title="${state}: ${fmtUSD2.format(total)}">${fmtUSD0.format(total)}</span>`,
        iconSize: null,    // sized by content
        iconAnchor: [0, 0],
      });
      L.marker(c, { icon, interactive: true })
        .addTo(map)
        .bindPopup(`<strong>${state}</strong><br>${fmtUSD2.format(total)}`);
    }
  }

  function renderAvgStateMap(items) {
    const mapEl = document.getElementById('ypAvgStateMap');
    if (!mapEl || typeof L === 'undefined') return;
    const map = L.map(mapEl, { worldCopyJump: false, scrollWheelZoom: false })
                 .setView([39.0, -96.5], 4);
    map.on('click', () => map.scrollWheelZoom.enable());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const sums = new Map();
    const counts = new Map();
    for (const it of items) {
      const s = (it.state || '').toUpperCase();
      if (!s) continue;
      sums.set(s, (sums.get(s) || 0) + (it.amount || 0));
      counts.set(s, (counts.get(s) || 0) + 1);
    }
    for (const [state, total] of sums.entries()) {
      const c = STATE_CENTROIDS[state];
      if (!c) continue;
      const n = counts.get(state) || 0;
      if (!n) continue;
      const avg = total / n;
      const icon = L.divIcon({
        className: 'state-amount-icon',
        html: `<span class="amount-pill" title="${state}: avg ${fmtUSD2.format(avg)} across ${n} loan${n === 1 ? '' : 's'}">${fmtUSD0.format(avg)}</span>`,
        iconSize: null,
        iconAnchor: [0, 0],
      });
      L.marker(c, { icon, interactive: true })
        .addTo(map)
        .bindPopup(`<strong>${state}</strong><br>Average: ${fmtUSD2.format(avg)}<br>${n} loan${n === 1 ? '' : 's'} · ${fmtUSD2.format(total)} total`);
    }
  }

  function renderMap(items) {
    const mapEl = document.getElementById('ypMap');
    if (!mapEl || typeof L === 'undefined') return;
    const map = L.map(mapEl, { worldCopyJump: false, scrollWheelZoom: false })
                 .setView([39.0, -96.5], 4);  // center on the contiguous US
    map.on('click', () => map.scrollWheelZoom.enable());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Single-borrower marker: inline SVG via L.divIcon so we don't depend
    // on Leaflet's bundled marker-icon.png / shadow.png (those 404 on the
    // CDN auto-detect for this page — even with mergeOptions pinning the
    // URLs, the page renders the broken-image + "Mark" alt text). Going
    // SVG-DivIcon route sidesteps the issue and matches the green of the
    // MarkerCluster bubble palette.
    const SINGLE_PIN_SVG = `
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="36" viewBox="0 0 22 36" aria-hidden="true">
        <path d="M11 0C4.92 0 0 4.92 0 11c0 8.25 11 25 11 25s11-16.75 11-25C22 4.92 17.08 0 11 0z"
              fill="#5f9e4d" stroke="#fff" stroke-width="1.4" />
        <circle cx="11" cy="11" r="3.5" fill="#fff" />
      </svg>`;
    const singlePin = L.divIcon({
      className: 'yp-pin',
      html: SINGLE_PIN_SVG,
      iconSize: [22, 36],
      iconAnchor: [11, 35],
      popupAnchor: [0, -30],
    });

    // Cluster layer — dense areas show a numbered bubble (MarkerCluster's
    // own DivIcon), single-borrower locations show our green pin droplet.
    const clusterAvail = (typeof L.markerClusterGroup === 'function');
    const cluster = clusterAvail
      ? L.markerClusterGroup({
          chunkedLoading: true,
          showCoverageOnHover: false,
          spiderfyOnMaxZoom: true,
          maxClusterRadius: 40,
        })
      : L.layerGroup();
    for (const it of items) {
      if (it.lat == null || it.lng == null) continue;
      const popup =
        `<strong>${it.first_name || ''}</strong><br>` +
        `${[it.city, it.state].filter(Boolean).join(', ')}<br>` +
        `${fmtUSD2.format(it.amount || 0)}`;
      const m = L.marker([it.lat, it.lng], { icon: singlePin }).bindPopup(popup);
      cluster.addLayer(m);
    }
    map.addLayer(cluster);
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.crossOrigin = 'anonymous';
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('failed to load ' + src));
      document.head.appendChild(s);
    });
  }

  // Map range key → { url, lead text builder when data lands }. Last
  // Week + Last Year files are produced by scan_payouts_history.py
  // (committed alongside yesterday-payouts.json by the daily refresh
  // workflow). If a tab points at a missing JSON, the page shows a
  // friendly "refreshes overnight" placeholder rather than an error.
  const RANGES = {
    yesterday: {
      url: 'yesterday-payouts.json',
      label: data => {
        const d = data.target_date
          ? new Date(data.target_date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' })
          : 'unknown date';
        return `US borrowers whose loans paid out on <strong>${d}</strong>.`;
      },
    },
    week: {
      url: 'payouts-week.json',
      label: data => {
        const from = data.range && data.range.from
          ? new Date(data.range.from).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '';
        const to = data.range && data.range.to
          ? new Date(data.range.to).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
        return `US borrowers whose loans paid out from <strong>${from}</strong> to <strong>${to}</strong>.`;
      },
    },
    year: {
      url: 'payouts-year.json',
      label: data => {
        const from = data.range && data.range.from
          ? new Date(data.range.from).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : '';
        const to = data.range && data.range.to
          ? new Date(data.range.to).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : '';
        return `US borrowers whose loans paid out across <strong>${from}</strong> – <strong>${to}</strong> (last 12 completed months).`;
      },
    },
  };

  let currentRange = 'yesterday';
  let leafletReady = null;
  function ensureLeaflet() {
    if (!leafletReady) {
      leafletReady = loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')
        .then(() => loadScript('https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js'))
        .catch(err => console.warn('leaflet plugin load failed', err));
    }
    return leafletReady;
  }

  function clearContent(shape) {
    const content = document.getElementById('ypContent');
    if (shape === 'agg') {
      // Year view: aggregates only — no per-borrower pin map, no
      // per-borrower tables. The monthly bar chart slot lives between
      // the state-total map and the state-avg map. The state-total
      // caption carries a toggle link that swaps the map between
      // absolute dollars and $-per-state-resident.
      content.innerHTML = `
        <p class="yp-map-caption has-toggle" id="ypTotalCaption">
          <span id="ypTotalCaptionText">Total paid out by state</span>
          <button type="button" class="yp-map-toggle" id="ypTotalToggle">show $ per person of state population</button>
        </p>
        <div class="yp-map-states" id="ypStateMap"></div>

        <p class="yp-map-caption">Monthly payouts (last 12 completed months)</p>
        <div class="yp-bars" id="ypBars"></div>

        <p class="yp-map-caption">Average loan amount by state</p>
        <div class="yp-map-states" id="ypAvgStateMap"></div>

        <div class="yp-states" id="ypStates"></div>`;
    } else {
      content.innerHTML = `
        <p class="yp-map-caption">Where the borrowers are</p>
        <div class="yp-map" id="ypMap"></div>

        <p class="yp-map-caption">Total paid out by state</p>
        <div class="yp-map-states" id="ypStateMap"></div>

        <p class="yp-map-caption">Average loan amount by state</p>
        <div class="yp-map-states" id="ypAvgStateMap"></div>

        <div class="yp-states" id="ypStates"></div>`;
    }
  }

  // Year-shape renderers — take pre-aggregated rows from the JSON
  // (by_state, by_month) instead of recomputing from items. The
  // state-total renderer supports two modes via `yearTotalMode`:
  // 'total' (default — absolute dollars) and 'capita' ($-per-state-
  // resident from the STATE_POPULATIONS table).
  function renderStateMapFromAgg(byState) {
    const mapEl = document.getElementById('ypStateMap');
    if (!mapEl || typeof L === 'undefined') return;
    const map = L.map(mapEl, { worldCopyJump: false, scrollWheelZoom: false }).setView([39.0, -96.5], 4);
    map.on('click', () => map.scrollWheelZoom.enable());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    const capita = yearTotalMode === 'capita';
    for (const row of byState || []) {
      const state = (row.state || '').toUpperCase();
      const c = STATE_CENTROIDS[state];
      if (!c) continue;
      const total = row.amount || 0;
      const pop = STATE_POPULATIONS[state] || 0;
      const value = capita
        ? (pop ? total / pop : null)
        : total;
      if (value == null) continue; // state has no population entry — skip in capita mode
      const display = capita
        ? formatCapita(value)
        : fmtUSD0.format(value);
      const popupLine = capita
        ? `<strong>${state}</strong><br>${formatCapita(value)} per resident<br>${fmtUSD2.format(total)} total · ${pop.toLocaleString('en-US')} residents`
        : `<strong>${state}</strong><br>${fmtUSD2.format(total)}<br>${(row.borrowers || 0).toLocaleString('en-GB')} loans`;
      const icon = L.divIcon({
        className: 'state-amount-icon',
        html: `<span class="amount-pill" title="${state}: ${display}">${display}</span>`,
        iconSize: null, iconAnchor: [0, 0],
      });
      L.marker(c, { icon, interactive: true }).addTo(map).bindPopup(popupLine);
    }
  }
  // $-per-resident is usually < $10 across the 12-month window, so
  // render at 2-decimal cent precision; under $0.01 show "<$0.01" to
  // avoid printing $0.00.
  function formatCapita(v) {
    if (v == null) return '—';
    if (v < 0.005) return '< $0.01';
    return '$' + v.toFixed(2);
  }

  function renderAvgStateMapFromAgg(byState) {
    const mapEl = document.getElementById('ypAvgStateMap');
    if (!mapEl || typeof L === 'undefined') return;
    const map = L.map(mapEl, { worldCopyJump: false, scrollWheelZoom: false }).setView([39.0, -96.5], 4);
    map.on('click', () => map.scrollWheelZoom.enable());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    for (const row of byState || []) {
      const state = (row.state || '').toUpperCase();
      const c = STATE_CENTROIDS[state];
      if (!c) continue;
      const n = row.borrowers || 0;
      if (!n) continue;
      const avg = row.avg || ((row.amount || 0) / n);
      const icon = L.divIcon({
        className: 'state-amount-icon',
        html: `<span class="amount-pill" title="${state}: avg ${fmtUSD2.format(avg)} across ${n} loan${n === 1 ? '' : 's'}">${fmtUSD0.format(avg)}</span>`,
        iconSize: null, iconAnchor: [0, 0],
      });
      L.marker(c, { icon, interactive: true })
        .addTo(map)
        .bindPopup(`<strong>${state}</strong><br>Average: ${fmtUSD2.format(avg)}<br>${n.toLocaleString('en-GB')} loan${n === 1 ? '' : 's'} · ${fmtUSD2.format(row.amount || 0)} total`);
    }
  }
  function renderMonthlyBars(byMonth) {
    const root = document.getElementById('ypBars');
    if (!root) return;
    const months = (byMonth || []).slice();
    if (!months.length) { root.textContent = 'No data.'; return; }
    const peak = months.reduce((m, r) => Math.max(m, r.amount || 0), 0) || 1;
    root.innerHTML = months.map(r => {
      const label = monthLabel(r.month);
      const pct = Math.max(2, (100 * (r.amount || 0) / peak));
      return `
        <div class="yp-bar-row">
          <span class="yp-bar-label">${label}</span>
          <div class="yp-bar-track"><div class="yp-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="yp-bar-amt">${fmtUSD0.format(r.amount || 0)}<span class="yp-bar-amt-meta">${(r.borrowers || 0).toLocaleString('en-GB')} loans</span></div>
        </div>`;
    }).join('');
  }
  function monthLabel(iso) {
    // "2025-05" → "May 2025"
    if (!iso) return '';
    const [y, m] = iso.split('-');
    const d = new Date(parseInt(y, 10), parseInt(m, 10) - 1, 1);
    return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
  }
  function renderStateCardsFromAgg(byState) {
    const root = document.getElementById('ypStates');
    if (!root) return;
    const sorted = (byState || []).slice().sort((a, b) => (a.state || '').localeCompare(b.state || ''));
    const frag = document.createDocumentFragment();
    for (const row of sorted) {
      const card = document.createElement('div');
      card.className = 'yp-state';
      card.innerHTML = `
        <h3 class="yp-state-h">
          <span>${row.state || '—'}</span>
          <span class="yp-state-meta">${(row.borrowers || 0).toLocaleString('en-GB')} · ${fmtUSD0.format(row.amount || 0)}</span>
        </h3>
        <table class="yp-table">
          <tbody>
            <tr><td class="first-name">Average loan</td><td></td><td class="amount">${fmtUSD2.format(row.avg || ((row.amount || 0) / Math.max(1, row.borrowers || 1)))}</td></tr>
          </tbody>
        </table>`;
      frag.appendChild(card);
    }
    root.appendChild(frag);
  }

  function showPending(message) {
    document.getElementById('ypContent').innerHTML =
      `<div class="yp-range-pending"><strong>Not refreshed yet</strong>${message}</div>`;
  }

  // Stash for re-render when the user toggles total <-> per-capita.
  let lastYearByState = null;

  function paintAggregated(data) {
    const total = (data.totals && data.totals.amount) || 0;
    const n     = (data.totals && data.totals.borrowers) || 0;
    const updated = data.updated_at ? new Date(data.updated_at).toLocaleString('en-GB') : '';
    document.getElementById('ypMeta').textContent =
      `${n.toLocaleString('en-GB')} borrowers · ${fmtUSD0.format(total)} paid out · last refreshed ${updated}`;
    lastYearByState = data.by_state;
    yearTotalMode = 'total';
    try { renderStateMapFromAgg(data.by_state); }    catch (e) { console.error('state map (agg) failed', e); }
    try { renderMonthlyBars(data.by_month); }        catch (e) { console.error('monthly bars failed', e); }
    try { renderAvgStateMapFromAgg(data.by_state); } catch (e) { console.error('avg state map (agg) failed', e); }
    try { renderStateCardsFromAgg(data.by_state); }  catch (e) { console.error('state cards (agg) failed', e); }
    wireYearTotalToggle();
  }
  function wireYearTotalToggle() {
    const btn = document.getElementById('ypTotalToggle');
    const cap = document.getElementById('ypTotalCaptionText');
    if (!btn || !cap) return;
    btn.addEventListener('click', () => {
      yearTotalMode = (yearTotalMode === 'total') ? 'capita' : 'total';
      cap.textContent = yearTotalMode === 'capita'
        ? '$ paid out per resident, by state'
        : 'Total paid out by state';
      btn.textContent = yearTotalMode === 'capita'
        ? 'show absolute dollar totals'
        : 'show $ per person of state population';
      // Leaflet's map instance owns the #ypStateMap DIV — destroy it by
      // re-creating the container, then re-render. Cheap; the dataset
      // is in memory.
      const old = document.getElementById('ypStateMap');
      if (old) {
        const fresh = old.cloneNode(false);
        old.parentNode.replaceChild(fresh, old);
      }
      try { renderStateMapFromAgg(lastYearByState); } catch (e) { console.error('state map toggle re-render failed', e); }
    });
  }

  function paint(data) {
    const items = data.items || [];
    const total = items.reduce((s, i) => s + (i.amount || 0), 0);
    const updated = data.updated_at ? new Date(data.updated_at).toLocaleString('en-GB') : '';
    document.getElementById('ypMeta').textContent =
      `${items.length.toLocaleString('en-GB')} borrowers · ${fmtUSD0.format(total)} paid out · last refreshed ${updated}`;

    // Group by state
    const byState = new Map();
    for (const it of items) {
      const s = it.state || '—';
      if (!byState.has(s)) byState.set(s, []);
      byState.get(s).push(it);
    }
    const sortedStates = [...byState.entries()].sort((a, b) => a[0].localeCompare(b[0]));

    const root = document.getElementById('ypStates');
    const frag = document.createDocumentFragment();
    for (const [state, list] of sortedStates) {
      const stateTotal = list.reduce((s, i) => s + (i.amount || 0), 0);
      const card = document.createElement('div');
      card.className = 'yp-state';
      // Cap each per-state list at 200 rows for the long-window views.
      // The Yearly tab can have 5k+ borrowers per state and dropping
      // every name into the DOM bricks the page on mobile Safari.
      const cap = 200;
      const visible = list.slice(0, cap);
      const overflow = list.length - visible.length;
      const rows = visible.map(it =>
        `<tr>` +
          `<td class="first-name">${it.first_name || ''}</td>` +
          `<td class="city" title="${(it.county || '') + (it.county ? ' County' : '')}">${it.city || ''}</td>` +
          `<td class="amount">${fmtUSD2.format(it.amount || 0)}</td>` +
        `</tr>`
      ).join('');
      const more = overflow > 0
        ? `<tr><td colspan="3" style="text-align:center; font-style:italic; color: var(--muted); padding: 8px 14px;">+${overflow.toLocaleString('en-GB')} more borrowers in ${state}</td></tr>`
        : '';
      card.innerHTML = `
        <h3 class="yp-state-h">
          <span>${state}</span>
          <span class="yp-state-meta">${list.length.toLocaleString('en-GB')} · ${fmtUSD0.format(stateTotal)}</span>
        </h3>
        <table class="yp-table">
          <thead><tr><th>First name</th><th>City</th><th style="text-align:right">Amount</th></tr></thead>
          <tbody>${rows}${more}</tbody>
        </table>
      `;
      frag.appendChild(card);
    }
    root.appendChild(frag);

    try { renderMap(items); }         catch (e) { console.error('pin map failed', e); }
    try { renderStateMap(items); }    catch (e) { console.error('state map failed', e); }
    try { renderAvgStateMap(items); } catch (e) { console.error('avg state map failed', e); }
  }

  function loadRange(key) {
    currentRange = key;
    document.querySelectorAll('.yp-range-btn').forEach(b => {
      const on = b.dataset.range === key;
      b.classList.toggle('is-active', on);
      b.setAttribute('aria-selected', String(on));
    });
    const cfg = RANGES[key];
    if (!cfg) return;
    // Re-clear lazily once we see the shape — for now build the
    // per-borrower layout. Year view rebuilds the layout itself.
    clearContent('items');
    document.getElementById('ypMeta').textContent = 'Loading…';
    document.getElementById('ypLead').innerHTML = '&nbsp;';

    ensureLeaflet().finally(() => {
      fetch(cfg.url, { cache: 'no-cache' })
        .then(r => {
          if (r.status === 404) {
            throw Object.assign(new Error('not-yet-built'), { code: 'missing' });
          }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          document.getElementById('ypLead').innerHTML = cfg.label(data);
          // Year-shape datasets carry by_state[] + by_month[] instead
          // of items[]; render the aggregated layout in that case.
          if (Array.isArray(data.by_state)) {
            clearContent('agg');
            paintAggregated(data);
          } else {
            paint(data);
          }
        })
        .catch(err => {
          if (err.code === 'missing') {
            showPending(
              key === 'week'
                ? '<p>The 7-day payouts dataset is generated by the overnight refresh and has not landed yet.</p>'
                : key === 'year'
                  ? '<p>The 12-month payouts dataset is generated by the overnight refresh and has not landed yet.</p>'
                  : '<p>The payouts dataset has not landed yet.</p>'
            );
            document.getElementById('ypMeta').textContent = '';
            document.getElementById('ypLead').textContent = '';
          } else {
            const meta = document.getElementById('ypMeta');
            if (meta) meta.textContent = 'Could not load payouts: ' + err.message;
          }
        });
    });
  }

  document.querySelectorAll('.yp-range-btn').forEach(b => {
    b.addEventListener('click', () => loadRange(b.dataset.range));
  });
  loadRange('yesterday');
</script>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.body.classList.remove('nav-open');
  });
  document.querySelectorAll('.qb-nav-link').forEach(a =>
    a.addEventListener('click', () => document.body.classList.remove('nav-open'))
  );
</script>
<script src="nav.js" defer></script>
</body>
</html>
