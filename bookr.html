<style>
  .bk-section { max-width: 100%; margin: 0 auto; padding: 18px 16px 48px; }
  .bk-section h1 {
    font-family: var(--font-display, "Newsreader", serif);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800; letter-spacing: 0.02em; text-transform: uppercase;
    margin: 0 0 8px; color: var(--ink);
  }
  .bk-eyebrow {
    font: italic 500 13px/1.3 var(--font-display, "Newsreader", serif);
    color: var(--ink-600); margin: 0 0 14px;
  }
  /* Tabs row: ledger-style underline that swaps on the active tab. */
  .bk-tabs { display: flex; gap: 24px; border-bottom: 1px solid var(--ink-500); margin: 0 0 14px; }
  .bk-tab {
    background: none; border: 0; padding: 8px 0;
    font: 600 13px/1.2 var(--font-body, "Inter", sans-serif);
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-500); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .bk-tab.is-active { color: var(--ink-900); border-bottom-color: var(--brass-500); }
  .bk-tab:hover:not(.is-active) { color: var(--ink-700); }
  /* Toolbar row above the grid: zoom, type filter, change-user picker. */
  .bk-toolbar { display: flex; flex-wrap: wrap; gap: 14px 22px; align-items: center; margin: 0 0 12px; }
  .bk-tool-label {
    font: 500 11px/1 var(--font-mono, monospace); letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-500); margin-right: 6px;
  }
  .bk-select {
    font: 500 13px/1.2 var(--font-body); color: var(--ink-900); background: var(--paper-50);
    border: 1px solid var(--ink-300); border-radius: 0; padding: 5px 8px;
  }
  .bk-seg { display: inline-flex; border: 1px solid var(--ink-300); }
  .bk-seg button {
    background: var(--paper-50); border: 0; border-right: 1px solid var(--ink-300);
    padding: 5px 12px; cursor: pointer;
    font: 500 12px/1.2 var(--font-body); color: var(--ink-700);
  }
  .bk-seg button:last-child { border-right: 0; }
  .bk-seg button.is-active { background: var(--ink-900); color: var(--paper-50); }
  /* Linked-to-BookR pill on the right. */
  .bk-link-pill {
    margin-left: auto;
    font: 500 11px/1 var(--font-mono); letter-spacing: 0.04em;
    padding: 4px 8px; border: 1px solid var(--brass-300); color: var(--brass-700); background: var(--brass-50);
  }
  .bk-link-pill.is-unlinked { color: var(--red-700); border-color: var(--red-300); background: var(--red-50); }
  /* Banner shown when the viewer has no BookR uid mapping. */
  .bk-banner {
    background: var(--red-50); border-left: 4px solid var(--red-500);
    padding: 10px 14px; margin: 0 0 14px;
    font: 400 13px/1.45 var(--font-body); color: var(--ink-900);
  }
  /* The grid lives in a horizontally scrollable wrapper so the sticky
     asset column always stays put on mobile. */
  .bk-grid-wrap {
    overflow-x: auto; max-width: 100%;
    border: 1px solid var(--ink-300); background: var(--paper-50);
  }
  .bk-grid {
    display: grid; min-width: 100%;
    /* grid-template-columns is set inline by JS once we know zoom range. */
    font: 400 12px/1.3 var(--font-body);
  }
  .bk-cell {
    border-right: 1px solid #ffffff; border-bottom: 1px solid #ffffff;
    padding: 2px; min-height: 64px; box-sizing: border-box;
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  /* Today: solid black so it pops without changing column width.
     Override booked grey + free paper. Avatar img stays on top because
     it's an actual element, not a background. */
  .bk-cell.is-today-col { background: #000; color: #fff; }
  .bk-cell.is-today-col.is-booked { background: #000; }
  .bk-cell.is-weekend { background: #ffffff; }
  .bk-cell.is-past { color: var(--ink-400); background: #ffffff; cursor: default; }
  .bk-cell.is-free { cursor: pointer; }
  .bk-cell.is-free:hover { background: var(--brass-50); }
  /* Booked cells: 60% grey so the round avatar pops on top. */
  .bk-cell.is-booked { background: rgba(0, 0, 0, 0.5); cursor: pointer; color: #ffffff; }
  .bk-cell.is-mine { background: rgba(200, 151, 63, 0.18); }
  .bk-cell.is-pending { opacity: 0.55; cursor: progress; }
  .bk-cell.is-loading { position: relative; cursor: progress; background: var(--paper-100); }
  .bk-cell.is-loading::after {
    content: ""; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
    margin: -5px 0 0 -5px; border-radius: 50%;
    border: 1.5px solid var(--brass-300, #d4b87a); border-top-color: transparent;
    animation: bk-spin 0.7s linear infinite;
  }
  @keyframes bk-spin { to { transform: rotate(360deg); } }
  /* Sticky asset column on the left edge. */
  .bk-asset-cell {
    position: sticky; left: 0; z-index: 2;
    background: var(--paper-50);
    border-right: 2px solid #000;
    padding: 3px 5px; min-width: 75px; max-width: 75px;
    border-bottom: 1px solid #ffffff;
    display: flex; flex-direction: column; gap: 0;
    box-sizing: border-box;
    text-align: center;
  }
  .bk-asset-cell.is-section { background: var(--paper-200); }
  .bk-asset-title {
    font: 600 11px/1.15 var(--font-body); color: var(--ink-900);
    word-break: break-word; overflow-wrap: anywhere;
  }
  .bk-asset-title a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--ink-400); }
  .bk-asset-title a:hover { color: var(--brass-700); border-bottom-color: var(--brass-500); }
  .bk-asset-sub {
    font: 400 9px/1.15 var(--font-mono); color: var(--ink-600);
    word-break: break-word; overflow-wrap: anywhere;
  }
  /* Day-header row stays at the top while you scroll the grid vertically.
     For now the page is a single grid, no vertical sticky needed. */
  .bk-day-head {
    background: var(--paper-200); padding: 4px 2px;
    text-align: center;
    font: 600 10px/1.1 var(--font-mono); color: var(--ink-700);
    border-right: 1px solid #ffffff; border-bottom: 1px solid #ffffff;
  }
  .bk-day-head.is-weekend { background: var(--paper-200); }
  .bk-day-head.is-today-col { background: #000; color: #fff; }
  .bk-day-head.is-today-col .bk-dow,
  .bk-day-head.is-today-col .bk-mo { opacity: 1; }
  .bk-day-head .bk-dow { display: block; opacity: 0.7; letter-spacing: 0.04em; }
  .bk-day-head .bk-dn  { display: block; font: 700 22px/1.1 var(--font-body); margin-top: 2px; }
  .bk-day-head .bk-mo  { display: block; font-size: 9px; opacity: 0.65; }
  /* The corner cell (top-left intersection of asset col + day row). */
  .bk-corner {
    position: sticky; left: 0; z-index: 3;
    background: var(--paper-200); border-right: 2px solid #000; border-bottom: 1px solid #ffffff;
    padding: 4px 4px; font: 600 8px/1.15 var(--font-mono); color: var(--ink-700);
    text-transform: uppercase; letter-spacing: 0.04em;
    min-width: 75px; max-width: 75px; box-sizing: border-box;
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .bk-cell-name {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font: 600 10pt/1.05 var(--font-body); color: #ffffff;
    max-width: 100%; gap: 1px;
    word-break: break-word; overflow-wrap: anywhere;
  }
  .bk-name-line { display: block; white-space: nowrap; }
  .bk-cell:not(.is-booked) .bk-cell-name { color: var(--ink-900); }
  /* Avatar+name overlay. Image fills the cell; name shows on hover */
  /* (mouse) or while the cell is touch-pressed (mobile). The .is-external */
  /* class swaps in the AirBnb logo asset. */
  .bk-cell.bk-has-avatar { padding: 0; position: relative; }
  .bk-cell-avatar {
    width: 64px; height: 64px;
    object-fit: cover; display: block;
    border-radius: 50%;
    margin: auto;
    transition: opacity 0.12s ease-in;
  }
  .bk-cell.bk-has-avatar .bk-cell-name {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; text-align: center;
    padding: 2px 4px;
    background: var(--paper-50);
    color: var(--ink-900);
    opacity: 0; transition: opacity 0.12s ease-in;
    pointer-events: none;
  }
  .bk-cell.bk-has-avatar:hover .bk-cell-avatar,
  .bk-cell.bk-has-avatar.bk-pressed .bk-cell-avatar { opacity: 0; }
  .bk-cell.bk-has-avatar:hover .bk-cell-name,
  .bk-cell.bk-has-avatar.bk-pressed .bk-cell-name { opacity: 1; pointer-events: auto; }
  .bk-cell.is-external .bk-cell-avatar { background: #FF5A5F; }
  .bk-admin-link { padding: 18px 0 8px; text-align: center; font: italic 400 12px/1.4 var(--font-display); color: var(--ink-500); }
  .bk-admin-link a { color: inherit; text-decoration: underline; text-decoration-style: dotted; }
  /* Popover that opens when you click a cell. */
  .bk-pop {
    position: fixed; z-index: 1000;
    background: var(--paper-50); border: 1px solid var(--ink-500);
    box-shadow: none; padding: 12px 14px; min-width: 240px; max-width: 320px;
    font: 400 13px/1.4 var(--font-body); color: var(--ink-900);
  }
  .bk-pop h3 { margin: 0 0 6px; font: 600 14px/1.2 var(--font-body); color: var(--ink-900); }
  .bk-pop .bk-pop-sub { font: italic 400 12px/1.3 var(--font-display); color: var(--ink-600); margin: 0 0 8px; }
  .bk-pop .bk-pop-meta { font: 400 12px/1.4 var(--font-mono); color: var(--ink-700); margin: 0 0 10px; }
  .bk-pop-actions { display: flex; gap: 8px; }
  .bk-btn { font: 600 12px/1 var(--font-body); padding: 7px 12px; border: 1px solid var(--ink-500); background: var(--paper-50); color: var(--ink-900); cursor: pointer; }
  .bk-btn:hover { background: var(--paper-200); }
  .bk-btn.is-danger { color: var(--red-700); border-color: var(--red-500); }
  .bk-btn.is-danger:hover { background: var(--red-50); }
  .bk-btn.is-primary { background: var(--brass-500); color: var(--paper-50); border-color: var(--brass-600); }
  .bk-btn.is-primary:hover { background: var(--brass-600); }
  .bk-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  /* My Bookings: a quiet ledger grouped by asset. */
  .bk-mine-section { max-width: 880px; margin: 0 auto; }
  .bk-mine-group { margin: 0 0 22px; padding: 0 0 12px; border-bottom: 1px solid var(--paper-300); }
  .bk-mine-group h2 { margin: 0 0 8px; font: 600 14px/1.2 var(--font-display); color: var(--ink-900); }
  .bk-mine-group h2 a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--ink-400); }
  .bk-mine-group h2 a:hover { color: var(--brass-700); border-bottom-color: var(--brass-500); }
  .bk-mine-row {
    display: grid; grid-template-columns: 200px 1fr auto; gap: 14px; align-items: center;
    padding: 5px 0; font: 400 13px/1.3 var(--font-body); color: var(--ink-800);
    border-top: 1px dashed var(--paper-300);
  }
  .bk-mine-row:first-of-type { border-top: 0; }
  .bk-mine-row .bk-mine-when { font: 500 12px/1.2 var(--font-mono); color: var(--ink-900); }
  .bk-mine-row .bk-mine-meta { font: 400 11px/1.3 var(--font-mono); color: var(--ink-500); }
  .bk-mine-row.is-past { color: var(--ink-500); }
  .bk-mine-empty { font-style: italic; color: var(--ink-500); padding: 18px 0; }
  .bk-status { font: 400 12px/1.3 var(--font-mono); color: var(--ink-500); padding: 6px 0; }
  @media (max-width: 720px) {
    /* Old override forced 160-200px on phones — which is the very
       case we wanted compact. Asset cell + corner now stay at the
       desktop 75px on every viewport. */
    .bk-mine-row { grid-template-columns: 1fr; gap: 4px; }
  }
</style>

<section class="bk-section">

  <div id="bkBanner" class="bk-banner" style="display:none"></div>
  <div class="bk-tabs">
    <button class="bk-tab is-active" data-tab="calendar" type="button">Calendar</button>

  </div>
  <div id="bkCalendarPanel">
    <div class="bk-toolbar">
      <span><span class="bk-tool-label">Days</span>
        <select id="bkZoom" class="bk-select">
          <option value="30">Next 30</option>
          <option value="60">Next 60</option>

        </select></span>

          <button data-f="all" class="is-active" type="button">All</button>
          <button data-f="cars" type="button">Cars</button>
          <button data-f="properties" type="button">Properties</button>
        </span></span>
    </div>

      <div id="bkGrid" class="bk-grid"></div>
    </div>
  </div>

  </div>

<div id="bkPop" class="bk-pop" style="display:none"></div>
<script>
(function () {
  const $ = sel => document.querySelector(sel);
  const STATE = {
    whoami: null,
    users: {},
    cars: [], properties: [],
    filter: "all",
    zoom: 30,
    bookings: {},      /* keyed by `type:id` -> {date: uid|free} */
    isAdmin: false,
    targetEmail: null, /* removed UI — kept for back-compat with payload helpers */
    tab: "calendar",
    pendingDates: new Set(),
    peopleByBookrUid: {},  /* uid -> Person record (for avatar lookup) */
  };

  /* Date helpers — everything in UK local. */
  const pad = n => String(n).padStart(2, "0");
  function ymd(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function todayMidnight() { const d = new Date(); d.setHours(0,0,0,0); return d; }
  function dowLetter(d) { return ["S", "M", "T", "W", "T", "F", "S"][d.getDay()]; }
  function monShort(d) { return ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][d.getMonth()]; }
  function isWeekend(d) { const x = d.getDay(); return x === 0 || x === 6; }
  function firstName(s) { return (s || "").split(/\s+/)[0] || ""; }
  function compactName(name) {
    const p = (name || "").split(/\s+/).filter(Boolean);
    if (!p.length) return "";
    if (p.length === 1) return p[0];
    return p[0] + " " + p[p.length - 1].charAt(0).toUpperCase();
  }
  /* UK fiscal year: starts April 1. "Most recent April 1" = April of this year if
     today is on/after Apr 1, else April of previous year. */
  function fiscalStart() {
    const t = todayMidnight();
    const apr = new Date(t.getFullYear(), 3, 1);
    if (t < apr) return new Date(t.getFullYear() - 1, 3, 1);
    return apr;
  }

  async function getJSON(url, opts) {
    const res = await fetch(url, Object.assign({ cache: "no-store" }, opts || {}));
    if (!res.ok) throw new Error(url + ": " + res.status);
    return res.json();
  }

  async function loadAll() {
    setStatus("Loading…");
    let whoami = null, assets = null, assetsErr = null, whoamiErr = null, usersErr = null;
    const usersP = getJSON("/api/bookr/users")
      .then(u => (u && u.users) || {})
      .catch(e => { usersErr = e && e.message || String(e); return {}; });
    const adminP = getJSON("/api/workspace/whoami").then(w => !!(w && (w.is_admin || w.is_togetherbook_admin))).catch(() => false);
    const [w, a] = await Promise.all([
      getJSON("/api/bookr/whoami").catch(e => { whoamiErr = e && e.message || String(e); return null; }),
      getJSON("/api/bookr/assets").catch(e => { assetsErr = e && e.message || String(e); return null; }),
    ]);
    whoami = w; assets = a;
    STATE.whoami = whoami;
    STATE.cars = (assets && assets.cars) || [];
    STATE.properties = (assets && assets.properties) || [];
    // Surface the real reason the list is empty so this doesn't read
    // as "0 ASSETS" for users — distinguishing a worker error, an
    // empty-but-valid response, and rules-denying-the-read.
    const total = STATE.cars.length + STATE.properties.length;
    if (total === 0 || assetsErr || whoamiErr) {
      renderBookrDiagnostic({ whoami, whoamiErr, assets, assetsErr, usersErr });
    }
    STATE.bookings = {};
    STATE.pendingDates = new Set();
    const { days } = dateRange();
    days.forEach(d => STATE.pendingDates.add(ymd(d)));
    renderTopChrome();
    render();
    usersP.then(u => { STATE.users = u; if (STATE.tab === "calendar") renderGrid(); });
    adminP.then(a => {
      STATE.isAdmin = a;
      renderUserPicker();
      const el = document.querySelector("#bkAdminLink");
      if (el) el.hidden = !a;
    });
    /* Pull people.json via the worker, not /people.json directly, so we
       see the just-committed bookr_uids without GH Pages CDN lag. Also
       fold in annotations.json for any photo timestamp that lives there
       rather than on the Person record. */
    Promise.all([
      fetch("/api/workspace/table?file=people", { cache: "no-store", headers: { "Cache-Control": "no-cache" } }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch("/annotations.json", { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch("/staff.json",       { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([peopleDoc, annDoc, staffDoc]) => {
      const list = (peopleDoc && peopleDoc.people) || [];
      const ann = (annDoc && annDoc.annotations) || {};
      // Google Workspace directory photos (googleusercontent URLs) keyed
      // by email — same source profile.js falls back to. Lets people who
      // never uploaded a local photo still show their Google avatar.
      const staffByEmail = {};
      for (const u of ((staffDoc && staffDoc.users) || [])) {
        const e = (u && u.email || "").toLowerCase();
        if (e && u.photo_url) staffByEmail[e] = u.photo_url;
      }
      const map = {};
      for (const p of list) {
        const emails = [p.main_google_email, ...(p.alt_google_emails || []), p.external_google_email]
          .filter(Boolean).map(e => e.toLowerCase());
        let chosenEmail = null, chosenTs = null;
        for (const e of emails) {
          const ts = (ann[e] && ann[e].directory_photo_uploaded_at) || null;
          if (ts) { chosenEmail = e; chosenTs = ts; break; }
        }
        if (!chosenEmail && p.directory_photo_uploaded_at && p.main_google_email) {
          chosenEmail = p.main_google_email.toLowerCase();
          chosenTs = p.directory_photo_uploaded_at;
        }
        if (chosenEmail) {
          const key = chosenEmail.replace(/@/g, "_at_");
          p._photo_url = "/assets/photos/" + key + ".jpg?v=" + encodeURIComponent(chosenTs || "");
        } else {
          // No locally-uploaded photo — fall back to the Workspace
          // directory photo from staff.json (same fallback profile.js uses).
          for (const e of emails) {
            if (staffByEmail[e]) { p._photo_url = staffByEmail[e]; break; }
          }
        }
        for (const uid of (p.bookr_uids || [])) {
          if (uid) map[uid] = p;
        }
        if (p.bookr_uid) map[p.bookr_uid] = p;
      }
      STATE.peopleByBookrUid = map;
      if (STATE.tab === "calendar") renderGrid();
    });
    loadBookingsProgressively();
  }

  // Full re-fetch of all bookings in the current zoom range. Called
  // after a book / cancel / zoom / filter / tab change so the grid
  // reflects everyone's current state, not just the local optimistic
  // patch. Was previously referenced 5 places but never defined —
  // which silently broke the post-action re-render and made bookings
  // look like they didn't take until a hard browser refresh.
  async function refreshAllBookings() {
    STATE.bookings = {};
    STATE.pendingDates = new Set();
    const { days } = dateRange();
    days.forEach(d => STATE.pendingDates.add(ymd(d)));
    render();
    await loadBookingsProgressively();
  }

  async function loadBookingsProgressively() {
    const { days } = dateRange();
    STATE.isLoadingBookings = true;
    const chunks = [];
    for (let i = 0; i < days.length; i += 7) chunks.push(days.slice(i, i + 7));
    try {
      for (const chunk of chunks) {
        const from = ymd(chunk[0]);
        const to   = ymd(chunk[chunk.length - 1]);
        const params = "type=" + encodeURIComponent(STATE.filter || "all") +
                       "&from=" + from + "&to=" + to;
        try {
          const res = await getJSON("/api/bookr/all-bookings?" + params);
          const tree = (res && res.bookings) || { cars: {}, properties: {} };
          for (const kind of ["cars", "properties"]) {
            for (const [id, dates] of Object.entries(tree[kind] || {})) {
              const key = kind + ":" + id;
              STATE.bookings[key] = Object.assign(STATE.bookings[key] || {}, dates);
            }
          }
        } catch (e) {
          console.warn("bookr week fetch failed", from, to, e);
        }
        chunk.forEach(d => STATE.pendingDates.delete(ymd(d)));
        if (STATE.tab === "calendar") renderGrid();
      }
    } finally {
      STATE.isLoadingBookings = false;
      // Run the (expensive) name-fit pass once now that every chunk has
      // landed. Skipping the per-chunk passes saves ~52 full sweeps on
      // a 365-day zoom.
      const grid = document.querySelector("#bkGrid");
      // Same 2000-cell cap as renderGrid — at 365-day zoom the layout-
      // reflow cost of measuring ~11k cells crashes mobile Safari.
      const cellCount = visibleAssets().length * dateRange().days.length;
      if (grid && cellCount < 2000) fitNamesInGrid(grid);
    }
    setStatus("");
  }

  function setStatus(msg) {
    const el = document.querySelector("#bkStatus");
    if (!el) return;
    el.textContent = msg || "";
    el.style.display = msg ? "" : "none";
  }

  // Surfaces the actual reason a load returned nothing — error message
  // from the worker, or "valid response but empty" (which on Firebase
  // RTDB almost always means the service account lacks the IAM role
  // that bypasses security rules). Inserted just above the calendar.
  function renderBookrDiagnostic(info) {
    let existing = document.getElementById("bkDiag");
    if (!existing) {
      existing = document.createElement("div");
      existing.id = "bkDiag";
      existing.style.cssText = "margin: 12px 0; padding: 12px 14px; background: var(--paper-100, #faf3e3); border-left: 3px solid var(--brass-500, #C8973F); font: 400 12px/1.5 var(--font-body); color: var(--ink-800);";
      const main = document.querySelector("main") || document.body;
      const grid = document.querySelector("#bkGrid") || document.querySelector(".bk-tabs") || main.firstChild;
      (grid && grid.parentElement || main).insertBefore(existing, grid || null);
    }
    const lines = [];
    lines.push("<strong>BookR diagnostics</strong>");
    if (info.whoamiErr) {
      lines.push(`whoami: <span style="color:var(--red-600,#b3261e);">${escapeHtml(info.whoamiErr)}</span>`);
    } else if (info.whoami) {
      lines.push("whoami: " + escapeHtml(JSON.stringify(info.whoami)));
    }
    if (info.assetsErr) {
      lines.push(`assets: <span style="color:var(--red-600,#b3261e);">${escapeHtml(info.assetsErr)}</span>`);
    } else if (info.assets) {
      const cn = (info.assets.cars || []).length;
      const pn = (info.assets.properties || []).length;
      lines.push(`assets: <code>{cars: ${cn}, properties: ${pn}}</code>`);
      if (cn === 0 && pn === 0) {
        lines.push(
          '<em>Worker reached Firebase and got an empty list. Almost always means ' +
          'security rules are silently denying the service-account read. Fix: in ' +
          '<a href="https://console.firebase.google.com" target="_blank">Firebase console</a> → ' +
          'rg-bookr project → Realtime Database → Rules, ensure <code>cars</code>, <code>properties</code>, ' +
          '<code>users</code> are readable by service accounts; OR grant the service account the ' +
          '<strong>Firebase Realtime Database Admin</strong> IAM role at ' +
          '<a href="https://console.cloud.google.com/iam-admin/iam?project=rg-bookr" target="_blank">' +
          'console.cloud.google.com/iam-admin/iam?project=rg-bookr</a> (service-account email is ' +
          'inside BOOKR_SERVICE_ACCOUNT_JSON on the worker).</em>'
        );
      }
    }
    if (info.usersErr) {
      lines.push(`users: <span style="color:var(--red-600,#b3261e);">${escapeHtml(info.usersErr)}</span>`);
    }
    existing.innerHTML = lines.join("<br>");
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function renderTopChrome() {
    // The "Linked to BookR" pill + the "Not linked" red banner were
    // removed — users only ever book as themselves and the worker
    // refuses calls from unlinked accounts already. Nothing to render
    // here now, but the function stays as a no-op for the existing
    // callers in case future top-chrome bits land.
    const banner = document.querySelector("#bkBanner");
    if (banner) banner.style.display = "none";
  }
  // renderUserPicker removed — the "Book as" dropdown is gone; every
  // user books as themselves. The bookrBook handler also defaults to
  // the viewer's own uid when no target_user_uid is supplied.
  function renderUserPicker() { /* removed */ }

  function visibleAssets() {
    const keep = a => (a && a.available !== false);
    if (STATE.filter === "cars") return STATE.cars.filter(keep).map(a => Object.assign({}, a, { type: "cars" }));
    if (STATE.filter === "properties") return STATE.properties.filter(keep).map(a => Object.assign({}, a, { type: "properties" }));
    const cs = STATE.cars.filter(keep).map(a => Object.assign({}, a, { type: "cars" }));
    const ps = STATE.properties.filter(keep).map(a => Object.assign({}, a, { type: "properties" }));
    return cs.concat(ps);
  }
  // Three days of history sit to the LEFT of today's column. They
  // load and render normally, but the initial horizontal scroll
  // position is set so they're off-screen — the user can swipe right
  // to reveal them.
  const HISTORY_DAYS = 3;
  function dateRange() {
    const start = addDays(todayMidnight(), -HISTORY_DAYS);
    const total = STATE.zoom + HISTORY_DAYS;
    const days = [];
    for (let i = 0; i < total; i++) days.push(addDays(start, i));
    return { start: start, end: addDays(start, total - 1), days: days };
  }
  function render() {
    /* Switch the calendar/mine panels. */
    document.querySelector("#bkCalendarPanel").style.display = (STATE.tab === "calendar") ? "" : "none";
    document.querySelector("#bkMinePanel").style.display = (STATE.tab === "mine") ? "" : "none";
    if (STATE.tab === "calendar") renderGrid();
    else renderMine();
  }

  function buildAssetCell(a) {
    const el = document.createElement("div");
    el.className = "bk-asset-cell";
    const titleEl = document.createElement("div");
    titleEl.className = "bk-asset-title";
    const link = document.createElement("a");
    link.href = "/bookr-asset.html?type=" + encodeURIComponent(a.type) + "&id=" + encodeURIComponent(a.id);
    link.textContent = a.title || a.id;
    titleEl.appendChild(link);
    el.appendChild(titleEl);
    if (a.sub_title) {
      const sub = document.createElement("div");
      sub.className = "bk-asset-sub";
      sub.textContent = a.sub_title;
      el.appendChild(sub);
    }
    return el;
  }

  function buildDayHead(d, todayY) {
    const el = document.createElement("div");
    el.className = "bk-day-head";
    if (isWeekend(d)) el.classList.add("is-weekend");
    if (ymd(d) === todayY) el.classList.add("is-today-col");
    const dow = document.createElement("span"); dow.className = "bk-dow"; dow.textContent = dowLetter(d);
    const dn  = document.createElement("span"); dn.className  = "bk-dn";  dn.textContent  = String(d.getDate());
    el.appendChild(dow); el.appendChild(dn);
    if (d.getDate() === 1 || ymd(d) === todayY) {
      const mo = document.createElement("span");
      mo.className = "bk-mo"; mo.textContent = monShort(d);
      el.appendChild(mo);
    }
    return el;
  }

  function avatarUrlForBookrUid(uid) {
    if (!uid) return null;
    if (uid === "smartbnb") return "/assets/airbnb-logo.svg";
    const p = STATE.peopleByBookrUid[uid];
    return (p && p._photo_url) || null;
  }

    function buildBookingCell(a, d, todayY) {
    const el = document.createElement("div");
    el.className = "bk-cell";
    const dy = ymd(d);
    if (isWeekend(d)) el.classList.add("is-weekend");
    if (dy === todayY) el.classList.add("is-today-col");
    if (dy < todayY) el.classList.add("is-past");
    const bookings = STATE.bookings[a.type + ":" + a.id] || {};
    const value = bookings[dy];
    const myUids = (STATE.whoami && STATE.whoami.uids) || [];
    if (STATE.pendingDates && STATE.pendingDates.has(dy)) {
      el.classList.add("is-loading");
      el.setAttribute("aria-busy", "true");
      el.dataset.kind = "loading";
      el.dataset.type = a.type;
      el.dataset.asset = a.id;
      el.dataset.date = dy;
      return el;
    }
    if (value && value !== "free") {
      const u = STATE.users[value];
      // SmartBnB is the external-channel integration owner (AirBnb / Guesty
      // sync writes its uid into the date cell). Render those as "AirBnb"
      // and skip the Person link — there's no Directory record behind it.
      const isExternalChannel = (value === "smartbnb");
      const fullName = isExternalChannel ? "AirBnb" : ((u && u.name) || value);
      el.classList.add("is-booked");
      if (isExternalChannel) el.classList.add("is-external");
      const isMine = (myUids.length && myUids.indexOf(value) >= 0);
      if (isMine) el.classList.add("is-mine");
      // Name is a link to the booker's TogetherBook profile EXCEPT
      // when this is the viewer's own booking — for that case we
      // want the tap to open the cancel-this-booking confirm dialog
      // wired in the grid click handler. So: plain span for mine +
      // external channel; <a> link only for other people's bookings.
      const useLink = !isExternalChannel && !isMine;
      const name = useLink ? document.createElement("a") : document.createElement("span");
      name.className = "bk-cell-name";
      if (useLink) name.href = "/user.html?bookr_uid=" + encodeURIComponent(value);
      // Split into two stacked lines: everything before the last space
      // goes on top, surname on the bottom. One-word names (e.g.
      // "AirBnb") render as a single line.
      const _parts = (fullName || "").trim().split(/\s+/).filter(Boolean);
      const _last = _parts.length > 1 ? _parts.pop() : "";
      const _first = _parts.join(" ");
      const _l1 = document.createElement("span");
      _l1.className = "bk-name-line";
      _l1.textContent = _first || fullName || "";
      name.appendChild(_l1);
      if (_last) {
        const _l2 = document.createElement("span");
        _l2.className = "bk-name-line";
        _l2.textContent = _last;
        name.appendChild(_l2);
      }
      // If we have an avatar (or the AirBnb logo for smartbnb), put it
      // over the name; CSS swaps it for the name on :hover / .bk-pressed.
      const avatarUrl = avatarUrlForBookrUid(value);
      if (avatarUrl) {
        const img = document.createElement("img");
        img.className = "bk-cell-avatar";
        img.src = avatarUrl;
        img.alt = "";
        img.onerror = () => { img.remove(); el.classList.remove("bk-has-avatar"); };
        el.classList.add("bk-has-avatar");
        el.appendChild(img);
      }
      el.appendChild(name);
      el.title = fullName + " · " + a.title;
      el.dataset.kind = "booked";
      el.dataset.uid = value;
    } else if (dy >= todayY) {
      el.classList.add("is-free");
      el.title = "Free — click to book " + a.title + " on " + dy;
      el.dataset.kind = "free";
    } else {
      el.dataset.kind = "pastfree";
    }
    el.dataset.type = a.type;
    el.dataset.asset = a.id;
    el.dataset.date = dy;
    return el;
  }

  function renderGrid() {
    const grid = document.querySelector("#bkGrid");
    grid.innerHTML = "";
    const assets = visibleAssets();
    const { days } = dateRange();
    const todayY = ymd(todayMidnight());
    /* Day columns are square at the avatar circle's size (64px) so a
       booked cell is exactly the round avatar with no padding. */
    const dayW = 64;
    grid.style.gridTemplateColumns = "75px repeat(" + days.length + ", " + dayW + "px)";
    // Initial scroll: skip past the 3 history days so today's column
    // is the first thing the user sees. Swipe right reveals history.
    const wrap = grid.parentElement;
    if (wrap && wrap.classList.contains("bk-grid-wrap")) {
      // Defer one frame so the layout's measured before we scroll.
      requestAnimationFrame(() => { wrap.scrollLeft = HISTORY_DAYS * dayW; });
    }
    /* Header row */
    const corner = document.createElement("div");
    corner.className = "bk-corner";
    // Corner cell left blank — was "N ASSETS · NEXT M DAYS" but that
    // info is already in the toolbar (the Days picker + the filter
    // pills) so the label was redundant.
    corner.textContent = "";
    grid.appendChild(corner);
    days.forEach(d => grid.appendChild(buildDayHead(d, todayY)));
    /* Asset rows */
    assets.forEach(a => {
      grid.appendChild(buildAssetCell(a));
      days.forEach(d => grid.appendChild(buildBookingCell(a, d, todayY)));
    });
    // Skip the expensive per-cell measure pass while the progressive
    // loader is firing renderGrid() once per week — it'll run a single
    // pass at the end. Also skip on huge zooms (360 days) where the
    // cell count makes the layout-reflow cost crash mobile Safari.
    if (!STATE.isLoadingBookings && (assets.length * days.length) < 2000) {
      fitNamesInGrid(grid);
    }
    setStatus("");
  }

  function fitNamesInGrid(grid) {
    const names = grid.querySelectorAll(".bk-cell-name");
    for (const el of names) {
      el.style.fontSize = "";
      const parent = el.parentElement;
      if (!parent) continue;
      const max = parent.clientWidth - 4;
      if (max <= 0) continue;
      const lines = el.querySelectorAll(".bk-name-line");
      // Start at the CSS-default size and shrink until the WIDER of the
      // two name lines fits the cell. Floor 8px to stay readable.
      let size = 19;
      function widest() {
        let w = 0;
        for (const ln of lines) { if (ln.scrollWidth > w) w = ln.scrollWidth; }
        return w;
      }
      while (widest() > max && size > 8) {
        size -= 0.5;
        el.style.fontSize = size + "px";
      }
    }
  }

  /* Walk consecutive same-uid cells around (type, id, date) to find */
  /* the run of dates that booking spans. Returns [start, end] in YMD. */
  function runFor(type, id, date, uid) {
    const map = STATE.bookings[type + ":" + id] || {};
    let s = new Date(date + "T00:00:00");
    let e = new Date(date + "T00:00:00");
    while (true) {
      const prev = addDays(s, -1);
      if (map[ymd(prev)] === uid) s = prev; else break;
    }
    while (true) {
      const next = addDays(e, 1);
      if (map[ymd(next)] === uid) e = next; else break;
    }
    return { from: ymd(s), to: ymd(e) };
  }

  function closePop() {
    const pop = document.querySelector("#bkPop");
    pop.style.display = "none";
    pop.innerHTML = "";
  }

  function openPop(cell) {
    const pop = document.querySelector("#bkPop");
    pop.innerHTML = "";
    const t = cell.dataset.type;
    const id = cell.dataset.asset;
    const date = cell.dataset.date;
    const kind = cell.dataset.kind;
    const asset = (t === "cars" ? STATE.cars : STATE.properties).find(a => a.id === id) || {};
    const myUids = (STATE.whoami && STATE.whoami.uids) || [];
    const myUid = myUids[0] || null;
    /* Position the popover near the clicked cell. */
    const r = cell.getBoundingClientRect();
    pop.style.display = "";
    pop.style.top  = Math.min(window.innerHeight - 200, r.bottom + 6) + "px";
    pop.style.left = Math.min(window.innerWidth - 340, Math.max(8, r.left)) + "px";
    /* Build inner HTML */
    const h = document.createElement("h3");
    const link = document.createElement("a");
    link.href = "/bookr-asset.html?type=" + encodeURIComponent(t) + "&id=" + encodeURIComponent(id);
    link.textContent = asset.title || id;
    link.style.color = "inherit";
    h.appendChild(link);
    pop.appendChild(h);
    if (asset.sub_title) {
      const s = document.createElement("div"); s.className = "bk-pop-sub"; s.textContent = asset.sub_title;
      pop.appendChild(s);
    }
    const meta = document.createElement("div");
    meta.className = "bk-pop-meta";
    pop.appendChild(meta);
    const actions = document.createElement("div");
    actions.className = "bk-pop-actions";
    pop.appendChild(actions);
    /* CONTENT depending on kind */
    if (kind === "free") {
      meta.textContent = "Free on " + date;
      const bookBtn = document.createElement("button");
      bookBtn.className = "bk-btn is-primary";
      bookBtn.textContent = STATE.isAdmin && STATE.targetEmail ? ("Book for " + STATE.targetEmail) : "Book this day";
      if (!myUid && !(STATE.isAdmin && STATE.targetEmail)) bookBtn.disabled = true;
      bookBtn.onclick = () => bookOne(t, id, date, cell);
      actions.appendChild(bookBtn);
    } else if (kind === "booked") {
      const uid = cell.dataset.uid;
      const u = STATE.users[uid] || {};
      const name = u.name || uid;
      const run = runFor(t, id, date, uid);
      meta.textContent = name + " · " + (run.from === run.to ? run.from : (run.from + " — " + run.to));
      const cancelBtn = document.createElement("button");
      cancelBtn.className = "bk-btn is-danger";
      cancelBtn.textContent = "Cancel " + date;
      const canCancel = STATE.isAdmin || (myUids.length && myUids.indexOf(uid) >= 0);
      if (!canCancel) cancelBtn.disabled = true;
      cancelBtn.onclick = () => cancelOne(t, id, date, cell);
      actions.appendChild(cancelBtn);
    }
    const closeBtn = document.createElement("button");
    closeBtn.className = "bk-btn"; closeBtn.textContent = "Close";
    closeBtn.onclick = closePop;
    actions.appendChild(closeBtn);
  }

  async function bookOne(type, asset, date, cell) {
    cell.classList.add("is-pending");
    closePop();
    const payload = { type: type, asset: asset, date: date };
    if (STATE.isAdmin && STATE.targetEmail) payload.target_email = STATE.targetEmail;
    let ok = false;
    try {
      const r = await fetch("/api/bookr/book", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload), cache: "no-store" });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || r.statusText);
      // Optimistic patch — book appears in the cell on the next
      // render, no waiting for the background refresh.
      const key = type + ":" + asset;
      STATE.bookings[key] = STATE.bookings[key] || {};
      STATE.bookings[key][date] = j.uid;
      ok = true;
    } catch (e) {
      alert("Could not book: " + e.message);
    }
    cell.classList.remove("is-pending");
    render();
    if (ok) loadBookingsProgressively().catch(() => {});
  }

  async function cancelOne(type, asset, date, cell) {
    cell.classList.add("is-pending");
    closePop();
    let ok = false;
    try {
      const r = await fetch("/api/bookr/cancel", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: type, asset: asset, date: date }), cache: "no-store" });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || r.statusText);
      const key = type + ":" + asset;
      if (STATE.bookings[key]) STATE.bookings[key][date] = "free";
      ok = true;
    } catch (e) {
      alert("Could not cancel: " + e.message);
    }
    cell.classList.remove("is-pending");
    render();
    if (ok) loadBookingsProgressively().catch(() => {});
  }

  /* My Bookings — list every cell whose value equals my uid, from the
     most recent April 1 forwards, grouped by asset. Fetches the full */
  /* bookings tree for every asset (no from/to) and filters. */
  async function renderMine() {
    const panel = document.querySelector("#bkMinePanel");
    panel.innerHTML = "";
    const myUids = (STATE.whoami && STATE.whoami.uids) || [];
    if (!myUids.length) {
      panel.innerHTML = '<div class="bk-mine-empty">You are not linked to a BookR user yet, so there are no bookings to list.</div>';
      return;
    }
    panel.innerHTML = '<div class="bk-status">Loading your bookings…</div>';
    const since = ymd(fiscalStart());
    const assets = [
      ...STATE.cars.map(a => Object.assign({}, a, { type: "cars" })),
      ...STATE.properties.map(a => Object.assign({}, a, { type: "properties" })),
    ];
    const fetches = await Promise.all(assets.map(a =>
      getJSON("/api/bookr/bookings?type=" + encodeURIComponent(a.type) + "&asset=" + encodeURIComponent(a.id) + "&from=" + since + "&to=2099-12-31")
        .then(r => ({ a: a, b: (r && r.bookings) || {} }))
        .catch(() => ({ a: a, b: {} }))));
    /* Build runs of consecutive same-uid dates per asset. */
    const groups = [];
    fetches.forEach(({ a, b }) => {
      const dates = Object.keys(b).filter(d => myUids.indexOf(b[d]) >= 0).sort();
      if (!dates.length) return;
      const runs = [];
      let s = dates[0], prev = dates[0];
      for (let i = 1; i < dates.length; i++) {
        const expected = ymd(addDays(new Date(prev + "T00:00:00"), 1));
        if (dates[i] === expected) { prev = dates[i]; continue; }
        runs.push({ from: s, to: prev });
        s = dates[i]; prev = dates[i];
      }
      runs.push({ from: s, to: prev });
      groups.push({ a: a, runs: runs });
    });
    panel.innerHTML = "";
    if (!groups.length) {
      panel.innerHTML = '<div class="bk-mine-empty">No bookings since ' + since + '.</div>';
      return;
    }
    const todayY = ymd(todayMidnight());
    groups.forEach(g => panel.appendChild(buildMineGroup(g, todayY)));
  }

  function buildMineGroup(g, todayY) {
    const wrap = document.createElement("div");
    wrap.className = "bk-mine-group";
    const h = document.createElement("h2");
    const link = document.createElement("a");
    link.href = "/bookr-asset.html?type=" + encodeURIComponent(g.a.type) + "&id=" + encodeURIComponent(g.a.id);
    link.textContent = g.a.title || g.a.id;
    h.appendChild(link);
    if (g.a.sub_title) {
      const su = document.createElement("span");
      su.style.cssText = "margin-left:8px;color:var(--ink-500);font-weight:400;font-size:12px;";
      su.textContent = g.a.sub_title;
      h.appendChild(su);
    }
    wrap.appendChild(h);
    g.runs.sort((x, y) => x.from < y.from ? -1 : x.from > y.from ? 1 : 0);
    g.runs.forEach(r => {
      const row = document.createElement("div");
      row.className = "bk-mine-row";
      const isPast = r.to < todayY;
      if (isPast) row.classList.add("is-past");
      const when = document.createElement("span");
      when.className = "bk-mine-when";
      when.textContent = r.from === r.to ? r.from : (r.from + "  →  " + r.to);
      row.appendChild(when);
      const meta = document.createElement("span");
      meta.className = "bk-mine-meta";
      const days = (new Date(r.to + "T00:00:00") - new Date(r.from + "T00:00:00"))/86400000 + 1;
      meta.textContent = days + " day" + (days === 1 ? "" : "s") + (isPast ? " · past" : " · upcoming");
      row.appendChild(meta);
      if (!isPast) {
        const btn = document.createElement("button");
        btn.className = "bk-btn is-danger";
        btn.textContent = days === 1 ? "Cancel" : "Cancel run";
        btn.onclick = () => cancelRun(g.a.type, g.a.id, r.from, r.to);
        row.appendChild(btn);
      } else {
        const spacer = document.createElement("span"); spacer.textContent = "";
        row.appendChild(spacer);
      }
      wrap.appendChild(row);
    });
    return wrap;
  }

  async function cancelRun(type, asset, from, to) {
    const start = new Date(from + "T00:00:00");
    const end = new Date(to + "T00:00:00");
    const dates = [];
    for (let d = new Date(start); d <= end; d = addDays(d, 1)) dates.push(ymd(d));
    if (!confirm("Cancel " + dates.length + " day" + (dates.length === 1 ? "" : "s") + "?")) return;
    for (const d of dates) {
      try {
        const r = await fetch("/api/bookr/cancel", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: type, asset: asset, date: d }), cache: "no-store" });
        const j = await r.json();
        if (!r.ok || !j.ok) throw new Error(j.error || r.statusText);
      } catch (e) {
        alert("Failed to cancel " + d + ": " + e.message);
        break;
      }
    }
    await refreshAllBookings();
    render();
  }

  /* Event wiring. */
  function wire() {
    document.querySelectorAll(".bk-tab").forEach(b => {
      b.addEventListener("click", () => {
        STATE.tab = b.dataset.tab;
        document.querySelectorAll(".bk-tab").forEach(x => x.classList.toggle("is-active", x === b));
        render();
      });
    });
    document.querySelector("#bkZoom").addEventListener("change", (e) => {
      STATE.zoom = parseInt(e.target.value, 10) || 30;
      setStatus("Loading…");
      requestAnimationFrame(() => { refreshAllBookings(); });
    });
    document.querySelector("#bkFilter").addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      document.querySelectorAll("#bkFilter button").forEach(x => x.classList.toggle("is-active", x === b));
      STATE.filter = b.dataset.f;
      setStatus("Loading…");
      requestAnimationFrame(() => { refreshAllBookings(); });
    });
    // #bkChangeUser dropdown was removed — users only book as themselves now.
    /* Mobile: press-and-hold over an avatar reveals the name. */
    const _grid = document.querySelector("#bkGrid");
    _grid.addEventListener("touchstart", (e) => {
      const cell = e.target.closest(".bk-cell.bk-has-avatar");
      if (cell) cell.classList.add("bk-pressed");
    }, { passive: true });
    const _clearPress = () => document.querySelectorAll(".bk-cell.bk-pressed").forEach(c => c.classList.remove("bk-pressed"));
    _grid.addEventListener("touchend",    _clearPress, { passive: true });
    _grid.addEventListener("touchcancel", _clearPress, { passive: true });
    document.querySelector("#bkGrid").addEventListener("click", (e) => {
      // Names inside booked cells (other people's bookings) are real
      // <a> links to that person's TogetherBook profile. Let the
      // browser handle that navigation instead of opening anything.
      if (e.target.closest("a.bk-cell-name")) return;
      const cell = e.target.closest(".bk-cell");
      if (!cell || !cell.dataset.type) return;
      const kind = cell.dataset.kind;
      if (kind === "pastfree") return;
      // Tap on your own booking → native confirm to cancel just that
      // day. Matches the BookR app's interaction. Tap on someone
      // else's booking or a free cell → the usual popover flow.
      if (kind === "booked" && cell.classList.contains("is-mine")) {
        const type    = cell.dataset.type;
        const asset   = cell.dataset.asset;
        const date    = cell.dataset.date;
        const assetTitle = (visibleAssets().find(a => String(a.id) === String(asset) && a.type === type) || {}).title || asset;
        if (confirm(`Cancel your booking?\n\n${assetTitle} booked for ${date}`)) {
          cancelOne(type, asset, date, cell);
        }
        return;
      }
      openPop(cell);
    });
    document.addEventListener("click", (e) => {
      const pop = document.querySelector("#bkPop");
      if (pop.style.display === "none") return;
      if (pop.contains(e.target)) return;
      if (e.target.closest(".bk-cell")) return;
      closePop();
    });
  }
  wire();
  loadAll();
})();
</script>
